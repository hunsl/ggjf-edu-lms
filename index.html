<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>경기북부 직업교육 학사관리 지원시스템 v2026 Master</title>
  
  <link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ══════════════════════════════════════════════════════════
       🎨 PREMIUM SAAS DESIGN SYSTEM (확장형 디자인 엔진)
    ══════════════════════════════════════════════════════════ */
    :root {
      /* 🍊 Brand Identity (경기북부 오렌지 테마) */
      --p: #EA580C; --p-dark: #C2410C; --p-light: #FB923C; --p-soft: #FFF7ED;
      --sb: #7C2D12; --sb-dark: #451A03;
      
      /* 🌑 Neutral Palette */
      --tx: #0F172A; --tx-sub: #334155; --mu: #64748B; --mu-light: #94A3B8;
      --bd: #E2E8F0; --bd-light: #F1F5F9;
      --s1: #FFFFFF; --s2: #F8FAFC; --s3: #F1F5F9;
      
      /* 🚥 Functional Colors */
      --ok: #10B981; --ok-soft: #ECFDF5;
      --warn: #F59E0B; --warn-soft: #FFFBEB;
      --danger: #EF4444; --danger-soft: #FEF2F2;
      --info: #3B82F6; --info-soft: #EFF6FF;
      --purple: #8B5CF6; --purple-soft: #F5F3FF;
      
      /* 💎 UI Geometry */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.04), 0 4px 6px -4px rgb(0 0 0 / 0.04);
      --shadow-lg: 0 25px 50px -12px rgb(0 0 0 / 0.12);
      --radius-sm: 8px; --radius-md: 16px; --radius-lg: 28px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background: var(--s2); color: var(--tx); -webkit-font-smoothing: antialiased; }

    /* 🌊 고성능 모션 그래픽 정의 */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    
    .animate-fade-up { animation: fadeUp 0.6s var(--ease) both; }
    .animate-pop { animation: popIn 0.4s var(--ease) both; }

    /* 💎 마스터 클래스 UI 부품 */
    .glass-effect { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .premium-card { background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--bd); box-shadow: var(--shadow-sm); transition: all 0.4s var(--ease); overflow: hidden; }
    .premium-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); border-color: var(--p-light); }

    /* 사이드바 프로페셔널 네비게이션 */
    .nav-link {
      display: flex; align-items: center; gap: 16px; padding: 18px 24px; border-radius: 20px; 
      cursor: pointer; color: rgba(255,255,255,0.5); transition: all 0.3s ease; border: none; 
      background: transparent; width: 100%; text-align: left; font-size: 15.5px; font-weight: 600;
      margin-bottom: 8px; position: relative;
    }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); transform: translateX(6px); }
    .nav-link.active { color: #fff; background: linear-gradient(135deg, var(--p) 0%, var(--p-dark) 100%); font-weight: 800; box-shadow: 0 10px 25px rgba(124,45,18,0.4); }
    .nav-link.active::before { content: ''; position: absolute; left: 0; width: 5px; height: 24px; background: #fff; border-radius: 0 4px 4px 0; }

    /* 행정 데이터 그리드 테이블 */
    .master-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .master-table th { background: var(--s3); padding: 22px 18px; font-size: 12.5px; font-weight: 800; color: var(--mu); text-transform: uppercase; border-bottom: 2px solid var(--bd); letter-spacing: 0.5px; }
    .master-table td { padding: 20px 18px; border-bottom: 1px solid var(--bd-light); transition: background 0.2s; font-size: 14.5px; }
    .master-table tr:hover td { background: var(--p-soft) !important; }

    /* 폼 컨트롤 고도화 */
    input, select, textarea { 
      width: 100%; padding: 15px 20px; border-radius: 16px; border: 2px solid var(--bd-light); 
      background: var(--s1); font-size: 15px; color: var(--tx); outline: none; transition: var(--ease); 
    }
    input:focus, select:focus { border-color: var(--p); box-shadow: 0 0 0 5px var(--p-soft); }
    label { font-size: 13.5px; font-weight: 800; color: var(--tx-sub); margin-bottom: 10px; display: block; margin-left: 5px; }

    /* 🚀 시스템 부팅 시뮬레이션 로더 */
    #loading { 
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
      background: radial-gradient(circle at center, var(--sb), var(--sb-dark)); z-index: 9999; transition: opacity 0.8s; color: #fff; 
    }
    .loading-pulse { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
    .loading-pulse::after { content: ''; position: absolute; width: 100%; height: 100%; border: 2px solid #fff; border-radius: 50%; animation: ping 1.5s var(--ease) infinite; }
    @keyframes ping { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }

    @media print { .no-print { display: none !important; } body { background: #fff; overflow: visible; } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-pulse"><span style="font-size: 40px;">🎓</span></div>
    <div style="margin-top: 40px; font-size: 30px; font-weight: 950; letter-spacing: -1.5px;">GYEONGGI NORTHERN EDU ERP</div>
    <div style="font-size: 14px; opacity: 0.6; margin-top: 15px; font-weight: 500; letter-spacing: 3px;">INITIALIZING MASTER SYSTEM V.2026</div>
  </div>
  <div id="root"></div>

<script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback } = React;

    /* ══════════════════════════════════════════════════════════
       1. CORE SYSTEM CONFIG (시스템 전역 설정 및 에러 방지용 변수)
    ══════════════════════════════════════════════════════════ */
    const SB_URL = "https://vqkjakgbrsnsererwmma.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxa2pha2dicnNuc2VyZXJ3bW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDA2MjIsImV4cCI6MjA4ODkxNjYyMn0.caGpzJdTcfT3CZTkJi2Mctte3nNvh3e6xTtFVaCfkiM";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);
    const API = `${SB_URL}/rest/v1`;
    const H = { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json", "Prefer": "return=representation" };

    // 사이드바 메뉴 정의 (이게 없으면 메뉴가 안 뜹니다)
    const NAV_ITEMS = [
      { id: "dash", label: "대시보드 컨트롤", icon: "dash" },
      { id: "courses", label: "교육과정 마스터", icon: "course" },
      { id: "students", label: "훈련생 마스터", icon: "students" },
      { id: "attendance", label: "실시간 출결제어", icon: "attend" },
      { id: "employment", label: "취업 성과관리", icon: "award" },
      { id: "cert", label: "증명서 공식발급", icon: "cert" }
    ];

    // 테스트용 시드 데이터
    const SEED_DATA = {
      students: [
        { id: 101, name: "홍길동", cid: 1, birth: "1995-05-10", phone: "010-1234-5678", rate: 95, empStatus: "과정유관 취업", itvGrade: "A+", itvPass: true },
        { id: 102, name: "성춘향", cid: 1, birth: "1998-11-20", phone: "010-2233-4455", rate: 75, empStatus: "미취업", itvGrade: "B", itvPass: true },
        { id: 103, name: "이몽룡", cid: 2, birth: "1992-02-14", phone: "010-5566-7788", rate: 100, empStatus: "취업", itvGrade: "A", itvPass: true }
      ]
    };

    /* ── DB 비동기 핸들러 ── */
    const sysDB = {
      async query(table, q = "select=*") {
        try {
          const r = await fetch(`${API}/${table}?${q}`, { headers: H });
          const d = await r.json();
          return r.ok ? { data: d, error: null } : { data: null, error: d };
        } catch (e) { return { data: null, error: e }; }
      },
      async upsert(table, body, filter = "") {
        const method = filter ? "PATCH" : "POST";
        const url = filter ? `${API}/${table}?${filter}` : `${API}/${table}`;
        try {
          const r = await fetch(url, { method, headers: H, body: JSON.stringify(Array.isArray(body)?body:[body]) });
          const d = await r.json();
          return r.ok ? { data: d, error: null } : { data: null, error: d };
        } catch (e) { return { data: null, error: e }; }
      },
      async remove(table, filter) {
        try {
          const r = await fetch(`${API}/${table}?${filter}`, { method: "DELETE", headers: H });
          return r.ok ? { error: null } : { error: true };
        } catch (e) { return { error: e }; }
      }
    };

    /* ── 행정 데이터 매퍼 ── */
    const mapper = {
      student: r => r ? {
        id: r.id, cid: r.course_id, name: r.name, gender: r.gender, birth: r.birth, phone: r.phone, 
        addr: r.addr_city, edu: r.edu, major: r.major, empStatus: r.employ_status || "미취업",
        itvScore: r.itv_score, itvGrade: r.itv_grade, itvPass: r.itv_pass, rate: r.rate || 0, memo: r.memo
      } : null,
      course: r => r ? {
        id: r.id, cat: r.category, code: r.code, name: r.name, from: r.date_from, to: r.date_to,
        hours: r.hours, tgt: r.target, cg: r.completion_goal, eg: r.employment_goal, method: r.method,
        days: r.sched_days, tFrom: r.sched_time_from, tTo: r.sched_time_to, cc: r.category === "늘봄강사양성" ? "#EA580C" : "#C2410C"
      } : null,
      attendance: r => r ? {
        id: r.id, sid: r.student_id, cid: r.course_id, date: r.attend_date, in: r.in_time, out: r.out_time, status: r.status, viaQr: !!r.via_qr
      } : null
    };

    const fromCourse = (c) => ({
      category: c.cat, code: c.code, name: c.name, date_from: c.from, date_to: c.to,
      hours: c.hours, target: c.tgt, completion_goal: c.cg, employment_goal: c.eg,
      method: c.method, sched_days: c.days, sched_time_from: c.tFrom, sched_time_to: c.tTo
    });

    const fromStudent = (s) => ({
      course_id: s.cid, name: s.name, gender: s.gender, birth: s.birth, phone: s.phone,
      addr_city: s.addr, edu: s.edu, major: s.major, employ_status: s.empStatus,
      itv_score: s.itvScore, itv_grade: s.itvGrade, itv_pass: s.itvPass, rate: s.rate, memo: s.memo
    });

    const rateColor = (r) => r >= 80 ? "var(--ok)" : r >= 70 ? "var(--warn)" : "var(--danger)";

    /* ═══════════════════════════════════════════════════════════
       2. ATOMIC UI COMPONENTS (고성능 부품군 - Chip 포함)
    ═══════════════════════════════════════════════════════════ */
    const Icon = ({ n, s=20, c="currentColor", style={} }) => {
      const paths = {
        dash: <><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>,
        course: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>,
        students: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></>,
        attend: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        award: <><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>,
        cert: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
        plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
        qr: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,
        search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        dl: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>
      };
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0, ...style}}>{paths[n]}</svg>;
    };

    const Btn = ({ children, onClick, variant="primary", size="md", style={}, disabled=false, icon }) => {
      const base = { border:"none", borderRadius:"16px", cursor:disabled?"not-allowed":"pointer", fontWeight:800, display:"inline-flex", alignItems:"center", justifyContent:"center", gap:"10px", transition:"all 0.3s cubic-bezier(0.16, 1, 0.3, 1)", opacity:disabled?0.5:1 };
      const sizes = { sm:{padding:"10px 18px",fontSize:13.5}, md:{padding:"15px 32px",fontSize:15.5}, lg:{padding:"20px 48px",fontSize:18} };
      const variants = {
        primary: { background:`linear-gradient(135deg, var(--p), var(--p-dark))`, color:"#fff", boxShadow:`0 8px 20px rgba(234, 88, 12, 0.3)` },
        white: { background:"#fff", color:"var(--tx)", border:"2.5px solid var(--bd-light)", boxShadow:"var(--shadow-sm)" },
        ghost: { background:"var(--bd-light)", color:"var(--tx-sub)", border:"none" },
        danger: { background: "var(--danger-soft)", color: "var(--danger)", border: "2.5px solid #FECACA" }
      };
      return (
        <button disabled={disabled} onClick={onClick} onMouseDown={e => !disabled && (e.currentTarget.style.transform = "scale(0.96)")} onMouseUp={e => !disabled && (e.currentTarget.style.transform = "scale(1)")} style={{...base, ...sizes[size], ...variants[variant], ...style}}>
          {icon && <Icon n={icon} s={size==='sm'?18:22} />}
          {children}
        </button>
      );
    };

    const Chip = ({ label, type = "info", icon, style = {} }) => {
      const colors = {
        info: { bg: "var(--info-soft)", tx: "var(--info)" },
        success: { bg: "var(--ok-soft)", tx: "var(--ok)" },
        warn: { bg: "var(--warn-soft)", tx: "var(--warn)" },
        danger: { bg: "var(--danger-soft)", tx: "var(--danger)" },
        purple: { bg: "var(--purple-soft)", tx: "var(--purple)" },
        ghost: { bg: "var(--s3)", tx: "var(--mu)" }
      };
      const c = colors[type] || colors.info;
      return (
        <span style={{
          background: c.bg, color: c.tx, padding: "7px 16px", borderRadius: "24px",
          fontSize: "12.5px", fontWeight: 900, whiteSpace: "nowrap", display: "inline-flex",
          alignItems: "center", gap: 7, ...style
        }}>
          {icon && <Icon n={icon} s={14} c={c.tx} />}
          {label}
        </span>
      );
    };

    const Badge = ({ label, type="info" }) => <Chip label={label} type={type} />;

    const SectionHead = ({ title, sub, right }) => (
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:45, paddingBottom:25, borderBottom:`4px solid var(--bd-light)` }}>
        <div className="animate-fade-up">
          <h2 style={{ fontSize:36, fontWeight:950, color:"var(--tx)", letterSpacing:"-1.5px", marginBottom:12 }}>{title}</h2>
          {sub && <p style={{ fontSize:17, fontWeight:500, color:"var(--mu)", letterSpacing:"-0.5px" }}>{sub}</p>}
        </div>
        <div className="no-print">{right}</div>
      </div>
    );
    /* ═══════════════════════════════════════════════════════════
       3. CONFLICT & LOGIC ENGINE (중복 배정 방지 및 행정 로직)
    ═══════════════════════════════════════════════════════════ */
    
    // 강의실 및 강사 일정 충돌 검사 (Overlap Detection Algorithm)
    const ConflictEngine = {
      check: (newCourse, allCourses) => {
        // 날짜가 하루라도 겹치는지 체크
        const isDateOverlap = (c1, c2) => {
          const s1 = new Date(c1.from); const e1 = new Date(c1.to);
          const s2 = new Date(c2.from); const e2 = new Date(c2.to);
          return s1 <= e2 && e1 >= s2;
        };

        // 시간이 겹치는지 체크
        const isTimeOverlap = (c1, c2) => {
          const tS1 = c1.tFrom; const tE1 = c1.tTo;
          const tS2 = c2.tFrom; const tE2 = c2.tTo;
          return tS1 < tE2 && tE1 > tS2;
        };

        // 요일이 하루라도 겹치는지 체크
        const isDayOverlap = (c1, c2) => {
          const d1 = c1.days.split(',').map(d => d.trim());
          const d2 = c2.days.split(',').map(d => d.trim());
          return d1.some(day => d2.includes(day));
        };

        for (const target of allCourses) {
          if (newCourse.id === target.id) continue; // 수정 시 자기 자신 제외

          if (isDateOverlap(newCourse, target) && isDayOverlap(newCourse, target) && isTimeOverlap(newCourse, target)) {
            // 1. 강의실 중복 체크
            if (newCourse.roomId === target.roomId && newCourse.roomId !== 0) {
              return { type: 'ROOM', msg: `[강의실 충돌] '${target.name}' 과정이 이미 해당 강의실을 사용 중입니다.` };
            }
            // 2. 강사 중복 체크
            if (newCourse.instrId === target.instrId && newCourse.instrId !== 0) {
              return { type: 'INSTR', msg: `[강사 충돌] 배정된 강사가 해당 시간에 '${target.name}' 강의를 진행합니다.` };
            }
          }
        }
        return null;
      }
    };

    /* ═══════════════════════════════════════════════════════════
       4. DASHBOARD COMPONENT (고밀도 성과 지표)
    ═══════════════════════════════════════════════════════════ */
    const Dashboard = ({ students, courses }) => {
      const stats = useMemo(() => {
        const totalTgt = courses.reduce((a, b) => a + (b.tgt || 0), 0);
        const currentTotal = students.length;
        const avgRate = currentTotal ? (students.reduce((a, b) => a + b.rate, 0) / currentTotal).toFixed(1) : 0;
        const riskGroup = students.filter(s => s.rate < 80);
        const empRelevant = students.filter(s => s.empStatus === "과정유관 취업").length;
        
        return { totalTgt, currentTotal, avgRate, riskGroup, empRelevant };
      }, [students, courses]);

      return (
        <div className="page-container animate-fade-up">
          <SectionHead 
            title="사업 운영 종합 대시보드" 
            sub="2026년 경기북부 직업교육 실시간 지표 분석"
            right={<Badge label="LIVE UPDATE ENABLED" type="success" icon="dash" />}
          />

    ═══════════════════════════════════════════════════════════ */
    const StudentMobileView = ({ cid }) => {
      const [course, setCourse] = useState(null);
      const [students, setStudents] = useState([]);
      const [selSid, setSelSid] = useState("");
      const [msg, setMsg] = useState("");

      useEffect(() => {
        const load = async () => {
          const { data: c } = await sysDB.query("courses", `id=eq.${cid}`);
          const { data: s } = await sysDB.query("students", `course_id=eq.${cid}&order=name`);
          if (c) setCourse(mapper.course(c[0]));
          if (s) setStudents(s.map(mapper.student));
        };
        load();
      }, [cid]);

      const handleCheck = async (type) => {
        if (!selSid) return alert("본인의 성명을 선택해 주세요.");
        const now = new Date().toTimeString().slice(0, 5);
        const today = new Date().toISOString().slice(0, 10);
        const body = type === 'in' ? { in_time: now, status: '출석', via_qr: true } : { out_time: now, via_qr: true };
        
        const { data: ex } = await sysDB.query("attendance", `student_id=eq.${selSid}&attend_date=eq.${today}`);
        if (ex && ex.length > 0) await sysDB.upsert("attendance", body, `id=eq.${ex[0].id}`);
        else await sysDB.upsert("attendance", { student_id: selSid, course_id: cid, attend_date: today, ...body });
        
        setMsg(`${type === 'in' ? '입실' : '퇴실'} 처리가 완료되었습니다!`);
      };

      if (!course) return <div id="loading"><div className="loading-pulse"></div></div>;

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", minHeight: "100vh", background: "#fff", display: "flex", flexDirection: "column" }}>

            <h1 style={{ fontSize: 26, fontWeight: 950 }}>{course.name}</h1>
          </header>
          <main style={{ flex: 1, padding: 40 }}>
            {msg ? (
              <div style={{ textAlign: "center", paddingTop: 40 }}>
                <div style={{ fontSize: 80, marginBottom: 20 }}>✅</div>
                <h2 style={{ fontSize: 24, fontWeight: 900 }}>{msg}</h2>
                <Btn onClick={() => setMsg("")} style={{ marginTop: 40, width: "100%" }}>확인</Btn>
              </div>
            ) : (
              <div>
                <label style={{ fontSize: 16, fontWeight: 800, marginBottom: 15 }}>성명을 선택하세요</label>
                <select value={selSid} onChange={e => setSelSid(e.target.value)} style={{ height: 64, fontSize: 18, fontWeight: 700, borderRadius: 20, marginBottom: 40 }}>
                  <option value="">-- 명단 선택 --</option>
                  {students.map(s => <option key={s.id} value={s.id}>{s.name} (2026-ID-{s.id})</option>)}
                </select>
                <button onClick={() => handleCheck('in')} style={{ width: "100%", height: 80, borderRadius: 24, background: "var(--p)", color: "#fff", fontSize: 22, fontWeight: 900, border: "none", marginBottom: 16, cursor: "pointer" }}>입실 하기</button>
                <button onClick={() => handleCheck('out')} style={{ width: "100%", height: 80, borderRadius: 24, background: "var(--tx-sub)", color: "#fff", fontSize: 22, fontWeight: 900, border: "none", cursor: "pointer" }}>퇴실 하기</button>
              </div>
            )}
          </main>
        </div>
      );

      const isMobile = params.get("mode") === "checkin";
      const cid = params.get("cid");

      // 시스템 마운트 및 실시간 데이터 바인딩
      useEffect(() => {
        if (isMobile) return;
        const init = async () => {
          const [c, s, a] = await Promise.all([
            sysDB.query("courses", "select=*&order=id"),
            sysDB.query("students", "select=*&order=id"),
            sysDB.query("attendance", `attend_date=eq.${new Date().toISOString().slice(0, 10)}`)
          ]);
          if (c.data) setCourses(c.data.map(mapper.course));
          if (s.data) setStudents(prev => [...prev, ...s.data.map(mapper.student)]);
          if (a.data) setAttendance(a.data.map(mapper.attendance));
          
          document.getElementById('loading').style.opacity = '0';
          setTimeout(() => document.getElementById('loading').remove(), 800);
        };
        init();

        // ⭐ Supabase Realtime 채널 구독
        const channel = supabase.channel('realtime-erp')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance' }, p => {
            if (p.eventType === 'INSERT') setAttendance(prev => [...prev, mapper.attendance(p.new)]);
            if (p.eventType === 'UPDATE') setAttendance(prev => prev.map(x => x.id === p.new.id ? mapper.attendance(p.new) : x));
          }).subscribe();
        return () => supabase.removeChannel(channel);
      }, [isMobile]);

      if (isMobile && cid) return <StudentMobileView cid={cid} />;

      const renderPage = () => {
        switch(page) {
          case "dash": return <Dashboard students={students} courses={courses} />;
          case "courses": return <CourseList courses={courses} onAdd={async d => { const {data}=await sysDB.upsert("courses", d); if(data) setCourses(p=>[...p, mapper.course(data)]); }} onUpdate={async d => { await sysDB.upsert("courses", d, `id=eq.${d.id}`); setCourses(p=>p.map(x=>x.id===d.id?d:x)); }} onDelete={async id => { await sysDB.remove("courses", `id=eq.${id}`); setCourses(p=>p.filter(x=>x.id!==id)); }} />;
          case "students": return <StudentMgmt students={students} courses={courses} onUpdate={async d => { await sysDB.upsert("students", d, `id=eq.${d.id}`); setStudents(p=>p.map(x=>x.id===d.id?d:x)); }} onDelete={async id => { await sysDB.remove("students", `id=eq.${id}`); setStudents(p=>p.filter(x=>x.id!==id)); }} onNew={() => alert('신규등록')} />;
          case "employment": return <EmploymentMgmt students={students} courses={courses} onUpdate={async d => { await sysDB.upsert("students", d, `id=eq.${d.id}`); setStudents(p=>p.map(x=>x.id===d.id?d:x)); }} />;
          case "attendance": return <AttendanceMgmt students={students} courses={courses} attendance={attendance} onManualUpdate={async (sid, type, val, stat) => {
            const today = new Date().toISOString().slice(0, 10);
            const ex = attendance.find(a => a.sid === sid && a.date === today);
            const body = type === 'in' ? { in_time: val, status: stat } : type === 'out' ? { out_time: val } : { status: val };
            if (ex) await sysDB.upsert("attendance", body, `id=eq.${ex.id}`);
            else await sysDB.upsert("attendance", { student_id: sid, course_id: students.find(x=>x.id===sid).cid, attend_date: today, ...body, via_qr: false });
          }} />;
          case "cert": return <CertMgmt students={students} courses={courses} />;
          default: return <Dashboard students={students} courses={courses} />;
        }
      };

      return (
        <div style={{ display: "flex", height: "100vh", overflow: "hidden" }}>
          <aside style={{ width: 320, background: "var(--sb)", color: "#fff", display: "flex", flexDirection: "column", boxShadow: "10px 0 40px rgba(0,0,0,0.3)", zIndex: 100 }}>
            <div style={{ padding: "60px 40px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ fontSize: 28, fontWeight: 950, letterSpacing: "-1.5px" }}>NORTHERN ERP</div>
              <div style={{ fontSize: 13, color: "var(--p-light)", fontWeight: 800, marginTop: 8 }}>Gyeonggi Job Foundation</div>
            </div>
            <nav className="premium-scroll" style={{ flex: 1, padding: "40px 20px", overflowY: "auto" }}>
              {[
                {id:"dash", l:"대시보드 컨트롤", i:"dash"}, {id:"courses", l:"교육과정 마스터", i:"course"}, {id:"students", l:"훈련생 데이터", i:"students"},
                {id:"attendance", l:"실시간 출결제어", i:"attend"}, {id:"employment", l:"취업 성과관리", i:"award"}, {id:"cert", l:"증명서 공식발급", i:"cert"}
              ].map(it => (
                <button key={it.id} onClick={() => setPage(it.id)} className={`nav-link ${page===it.id?'active':''}`}>
                  <Icon n={it.i} s={22} /> {it.l}
                </button>
              ))}
            </nav>
            <div style={{ padding: 40, background: "rgba(0,0,0,0.2)", textAlign: "center" }}>
              <div style={{ fontSize: 16, fontWeight: 900 }}>이상훈 과장님</div>
              <div style={{ fontSize: 11, opacity: 0.5, marginTop: 5 }}>북부교육팀 마스터</div>
            </div>
          </aside>
          <main className="premium-scroll" style={{ flex: 1, overflowY: "auto", padding: "60px 80px", background: "var(--s2)" }}>
            {renderPage()}
          </main>
        </div>
      );
    }

    /* ── 최종 렌더링 ── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
