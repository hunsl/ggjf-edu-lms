      }
    }

      }
      to {
        opacity: 1;
      }

    const AttendanceManager = ({ data, setData }) => {
      const [course, setCourse] = useState(data.courses[1] || data.courses[0]);
      const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
      const [mode, setMode] = useState("qr");
      const [qrType, setQrType] = useState("in");
      const [records, setRecords] = useState({});
      const [simRunning, setSimRunning] = useState(false);

      const courseStudents = data.students.filter(s => s.cid === course.id);

      const qrData = `https://check.gjf.or.kr/attend?c=${course.code}&d=${date}&type=${qrType}`;
      const qrUrl = `https://quickchart.io/qr?text=${encodeURIComponent(qrData)}&size=200&margin=2`;

      const startSim = () => {
        if (simRunning) return;
        setSimRunning(true);
        let i = 0;
        const interval = setInterval(() => {
          if (i >= courseStudents.length) {
            clearInterval(interval);
            setSimRunning(false);
            return;
          }
          const s = courseStudents[i];
          const time = `${String(Math.floor(Math.random() * 24)).padStart(2, "0")}:${String(Math.floor(Math.random() * 60)).padStart(2, "0")}`;
          setRecords(prev => ({ ...prev, [s.id]: { ...prev[s.id], [qrType === "in" ? "in_time" : "out_time"]: time } }));
          i++;
        }, 200);
      };

      return (
        <div className="page">
          <SectionHead
            title="📋 출결관리"
            sub="QR 코드 스캔 또는 수동 입력으로 출석 관리"
            right={
              <div style={{ display: "flex", gap: "6px" }}>
                <Btn size="sm" onClick={() => setMode("qr")} variant={mode === "qr" ? "primary" : "ghost"}>📱 QR 출석</Btn>
                <Btn size="sm" onClick={() => setMode("manual")} variant={mode === "manual" ? "primary" : "ghost"}>✏️ 수동입력</Btn>
              </div>
            }
          />

          <Card style={{ padding: "14px 18px", marginBottom: "16px", display: "flex", gap: "14px", alignItems: "center", flexWrap: "wrap" }}>
            <div>
              <label style={{ fontSize: "10px", fontWeight: "600", color: T.mu, display: "block", marginBottom: "5px" }}>과정</label>
              <select value={course.id} onChange={(e) => setCourse(data.courses.find(c => c.id === +e.target.value) || data.courses[0])} style={{ padding: "7px 10px", border: `1px solid ${T.bd}`, borderRadius: "8px", fontSize: "12px", cursor: "pointer", background: T.s2 }}>
                {data.courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: "10px", fontWeight: "600", color: T.mu, display: "block", marginBottom: "5px" }}>수업일</label>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={{ padding: "7px 10px", border: `1px solid ${T.bd}`, borderRadius: "8px", fontSize: "12px", background: T.s2, cursor: "pointer" }} />
            </div>
            <div style={{ marginLeft: "auto", display: "flex", gap: "12px", alignItems: "center", fontSize: "12px" }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: "16px", fontWeight: "800", color: T.ok }}>
                  {Object.values(records).filter(r => r.in_time).length}
                </div>
                <div style={{ fontSize: "9px", color: T.mu }}>출석</div>
              </div>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: "16px", fontWeight: "800", color: T.danger }}>
                  {courseStudents.length - Object.values(records).filter(r => r.in_time).length}
                </div>
                <div style={{ fontSize: "9px", color: T.mu }}>미확인</div>
              </div>
            </div>
          </Card>

          {mode === "qr" ? (
            <div style={{ display: "grid", gridTemplateColumns: "300px 1fr", gap: "16px" }}>
              <Card style={{ padding: "20px" }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px", marginBottom: "14px" }}>
                  {["📥 입실", "📤 퇴실"].map((label, i) => (
                    <Btn key={i} size="sm" onClick={() => setQrType(i === 0 ? "in" : "out")} variant={qrType === (i === 0 ? "in" : "out") ? "primary" : "ghost"} style={{ justifyContent: "center", fontSize: "11px" }}>
                      {label}
                    </Btn>
                  ))}
                </div>
                <div style={{ background: "#ddd", width: "100%", aspectRatio: "1", borderRadius: "12px", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: "14px", overflow: "hidden" }}>
                  <img src={qrUrl} alt="QR" style={{ width: "100%", height: "100%" }} onError={(e) => e.target.style.display = "none"} />
                </div>
                <Btn onClick={startSim} variant="primary" style={{ width: "100%", justifyContent: "center", fontSize: "11px" }}>
                  {simRunning ? "스캔 중..." : "시뮬레이션"}
                </Btn>
              </Card>

              <Card style={{ padding: "0", overflow: "hidden" }}>
                <div style={{ overflowY: "auto", maxHeight: "400px" }}>
                  {courseStudents.map(s => {
                    const rec = records[s.id];
                    const inTime = rec?.in_time;
                    return (
                      <div key={s.id} style={{ display: "flex", alignItems: "center", gap: "10px", padding: "11px 14px", borderBottom: `1px solid ${T.bd}`, background: inTime ? T.pbg : T.s }}>
                        <div style={{ width: "32px", height: "32px", borderRadius: "8px", background: inTime ? `${T.p}20` : T.s2, color: inTime ? T.p : T.mu, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px", fontWeight: "800", flexShrink: 0 }}>
                          {s.name[0]}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: "12px", fontWeight: "700", color: T.tx }}>{s.name}</div>
                          <div style={{ fontSize: "10px", color: inTime ? T.ok : T.mu, marginTop: "2px" }}>
                            {inTime ? `✓ 입실 ${inTime}` : "대기"}
                          </div>
                        </div>
                        <Chip label={inTime ? "출석" : "미확인"} bg={inTime ? T.pbg : T.s2} color={inTime ? T.p : T.mu} />
                      </div>
                    );
                  })}
                </div>
              </Card>
            </div>
          ) : (
            <Card style={{ overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ background: T.s3, borderBottom: `1px solid ${T.bd}` }}>
                    {["이름", "입실", "퇴실", "상태"].map((h, i) => (
                      <th key={i} style={{ padding: "10px 12px", textAlign: "left", fontSize: "11px", fontWeight: "700", color: T.mu }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {courseStudents.map(s => {
                    const rec = records[s.id];
                    return (
                      <tr key={s.id} className="row-hover" style={{ borderBottom: `1px solid ${T.bd}` }}>
                        <td style={{ padding: "10px 12px", fontSize: "12px", fontWeight: "700" }}>{s.name}</td>
                        <td style={{ padding: "10px 12px", fontSize: "11px", color: T.mu }}>
                          <input type="time" defaultValue={rec?.in_time} style={{ width: "90px", padding: "4px", border: `1px solid ${T.bd}`, borderRadius: "6px", fontSize: "11px" }} />
                        </td>
                        <td style={{ padding: "10px 12px", fontSize: "11px", color: T.mu }}>
                          <input type="time" defaultValue={rec?.out_time} style={{ width: "90px", padding: "4px", border: `1px solid ${T.bd}`, borderRadius: "6px", fontSize: "11px" }} />
                        </td>
                        <td style={{ padding: "10px 12px" }}>
                          <Chip label={rec?.in_time ? "출석" : "결석"} bg={rec?.in_time ? T.pbg : "#FEF2F2"} color={rec?.in_time ? T.p : T.danger} />
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </Card>
          )}
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════
    // 🎓 COMPLETION & CERTIFICATE
    // ═══════════════════════════════════════════════════════════
    const CertificateManager = ({ data }) => {
      const [course, setCourse] = useState(data.courses[1] || data.courses[0]);
      const courseStudents = data.students.filter(s => s.cid === course.id && s.rate >= 80);

      const printCert = (s) => {
        const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:'Pretendard',sans-serif;padding:40px;background:#f0f0f0}
        .cert{width:210mm;height:297mm;background:#fff;padding:30mm;display:flex;flex-direction:column;box-shadow:0 0 20px rgba(0,0,0,.1);margin:auto}
        .title{text-align:center;font-size:48px;font-weight:900;letter-spacing:20px;margin-bottom:60px;border-bottom:3px solid #000;padding-bottom:15px}
        .field{display:flex;align-items:baseline;font-size:16px;margin-bottom:30px;gap:10px}
        .label{font-weight:700;min-width:120px}
        .value{flex:1;border-bottom:1px solid #999;padding-bottom:5px}
        .body{text-align:center;font-size:15px;line-height:2.2;margin:80px 0}
        .sign{text-align:center;margin-top:100px}
        .sign-line{display:inline-flex;gap:30px;align-items:center;margin-top:40px}
        .stamp{width:60px;height:60px;border:2px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900}</style></head>
        <body><div class="cert"><div class="title">수 료 증</div>
        <div class="field"><span class="label">성 명</span><span class="value">${s.name}</span></div>
        <div class="field"><span class="label">생년월일</span><span class="value">${s.birth}</span></div>
        <div class="field"><span class="label">과 정</span><span class="value">「${course.name}」</span></div>
        <div class="field"><span class="label">기 간</span><span class="value">${course.dateFrom} ~ ${course.dateTo} (총 ${course.hours}시간)</span></div>
        <div class="body">위 사람은 경기도일자리재단에서 시행한 위 교육과정을 성실히 이수하였음을 증명합니다.</div>
        <div class="sign"><div>${new Date().getFullYear()}년 ${new Date().getMonth() + 1}월 ${new Date().getDate()}일</div>
        <div class="sign-line"><div style="font-size:16px;font-weight:800">경기도일자리재단 대표이사</div><div class="stamp">(인)</div></div></div></div></body></html>`;
        const w = window.open();
        w.document.write(html);
        w.document.close();
        setTimeout(() => w.print(), 500);
      };

      return (
        <div className="page">
          <SectionHead title="🎓 증명서발급" sub="수료증 및 수강증명서 발급" />

          <div style={{ display: "flex", gap: "8px", marginBottom: "16px", flexWrap: "wrap" }}>
            {data.courses.map(c => (
              <button key={c.id} onClick={() => setCourse(c)} style={{ padding: "6px 14px", borderRadius: "20px", border: "none", cursor: "pointer", fontSize: "11px", fontWeight: "600", background: course.id === c.id ? T.p : T.s3, color: course.id === c.id ? "#fff" : T.mu }}>
                {c.code}
              </button>
            ))}
          </div>

          <Card style={{ padding: "16px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "14px" }}>
              <div style={{ fontSize: "13px", fontWeight: "700" }}>수료 대상자: {courseStudents.length}명 (출석률 80% 이상)</div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(250px, 1fr))", gap: "10px" }}>
              {courseStudents.map(s => (
                <div key={s.id} style={{ padding: "12px", background: T.s2, borderRadius: "8px", border: `1px solid ${T.bd}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: "12px", fontWeight: "700", color: T.tx }}>{s.name}</div>
                    <div style={{ fontSize: "10px", color: T.mu, marginTop: "2px" }}>출석률: {s.rate}%</div>
                  </div>
                  <Btn size="sm" onClick={() => printCert(s)}><Icon n="save" s={12} /> PDF</Btn>
                </div>
              ))}
            </div>
          </Card>
        </div>
      );
    };

    // ════════���══════════════════════════════════════════════════
    // 🔧 MAIN APP
    // ═══════════════════════════════════════════════════════════
    function App() {
      const [auth, setAuth] = useState(() => {
        const stored = localStorage.getItem("auth_user");
        return stored ? JSON.parse(stored) : null;
      });

      const [page, setPage] = useState("dash");
      const [data, setData] = useState(() => {
        const stored = localDB.get();
        if (!stored.courses || stored.courses.length === 0) {
          const init = { ...stored, courses: INITIAL_COURSES, students: INITIAL_STUDENTS, rooms: INITIAL_ROOMS };
          localDB.set(init);
          return init;
        }
        return stored;
      });

      useEffect(() => {
        const loader = document.getElementById("loading");
        if (loader) {
          setTimeout(() => {
            loader.style.opacity = "0";
            setTimeout(() => loader.remove(), 800);
          }, 1200);
        }
      }, []);

      if (!auth) {
        return <LoginScreen onLogin={setAuth} />;
      }

      const NAV = [
        { id: "dash", label: "📊 대시보드", icon: "dash" },
        { id: "courses", label: "📌 과정관리", icon: "book" },
        { id: "students", label: "👥 훈련생관리", icon: "people" },
        { id: "attendance", label: "📋 출결관리", icon: "check" },
        { id: "completion", label: "🎓 증명서발급", icon: "award" },
        { id: "account", label: "🔧 계정관리", icon: "user" }
      ];

      const renderPage = () => {
        switch (page) {
          case "dash":
            return <Dashboard data={data} />;
          case "courses":
            return <CourseManager data={data} setData={setData} />;
          case "students":
            return <StudentManager data={data} setData={setData} />;
          case "attendance":
            return <AttendanceManager data={data} setData={setData} />;
          case "completion":
            return <CertificateManager data={data} />;
          case "account":
            return (
              <div className="page">
                <SectionHead title="🔧 계정관리" sub="시스템 관리자 설정" />
                <Card style={{ padding: "20px", maxWidth: "400px" }}>
                  <div style={{ fontSize: "13px", color: T.mu, lineHeight: "1.8" }}>
                    <b>현재 로그인:</b> {auth.name} ({auth.rank})<br/>
                    <b>부서:</b> {auth.dept}<br/>
                    <b>권한:</b> {auth.role === "admin" ? "마스터" : "운영진"}
                  </div>
                  <Btn onClick={() => { localStorage.clear(); setAuth(null); }} variant="danger" style={{ marginTop: "20px" }}>로그아웃</Btn>
                </Card>
              </div>
            );
          default:
            return null;
        }
      };

      return (
        <div style={{ display: "flex", height: "100vh", overflow: "hidden" }}>
          {/* 사이드바 */}
          <aside style={{ width: "280px", background: T.sb, color: "#fff", display: "flex", flexDirection: "column", boxShadow: "10px 0 40px rgba(0,0,0,.3)", zIndex: 100 }}>
            <div style={{ padding: "40px 30px", borderBottom: "1px solid rgba(255,255,255,.1)" }}>
              <div style={{ fontSize: "20px", fontWeight: "950", letterSpacing: "-1px" }}>🎓 경기북부</div>
              <div style={{ fontSize: "11px", color: T.pl, fontWeight: "800", marginTop: "6px", letterSpacing: "1px" }}>v2026 FINAL</div>
            </div>

            <nav style={{ flex: 1, padding: "25px 15px", overflowY: "auto" }}>
              {NAV.map(it => (
                <button key={it.id} onClick={() => setPage(it.id)} className={`btn-nav ${page === it.id ? "active" : ""}`} style={{ width: "100%", padding: "14px 16px", marginBottom: "8px", borderRadius: "12px", border: "none", cursor: "pointer", background: page === it.id ? `linear-gradient(135deg, ${T.p}, ${T.pd})` : "transparent", color: "#fff", display: "flex", alignItems: "center", gap: "10px", fontSize: "13px", fontWeight: "700", transition: "all 0.15s" }}>
                  <span style={{ fontSize: "16px" }}>{it.label.split(" ")[0]}</span>
                  {it.label.split(" ").slice(1).join(" ")}
                </button>
              ))}
            </nav>

            <div style={{ padding: "20px 15px", background: "rgba(0,0,0,.2)", display: "flex", alignItems: "center", gap: "12px", fontSize: "12px", color: "#fff" }}>
              <div style={{ width: "36px", height: "36px", borderRadius: "10px", background: T.p, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "900" }}>{auth.name[0]}</div>
              <div>
                <div style={{ fontWeight: "700" }}>{auth.name}</div>
                <div style={{ fontSize: "10px", opacity: ".7" }}>{auth.dept}</div>
              </div>
            </div>
          </aside>

          {/* 메인 콘텐츠 */}
          <main style={{ flex: 1, overflowY: "auto", padding: "40px 50px", background: T.s2 }}>
            {renderPage()}
          </main>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    // 🚀 RENDER
    // ═══════════════════════════════════════════════════════════
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
