    setStudents(prev => prev.filter(s => s.id!==id));
    addAudit("훈련생 삭제", `${target?.name || id} 삭제`, currentUser?.name);
  }, [students, addAudit, currentUser]);

  const resetData = useCallback(async () => {
    const { error } = await sbDelete("students", "id=gte.0");
    if (error) { alert("초기화 오류: " + (error.message||JSON.stringify(error))); return; }
    setStudents([]);
    addAudit("전체 초기화", "모든 훈련생 데이터 삭제", currentUser?.name);
  }, [addAudit, currentUser]);

  const resetCoursStudents = useCallback(async (cid) => {
    const { error } = await sbDelete("students", `cid=eq.${cid}`);
    if (error) { alert("초기화 오류: " + (error.message||JSON.stringify(error))); return; }
    setStudents(prev => prev.filter(s => s.cid !== cid));
    addAudit("과정 초기화", `과정 ID ${cid} 훈련생 삭제`, currentUser?.name);
  }, [addAudit, currentUser]);

  // ── 과정 CRUD ──
  const addCourse = useCallback(async (c) => {
    const { data, error } = await sbInsert("courses", fromCourse(c));
    if (error) { 
      alert("과정 저장 오류: " + (error.message||JSON.stringify(error))); 
      console.error("❌ 과정 저장 실패:", error);
      return; 
    }
    // sbInsert는 단일 객체(row)를 반환함 — data.id로 확인
    if (data && data.id) {
      setCourses(prev => {
        const filtered = prev.filter(x => x.id !== data.id);
        return [...filtered, toCourse(data)];
      });
    } else {
      // Prefer 헤더가 무시된 경우(드물지만) DB에서 최신 목록 재조회
      const { data: fresh } = await sbGet("courses", "select=*&order=id");
      if (fresh && fresh.length > 0) setCourses(fresh.map(toCourse));
    }
    addAudit("과정 등록", `${c.name} (${c.code}) 추가`, currentUser?.name);
    console.log("✅ 과정 저장 완료:", data?.name);
  }, [addAudit, currentUser]);

  const updateCourse = useCallback(async (c) => {
    const { error } = await sbUpdate("courses", `id=eq.${c.id}`, fromCourse(c));
    if (error) { 
      alert("과정 수정 오류: " + (error.message||JSON.stringify(error))); 
      console.error("❌ 과정 수정 실패:", error);
      return; 
    }
    addAudit("과정 수정", `${c.name} (${c.code}) 정보 수정`, currentUser?.name);
    console.log("✅ 과정 수정 완료:", c.name);
    setCourses(prev => prev.map(x => x.id===c.id ? c : x));
  }, [addAudit, currentUser]);

  const deleteCourse = useCallback(async (id) => {
    const target = courses.find(c => c.id === id);
    const { error } = await sbDelete("courses", `id=eq.${id}`);
    if (error) { 
      alert("과정 삭제 오류: " + (error.message||JSON.stringify(error))); 
      console.error("❌ 과정 삭제 실패:", error);
      return; 
    }
    addAudit("과정 삭제", `${target?.name || id} 삭제`, currentUser?.name);
    console.log("✅ 과정 삭제 완료: ID", id);
    setCourses(prev => prev.filter(c => c.id!==id));
  }, [courses, addAudit, currentUser]);

  // ── 출결 저장 후 출석률 재계산 → students.rate DB 업데이트 → 로컬 state 반영 ──
  // attendance 테이블에서 직접 집계하므로 DB 트리거 없이도 수료/증명서 기준이 정확히 반영됨
  const recalculateAttendanceRate = useCallback(async (courseId) => {
    try {
      const course = coursesRef.current.find(c => c.id === Number(courseId));
      if (!course) return;
      const allDays = buildCourseDates(course);
      const totalDays = allDays.length;
      if (totalDays === 0) return;
      const validDates = new Set(allDays);
      const courseStuds = studentsRef.current.filter(s => Number(s.cid) === Number(courseId));
      if (courseStuds.length === 0) return;
      const ids = courseStuds.map(s => s.id).join(",");
      const { data: att, error } = await sbGet(
        "attendance",
        `select=student_id,date,status&student_id=in.(${ids})`
      );
      if (error) throw error;
      // 학생별로 그룹핑
      const byStudent = {};
      (att || []).forEach(r => {
        if (!byStudent[r.student_id]) byStudent[r.student_id] = [];
        byStudent[r.student_id].push(r);
      });
      const updates = [];
      courseStuds.forEach(s => {
        const recs = byStudent[s.id] || [];
        // 동일 날짜 중복 레코드 방지를 위해 Set으로 고유 날짜 집계
        const presentDays = new Set(
          recs
            .filter(r => validDates.has(r.date) && (r.status === "O" || r.status === "L"))
            .map(r => r.date)
        ).size;
        const newRate = Math.min(100, Math.round((presentDays / totalDays) * 100));
        updates.push({ id: s.id, rate: newRate });
      });
      // DB 업데이트 (Promise.all로 완료 보장 — 수료/증명서 화면 탐색 전 일관성 확보)
      await Promise.all(
        updates.map(u => sbUpdate("students", `id=eq.${u.id}`, { rate: u.rate }).catch(console.warn))
      );
      // 로컬 state 즉시 반영 → 수료/증명서 화면이 바로 갱신됨
      setStudents(prev => prev.map(s => {
        const upd = updates.find(u => u.id === s.id);
        return upd ? { ...s, rate: upd.rate } : s;
      }));
      console.debug(`출석률 재계산 완료: ${updates.length}명 (총 ${totalDays}일 기준)`);
    } catch (err) {
      console.warn("출석률 재계산 실패:", err.message || err);
    }
  }, []);

  // ── 스마트 라우팅: ?mode=checkin → 모바일 출석 페이지 (로그인 불필요) ──

                  {currentUser.role==="admin" && (
                    <span style={{ fontSize:9, background:T.p, color:"#fff",
                      padding:"1px 5px", borderRadius:3, whiteSpace:"nowrap" }}>관리자</span>
                  )}
                </div>
              </div>
            </div>

            {/* Content */}
            <div style={{ flex:1, overflowY:"auto", padding:"18px 20px" }}>
              {renderPage()}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

/* ── 앱 마운트 ── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
