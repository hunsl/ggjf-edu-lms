<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경기북부 직업교육 학사관리시스템</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    /* ─── 상수 및 데이터 정의 ────────────────────────────── */
    const 출석률기준 = { 위험: 70, 주의: 80, 정상: 80, 수료기준: 80 };
    const 사업정보 = { 연도: 2026, 총예산: "278,500천원", 출연금비율: "100%", 주관기관: "경기도일자리재단 북부사업본부" };

    const COURSES = [
      { id:1, category:"늘봄강사양성", catColor:"#0F766E", name:"초등 피지컬 코딩강사 양성", code:"NB-01", period:"6~7월", method:"블렌디드", hours:92, target:20, completionGoal:18, employGoal:12 },
      { id:2, category:"늘봄강사양성", catColor:"#0F766E", name:"AI 딥러닝 전문강사 양성", code:"NB-02", period:"6~8월", method:"블렌디드", hours:104, target:20, completionGoal:18, employGoal:12 },
      { id:4, category:"지역연계·기여", catColor:"#059669", name:"ERP·지게차 물류관리 실무자 양성",code:"JY-01", period:"3~5월", method:"대면", hours:182, target:15, completionGoal:14, employGoal:9 },
      { id:8, category:"사무분야", catColor:"#7C3AED", name:"행정회계 사무 OA (1기)", code:"SM-01", period:"3~5월", method:"대면", hours:200, target:20, completionGoal:18, employGoal:12 },
    ];

    const STUDENTS = [
      { id:1, courseId:4, name:"김민준", phone:"010-1234-5678", attendRate: 95, attend: 19, absent: 1 },
      { id:2, courseId:4, name:"이서연", phone:"010-2345-6789", attendRate: 75, attend: 15, absent: 5 },
      { id:3, courseId:4, name:"박지훈", phone:"010-3456-7890", attendRate: 60, attend: 12, absent: 8 },
      { id:4, courseId:1, name:"최수아", phone:"010-4567-8901", attendRate: 100, attend: 20, absent: 0 },
      { id:5, courseId:8, name:"정우진", phone:"010-5678-9012", attendRate: 85, attend: 17, absent: 3 },
    ];

    const C = { primary: "#EA580C", primaryBg: "#FFF7ED", sidebar: "#9A3412", danger: "#EF4444", warning: "#F59E0B", surface: "#FFFFFF", surface2: "#F8FAFC", border: "#E2E8F0", text: "#1E293B", muted: "#64748B" };

    /* ─── 폰트 및 애니메이션 CSS ─────────────────────────── */
    const FontLoader = () => (
      <style>{`
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(160deg,#FFEDD5 0%,#FED7AA 15%,#FFF7ED 45%,#F1F5F9 75%,#FFEDD5 100%); }
        button { cursor: pointer; font-family: inherit; }
        .anim { animation: fadeUp 0.3s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      `}</style>
    );

    /* ─── 대시보드 컴포넌트 ───────────────────────────── */
    const Dashboard = () => (
      <div className="anim">
        <h2 style={{fontSize:20, fontWeight:800, color:C.text, marginBottom:20}}>대시보드</h2>
        <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))", gap:14, marginBottom:24}}>
          {[
            {label:"총 모집 목표", val:"240명", sub:"13개 과정", color:C.primary, icon:"👥"},
            {label:"수료 목표 (90%)", val:"216명", sub:"과정별 합산", color:"#059669", icon:"✓"},
            {label:"현재 위험 훈련생", val:"12명", sub:"출석률 80% 미만", color:C.danger, icon:"⚠️"}
          ].map((k, i)=>(
            <div key={i} style={{background:C.surface, padding:"20px", borderRadius:12, border:`1px solid ${C.border}`, display:"flex", gap:14}}>
              <div style={{width:46, height:46, borderRadius:12, background:`${k.color}15`, color:k.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22}}>{k.icon}</div>
              <div>
                <div style={{fontSize:26, fontWeight:800, color:C.text}}>{k.val}</div>
                <div style={{fontSize:12, color:C.muted, marginTop:3}}>{k.label}</div>
              </div>
            </div>
          ))}
        </div>
        
        <div style={{background:C.surface, padding:22, borderRadius:12, border:`1px solid ${C.border}`}}>
          <h3 style={{fontSize:16, fontWeight:700, marginBottom:16}}>2026 사업 개요</h3>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))", gap:12}}>
            {[{l:"사업기간",v:"2026.01 ~ 12월"},{l:"총 사업량",v:"13개 과정 / 240명"},{l:"수료율 목표",v:"90% 이상"}].map(item=>(
              <div key={item.l} style={{padding:"12px", background:C.surface2, borderRadius:8, border:`1px solid ${C.border}`}}>
                <div style={{fontSize:10, color:C.muted}}>{item.l}</div>
                <div style={{fontSize:13, fontWeight:700, marginTop:4}}>{item.v}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:16, padding:14, background:C.primaryBg, borderRadius:8, border:"1px solid #FFEDD5"}}>
             <div style={{fontSize:11, color:C.muted}}>사업 전체 예산</div>
             <div style={{fontSize:20, fontWeight:800, color:C.primary}}>{사업정보.총예산}</div>
          </div>
        </div>
      </div>
    );

    /* ─── 준비중 화면 ───────────────────────────────── */
    const ComingSoon = ({ title }) => (
      <div className="anim" style={{padding:40, textAlign:"center", background:C.surface, borderRadius:12, border:`1px solid ${C.border}`}}>
        <div style={{fontSize:40, marginBottom:10}}>🚧</div>
        <h2 style={{fontSize:18, fontWeight:700, color:C.text}}>{title}</h2>
        <p style={{color:C.muted, fontSize:13, marginTop:8}}>해당 페이지 기능은 현재 준비 중입니다.</p>
      </div>
    );

    /* ─── 메인 앱 레이아웃 ─────────────────────────────── */
    const App = () => {
      const [page, setPage] = useState("dash");
      const navs = [
        { id:"dash", label:"📊 대시보드" },
        { id:"courses", label:"📚 과정 현황" },
        { id:"students", label:"👥 훈련생 관리" },
        { id:"attendance", label:"📅 출결 관리" },
        { id:"completion", label:"✅ 수료 관리" },
      ];

      return (
        <div style={{display:"flex", height:"100vh", overflow:"hidden"}}>
          <FontLoader />
          
          {/* 사이드바 */}
          <div style={{width:240, background:`linear-gradient(180deg, #9A3412 0%, ${C.primary} 55%, #F97316 100%)`, display:"flex", flexDirection:"column", flexShrink:0}}>
            <div style={{padding:"16px 18px", borderBottom:"1px solid rgba(255,255,255,0.1)", color:"white"}}>
              <div style={{fontSize:13, fontWeight:900}}>경기북부 직업교육</div>
              <div style={{fontSize:10, color:"rgba(255,255,255,0.5)", marginTop:4}}>학사관리시스템 v2026</div>
            </div>
            <nav style={{flex:1, padding:"10px 0"}}>
              {navs.map(n => (
                <button key={n.id} onClick={()=>setPage(n.id)} style={{
                  width:"100%", display:"block", textAlign:"left", padding:"12px 18px",
                  background: page===n.id ? "rgba(255,255,255,0.15)" : "transparent",
                  border:"none", borderLeft: page===n.id ? "3px solid #FDBA74" : "3px solid transparent",
                  color: page===n.id ? "white" : "rgba(255,255,255,0.5)",
                  fontWeight: page===n.id ? 700 : 500, fontSize:14
                }}>
                  {n.label}
                </button>
              ))}
            </nav>
          </div>

          {/* 메인 영역 */}
          <div style={{flex:1, display:"flex", flexDirection:"column"}}>
            <header style={{height:52, background:"rgba(255,255,255,0.9)", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", padding:"0 22px", justifyContent:"space-between"}}>
              <div style={{fontSize:12, color:C.muted}}>
                <span style={{color:C.primary, fontWeight:700}}>경기도일자리재단 북부사업본부</span> · 직업교육 학사관리시스템
              </div>
              <div style={{padding:"5px 10px", background:C.primaryBg, borderRadius:8, fontSize:11, fontWeight:700, color:C.primary}}>
                👤 담당자
              </div>
            </header>
            
            <main style={{flex:1, padding:22, overflowY:"auto"}}>
              {page === "dash" && <Dashboard />}
              {page === "courses" && <ComingSoon title="과정 현황" />}
              {page === "students" && <ComingSoon title="훈련생 관리" />}
              {page === "attendance" && <ComingSoon title="출결 관리" />}
              {page === "completion" && <ComingSoon title="수료 관리" />}
            </main>
          </div>
        </div>
      );
    };

    // React 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
