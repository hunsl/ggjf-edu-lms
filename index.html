<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>경기북부 직업교육 통합 학사관리시스템 v2026</title>
  
  <link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* 🎨 프리미엄 SaaS 디자인 시스템 */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }
    
    /* 로딩 애니메이션 */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #7C2D12, #EA580C, #FFF7ED);
      z-index: 9999; transition: opacity .4s; color: #fff;
    }
    #loading .icon { font-size: 56px; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
    #loading .msg  { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

    /* 커스텀 스크롤바 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.4); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.6); }

    /* 텍스트 입력 UI */
    input, select, button, textarea { font-family: inherit; transition: all 0.2s ease; }
    input:focus, select:focus, textarea:focus { border-color: #EA580C !important; box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.15) !important; outline: none; }
    
    /* 애니메이션 유틸리티 */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    .page { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .row-hover:hover { background-color: #FFF7ED !important; }
    
    /* 카드 디자인 */
    .premium-card {
      background: #fff; border-radius: 20px; border: 1px solid #E2E8F0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
    }
    .premium-card:hover {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="icon">🎓</div>
    <div class="msg">경기북부 직업교육 통합관리시스템</div>
    <div style="font-size:12px; opacity:0.6; margin-top:8px">데이터베이스 동기화 중...</div>
  </div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback } = React;

    /* ══════════════════════════════════════════════════════════
       1. Supabase REST API & Realtime 통합 로직
    ══════════════════════════════════════════════════════════ */
    const SB_URL = "https://vqkjakgbrsnsererwmma.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxa2pha2dicnNuc2VyZXJ3bW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDA2MjIsImV4cCI6MjA4ODkxNjYyMn0.caGpzJdTcfT3CZTkJi2Mctte3nNvh3e6xTtFVaCfkiM";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);
    const API = `${SB_URL}/rest/v1`;
    const H = { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json", "Prefer": "return=representation" };

    const sbGet = async (t, p="") => { const r = await fetch(`${API}/${t}?${p}`, {headers:H}); const d = await r.json(); return { data: r.ok?d:null, error: r.ok?null:d }; };
    const sbInsert = async (t, b) => { const r = await fetch(`${API}/${t}`, {method:"POST", headers:H, body:JSON.stringify(Array.isArray(b)?b:[b])}); const d = await r.json(); return { data: Array.isArray(b)?d:d[0], error: r.ok?null:d }; };
    const sbUpdate = async (t, f, b) => { const r = await fetch(`${API}/${t}?${f}`, {method:"PATCH", headers:H, body:JSON.stringify(b)}); const d = await r.json(); return { data: d, error: r.ok?null:d }; };
    const sbDelete = async (t, f) => { const r = await fetch(`${API}/${t}?${f}`, {method:"DELETE", headers:H}); return { error: r.ok?null:true }; };

    /* ── 데이터 변환 (DB snake_case ↔ App camelCase) ── */
    const toStudent = r => r ? {
      id: r.id, cid: r.course_id, name: r.name, gender: r.gender||"", birth: r.birth||"", idBack: r.id_back||"", phone: r.phone||"", addrCity: r.addr_city||"",
      edu: r.edu||"", major: r.major||"", career: r.career||"", certs: r.certs||"", unemployment: !!r.unemployment, disabled: !!r.disabled, veteran: !!r.veteran,
      itvDate: r.itv_date||"", itvScore: r.itv_score||null, itvGrade: r.itv_grade||"", itvPass: !!r.itv_pass, memo: r.memo||"", rate: r.rate||0
    } : null;

    const fromStudent = s => ({
      course_id: s.cid, name: s.name, gender: s.gender, birth: s.birth||null, id_back: s.idBack, phone: s.phone, addr_city: s.addrCity,
      edu: s.edu, major: s.major, career: s.career, certs: s.certs, unemployment: s.unemployment, disabled: s.disabled, veteran: s.veteran,
      itv_date: s.itvDate||null, itv_score: s.itvScore, itv_grade: s.itvGrade, itv_pass: s.itvPass, memo: s.memo, rate: s.rate
    });

    const toCourse = r => r ? {
      id: r.id, cat: r.category||"", code: r.code||"", name: r.name||"", dateFrom: r.date_from||"", dateTo: r.date_to||"",
      hours: r.hours||0, tgt: r.target||20, cGoal: r.completion_goal||18, eGoal: r.employment_goal||12, method: r.method||"대면",
      schedDays: r.sched_days||"", schedTimeFrom: r.sched_time_from||"09:00", schedTimeTo: r.sched_time_to||"13:00", notes: r.notes||"",
      cc: r.category==="늘봄강사양성"?"#EA580C":"#C2410C", pdfData: r.pdf_data||"", pdfName: r.pdf_name||"", links: r.links||[]
    } : null;

    const toAttendance = r => r ? { id: r.id, sid: r.student_id, cid: r.course_id, date: r.attend_date, in: r.in_time, out: r.out_time, status: r.status, viaQr: !!r.via_qr } : null;

    /* ═══════════════════════════════════════════════════════════
       2. 디자인 테마 및 공통 UI 컴포넌트
    ═══════════════════════════════════════════════════════════ */
    const T = {
      p: "#EA580C", pm: "#F97316", pl: "#FB923C", pbg: "#FFF7ED", sb: "#7C2D12",
      ok: "#10B981", warn: "#F59E0B", danger: "#EF4444", info: "#3B82F6",
      s: "#FFFFFF", s2: "#F8FAFC", s3: "#F1F5F9", bd: "#E2E8F0", tx: "#0F172A", mu: "#64748B",
    };

    const Icon = ({ n, s=16 }) => {
      const d = {
        dash: <><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>,
        book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>,
        people: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></>,
        cal: <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
        check: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        award: <><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></>,
        plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        dl: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        qr: <><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>,
        edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
        bars: <><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>,
      };
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>{d[n]}</svg>;
    };

    const Btn = ({ children, onClick, variant="primary", size="md", style={} }) => {
      const base = { border:"none", borderRadius:"12px", cursor:"pointer", fontWeight:800, display:"inline-flex", alignItems:"center", justifyContent:"center", gap:"8px", transition:"all 0.2s cubic-bezier(0.16, 1, 0.3, 1)" };
      const sizes = { sm:{padding:"7px 14px",fontSize:12}, md:{padding:"11px 22px",fontSize:13.5}, lg:{padding:"14px 28px",fontSize:15} };
      const vars = {
        primary: { background:`linear-gradient(135deg, ${T.p}, #C2410C)`, color:"#fff", boxShadow:`0 4px 12px rgba(234, 88, 12, 0.25)` },
        ghost: { background:T.s, color:T.mu, border:`1px solid ${T.bd}`, boxShadow:`0 1px 2px rgba(0,0,0,0.03)` },
        danger: { background:"#FEF2F2", color:T.danger, border:`1px solid #FECACA` }
      };
      return <button onClick={onClick} onMouseDown={e=>e.currentTarget.style.transform="scale(0.96)"} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"} style={{...base, ...sizes[size], ...vars[variant], ...style}}>{children}</button>;
    };

    const SectionHead = ({ title, sub, right }) => (
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:28, paddingBottom:12, borderBottom:`2px solid ${T.s3}` }}>
        <div><h2 style={{ fontSize:24, fontWeight:900, color:T.tx, letterSpacing:"-0.5px" }}>{title}</h2>{sub && <p style={{ fontSize:14, fontWeight:500, color:T.mu, marginTop:6 }}>{sub}</p>}</div>
        {right}
      </div>
    );
    /* ═══════════════════════════════════════════════════════════
       3. EXCEL UTILITIES (실무형 엑셀 양식 및 다운로드)
    ═══════════════════════════════════════════════════════════ */
    const TEMPLATE_HEADERS = [
      "이름","성별","생년월일","주민번호뒷자리","연락처","거주시",
      "최종학력","전공","경력","자격증","취업형태","실업급여수급",
      "장애여부","보훈여부","면접일자","면접점수","면접등급","합격여부",
      "특이사항","과정코드"
    ];

    const downloadTemplate = (courses) => {
      const wb = XLSX.utils.book_new();
      
      // 1. 메인 양식 시트
      const example = [["홍길동","남","1990-01-01","1234567","010-1234-5678","의정부시","대졸","컴퓨터공학","IT기업 2년","정보처리기사","미취업","Y","N","N","2026-03-01","92","A+","Y","학습의지 매우 높음","NB-01"]];
      const ws = XLSX.utils.aoa_to_sheet([TEMPLATE_HEADERS, ...example]);
      ws["!cols"] = [8,5,12,14,14,10,10,12,15,15,12,12,8,8,12,8,8,8,25,10].map(w=>({wch:w}));
      XLSX.utils.book_append_sheet(wb, ws, "훈련생_등록명단");
      
      // 2. 과정코드 참조 시트 (입력 편의성)
      const wsRef = XLSX.utils.aoa_to_sheet([["과정코드","과정명","분야"], ...courses.map(c=>[c.code, c.name, c.cat])]);
      XLSX.utils.book_append_sheet(wb, wsRef, "과정코드_참조");
      
      XLSX.writeFile(wb, "2026_경기북부_훈련생_업로드양식.xlsx");
    };

    /* ═══════════════════════════════════════════════════════════
       4. DASHBOARD (실시간 지표 분석 및 시각화)
    ═══════════════════════════════════════════════════════════ */
    const Dashboard = ({ students, courses }) => {
      const stats = useMemo(() => {
        const totalTgt = courses.reduce((a,b)=>a+(b.tgt||0), 0);
        const totalCG  = courses.reduce((a,b)=>a+(b.cGoal||0), 0);
        const totalEG  = courses.reduce((a,b)=>a+(b.eGoal||0), 0);
        const avgRate  = students.length ? (students.reduce((a,b)=>a+b.rate, 0)/students.length).toFixed(1) : 0;
        const atRisk   = students.filter(s => s.rate < 80);
        return { totalTgt, totalCG, totalEG, avgRate, atRisk };
      }, [students, courses]);

      return (
        <div className="page">
          <SectionHead title="2026년 사업 운영 현황" sub="경기북부 직업교육 통합 지표 데이터" />
          
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))", gap:16, marginBottom:24 }}>
            {[
              { label:"총 모집 목표", val:`${stats.totalTgt}명`, sub:`${courses.length}개 과정`, icon:"people", color:T.p },
              { label:"현재 등록 인원", val:`${students.length}명`, sub:`충원율 ${stats.totalTgt ? Math.round(students.length/stats.totalTgt*100) : 0}%`, icon:"check", color:T.ok },
              { label:"평균 출석률", val:`${stats.avgRate}%`, sub:"전체 교육생 기준", icon:"dash", color:T.info },
              { label:"집중 관리 대상", val:`${stats.atRisk.length}명`, sub:"출석률 80% 미만", icon:"alert", color:T.danger },
            ].map((k,i) => (
              <div key={i} className="premium-card" style={{ padding:24 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
                  <div style={{ width:48, height:48, borderRadius:14, background:`${k.color}12`, color:k.color, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <Icon n={k.icon} s={24}/>
                  </div>
                  <Chip label={k.sub} bg={`${k.color}10`} color={k.color} />
                </div>
                <div style={{ fontSize:13, fontWeight:700, color:T.mu, marginBottom:4 }}>{k.label}</div>
                <div style={{ fontSize:32, fontWeight:900, color:T.tx, letterSpacing:"-1px" }}>{k.val}</div>
              </div>
            ))}
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:20 }}>
            <div className="premium-card" style={{ padding:24 }}>
              <h3 style={{ fontSize:18, fontWeight:800, marginBottom:20, display:"flex", alignItems:"center", gap:10 }}>
                <Icon n="book" s={20}/> 과정별 모집 및 수료 목표 달성도
              </h3>
              <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
                {courses.map(c => {
                  const cStus = students.filter(s=>s.cid===c.id);
                  const percent = Math.min(Math.round((cStus.length / c.tgt) * 100), 100);
                  return (
                    <div key={c.id}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8, alignItems:"center" }}>
                        <div style={{ fontSize:14, fontWeight:700, color:T.tx }}>{c.name} <span style={{ fontSize:11, color:T.mu, fontWeight:500, marginLeft:6 }}>{c.code}</span></div>
                        <div style={{ fontSize:13, fontWeight:800, color:T.p }}>{cStus.length} / {c.tgt}명 ({percent}%)</div>
                      </div>
                      <div style={{ height:8, background:T.s3, borderRadius:4, overflow:"hidden" }}>
                        <div style={{ width:`${percent}%`, height:"100%", background:`linear-gradient(90deg, ${T.p}, ${T.pm})`, borderRadius:4, transition:"width 1s ease" }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="premium-card" style={{ padding:24, background:`linear-gradient(180deg, #fff 0%, ${T.pbg} 100%)` }}>
              <h3 style={{ fontSize:18, fontWeight:800, marginBottom:20 }}>💡 운영 포인트</h3>
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                <div style={{ padding:16, background:"#fff", borderRadius:14, border:`1px solid ${T.bd}` }}>
                  <div style={{ fontSize:12, fontWeight:700, color:T.danger, marginBottom:4 }}>중점 관리</div>
                  <div style={{ fontSize:13, color:T.tx, lineHeight:1.5 }}>출석률 저조자 <b>{stats.atRisk.length}명</b>에 대한 유선 상담 및 사유 파악이 필요합니다.</div>
                </div>
                <div style={{ padding:16, background:"#fff", borderRadius:14, border:`1px solid ${T.bd}` }}>
                  <div style={{ fontSize:12, fontWeight:700, color:T.ok, marginBottom:4 }}>목표 달성도</div>
                  <div style={{ fontSize:13, color:T.tx, lineHeight:1.5 }}>연간 수료 목표 <b>{stats.totalCG}명</b> 대비 현재 안정권 인원은 <b>{students.filter(s=>s.rate>=90).length}명</b>입니다.</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       5. COURSE MODAL (풀옵션 교육과정 설정)
    ═══════════════════════════════════════════════════════════ */
    const CourseModal = ({ course, onSave, onClose }) => {
      const [f, setF] = useState(course || { 
        cat:"늘봄강사양성", code:"", name:"", dateFrom:"", dateTo:"", hours:0, tgt:20, 
        cGoal:18, eGoal:12, method:"대면", schedDays:"", schedTimeFrom:"09:00", schedTimeTo:"13:00", notes:"" 
      });
      const inpS = { width:"100%", padding:"12px 14px", borderRadius:12, border:`1px solid ${T.bd}`, fontSize:14, background:T.s2, outline:"none" };
      const labelS = { fontSize:12, fontWeight:700, color:T.mu, display:"block", marginBottom:6, marginLeft:4 };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,0.7)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(4px)" }} onClick={e=>e.target===e.currentTarget && onClose()}>
          <div className="premium-card" style={{ width:680, maxHeight:"92vh", overflow:"hidden", display:"flex", flexDirection:"column", animation:"popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)" }}>
            <div style={{ padding:"24px 32px", background:`linear-gradient(135deg, ${T.sb}, ${T.p})`, color:"#fff", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16 }}>

                <div><label style={labelS}>교육 종료일</label><input type="date" value={f.dateTo} onChange={e=>setF({...f, dateTo:e.target.value})} style={inpS}/></div>

                <div><label style={labelS}>수료 목표 (명)</label><input type="number" value={f.cGoal} onChange={e=>setF({...f, cGoal:+e.target.value})} style={inpS}/></div>
                <div><label style={labelS}>취업 목표 (명)</label><input type="number" value={f.eGoal} onChange={e=>setF({...f, eGoal:+e.target.value})} style={inpS}/></div>
              </div>

              <div style={{ padding:20, background:T.s2, borderRadius:16, border:`1px solid ${T.bd}` }}>
                <div style={{ fontSize:13, fontWeight:800, color:T.tx, marginBottom:12, display:"flex", alignItems:"center", gap:6 }}><Icon n="cal" s={16}/> 교육 시간표 설정</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
                   <div><label style={labelS}>수업 요일</label><input value={f.schedDays} onChange={e=>setF({...f, schedDays:e.target.value})} placeholder="월, 화, 수" style={inpS}/></div>
                   <div><label style={labelS}>시작 시간</label><input type="time" value={f.schedTimeFrom} onChange={e=>setF({...f, schedTimeFrom:e.target.value})} style={inpS}/></div>
                   <div><label style={labelS}>종료 시간</label><input type="time" value={f.schedTimeTo} onChange={e=>setF({...f, schedTimeTo:e.target.value})} style={inpS}/></div>

              </div>

    /* ═══════════════════════════════════════════════════════════
       6. EDIT MODAL (훈련생 면접 평가 및 인적사항 상세)
    ═══════════════════════════════════════════════════════════ */
    const EditModal = ({ student, courses, isNew, onSave, onClose }) => {
      const [f, setF] = useState(student || { 
        cid:courses[0]?.id, name:"", gender:"남", birth:"", phone:"", addrCity:"", 
        edu:"", major:"", career:"", certs:"", unemployment:false, disabled:false, 
        veteran:false, itvScore:null, itvGrade:"B", itvPass:true, memo:"", rate:100 
      });
      const inpS = { width:"100%", padding:"11px 14px", borderRadius:10, border:`1px solid ${T.bd}`, fontSize:13, background:T.s2, outline:"none" };
      const labelS = { fontSize:11, fontWeight:700, color:T.mu, display:"block", marginBottom:5, marginLeft:2 };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,0.7)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(4px)" }} onClick={e=>e.target===e.currentTarget && onClose()}>
          <div className="premium-card" style={{ width:600, maxHeight:"92vh", overflow:"hidden", display:"flex", flexDirection:"column", animation:"popIn 0.25s ease" }}>
            <div style={{ padding:"20px 28px", background:`linear-gradient(135deg, ${T.p}, #C2410C)`, color:"#fff", display:"flex", justifyContent:"space-between", alignItems:"center" }}>

            </div>
            
            <div style={{ padding:28, overflowY:"auto", display:"flex", flexDirection:"column", gap:18 }}>
              {/* 기본 신원 */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
                <div><label style={labelS}>훈련생 성명</label><input value={f.name} onChange={e=>setF({...f, name:e.target.value})} style={inpS}/></div>
                <div><label style={labelS}>성별</label><select value={f.gender} onChange={e=>setF({...f, gender:e.target.value})} style={inpS}><option>남</option><option>여</option></select></div>
                <div><label style={labelS}>학번 (자동)</label><div style={{...inpS, background:T.s3, fontWeight:800, color:T.p}}>2026-{f.id || "NEW"}</div></div>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div><label style={labelS}>배정 교육과정</label>
                  <select value={f.cid} onChange={e=>setF({...f, cid:+e.target.value})} style={inpS}>
                    {courses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <div><label style={labelS}>연락처</label><input value={f.phone} onChange={e=>setF({...f, phone:e.target.value})} placeholder="010-0000-0000" style={inpS}/></div>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                <div><label style={labelS}>생년월일</label><input type="date" value={f.birth} onChange={e=>setF({...f, birth:e.target.value})} style={inpS}/></div>
                <div><label style={labelS}>거주 시/군</label><input value={f.addrCity} onChange={e=>setF({...f, addrCity:e.target.value})} placeholder="의정부시" style={inpS}/></div>

              {/* 면접 평가 섹션 */}
              <div style={{ padding:20, background:T.pbg, borderRadius:16, border:`1px solid ${T.pl}30` }}>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
                  <div><label style={labelS}>면접 점수</label><input type="number" value={f.itvScore||""} onChange={e=>setF({...f, itvScore:+e.target.value})} style={inpS}/></div>
                  <div><label style={labelS}>종합 등급</label><select value={f.itvGrade} onChange={e=>setF({...f, itvGrade:e.target.value})} style={inpS}>{["A+","A","B+","B","C","탈락"].map(v=><option key={v}>{v}</option>)}</select></div>
                  <div><label style={labelS}>합격 판정</label><select value={f.itvPass?"Y":"N"} onChange={e=>setF({...f, itvPass:e.target.value==="Y"})} style={inpS}><option value="Y">합격(Pass)</option><option value="N">불합격(Fail)</option></select></div>

    /* ═══════════════════════════════════════════════════════════
       7. QR ATTENDANCE (강단 스크린용 대형 QR 모달)
    ═══════════════════════════════════════════════════════════ */
    const BigQrModal = ({ course, onClose }) => {
      const qrRef = useRef();
      // 접속 URL 구성 (mode=checkin 파라미터 포함)
      const checkInUrl = `${window.location.origin}${window.location.pathname}?mode=checkin&cid=${course.id}`;

      useEffect(() => {
        if (qrRef.current) {
          qrRef.current.innerHTML = "";
          new QRCode(qrRef.current, {
            text: checkInUrl,
            width: 340,
            height: 340,
            colorDark: "#7C2D12",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
          });
        }
      }, [course, checkInUrl]);

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,0.95)", display:"flex", alignItems:"center", justifyContent:"center", z_index:3000 }} onClick={onClose}>
          <div className="premium-card" style={{ background:"#fff", padding:50, textAlign:"center", animation:"popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)" }} onClick={e=>e.stopPropagation()}>
            <h2 style={{ fontSize:32, fontWeight:900, color:T.tx, marginBottom:8 }}>{course.name}</h2>
            <p style={{ color:T.mu, marginBottom:40, fontSize:18, fontWeight:500 }}>학생들은 스마트폰 카메라로 QR을 스캔하여 출석을 체크하세요.</p>
            <div style={{ display:"inline-block", padding:24, background:"#fff", borderRadius:24, border:`3px solid ${T.pbg}`, boxShadow:"0 20px 50px rgba(124,45,18,0.2)" }}>
              <div ref={qrRef}></div>
            </div>
            <div style={{ marginTop:40, fontSize:14, color:T.mu, fontWeight:600, background:T.s2, padding:"12px 20px", borderRadius:12 }}>{checkInUrl}</div>
            <button onClick={onClose} style={{ marginTop:30, padding:"12px 40px", borderRadius:12, border:`1.5px solid ${T.bd}`, background:"#fff", cursor:"pointer", fontWeight:800, fontSize:16 }}>닫기</button>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       8. ATTENDANCE MANAGEMENT (관리자용 하이브리드 출결 관리)
    ═══════════════════════════════════════════════════════════ */
    const AttendanceMgmt = ({ students, courses, attendance, onManual }) => {
      const [selCid, setSelCid] = useState(courses[0]?.id || null);
      const [showQr, setShowQr] = useState(false);
      const today = new Date(new Date().getTime() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);

      const courseStudents = useMemo(() => students.filter(s => s.cid === selCid), [students, selCid]);
      const currentCourse = useMemo(() => courses.find(c => c.id === selCid), [courses, selCid]);
      const todayAttendance = useMemo(() => attendance.filter(a => a.cid === selCid && a.date === today), [attendance, selCid, today]);

      return (
        <div className="page">
          <SectionHead
            title="실시간 하이브리드 출결 관리"
            sub={`스마트폰 QR 스캔과 담당자 수동 관리가 동시에 가능합니다. (${today} 기준)`}
            right={<Btn onClick={()=>setShowQr(true)} style={{ padding:"12px 24px" }}><Icon n="qr" s={18}/> 강단용 QR코드 생성</Btn>}
          />

          <div style={{ display:"flex", gap:10, marginBottom:24, overflowX:"auto", paddingBottom:8 }}>
            {courses.map(c => (
              <button key={c.id} onClick={()=>setSelCid(c.id)} style={{
                padding:"10px 20px", borderRadius:14, border:"1px solid", whiteSpace:"nowrap",
                borderColor: selCid===c.id ? T.p : T.bd,
                background: selCid===c.id ? T.pbg : "#fff",
                color: selCid===c.id ? T.p : T.mu,
                fontWeight:700, fontSize:13, cursor:"pointer"
              }}>{c.name}</button>
            ))}
          </div>

          <div className="premium-card" style={{ overflow:"hidden" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", textAlign:"center" }}>
              <thead style={{ background:T.s2, borderBottom:`1px solid ${T.bd}` }}>
                <tr>
                  {["학번·성명","입실 시간","퇴실 시간","체크 방식","현재 상태","수동 제어"].map(h=>(
                    <th key={h} style={{ padding:16, fontSize:12, fontWeight:700, color:T.mu }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {courseStudents.map(s => {
                  const att = todayAttendance.find(a => a.sid === s.id);
                  return (
                    <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.s3}` }}>
                      <td style={{ padding:16 }}>
                        <div style={{ fontSize:11, fontWeight:800, color:T.p }}>2026-{s.id}</div>
                        <div style={{ fontSize:15, fontWeight:700, color:T.tx }}>{s.name}</div>
                      </td>
                      <td style={{ padding:16, fontSize:14, fontWeight:700, color: att?.in ? T.tx : "#CBD5E1" }}>{att?.in || "--:--"}</td>
                      <td style={{ padding:16, fontSize:14, fontWeight:700, color: att?.out ? T.tx : "#CBD5E1" }}>{att?.out || "--:--"}</td>
                      <td style={{ padding:16 }}>{att ? (att.viaQr ? <Chip label="📱 QR스캔" bg="#EFF6FF" color="#2563EB"/> : <Chip label="✍️ 수동입력" bg="#F8FAFC" color="#64748B"/>) : "-"}</td>
                      <td style={{ padding:16 }}>
                        {att ? <Chip label={att.status} bg={att.status==='출석'? "#ECFDF5" : att.status==='지각'?"#FFFBEB":"#FEF2F2"} color={att.status==='출석'?T.ok : att.status==='지각'?T.warn:T.danger} /> : <span style={{fontSize:12, color:"#CBD5E1"}}>미처리</span>}
                      </td>
                      <td style={{ padding:16 }}>
                        <div style={{ display:"inline-flex", gap:6 }}>
                          <Btn variant="ghost" size="sm" onClick={()=>onManual(s.id, 'in', '09:00', '출석')}>입실</Btn>
                          <Btn variant="ghost" size="sm" onClick={()=>onManual(s.id, 'out', '13:00', null)}>퇴실</Btn>
                          <Btn variant="danger" size="sm" onClick={()=>onManual(s.id, 'status', null, '결석')}>결석</Btn>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {showQr && currentCourse && <BigQrModal course={currentCourse} onClose={()=>setShowQr(false)} />}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       9. CERTIFICATE ENGINE (A4 공식 양식 출력 및 인쇄 제어)
    ═══════════════════════════════════════════════════════════ */

      @media print { .print-btn { display:none; } body { padding:0; } .doc { border:none; } @page { size:A4; margin:0; } }
    `;

    const printDoc = (student, course, type, certNo, issueDate) => {
      const isCert = type === "cert";
      const birthStr = student.birth ? student.birth.replace(/(\d{4})-(\d{2})-(\d{2})/, "$1년 $2월 $3일") : "     년    월    일";
      
      const content = isCert ? `
        <div class="doc">
          <div class="doc-no">제 2026-북부교육팀-${certNo}호</div>
          <div class="title-wrap"><div class="title">수 료 증</div></div>
          <div class="field-row"><span class="field-label">성　　명</span>: <span class="field-value name">${student.name}</span></div>
          <div class="field-row"><span class="field-label">생년월일</span>: <span class="field-value">${birthStr}</span></div>
          <div class="field-row"><span class="field-label">교육과정</span>: <span class="field-value">「${course.name}」</span></div>
          <div class="field-row"><span class="field-label">교육기간</span>: <span class="field-value">${course.dateFrom} ~ ${course.dateTo} (총 ${course.hours}시간)</span></div>
          <div class="body-text">위 사람은 경기도일자리재단에서 실시한<br/>교육과정을 성실히 이수하였으므로 이 증서를 수여합니다.</div>
          <div class="sign-wrap">
            <div class="sign-date">${issueDate}</div>
            <div class="sign-line"><div class="sign-title">경기도일자리재단 대표이사</div><div class="stamp">인</div></div>
          </div>
        </div>
      ` : `
        <div class="doc">
          <div class="doc-no">제 2026-북부-수강-${certNo}호</div>
          <div class="title-wrap"><div class="title" style="font-size:32pt; letter-spacing:10px;">수강증명서</div></div>
          <div class="field-row"><span class="field-label">성　　명</span>: <span class="field-value name">${student.name}</span></div>
          <div class="field-row"><span class="field-label">주　　소</span>: <span class="field-value">${student.addrCity || "경기도 의정부시"}</span></div>
          <div class="field-row"><span class="field-label">수강과목</span>: <span class="field-value">${course.name}</span></div>
          <div class="field-row"><span class="field-label">수강기간</span>: <span class="field-value">${course.dateFrom} ~ ${course.dateTo} / 매주 ${course.schedDays}</span></div>
          <div class="body-text">위 사람은 상기 교육과정을 현재 수강 중임을<br/>증명합니다.</div>
          <div class="sign-wrap">
            <div class="sign-date">${issueDate}</div>
            <div class="sign-line"><div class="sign-title">경기도일자리재단 대표이사</div><div class="stamp">인</div></div>
          </div>
        </div>
      `;

      const win = window.open("", "_blank");
      win.document.write(`<html><head><title>${isCert?"수료증":"수강증명서"}_${student.name}</title><style>${PRINT_STYLE}</style></head><body>${content}<button class="print-btn" onclick="window.print()">프린트 / PDF 저장</button></body></html>`);
      win.document.close();
    };

    const CertMgmt = ({ students, courses }) => {
      const [selCid, setSelCid] = useState(courses[0]?.id);
      const [issueDate, setIssueDate] = useState(new Date().toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'long'}));
      
      const currentCourse = courses.find(c=>c.id===selCid);
      const eligible = students.filter(s=>s.cid===selCid);

      return (
        <div className="page">
          <SectionHead title="증명서 발급 관리" sub="수료증 및 수강증명서를 공식 양식으로 출력합니다." />
          
          <Card style={{ padding:24, marginBottom:24, background:T.pbg }}>
            <div style={{ display:"flex", gap:20, alignItems:"center" }}>
              <div style={{ flex:1 }}>
                <label style={{ fontSize:12, fontWeight:800, color:T.p, display:"block", marginBottom:8 }}>대상 과정 선택</label>
                <select value={selCid} onChange={e=>setSelCid(+e.target.value)} style={{ width:"100%", padding:12, borderRadius:12, border:`1.5px solid ${T.pl}50` }}>
                  {courses.map(c=><option key={c.id} value={c.id}>{c.name} ({c.code})</option>)}
                </select>
              </div>
              <div style={{ flex:1 }}>
                <label style={{ fontSize:12, fontWeight:800, color:T.p, display:"block", marginBottom:8 }}>발급 일자 표시</label>
                <input value={issueDate} onChange={e=>setIssueDate(e.target.value)} style={{ width:"100%", padding:12, borderRadius:12, border:`1.5px solid ${T.pl}50` }} />
              </div>
            </div>
          </Card>

          <div className="premium-card" style={{ overflow:"hidden" }}>
             <table style={{ width:"100%", borderCollapse:"collapse" }}>
               <thead style={{ background:T.s2 }}>
                 <tr>
                   {["학번","성명","출석률","상태","수료증","수강증명서"].map(h=><th key={h} style={{ padding:14, fontSize:12, color:T.mu }}>{h}</th>)}
                 </tr>
               </thead>
               <tbody>
                 {eligible.map((s, idx)=>(
                   <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.s3}`, textAlign:"center" }}>
                     <td style={{ padding:14, fontSize:11, color:T.mu }}>2026-{s.id}</td>
                     <td style={{ padding:14, fontWeight:700 }}>{s.name}</td>
                     <td style={{ padding:14 }}><span style={{ fontWeight:800, color:rateColor(s.rate) }}>{s.rate}%</span></td>
                     <td style={{ padding:14 }}><Chip label={s.rate>=80?"수료권":"미달"} bg={s.rate>=80?T.pbg:"#F1F5F9"} color={s.rate>=80?T.p:T.mu}/></td>
                     <td style={{ padding:14 }}><Btn size="sm" variant={s.rate>=80?"primary":"ghost"} onClick={()=>printDoc(s, currentCourse, "cert", `${currentCourse.code}-${100+idx}`, issueDate)}>수료증</Btn></td>
                     <td style={{ padding:14 }}><Btn size="sm" variant="ghost" onClick={()=>printDoc(s, currentCourse, "attend", `${currentCourse.code}-${100+idx}`, issueDate)}>증명서</Btn></td>
                   </tr>
                 ))}
               </tbody>
             </table>
          </div>
        </div>
      );
    };
    /* ═══════════════════════════════════════════════════════════
       10. INSTRUCTOR & ROOM MGMT (강사 및 강의실 현황 리스트)
    ═══════════════════════════════════════════════════════════ */
    const InstructorMgmt = ({ courses, instructors, setInstructors }) => {
      const [editTarget, setEdit] = useState(null);
      return (
        <div className="page">
          <SectionHead title="강사 풀(Pool) 관리" sub="과정별 주강사 및 외래강사 정보" right={<Btn size="sm" onClick={()=>setEdit({})}><Icon n="plus" s={14}/> 강사 추가</Btn>} />
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:16 }}>
            {instructors.map(inst => (
              <div key={inst.id} className="premium-card" style={{ padding:20, position:"relative" }}>
                <div style={{ display:"flex", alignItems:"center", gap:15 }}>
                  <div style={{ width:50, height:50, borderRadius:15, background:T.pbg, color:T.p, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, fontWeight:900 }}>{inst.name[0]}</div>
                  <div>
                    <div style={{ fontSize:16, fontWeight:800, color:T.tx }}>{inst.name}</div>
                    <div style={{ fontSize:12, color:T.mu, marginTop:2 }}>{inst.subject} · {inst.type}</div>
                  </div>
                </div>
                <div style={{ marginTop:15, display:"flex", gap:6 }}>
                  {inst.cids.map(cid => {
                    const c = courses.find(x=>x.id===cid);
                    return c ? <Chip key={cid} label={c.code} bg={T.s3} color={T.mu} /> : null;
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       11. STUDENT MOBILE VIEW (QR 스캔 후 학생이 보는 화면)
    ═══════════════════════════════════════════════════════════ */
    const StudentMobileView = ({ cid }) => {
      const [course, setCourse] = useState(null);
      const [students, setStudents] = useState([]);
      const [selSid, setSelSid] = useState("");
      const [msg, setMsg] = useState("");
      const today = new Date(new Date().getTime() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);

      useEffect(() => {
        const load = async () => {
          const { data: c } = await sbGet("courses", `id=eq.${cid}`);
          const { data: s } = await sbGet("students", `course_id=eq.${cid}&order=name`);
          if (c) setCourse(c[0]);
          if (s) setStudents(s);
        };
        load();
      }, [cid]);

      const handleCheckIn = async (type) => {
        if (!selSid) return alert("본인의 이름을 선택해주세요.");
        const now = new Date().toTimeString().slice(0, 5);
        const { data: ex } = await sbGet("attendance", `student_id=eq.${selSid}&attend_date=eq.${today}`);
        
        const body = type === 'in' ? { in_time: now, status: '출석' } : { out_time: now };
        if (ex && ex.length > 0) await sbUpdate("attendance", `id=eq.${ex[0].id}`, body);
        else await sbInsert("attendance", { student_id: selSid, course_id: cid, attend_date: today, ...body, via_qr: true });
        
        setMsg(`${type==='in'?'입실':'퇴실'} 처리가 완료되었습니다! (${now})`);
      };

      if (!course) return <div id="loading"><div className="icon">🎓</div><div className="msg">강의 정보를 찾는 중...</div></div>;

      return (
        <div style={{ maxWidth:480, margin:"0 auto", minHeight:"100vh", background:"#fff", display:"flex", flexDirection:"column" }}>
          <div style={{ background:`linear-gradient(135deg, ${T.sb}, ${T.p})`, padding:"50px 30px", textAlign:"center", color:"#fff", borderBottomLeftRadius:30, borderBottomRightRadius:30 }}>
            <h1 style={{ fontSize:24, fontWeight:900 }}>{course.name}</h1>
            <p style={{ opacity:0.8, marginTop:8, fontSize:15 }}>2026 경기북부 직업교육 출석체크</p>
          </div>
          <main style={{ padding:30, flex:1, display:"flex", flexDirection:"column", justifyContent:"center" }}>
            {msg ? (
              <div style={{ textAlign:"center", animation:"popIn 0.3s ease" }}>
                <div style={{ fontSize:60, marginBottom:20 }}>✅</div>
                <h2 style={{ fontSize:22, fontWeight:800, color:T.tx }}>{msg}</h2>
                <p style={{ color:T.mu, marginTop:10 }}>오늘도 열공하세요!</p>
              </div>
            ) : (
              <div style={{ animation:"fadeUp 0.4s ease" }}>
                <label style={{ fontSize:15, fontWeight:800, color:T.tx, display:"block", marginBottom:12 }}>🙋‍♂️ 본인의 이름을 선택하세요</label>
                <select value={selSid} onChange={e=>setSelSid(e.target.value)} style={{ width:"100%", padding:18, borderRadius:15, border:`2px solid ${T.bd}`, fontSize:16, fontWeight:600, marginBottom:25, appearance:"none", background:"#F8FAFC" }}>
                  <option value="">학생 명단 선택</option>
                  {students.map(s => <option key={s.id} value={s.id}>{s.name} (2026-{s.id})</option>)}
                </select>
                <button onClick={()=>handleCheckIn('in')} style={{ width:"100%", padding:22, borderRadius:18, border:"none", background:T.p, color:"#fff", fontSize:18, fontWeight:900, marginBottom:12, boxShadow:`0 10px 20px rgba(234,88,12,0.3)`, cursor:"pointer" }}>입실하기 (Check-In)</button>
                <button onClick={()=>handleCheckIn('out')} style={{ width:"100%", padding:22, borderRadius:18, border:"none", background:"#475569", color:"#fff", fontSize:18, fontWeight:900, cursor:"pointer" }}>퇴실하기 (Check-Out)</button>
              </div>
            )}
          </main>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       12. APP ROOT (최종 통합 상태 관리 및 라우팅)
    ═══════════════════════════════════════════════════════════ */
    function App() {
      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode");
      const cid = params.get("cid");

      const [students, setStudents] = useState([]);
      const [courses, setCourses] = useState([]);
      const [attendance, setAttendance] = useState([]);
      const [instructors, setInstructors] = useState(SEED_INSTRUCTORS);
      const [page, setPage] = useState("dash");
      const [dbReady, setDbReady] = useState(false);
      const [editTarget, setEditTarget] = useState(null);
      const [showNew, setShowNew] = useState(false);

      // 데이터 로드
      useEffect(() => {
        if (mode === 'checkin') return;
        const init = async () => {
          const [cRes, sRes, aRes] = await Promise.all([
            sbGet("courses", "select=*&order=id"),
            sbGet("students", "select=*&order=id"),
            sbGet("attendance", `attend_date=eq.${new Date().toISOString().slice(0, 10)}`)
          ]);
          if (cRes.data) setCourses(cRes.data.map(toCourse));
          if (sRes.data) setStudents(sRes.data.map(toStudent));
          if (aRes.data) setAttendance(aRes.data.map(toAttendance));
          setDbReady(true);
          const l = document.getElementById('loading'); if (l) l.style.opacity='0', setTimeout(()=>l.remove(),400);
        };
        init();
      }, [mode]);

      // ⭐ 실시간 Supabase 구독 (Realtime)
      useEffect(() => {
        if (!dbReady || mode === 'checkin') return;
        const channel = supabase.channel('schema-db-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance' }, payload => {
            if (payload.eventType === 'INSERT') setAttendance(prev => [...prev, toAttendance(payload.new)]);
            else if (payload.eventType === 'UPDATE') setAttendance(prev => prev.map(a => a.id === payload.new.id ? toAttendance(payload.new) : a));
          }).subscribe();
        return () => supabase.removeChannel(channel);
      }, [dbReady, mode]);

      if (mode === 'checkin' && cid) return <StudentMobileView cid={cid} />;

      const renderPage = () => {
        switch(page) {
          case "dash": return <Dashboard students={students} courses={courses}/>;
          case "courses": return <CourseList courses={courses} onAdd={async c=>{const {data}=await sbInsert("courses",fromCourse(c)); if(data) setCourses(p=>[...p,toCourse(data)])}} onUpdate={async c=>{setCourses(p=>p.map(x=>x.id===c.id?c:x)); await sbUpdate("courses",`id=eq.${c.id}`,fromCourse(c))}} onDelete={async id=>{setCourses(p=>p.filter(x=>x.id!==id)); await sbDelete("courses",`id=eq.${id}`)}}/>;
          case "students": return <StudentMgmt students={students} courses={courses} onAdd={async list=>{const {data}=await sbInsert("students",list.map(fromStudent)); if(data) setStudents(p=>[...p,...data.map(toStudent)])}} onEdit={setEditTarget} onDelete={async id=>{setStudents(p=>p.filter(x=>x.id!==id)); await sbDelete("students",`id=eq.${id}`)}} onNew={()=>setShowNew(true)}/>;
          case "instructors": return <InstructorMgmt courses={courses} instructors={instructors} setInstructors={setInstructors}/>;
          case "attendance": return <AttendanceMgmt students={students} courses={courses} attendance={attendance} onManual={async (sid, type, val, statusVal) => {
            const today = new Date().toISOString().slice(0, 10);
            const { data: ex } = await sbGet("attendance", `student_id=eq.${sid}&attend_date=eq.${today}`);
            const body = type === 'in' ? { in_time: val, status: statusVal } : type === 'out' ? { out_time: val } : { status: statusVal };
            if (ex && ex.length > 0) await sbUpdate("attendance", `id=eq.${ex[0].id}`, body);
            else await sbInsert("attendance", { student_id: sid, course_id: students.find(s=>s.id===sid).cid, attend_date: today, ...body, via_qr: false });
          }}/>;
          case "completion": return <CompletionMgmt students={students} courses={courses}/>;
          case "cert": return <CertMgmt students={students} courses={courses}/>;
          default: return <Dashboard students={students} courses={courses}/>;
        }
      };

      return (
        <div style={{ display:"flex", height:"100vh", overflow:"hidden" }}>
          <aside style={{ width:260, background:T.sb, color:"#fff", display:"flex", flexDirection:"column", boxShadow:"4px 0 20px rgba(0,0,0,0.1)" }}>
            <div style={{ padding:"30px 24px", borderBottom:"1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ fontSize:18, fontWeight:900, letterSpacing:"-0.5px" }}>경기북부 학사관리</div>
              <div style={{ fontSize:11, opacity:0.5, marginTop:4 }}>Gyeonggi Job Foundation</div>
            </div>
            <nav style={{ flex:1, padding:"20px 0" }}>
              {NAV_ITEMS.map(item => (
                <button key={item.id} className="btn-nav" onClick={()=>setPage(item.id)} style={{ width:"100%", padding:"14px 24px", display:"flex", alignItems:"center", gap:12, background:page===item.id?"rgba(255,255,255,0.1)":"transparent", border:"none", color:page===item.id?"#fff":"rgba(255,255,255,0.5)", cursor:"pointer", fontSize:14, fontWeight:page===item.id?800:500, borderLeft:page===item.id?`4px solid ${T.p}`:"4px solid transparent" }}>
                  <Icon n={item.icon} s={18}/> {item.label}
                </button>
              ))}
            </nav>
            <div style={{ padding:24, background:"rgba(0,0,0,0.2)" }}>
               <div style={{ fontSize:12, color:T.p, fontWeight:800 }}>ADMIN SESSION</div>
               <div style={{ fontSize:14, fontWeight:700, marginTop:4 }}>이상훈 과장님</div>
            </div>
          </aside>
          <main style={{ flex:1, overflowY:"auto", padding:"40px 50px", background:"#F8FAFC" }}>{renderPage()}</main>
          {showNew && <EditModal student={null} isNew={true} courses={courses} onSave={async s=>{const {data}=await sbInsert("students",fromStudent(s)); if(data) setStudents(p=>[...p,toStudent(data)]); setShowNew(false);}} onClose={()=>setShowNew(false)}/>}
          {editTarget && <EditModal student={editTarget} courses={courses} onSave={async s=>{setStudents(p=>p.map(x=>x.id===s.id?s:x)); await sbUpdate("students",`id=eq.${s.id}`,fromStudent(s)); setEditTarget(null);}} onClose={()=>setEditTarget(null)}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
