  // ── 시간 설정 — 과정별 schedTimeFrom/To에서 자동 로드, 수동 수정 가능 ──
  const parseHM = (str, defH, defM) => {
    if(!str) return [defH, defM];
    const [h, m] = str.split(":").map(Number);
    return [isNaN(h)?defH:h, isNaN(m)?defM:m];
  };
  const initTimes = (c) => {
    const [sh, sm] = parseHM(c?.schedTimeFrom, 9,  0);
    const [eh, em] = parseHM(c?.schedTimeTo,   13, 0);
    return { sh, sm, eh, em };
  };
  const initC = courses[3] || courses[0];
  const init0 = initTimes(initC);

  const [startH, setStartH] = useState(init0.sh);
  const [startM, setStartM] = useState(init0.sm);
  const [endH,   setEndH]   = useState(init0.eh);
  const [endM,   setEndM]   = useState(init0.em);
  const [showTimeSetting, setShowTimeSetting] = useState(false);
  const [timeCustomized,  setTimeCustomized]  = useState(false); // 수동 수정 여부

  // 과정 변경 시 시간 자동 갱신 (수동 수정 중이면 유지)
  const handleCourseChange = (c) => {
    setCourse(c);
    setRecords({});
    const newDates = buildCourseDates(c);
    setDate(newDates[newDates.length-1] || new Date().toISOString().slice(0,10));
    if(!timeCustomized) {
      const t = initTimes(c);
      setStartH(t.sh); setStartM(t.sm);
      setEndH(t.eh);   setEndM(t.em);
    }
  };

  // ── courses prop 변경 시 현재 선택 과정 갱신 (과정 수정 후 날짜/요일/시간 즉시 반영) ──
  // course를 ref로 추적해 stale closure 방지 (courses 의존성만으로 충분)
  const courseRef = React.useRef(course);
  useEffect(() => { courseRef.current = course; });
  useEffect(() => {
    if (!courses.length) return;
    const cur = courseRef.current;
    const updated = courses.find(c => c.id === cur?.id);
    if (!updated) {
      // 현재 선택된 과정이 삭제된 경우 첫 번째 과정으로 fallback
      handleCourseChange(courses[0]);
    } else if (
      updated.dateFrom      !== cur.dateFrom      ||
      updated.dateTo        !== cur.dateTo        ||
      updated.schedDays     !== cur.schedDays     ||
      updated.schedTimeFrom !== cur.schedTimeFrom ||
      updated.schedTimeTo   !== cur.schedTimeTo
    ) {
      // 일정/시간 변경 → 날짜 목록·시간 설정 재계산

      updated.name !== cur.name ||

    ) {
      // 이름·코드만 변경 → 출결 기록 유지하며 course 객체만 교체

  useEffect(() => {

    const connect = () => {
      if (intentionallyClosed) return;

                }
                if (newRecord.check_out) upd.checkOut = newRecord.check_out;
                return { ...prev, [newRecord.student_id]: upd };
              });
              console.log(`📌 [출결 Realtime] ← 학생 ID ${newRecord.student_id} status=${newRecord.status}`);
            }
          }
        } catch (err) {
          console.error("[출결 Realtime] 메시지 파싱 오류:", err);
        }
      };

      ws.onerror = () => console.warn("⚠️ [출결 Realtime] 소켓 오류");
      ws.onclose = (ev) => {
        clearInterval(heartbeatId);
        heartbeatId = null;
        if (!intentionallyClosed) {
          console.warn(`🔌 [출결 Realtime] 연결 끊김 (code:${ev.code}) — ${retryDelay/1000}초 후 재연결`);
          setTimeout(connect, retryDelay);
          retryDelay = Math.min(retryDelay * 2, 30000);
        }
      };
    };

    connect();

    return () => {
      intentionallyClosed = true;
      clearInterval(heartbeatId);
      heartbeatId = null;
      currentWs?.close();
    };
  }, [course, date]);

  // 상태 계산 (입실 시각 → 출석/결석) — HRD 기준: 지각 폐지, 50% 이상 참여 시 출석
  // check-in만 있는 경우 "O"(출석) 처리; check-out 후 50% 미달 시 "A"로 재판정 가능
  const calcStatus = (inMins, outMins) => {
    if (inMins === null) return "U";
    if (outMins != null) {
      const totalDay = endTotal - startTotal;
      if (totalDay > 0 && (outMins - inMins) < totalDay * 0.5) return "A";
    }
    return "O";
  };

  const checkedInCnt   = Object.values(records).filter(r=>r.checkIn).length;
  const checkedOutCnt  = Object.values(records).filter(r=>r.checkOut).length;
  const presentCnt     = Object.values(records).filter(r=>r.status==="O").length;
  const absentCnt      = Object.values(records).filter(r=>r.status==="A").length;
  const courseStudents = students.filter(s=>s.cid===course.id);
  const unconfirmedCnt = courseStudents.filter(s=>!records[s.id] || records[s.id].status==="U").length;

  // ── 시뮬레이션 ──
  const startSim = () => {
    if(simRunning) return;
    setSimRunning(true);
    if(qrType==="in") setRecords({});
    const students2 = [...courseStudents];
    let i = 0;
    simRef.current = setInterval(() => {
      if(i >= students2.length) { clearInterval(simRef.current); setSimRunning(false); return; }
      const s = students2[i];
      const offsetMins = Math.floor(Math.random() * 80) - 10; // -10 ~ +70분
      const mins = startTotal + offsetMins;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      const time = fmtTime(Math.max(0,h), Math.max(0,m));
      if(qrType === "in") {
        const simStatus = "O"; // HRD 기준: 입실 기록 = 출석 (지각 폐지)
        setRecords(prev => ({...prev, [s.id]: { ...(prev[s.id]||{}), checkIn: time, checkInMins: mins, status: simStatus }}));
      } else {
        const outOffset = endTotal + Math.floor(Math.random()*20) - 5;
        const oh = Math.floor(outOffset/60), om = outOffset%60;
        setRecords(prev => ({...prev, [s.id]: { ...(prev[s.id]||{}), checkOut: fmtTime(oh,om) }}));
      }
      i++;
    }, 500);
  };

  useEffect(() => () => clearInterval(simRef.current), []);

  // 모든 hooks 이후: course가 없을 때(transitions/삭제) crash 방지
  if (!course) return null;

  const ATT_MAP = {

    A: { label:"결석", bg:"#FEF2F2", color:T.danger },

        {/* ── 수업일 선택 + 수업 요일/시간 표시 + 요약 카운트 ── */}

          <div style={{ fontSize:13, color:T.mu }}>/ {courseStudents.length}명</div>

          <button onClick={async () => {
            const absentStudents = courseStudents.filter(s => !records[s.id]?.checkIn && records[s.id]?.status !== "A");
            if (absentStudents.length === 0) { alert("미확인 인원이 없습니다."); return; }
            if (!window.confirm(`미확인 ${absentStudents.length}명을 결석으로 일괄 처리하시겠습니까?`)) return;
            try {
              const courseIdNum = Number(course?.id);
              if (!courseIdNum) { alert("과정 정보 오류: course_id 없음"); return; }
              const toInsert = absentStudents.map(s => ({
                course_id: courseIdNum, student_id: Number(s.id), date,
                status: "A", check_in: null, check_out: null, method: "manual",
              }));
              const { error } = await sbUpsert("attendance", toInsert, "student_id,date,course_id");
              if (error) throw error;
              // 로컬 records 업데이트
              setRecords(prev => {
                const next = { ...prev };
                absentStudents.forEach(s => { next[s.id] = { ...(next[s.id]||{}), status: "A" }; });
                return next;
              });
              alert(`✅ ${absentStudents.length}명 결석 일괄 처리 완료`);
              if (onRatesUpdated) onRatesUpdated(course.id);
            } catch(err) {
              alert("마감 오류: " + fmtSaveError(err));
            }
          }} style={{ padding:"8px 12px", borderRadius:9, border:`1.5px solid ${T.danger}`,
            background:"#FEF2F2", color:T.danger, cursor:"pointer",
            fontSize:11, fontWeight:700, display:"flex", alignItems:"center", gap:5,
            whiteSpace:"nowrap" }}>

          </button>
        </div>
        </div>
      </Card>

      {mode === "qr" ? (
        <div style={{ display:"grid", gridTemplateColumns:"auto 1fr", gap:16 }}>

          {/* QR 코드 패널 */}
          <Card style={{ padding:20, width:280, flexShrink:0 }}>

            {/* 입실 / 퇴실 전환 */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:16 }}>
              {[
                { id:"in",  label:"📥 입실 QR", sub:"입실 스캔 → 출석", color:"#2563EB" },
                { id:"out", label:"📤 퇴실 QR", sub:`${fmtTime(endH,endM)} 기준`, color:T.p },
              ].map(({id,label,sub,color})=>(
                <button key={id} onClick={()=>setQrType(id)} style={{
                  padding:"10px 6px", borderRadius:9, border:"none", cursor:"pointer",
                  background: qrType===id ? color : T.s3,
                  color: qrType===id ? "#fff" : T.mu,
                  fontWeight:700, fontSize:11, transition:"all .15s",
                  outline: qrType===id ? `none` : `1px solid ${T.bd}` }}>
                  {label}
                  <div style={{ fontSize:9, marginTop:2,
                    color: qrType===id ? "rgba(255,255,255,.7)" : T.mu }}>{sub}</div>
                </button>
              ))}
            </div>

            {/* QR 이미지 — 로컬 canvas 렌더링 (Tracking Prevention 대응) */}
            <div ref={qrContainerRef} style={{ position:"relative", display:"inline-block", marginBottom:12 }}>
              <div style={{ border:`2px solid ${qrType==="in"?"#2563EB":T.pl}`, borderRadius:10, overflow:"hidden", lineHeight:0 }}>
                <QRCanvas data={qrData} size={200} color={qrColor} bgColor="#ffffff" />
              </div>
              <div style={{ position:"absolute", top:0, left:0, right:0, bottom:0, pointerEvents:"none",
                overflow:"hidden", borderRadius:10 }}>
                <div style={{ position:"absolute", left:0, right:0, height:2,

                  animation:"scanLine 2s linear infinite", opacity:.7 }}/>
              </div>
            </div>

            {/* 새 탭 / 다운로드 버튼 */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:10 }}>
              <button onClick={openQrBigView} title="대형 모니터에 QR을 크게 표시" style={{
                padding:"8px 4px", borderRadius:8, border:`1.5px solid #2563EB`,
                background:"#EFF6FF", color:"#2563EB", cursor:"pointer",

                alignItems:"center", gap:2 }}>
                <span style={{ fontSize:15 }}>🖥️</span>

              </button>
              <button onClick={downloadQrImage} title="QR 이미지를 PNG로 저장" style={{

                <span style={{ fontSize:15 }}>📥</span>

              </button>

            {/* 시간 정보 */}
            <div style={{ fontSize:10, color:T.mu, lineHeight:1.8, marginBottom:10,
              padding:"8px 10px", background:T.s2, borderRadius:7, border:`1px solid ${T.bd}` }}>
              <b style={{color:T.tx}}>과정:</b> {course.name}<br/>

            </div>

                      <div style={{ fontSize:13, fontWeight:700, color:T.tx }}>{s.name}</div>
                      <div style={{ fontSize:10, color:T.mu, marginTop:1, display:"flex", gap:8 }}>
                        {inRec  && <span style={{color:"#2563EB"}}>📥 입실 {inRec.time}</span>}
                        {outRec && <span style={{color:T.p}}>📤 퇴실 {outRec.time}</span>}
                        {!inRec && "대기 중"}
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:5, alignItems:"center" }}>
                      {inRec && <Chip label={att.label} bg={att.bg} color={att.color}/>}
                      {outRec && <Chip label="퇴실완료" bg="#EFF6FF" color="#2563EB"/>}
                      {!inRec && <Chip label="미확인" bg={T.s3} color={T.mu}/>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 진행 바 */}
            <div style={{ padding:"11px 18px", borderTop:`1px solid ${T.bd}`, background:T.s2 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                <span style={{ fontSize:11, color:T.mu }}>입실 진행률</span>
                <span style={{ fontSize:11, fontWeight:700, color:T.p }}>
                  {courseStudents.length ? Math.round(checkedInCnt/courseStudents.length*100) : 0}%
                  <span style={{ fontSize:10, color:T.mu, fontWeight:400, marginLeft:4 }}>
                    ({checkedInCnt}/{courseStudents.length})
                  </span>
                </span>
              </div>
              <RBar r={courseStudents.length ? checkedInCnt/courseStudents.length*100 : 0} h={8}/>
            </div>
          </Card>
        </div>
      ) : (
        /* ── 수동 입력 모드 ── */
        <Card style={{ overflow:"hidden" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead>
              <tr style={{ background:T.s2 }}>
                {["이름","누적 출석률","입실 시간","퇴실 시간","출결 상태","결석 사유","저장"].map(h=>(
                  <th key={h} style={{ padding:"10px 12px",
                    textAlign:h==="이름"?"left":"center",
                    fontSize:11, color:T.mu, fontWeight:700,
                    borderBottom:`1px solid ${T.bd}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {courseStudents.map(s=>{
                const row = manualAtt[s.id] || {};
                const curStatus = row.status || "";
                const curIn  = row.inTime  || "";
                const curOut = row.outTime || "";
                const curReason = row.reason || "";
                const curAbsType = row.absenceType || "personal";
                const dirty  = row.saved === false; // 저장 전 수정됨
                const saved  = row.saved === true;
                const setRow = (patch) => setManualAtt(p => ({
                  ...p, [s.id]: { ...(p[s.id]||{}), ...patch, saved: false }
                }));
                const saveRow = async () => {
                  try {
                    const now = new Date();
                    const defaultTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                    if (!curIn && !curStatus && !curOut) { alert("입실 시간 또는 상태를 먼저 입력하세요."); return; }
                    // 결석(A)은 명시적 입실 시간이 없으면 null 유지 (phantom check-in 방지)
                    const inTime = curIn || (curStatus && curStatus !== "A" ? defaultTime : null);
                    const calcMins = inTime ? timeToMins(inTime) : null;
                    const rowStatus = curStatus || (inTime ? "O" : "U");
                    const courseIdNum = Number(course?.id);
                    if (!courseIdNum) { alert("과정 정보 오류: course_id 없음"); console.error("❌ course_id 없음", course); return; }
                    const rowData = {
                      course_id: courseIdNum, student_id: Number(s.id), date,
                      status:       rowStatus,
                      check_in:     inTime  || null,
                      check_out:    curOut  || null,
                      method:       "manual",
                      ...(rowStatus === "A" && curReason ? { reason: curReason, absence_type: curAbsType || "personal" } : {}),
                    };
                    const { error } = await sbUpsert("attendance", [rowData], "student_id,date,course_id");
                    if (error) throw error;
                    setManualAtt(p => ({ ...p, [s.id]: { ...(p[s.id]||{}), saved: true } }));
                    // records 상태 동기화 → QR 모드와 수동 모드 연동
                    setRecords(prev => {
                      const next = { ...prev };
                      const upd  = { ...(next[s.id]||{}), status: rowStatus };
                      if (inTime) { upd.checkIn = inTime; upd.checkInMins = calcMins; }
                      if (curOut) upd.checkOut = curOut;
                      next[s.id] = upd;
                      return next;
                    });
                    if (onRatesUpdated) onRatesUpdated(course.id);
                  } catch(err) {
                    alert("저장 오류: " + fmtSaveError(err));
                  }
                };
                return (
                  <tr key={s.id} className="row-hover"
                    style={{ borderBottom:`1px solid ${T.bd}`,
                       background: saved ? "#F0FDF4" : "transparent" }}>
                    <td style={{ padding:"10px 12px", fontSize:13, fontWeight:700, color:T.tx }}>
                      {s.name}
                      {s.rate<80 && <span style={{ marginLeft:6, fontSize:10, color:T.danger }}>⚠</span>}
                    </td>
                    <td style={{ padding:"10px 12px", textAlign:"center" }}>
                      <div style={{ fontSize:13, fontWeight:800, color:rateColor(s.rate) }}>{s.rate}%</div>
                      <RBar r={s.rate} h={3}/>
                    </td>
                    {/* 입실 시간 */}
                    <td style={{ padding:"10px 8px", textAlign:"center" }}>
                      <input type="time" value={curIn}
                        onChange={e=>setRow({inTime:e.target.value})}
                        style={{ width:90, padding:"5px 6px", borderRadius:6, fontSize:12,
                          border:`1px solid ${curIn?T.ok:T.bd}`, outline:"none" }}/>
                    </td>
                    {/* 퇴실 시간 */}
                    <td style={{ padding:"10px 8px", textAlign:"center" }}>
                      <input type="time" value={curOut}
                        onChange={e=>setRow({outTime:e.target.value})}
                        style={{ width:90, padding:"5px 6px", borderRadius:6, fontSize:12,
                          border:`1px solid ${curOut?T.p:T.bd}`, outline:"none" }}/>
                    </td>
                    {/* 출결 상태 */}
                    <td style={{ padding:"10px 8px" }}>
                      <div style={{ display:"flex", gap:4, justifyContent:"center" }}>
                        {Object.entries(ATT_MAP).map(([k,v])=>(
                          <button key={k}
                            onClick={()=>setRow({status:k})}
                            style={{ width:40, height:26, border:"none", borderRadius:5,
                              cursor:"pointer", fontSize:11, fontWeight:700, transition:"all .15s",
                              background: curStatus===k ? v.color : T.s2,
                              color: curStatus===k ? "#fff" : T.mu }}>
                            {v.label}
                          </button>
                        ))}
                      </div>
                    </td>
                    {/* 결석 사유 */}
                    <td style={{ padding:"10px 8px", minWidth:140 }}>
                      {curStatus === "A" ? (
                        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                          <select value={curAbsType}
                            onChange={e=>setRow({absenceType:e.target.value})}
                            style={{ width:"100%", padding:"3px 6px", borderRadius:5, fontSize:11,
                              border:`1px solid ${T.bd}`, outline:"none", background:T.s2, color:T.tx }}>
                            <option value="excused">부득이한 사유 (㉠)</option>
                            <option value="personal">개인 사유 (㉡)</option>
                          </select>
                          <input type="text" value={curReason}
                            onChange={e=>setRow({reason:e.target.value})}
                            placeholder="사유 입력..."
                            style={{ width:"100%", padding:"3px 6px", borderRadius:5, fontSize:11,
                              border:`1px solid ${T.bd}`, outline:"none", color:T.tx, background:T.s2 }}/>
                        </div>
                      ) : (
                        <span style={{ fontSize:10, color:T.mu }}>—</span>
                      )}
                    </td>
                    {/* 개별 저장 버튼 */}
                    <td style={{ padding:"10px 8px", textAlign:"center" }}>
                      <button onClick={saveRow}
                        style={{ padding:"6px 12px", borderRadius:6, border:"none",
                          background: saved ? T.ok : T.p, color:"#fff",
                          fontSize:11, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>
                        {saved ? "✓ 저장됨" : "저장"}
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          
          {/* 전체 일괄 저장 버튼 */}
          <div style={{ padding:"14px 18px", borderTop:`1px solid ${T.bd}`, 
            display:"flex", gap:10, justifyContent:"flex-end", alignItems:"center" }}>
            <div style={{ fontSize:11, color:T.mu }}>
              {Object.values(manualAtt).filter(r=>r.saved).length}명 저장됨
            </div>
            <Btn variant="ghost" onClick={()=>setManualAtt({})}>
              초기화
            </Btn>
            <Btn onClick={async ()=>{
              const unsaved = courseStudents.filter(s => {
                const row = manualAtt[s.id]||{};
                return (row.inTime || row.status || row.outTime) && !row.saved;
              });
              if(unsaved.length === 0) { alert("저장할 내용이 없습니다."); return; }
              try {
                const courseIdNum = Number(course?.id);
                if (!courseIdNum) { alert("과정 정보 오류: course_id 없음"); console.error("❌ course_id 없음", course); return; }
                const now = new Date();
                const defaultTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                const attRows = unsaved.map(s => {
                  const row = manualAtt[s.id]||{};
                  // 결석(A)은 명시적 입실 시간이 없으면 null 유지 (phantom check-in 방지)
                  const inTime = row.inTime || (row.status && row.status !== "A" ? defaultTime : null);
                  const rowStatus = row.status || (inTime ? "O" : "U");
                  return {
                    course_id: courseIdNum, student_id: Number(s.id), date,
                    status:       rowStatus,
                    check_in:     inTime      || null,
                    check_out:    row.outTime  || null,
                    method:       "manual",
                    ...(rowStatus === "A" && row.reason ? { reason: row.reason, absence_type: row.absenceType || "personal" } : {}),
                  };
                });
                const { error } = await sbUpsert("attendance", attRows, "student_id,date,course_id");
                if (error) throw error;
                setManualAtt(p => {
                  const next = {...p};
                  unsaved.forEach(s => { next[s.id] = {...(next[s.id]||{}), saved:true}; });
                  return next;
                });
                // records 상태 동기화 → QR 모드와 수동 모드 연동
                setRecords(prev => {
                  const next = { ...prev };
                  attRows.forEach(r => {
                    const upd = { ...(next[r.student_id]||{}), status: r.status };
                    if (r.check_in)  { upd.checkIn = r.check_in; upd.checkInMins = timeToMins(r.check_in); }
                    if (r.check_out) upd.checkOut = r.check_out;
                    next[r.student_id] = upd;
                  });
                  return next;
                });
                alert(`✅ ${unsaved.length}명 출결 일괄 저장 완료`);
                if (onRatesUpdated) onRatesUpdated(course.id);
              } catch(err) {
                alert("저장 오류: " + fmtSaveError(err));
              }
            }}>
              <Icon n="check" s={13}/>
              전체 일괄 저장
            </Btn>
          </div>
        </Card>
      )}
    </div>
  );
};

/* ===========================================================
   COMPLETION
=========================================================== */
const CompletionMgmt = ({ students, courses }) => {
  const [course, setCourse] = useState(courses[3] || courses[0]);
  const [threshold, setThr] = useState(80);
  const [overrides, setOvr] = useState({});

  // courses prop 변경(실시간 업데이트/편집) 시 선택 과정 최신 데이터로 동기화
  useEffect(() => {
    if (!courses.length) return;
    setCourse(prev => {
      if (!prev) return courses[0];
      const updated = courses.find(c => c.id === prev.id);
      return updated || courses[0];
    });
  }, [courses]);

  if (!course) return null;
  const list = students.filter(s=>s.cid===course.id);
  const get  = s => overrides[s.id] ?? (s.rate>=threshold?"수료":"미수료");
  const completed = list.filter(s=>get(s)==="수료").length;
  const rate = list.length ? Math.round(completed/list.length*100) : 0;

  return (
    <div className="page">
      <SectionHead title="수료 관리" sub="출석률 기준 자동 판정 · 담당자 수동 조정 가능"/>

      <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap" }}>
        {courses.map(c=>(
          <button key={c.id} onClick={()=>setCourse(c)} style={{
            padding:"6px 13px", borderRadius:20, border:"none", cursor:"pointer",
            fontSize:11, fontWeight:600, whiteSpace:"nowrap",
            background: course.id===c.id ? c.cc : T.s3,
            color: course.id===c.id ? "#fff" : T.mu }}>
            {shortCourseName(c.name)}
          </button>
        ))}
      </div>

      {/* 컨트롤 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:12, marginBottom:18 }}>
        <Card style={{ padding:"16px 20px", display:"flex", gap:20, alignItems:"center" }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:11, color:T.mu, marginBottom:6, fontWeight:600 }}>수료 기준 출석률</div>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <input type="range" min={60} max={95} step={5} value={threshold}
                onChange={e=>setThr(+e.target.value)}
                style={{ flex:1, accentColor:T.p }}/>
              <span style={{ fontSize:26, fontWeight:900, color:T.p, minWidth:52 }}>{threshold}%</span>
            </div>
            <div style={{ fontSize:10, color:T.mu }}>※ 매뉴얼 기준: 총 교육시간의 80% 이상</div>
          </div>
          <Btn onClick={()=>{
            const j={};
            list.forEach(s=>{ j[s.id]=s.rate>=threshold?"수료":"미수료"; });
            setOvr(j);
          }}>자동 판정</Btn>
        </Card>
        <Card style={{ padding:"16px 22px", textAlign:"center" }}>
          <div style={{ fontSize:11, color:T.mu }}>수료율</div>
          <div style={{ fontSize:32, fontWeight:900, color:rate>=90?T.p:T.danger, lineHeight:1.1 }}>{rate}%</div>
          <div style={{ fontSize:11, color:T.mu }}>{completed}/{list.length}명</div>
          <Chip label={rate>=90?"목표달성":"목표미달"} bg={rate>=90?T.pbg:"#FEF2F2"} color={rate>=90?T.p:T.danger} size={10}/>
        </Card>
        <Card style={{ padding:"16px 22px" }}>
          <div style={{ fontSize:11, color:T.mu }}>과정 목표</div>
          <div style={{ fontSize:16, fontWeight:800, color:T.tx, marginTop:4 }}>{course.cGoal}명 수료</div>
          <div style={{ fontSize:11, color:T.mu, marginTop:2 }}>{course.eGoal}명 취업 목표</div>
        </Card>
      </div>

      <Card style={{ overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.s2 }}>
              {["이름","출석률","자동판정","최종결과","비고"].map(h=>(
                <th key={h} style={{ padding:"10px 16px",
                  textAlign:h==="이름"?"left":"center",
                  fontSize:11, color:T.mu, fontWeight:700,
                  borderBottom:`1px solid ${T.bd}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {list.map(s=>{
              const auto = s.rate>=threshold?"수료":"미수료";
              const final = get(s);
              const changed = overrides[s.id]!==undefined && overrides[s.id]!==auto;
              return (
                <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                  <td style={{ padding:"12px 16px", fontSize:13, fontWeight:700, color:T.tx }}>{s.name}</td>
                  <td style={{ padding:"12px 16px", textAlign:"center" }}>
                    <span style={{ fontSize:15, fontWeight:800, color:rateColor(s.rate) }}>{s.rate}%</span>
                    <RBar r={s.rate} h={3}/>
                  </td>
                  <td style={{ padding:"12px 16px", textAlign:"center" }}>
                    <Chip label={auto} bg={auto==="수료"?T.pbg:"#FEF2F2"} color={auto==="수료"?T.p:T.danger}/>
                  </td>
                  <td style={{ padding:"12px 16px" }}>
                    <div style={{ display:"flex", gap:6, justifyContent:"center" }}>
                      {["수료","미수료"].map(v=>(
                        <button key={v} onClick={()=>setOvr(p=>({...p,[s.id]:v}))} style={{
                          padding:"5px 14px", border:"none", borderRadius:6,
                          cursor:"pointer", fontWeight:700, fontSize:12, transition:"all .15s",
                          background: final===v?(v==="수료"?T.p:T.danger):"#F1F5F9",
                          color: final===v?"#fff":T.mu }}>
                          {v}
                        </button>
                      ))}
                    </div>
                  </td>
                  <td style={{ padding:"12px 16px", textAlign:"center", fontSize:11 }}>
                    {changed && <Chip label="수동조정" bg="#FFFBEB" color={T.warn}/>}
                    {s.rate<60 && <Chip label="1년 제한 검토" bg="#FEF2F2" color={T.danger} size={10}/>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

  const fmtD = d => d ? d.replace(/(\d{4})-(\d{2})-(\d{2})/, (_, y, m, dd) =>
    `${y}년 ${String(+m)}월 ${String(+dd)}일`) : "　　　　";
  const todayStr = new Date().toISOString().slice(0,10);

  const computedTo   = certEndDate   ||

const CertMgmt = ({ students, courses }) => {
  const [course, setCourse]       = useState(courses[3] || courses[0]);
  const [docType, setDocType]     = useState("cert");   // "cert" | "attend" | "parti"
  const [issued, setIssued]       = useState({});
  const [issueDate, setIssueDate] = useState("2026년　　월　　일");
  const [customDate, setCustomDate] = useState("");

  // courses prop 변경(실시간 업데이트/편집) 시 선택 과정 최신 데이터로 동기화
  useEffect(() => {
    if (!courses.length) return;
    setCourse(prev => {
      if (!prev) return courses[0];
      const updated = courses.find(c => c.id === prev.id);
      return updated || courses[0];
    });
  }, [courses]);

  if (!course) return null;
  // 수료증: 출석률 80% 이상
  // 수강증명서/참여확인서: 해당 과정 수강자 전체 (출석률 무관 — 등록 자체가 기준)
  const certEligible   = students.filter(s => Number(s.cid)===Number(course.id) && s.rate>=80);
  const attendEligible = students.filter(s => Number(s.cid)===Number(course.id));
  const eligible = docType==="cert" ? certEligible : attendEligible;

  const getCertNo = (s, idx) => {
    if (issued[s.id+docType]?.no) return issued[s.id+docType].no;
    // 순번 숫자만 반환 — 전체 번호는 템플릿에서 조합
    // 수료증: "2026-북부교육팀-{no}호" / 수강증명서: "제 2026-북부-수강-{no} 호"
    return String(idx+1).padStart(3, "0");
  };

  const handleIssue = async (s, idx) => {
    const no = getCertNo(s, idx);
    setIssued(p => ({ ...p, [s.id+docType]: { no, date: issueDate } }));
    if(docType==="cert") {
      printCertificate(s, course, no, issueDate);
    } else if (docType === "parti") {
      // 참여확인서: 강의실 정보 조회 후 출력
      let roomName = "";
      try {
        const { data: bookData } = await sbGet("room_bookings",
          `select=room_id&course_id=eq.${course.id}&limit=1`);
        if (bookData && bookData.length > 0) {
          const { data: roomData } = await sbGet("rooms",
            `select=name&id=eq.${bookData[0].room_id}&limit=1`);
          if (roomData && roomData.length > 0) roomName = roomData[0].name;
        }
      } catch(e) { console.warn("강의실 조회 오류:", e); }
      printParticipationCert(s, course, no, issueDate, roomName);
    } else {
      // 수강증명서(별지 83호): 결석 기록 + 최초 출석일 로드
      let studentAbsences = [];
      let certStartDate = null;
      let certEndDate   = null;
      try {
        const [absRes, firstRes] = await Promise.all([
          sbGet("attendance",
            `select=date,status,reason,absence_type&student_id=eq.${s.id}&course_id=eq.${course.id}&status=eq.A`),
          sbGet("attendance",
            `select=date&student_id=eq.${s.id}&course_id=eq.${course.id}&status=in.(O,L)&order=date.asc&limit=1`),
        ]);
        if (absRes.data) {
          studentAbsences = absRes.data.map(r => ({
            date: r.date,
            absenceType: r.absence_type || "personal",
            reason: r.reason || "",
          }));
        }
        // 최초 출석일: 훈련생이 실제로 참여한 첫날
        if (firstRes.data && firstRes.data.length > 0) {
          certStartDate = firstRes.data[0].date;
        } else {
          certStartDate = course.dateFrom || null;
        }
        // 종료일: 오늘 vs 과정 종료일 중 빠른 것
        const todayISO = new Date().toISOString().slice(0,10);
        certEndDate = (course.dateTo && todayISO < course.dateTo) ? todayISO : (course.dateTo || todayISO);
      } catch(e) {
        console.warn("출결 데이터 로드 오류:", e);
      }
      printAttendCert(s, course, no, issueDate, studentAbsences, certStartDate, certEndDate);
    }
  };

  const handleIssueAll = () => eligible.forEach((s, idx) => handleIssue(s, idx));

  const fmtDate = raw => {
    if (!raw) return "";
    const [y,m,d] = raw.split("-");
    return `${y}년 ${m}월 ${d}일`;
  };

  return (
    <div className="page">
      <SectionHead
        title="증명서 발급"
        sub="수료증 · 수강증명서 공식 양식 출력 · 브라우저 인쇄 → PDF 저장"
      />

      {/* 문서 종류 선택 */}
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
        {[
          {id:"cert",   label:"📋 수 료 증",   sub:"출석률 80% 이상"},
          {id:"attend", label:"📄 수강증명서", sub:"수강자 전체"},
          {id:"parti",  label:"📃 참여확인서", sub:"최종 선발 참여자"},
        ].map(({id,label,sub})=>(
          <button key={id} onClick={()=>setDocType(id)} style={{
            padding:"10px 20px", borderRadius:10, border:"none", cursor:"pointer",
            background: docType===id ? T.p : T.s2,
            color: docType===id ? "#fff" : T.mu,
            fontWeight:700, fontSize:13, transition:"all .15s",
            borderWidth:2, borderStyle:"solid",
            borderColor: docType===id ? T.p : T.bd }}>
            {label}
            <div style={{ fontSize:10, fontWeight:400, marginTop:2,
              color: docType===id ? "rgba(255,255,255,.7)" : T.mu }}>{sub}</div>
          </button>
        ))}
      </div>

      {/* 과정 선택 */}
      <div style={{ display:"flex", gap:7, marginBottom:16, flexWrap:"wrap" }}>
        {courses.map(c => (
          <button key={c.id} onClick={()=>setCourse(c)} style={{
            padding:"6px 12px", borderRadius:20, border:"none", cursor:"pointer",
            fontSize:11, fontWeight:600, whiteSpace:"nowrap",
            background: course.id===c.id ? c.cc : T.s3,
            color: course.id===c.id ? "#fff" : T.mu }}>
            {shortCourseName(c.name)}
          </button>
        ))}
      </div>

      {/* 발급일자 */}
      <Card style={{ padding:"14px 18px", marginBottom:16, display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ fontSize:12, fontWeight:700, color:T.tx }}>📅 발급일자</div>
        <input type="date" value={customDate}
          onChange={e => { setCustomDate(e.target.value); setIssueDate(fmtDate(e.target.value)); }}
          style={{ padding:"6px 10px", border:`1px solid ${T.bd}`, borderRadius:8,
            fontSize:12, outline:"none", background:T.s2, cursor:"pointer" }}/>
        <div style={{ fontSize:12, color:T.mu }}>→ <b style={{color:T.p}}>{issueDate}</b></div>
        <div style={{ marginLeft:"auto" }}>
          <Btn size="sm" onClick={handleIssueAll}>
            <Icon n="dl" s={13}/> 전체 {eligible.length}명 출력
          </Btn>
        </div>
      </Card>

      {/* 대상자 테이블 */}
      <Card style={{ overflow:"hidden" }}>
        <div style={{ padding:"12px 18px", borderBottom:`1px solid ${T.bd}`,
          display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <span style={{ fontSize:13, fontWeight:700, color:T.tx }}>
              {docType==="cert" ? "수료 대상자" : docType==="parti" ? "참여확인서 대상자" : "수강 대상자"}
            </span>
            <span style={{ fontSize:12, color:T.mu, marginLeft:8 }}>
              {eligible.length}명
              {docType==="cert" && (
                <>
                  {" "}/ 목표 {course.cGoal}명
                  {eligible.length >= course.cGoal
                    ? <span style={{color:T.ok,fontWeight:700,marginLeft:6}}>✓ 목표 달성</span>
                    : <span style={{color:T.danger,fontWeight:700,marginLeft:6}}>({course.cGoal-eligible.length}명 부족)</span>}
                </>
              )}
            </span>
          </div>
        </div>

        {/* 출력 안내 */}
        <div style={{ padding:"10px 18px", background:"#FFFBEB", borderBottom:`1px solid #FDE68A`,
          fontSize:11, color:"#92400E", display:"flex", gap:8, alignItems:"center" }}>
          <Icon n="info" s={13}/>
          <span>
            <b>PDF 저장:</b> 발급 버튼 → 새 창 → 🖨️ 클릭 →
            프린터를 <b>「PDF로 저장」</b> 선택 · 서명란: <b>경기도일자리재단 대표이사 (인)</b>
          </span>
        </div>

        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.s2 }}>
              {[
                {h:"번호",w:50},{h:"이름",w:"auto"},{h:"주민등록번호",w:130},
                {h:"출석률",w:80},{h:"문서번호",w:150},{h:"발급여부",w:90},{h:"",w:130}
              ].map(({h,w})=>(
                <th key={h} style={{ padding:"10px 14px", textAlign:h==="이름"?"left":"center",
                  fontSize:11, color:T.mu, fontWeight:700,
                  borderBottom:`1px solid ${T.bd}`, width:w }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {eligible.length===0 && (
              <tr><td colSpan={7} style={{ padding:"40px 0", textAlign:"center", fontSize:13, color:T.mu }}>
                {docType==="cert" ? "수료 대상자(출석률 80% 이상)가 없습니다" : "수강자가 없습니다"}
              </td></tr>
            )}
            {eligible.map((s, idx) => {
              const key  = s.id+docType;
              const cert = issued[key];
              const no   = getCertNo(s, idx);
              return (
                <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                  <td style={{ padding:"12px 14px", textAlign:"center", fontSize:12, color:T.mu }}>{idx+1}</td>
                  <td style={{ padding:"12px 14px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:28, height:28, borderRadius:8, background:`${T.p}15`,
                        color:T.p, display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:11, fontWeight:800, flexShrink:0 }}>{s.name[0]}</div>
                      <span style={{ fontSize:13, fontWeight:700, color:T.tx }}>{s.name}</span>
                    </div>
                  </td>
                  <td style={{ padding:"12px 14px", textAlign:"center", fontSize:11, color:T.mu, fontFamily:"monospace" }}>
                    {(() => {
                      const b = (s.birth||"").replace(/-/g,"");
                      const front = b.length >= 8 ? b.slice(2,4)+b.slice(4,6)+b.slice(6,8) : "------";
                      const back  = s.idBack ? s.idBack[0]+"______" : "-------";
                      return `${front}-${back}`;
                    })()}
                  </td>
                  <td style={{ padding:"12px 14px", textAlign:"center" }}>
                    <span style={{ fontSize:14, fontWeight:800,
                      color: s.rate>=80?T.ok:s.rate>=60?T.warn:T.danger }}>{s.rate}%</span>
                  </td>
                  <td style={{ padding:"12px 14px", textAlign:"center", fontSize:11, color:T.mu, fontFamily:"monospace" }}>
                    {cert
                      ? `2026-북부-${docType==="cert"?"수료":docType==="parti"?"참여":"수강"}-${no}호`
                      : <span style={{color:T.bd}}>미발급</span>}
                  </td>
                  <td style={{ padding:"12px 14px", textAlign:"center" }}>
                    <Chip label={cert?"발급완료":"미발급"} bg={cert?T.pbg:T.s3} color={cert?T.p:T.mu}/>
                  </td>
                  <td style={{ padding:"12px 14px", textAlign:"center" }}>
                    <Btn size="sm" variant={cert?"ghost":"primary"} onClick={()=>handleIssue(s,idx)}>
                      <Icon n="dl" s={12}/>{cert?"재출력":"PDF 발급"}
                    </Btn>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

const calcAge = birth => {
  if(!birth) return "-";
  const today = new Date();
  const b = new Date(birth);
  let age = today.getFullYear() - b.getFullYear();
  if(today.getMonth() < b.getMonth() || (today.getMonth()===b.getMonth() && today.getDate()<b.getDate())) age--;
  return `${age}세`;
};

                  const raw = e.target.value.replace(/[^0-9]/g, "");
                  const front6 = raw.slice(0,6);
                  const back7  = raw.slice(6,13);
                  if (front6.length === 6) {
                    const yy = front6.slice(0,2), mm = front6.slice(2,4), dd = front6.slice(4,6);
                    const f1  = back7[0] || "";
                    // 1/2=내국인 1900s, 3/4=내국인 2000s, 5/6=외국인 1900s, 7/8=외국인 2000s
                    const yyyy = (f1==="3"||f1==="4"||f1==="7"||f1==="8") ? `20${yy}` : `19${yy}`;
                    const candidate = `${yyyy}-${mm}-${dd}`;
                    const d = new Date(candidate);
                    if (!isNaN(d.getTime()) &&
                        d.getFullYear()===+yyyy && d.getMonth()===+mm-1 && d.getDate()===+dd) {
                      set("birth", candidate);
                    }
                  }
                  if (back7) set("idBack", back7);
                }}
                placeholder="YYMMDD-XXXXXXX  (앞 6자리 + 뒷 7자리, 총 13자리)"
                maxLength={14}
                style={{ ...inpStyle, letterSpacing:"3px", fontFamily:"monospace" }}
              />
              {form.birth && (
                <div style={{ fontSize:11, color:T.mu, marginTop:4, paddingLeft:2 }}>
                  📅 자동계산 — 생년월일: <b style={{color:T.tx}}>{form.birth}</b>　·　{age}
                </div>
              )}
            </FLD>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))", gap:10 }}>
            <FLD label="연락처">
              <input value={form.phone||""} onChange={e=>set("phone",e.target.value)} placeholder="010-0000-0000" style={inpStyle}/>
            </FLD>
            <FLD label="거주 시·군">
              <select value={form.addrCity||"의정부시"} onChange={e=>set("addrCity",e.target.value)} style={selStyle}>
                {["의정부시","양주시","포천시","동두천시","연천군","가평군","남양주시","구리시","기타"].map(v=>(
                  <option key={v} value={v}>{v}</option>
                ))}
              </select>
            </FLD>
          </div>

          {divider("면접 결과")}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:10 }}>
            <FLD label="면접일자">
              <input type="date" value={form.itvDate||""} onChange={e=>set("itvDate",e.target.value)} style={inpStyle}/>
            </FLD>
            <FLD label="점수 (100점)">
              <input value={form.itvScore||""} onChange={e=>set("itvScore",e.target.value)}
                placeholder="88" type="number" min="0" max="100" style={inpStyle}/>
            </FLD>
            <FLD label="등급">
              <select value={form.itvGrade||"B"} onChange={e=>set("itvGrade",e.target.value)} style={selStyle}>
                {["A+","A","B+","B","C","탈락"].map(v=><option key={v} value={v}>{v}</option>)}
              </select>
            </FLD>
          </div>

          <div style={{ display:"flex", gap:8 }}>
            {[["✅ 합격",true],["❌ 불합격",false]].map(([l,v])=>(
              <button key={l} type="button" onClick={()=>set("itvPass",v)} style={{
                flex:1, padding:"9px 0", borderRadius:8, border:"none", cursor:"pointer",
                fontWeight:700, fontSize:12, transition:"all .15s",
                background: form.itvPass===v ? (v?"#ECFDF5":"#FEF2F2") : T.s3,
                color: form.itvPass===v ? (v?T.ok:T.danger) : T.mu,
                borderWidth:1.5, borderStyle:"solid",
                borderColor: form.itvPass===v ? (v?T.ok:T.danger) : T.bd }}>
                {l}
              </button>
            ))}
          </div>

          {(form.itvScore||form.itvGrade) && (
            <div style={{ display:"flex", gap:12, alignItems:"center", padding:"12px 14px",
              borderRadius:10, background:form.itvPass?T.pbg:"#FEF2F2",
              border:`1px solid ${form.itvPass?T.pl+"60":"#FECACA"}` }}>
              <div style={{ width:44, height:44, borderRadius:10, flexShrink:0,
                background:form.itvPass?T.p:T.danger,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:16, fontWeight:900, color:"#fff" }}>{form.itvGrade||"?"}</div>
              <div>
                <div style={{ fontSize:13, fontWeight:800, color:T.tx }}>
                  {form.name||"(이름 없음)"} · {form.itvScore||"-"}점 · {form.itvPass?"합격":"불합격"}
                </div>
                <div style={{ fontSize:11, color:T.mu, marginTop:2 }}>
                  {courses.find(c=>c.id===form.cid)?.name} · {form.itvDate||"-"}
                </div>
              </div>
            </div>
          )}

          <FLD label="특이사항 · 메모">
            <textarea value={form.memo||""} onChange={e=>set("memo",e.target.value)}
              placeholder="면접 특이사항, 취업 의지, 배려 필요 사항 등 자유 기재"
              rows={3} style={{ ...inpStyle, resize:"vertical", fontFamily:"inherit", lineHeight:1.6 }}/>
          </FLD>
        </div>

        {/* 푸터 */}
        <div style={{ padding:"13px 22px", borderTop:`1px solid ${T.bd}`,
          display:"flex", justifyContent:"flex-end", gap:8, background:T.s2, flexShrink:0 }}>
          <Btn variant="ghost" onClick={onClose}>취소</Btn>
          <Btn onClick={async ()=>{
            if(!form.name||!form.name.trim()) return alert("이름은 필수 입력 항목입니다.");
            if(!form.birth) return alert("주민등록번호는 필수 입력 항목입니다. (앞 6자리 입력 필요)");
            await onSave({ ...form, id: form.id||undefined });
            onClose();
          }}>
            <Icon n="check" s={13}/> {isNew ? "등록" : "저장"}
          </Btn>
        </div>
      </div>
    </div>
  );
};

const InstructorMgmt = ({ courses }) => {
  const [instructors, setInst] = useState(SEED_INSTRUCTORS);
  const [editTarget, setEdit]  = useState(null);
  const [isNew, setIsNew]      = useState(false);
  const [search, setSearch]    = useState("");
  const [typeFilter, setTF]    = useState("전체");

  // ── DB 연동 상태 ──
  const [dbStatus, setDbStatus] = useState("loading"); // loading | ok | error
  const [rtStatus, setRtStatus] = useState("pending"); // pending | connected | disconnected | error
  const [lastOp,   setLastOp]   = useState(null);      // {type, status, msg}

  // ── Supabase 초기 로드 ──
  useEffect(() => {
    const load = async () => {
      try {
        const { data, error } = await sbGet("instructors", "select=*&order=id");
        if (error) throw error;
        if (data && data.length > 0) setInst(data.map(toInstructor));
        setDbStatus("ok");
      } catch (err) {
        console.warn("강사 목록 로드 실패 (시드 데이터 사용):", err.message || err);
        setDbStatus("error");
      }
    };
    load();
  }, []);

  // ── 강사 실시간 구독 ──
  useEffect(() => {
    realtimeManager.subscribe("instructors", {
      onInsert: (newRecord) => {
        setInst(prev => {
          // 이미 있으면 DB 정규 데이터로 갱신, 없으면 추가
          if (prev.find(x => x.id === newRecord.id))
            return prev.map(x => x.id === newRecord.id ? toInstructor(newRecord) : x);
          console.log("🆕 강사 추가 (실시간):", newRecord.name);
          return [...prev, toInstructor(newRecord)];
        });
      },
      onUpdate: (newRecord) => {
        setInst(prev => prev.map(x => x.id === newRecord.id ? toInstructor(newRecord) : x));
        console.log("✏️ 강사 수정 (실시간):", newRecord.name);
      },
      onDelete: (oldRecord) => {
        setInst(prev => prev.filter(x => x.id !== oldRecord.id));
        console.log("🗑️ 강사 삭제 (실시간):", oldRecord.name);
      },
      onStatus: (s) => setRtStatus(s),
    });
    return () => realtimeManager.unsubscribe("instructors");
  }, []);

  const filtered = instructors.filter(i => {
    if(typeFilter!=="전체" && i.type!==typeFilter) return false;
    if(search && !i.name.includes(search) && !i.subject.includes(search)) return false;
    return true;
  });

  const handleSave = async inst => {
    const isSchemaErr = (e, col) => {
      const m = e?.message || e?.hint || JSON.stringify(e);
      return m.includes("schema cache") && m.includes(col);
    };
    const doSave = async (body) => isNew
      ? sbInsert("instructors", body)
      : sbUpdate("instructors", `id=eq.${inst.id}`, body);

    try {
      const body = fromInstructor(inst);
      let res = await doSave(body);

      // cids/note 컬럼 스키마 캐시 미등록 → 해당 필드 제외 후 재시도
      if (res.error && (isSchemaErr(res.error, "cids") || isSchemaErr(res.error, "note"))) {
        console.warn("⚠️ instructors.cids/note 스키마 캐시 오류 — Supabase 대시보드 → Settings → API → Schema Cache → Reload 클릭");
        const { cids, note, ...fallback } = body;
        res = await doSave(fallback);
      }

      if (res.error) throw res.error;

      if (isNew) {
        const saved = (res.data && res.data[0]) ? toInstructor(res.data[0]) : { ...inst, id: Date.now() };
        setInst(p => [...p, saved]);
      } else {
        setInst(p => p.map(x => x.id===inst.id ? inst : x));
      }
      setLastOp({ type: isNew ? "add" : "edit", status: "ok" });
    } catch (err) {
      setLastOp({ type: isNew ? "add" : "edit", status: "error", msg: err.message || String(err) });
      alert("저장 오류: " + (err.message || String(err)));
      throw err;
    }
  };
  const handleDel = async id => {
    if (!window.confirm("강사를 삭제하시겠습니까?")) return;
    try {
      const { error } = await sbDelete("instructors", `id=eq.${id}`);
      if (error) throw error;
      setInst(p => p.filter(x => x.id !== id));
      setLastOp({ type: "delete", status: "ok" });
    } catch (err) {
      console.warn("강사 삭제 오류:", err.message || err);
      setLastOp({ type: "delete", status: "error", msg: err.message || String(err) });
      alert("삭제 오류: " + (err.message || String(err)));
    }
  };

  const typeColors = {"주강사":T.p,"보조강사":T.ok,"외래강사":"#7C3AED","운영요원":T.warn};

  return (
    <div className="page">
      {editTarget!==null && (
        <InstructorModal inst={isNew?null:editTarget} isNew={isNew} courses={courses}
          onSave={handleSave} onClose={()=>setEdit(null)}/>
      )}

      <SectionHead
        title="강사 관리"
        sub={`등록 강사 ${instructors.length}명`}
        right={<Btn size="sm" onClick={()=>{setIsNew(true);setEdit({});}}>
          <Icon n="plus" s={13}/> 강사 추가
        </Btn>}
      />

      {/* DB 연동 상태 체크리스트 */}
      <SyncPanel dbStatus={dbStatus} rtStatus={rtStatus} lastOp={lastOp} count={instructors.length}/>

      {/* 필터 바 */}
      <Card style={{ padding:"12px 16px", marginBottom:14, display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="이름 / 담당과목 검색…"
          style={{ padding:"7px 11px", border:`1px solid ${T.bd}`, borderRadius:8,
            fontSize:12, outline:"none", background:T.s2, color:T.tx, width:180 }}/>
        <div style={{ display:"flex", gap:5 }}>
          {["전체","주강사","보조강사","외래강사","운영요원"].map(t=>(
            <button key={t} onClick={()=>setTF(t)} style={{
              padding:"5px 12px", borderRadius:16, border:"none", cursor:"pointer",
              fontSize:11, fontWeight:600,
              background: typeFilter===t ? T.p : T.s3,
              color: typeFilter===t ? "#fff" : T.mu }}>{t}</button>
          ))}
        </div>
        <div style={{ marginLeft:"auto", fontSize:12, color:T.mu, fontWeight:600 }}>
          {filtered.length}명
        </div>
      </Card>

      {/* 강사 카드 그리드 */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:12 }}>
        {filtered.map(inst=>(
          <Card key={inst.id} style={{ padding:18, position:"relative" }}>
            {/* 수정/삭제 */}
            <div style={{ position:"absolute", top:12, right:12, display:"flex", gap:5 }}>
              <button onClick={()=>{setIsNew(false);setEdit(inst);}} style={{
                width:26,height:26,borderRadius:6,border:"none",background:T.pbg,color:T.p,
                cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon n="edit" s={12}/>
              </button>
              <button onClick={()=>handleDel(inst.id)} style={{
                width:26,height:26,borderRadius:6,border:"none",background:"#FEF2F2",color:T.danger,
                cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon n="x" s={12}/>
              </button>
            </div>

            {/* 아바타 + 이름 */}
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12, paddingRight:60 }}>
              <div style={{ width:44, height:44, borderRadius:12, flexShrink:0,
                background:`${typeColors[inst.type]||T.p}18`,
                color:typeColors[inst.type]||T.p,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:18, fontWeight:900 }}>{inst.name[0]}</div>
              <div>
                <div style={{ fontSize:14, fontWeight:800, color:T.tx }}>{inst.name}</div>
                <div style={{ display:"flex", gap:5, marginTop:3 }}>
                  <Chip label={inst.type} bg={`${typeColors[inst.type]||T.p}15`} color={typeColors[inst.type]||T.p}/>
                  {inst.subject && <Chip label={inst.subject} bg={T.s3} color={T.mu}/>}
                </div>
              </div>
            </div>

            {/* 상세 정보 */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:10 }}>
              {[
                {l:"📞",v:inst.phone},
                {l:"📧",v:inst.email},
                {l:"🏅",v:inst.cert||"—"},
                {l:"⏳",v:inst.career ? `경력 ${inst.career}` : "—"},
              ].map(({l,v})=>(
                <div key={l} style={{ fontSize:11, color:T.mu, display:"flex", gap:4, alignItems:"flex-start" }}>
                  <span>{l}</span>
                  <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{v||"—"}</span>
                </div>
              ))}
            </div>

            {/* 담당 과정 뱃지 */}
            {(inst.cids||[]).length > 0 && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                {inst.cids.map(cid=>{
                  const c = courses.find(x=>x.id===cid);
                  return c ? <Chip key={cid} label={c.code} bg={`${c.cc}15`} color={c.cc}/> : null;
                })}
              </div>
            )}

            {inst.note && (
              <div style={{ marginTop:8, fontSize:11, color:T.mu, background:T.s3,
                borderRadius:6, padding:"6px 9px" }}>📝 {inst.note}</div>
            )}
          </Card>
        ))}

        {/* 추가 카드 */}
        <div onClick={()=>{setIsNew(true);setEdit({});}} style={{

/* ── BookModal: 강의 일정 추가/수정 (독립 컴포넌트) ── */
const BookModal = ({ init, onClose, rooms, bookings, courses, setBookings, onSave, onDelete }) => {
  const inp = { width:"100%", padding:"8px 10px", border:`1px solid ${T.bd}`,
    borderRadius:8, fontSize:12, outline:"none", color:T.tx, background:T.s2 };
const firstCourseId = courses[0]?.id || 1;
const empty = {
  roomId: rooms[0]?.id || 1,
  courseId: firstCourseId,
  label: courses[0]?.name || "",
  start: "", end: "",
  color: getCourseColor(firstCourseId, courses),  // ← 과정 팔레트 자동 적용
};
const [form, setForm] = useState(init || empty);
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const isEdit = !!(init?.id);

  // ── 요일 겹침 검사 헬퍼 ──
  const daysOverlap = (daysA, daysB) => {
    if (!daysA || !daysB) return true; // 정보 없으면 겹친다고 가정
    const setA = new Set(daysA.split(/[,\s]+/).map(d=>d.trim()).filter(Boolean));
    return daysB.split(/[,\s]+/).map(d=>d.trim()).filter(Boolean).some(d => setA.has(d));
  };
  // ── 시간대 겹침 검사 헬퍼 ──
  const timesOverlap = (fromA, toA, fromB, toB) => {
    if (!fromA || !toA || !fromB || !toB) return true;
    const toMins = t => { const [h,m] = t.split(":").map(Number); return h*60+m; };
    return toMins(fromA) < toMins(toB) && toMins(toA) > toMins(fromB);
  };

  const getCourseSchedule = (courseId) => courses.find(c=>c.id===courseId) || {};

  const conflicts = (form.start && form.end && form.roomId)
    ? bookings.filter(b => {
        if (b.roomId !== form.roomId) return false;
        if (b.id === init?.id) return false;
        // 1단계: 날짜 범위 겹침
        if (b.start > form.end || b.end < form.start) return false;
        // 2단계: 수업 요일 겹침
        const bCourse   = getCourseSchedule(b.courseId);
        const fCourse   = getCourseSchedule(form.courseId);
        if (!daysOverlap(bCourse.schedDays, fCourse.schedDays)) return false;
        // 3단계: 시간대 겹침
        if (!timesOverlap(bCourse.schedTimeFrom, bCourse.schedTimeTo,
                          fCourse.schedTimeFrom, fCourse.schedTimeTo)) return false;
        return true;
      })
    : [];
  const hasConflict = conflicts.length > 0;

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:1000,
      display:"flex", alignItems:"center", justifyContent:"center" }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:T.s, borderRadius:16, width:440, maxWidth:"96vw",
        boxShadow:"0 24px 64px rgba(0,0,0,.28)", overflow:"hidden", animation:"fadeUp .2s ease" }}>
        <div style={{ background:`linear-gradient(135deg,${T.sb},${T.p})`,
          padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ fontSize:14, fontWeight:800, color:"#fff" }}>
            {isEdit ? "강의 일정 수정" : "강의 일정 추가"}
          </div>
          <button onClick={onClose} style={{ width:26,height:26,borderRadius:6,border:"none",
            background:"rgba(255,255,255,.15)",color:"#fff",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center" }}>
            <Icon n="x" s={13}/>
          </button>
        </div>
        <div style={{ padding:"18px 20px", display:"flex", flexDirection:"column", gap:12 }}>
          <FLD label="강의실">
            <select value={form.roomId} onChange={e=>set("roomId",+e.target.value)}
              style={{...inp, cursor:"pointer",
                borderColor: hasConflict ? T.danger : T.bd,
                background: hasConflict ? "#FEF2F2" : T.s2 }}>
              {rooms.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </FLD>
          <FLD label="과정">
<select value={form.courseId} onChange={e=>{
  const cid = +e.target.value;
  const c = courses.find(x => x.id === cid);
  setForm(p => ({
    ...p,
    courseId: cid,
    label: c?.name || "",
    color: getCourseColor(cid, courses),  // ← 과정 선택 시 색상 자동 설정
  }));
}} style={{...inp, cursor:"pointer"}}>
              {courses.map(c=><option key={c.id} value={c.id}>{shortCourseName(c.name)} [{c.code}]</option>)}
            </select>
          </FLD>
          <FLD label="표시 이름">
            <input value={form.label||""} onChange={e=>set("label",e.target.value)} placeholder="캘린더에 표시될 이름" style={inp}/>
          </FLD>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <FLD label="시작일">
              <input type="date" value={form.start||""} onChange={e=>set("start",e.target.value)}
                style={{...inp, borderColor: hasConflict ? T.danger : T.bd }}/>
            </FLD>
            <FLD label="종료일">
              <input type="date" value={form.end||""} onChange={e=>set("end",e.target.value)}
                style={{...inp, borderColor: hasConflict ? T.danger : T.bd }}/>
            </FLD>
          </div>
          {hasConflict && (
            <div style={{ padding:"10px 12px", borderRadius:8,
              background:"#FEF2F2", border:"1px solid #FECACA", fontSize:11, color:T.danger }}>
              <div style={{ fontWeight:700, marginBottom:4 }}>⚠️ 강의실 중복! 아래 일정과 겹칩니다</div>
              {conflicts.map(b=>(
                <div key={b.id} style={{ display:"flex", alignItems:"center", gap:6,
                  padding:"4px 0", borderTop:"1px solid #FEE2E2" }}>
                  <div style={{ width:8,height:8,borderRadius:2,background:b.color,flexShrink:0 }}/>
                  <span style={{ fontWeight:600 }}>{b.label}</span>
                  <span style={{ color:"#991B1B", marginLeft:"auto" }}>{b.start} ~ {b.end}</span>
                </div>
              ))}
            </div>
          )}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:6 }}>색상</label>
            <div style={{ display:"flex", gap:6 }}>
              {BOOKING_COLORS.map(col=>(
                <button key={col} type="button" onClick={()=>set("color",col)} style={{
                  width:24, height:24, borderRadius:6, background:col, border:"none", cursor:"pointer",
                  outline: form.color===col ? `3px solid ${col}` : "none", outlineOffset:2 }}/>
              ))}
            </div>
          </div>
        </div>
        <div style={{ padding:"12px 20px", borderTop:`1px solid ${T.bd}`,
          display:"flex", justifyContent:"space-between", alignItems:"center", background:T.s2 }}>
          {isEdit
            ? <Btn variant="danger" size="sm" onClick={async ()=>{ if(onDelete) await onDelete(init.id); else setBookings(p=>p.filter(b=>b.id!==init.id)); onClose(); }}>삭제</Btn>
            : <div/>}
          <div style={{ display:"flex", gap:8 }}>
            <Btn variant="ghost" onClick={onClose}>취소</Btn>
            <Btn variant={hasConflict?"danger":"primary"} onClick={async ()=>{
              if(!form.label||!form.start||!form.end) return alert("이름·시작일·종료일은 필수입니다.");
              if(form.start>form.end) return alert("시작일이 종료일보다 늦습니다.");
              if(hasConflict && !window.confirm(`⚠️ 중복 예약됩니다.\n\n${conflicts.map(b=>`• ${b.label} (${b.start}~${b.end})`).join("\n")}\n\n그래도 저장하시겠습니까?`)) return;
              try {
                if(onSave) {
                  await onSave(isEdit ? { ...form } : { ...form, id: undefined });
                } else {
                  if(isEdit) setBookings(p=>p.map(b=>b.id===init.id?{...form}:b));
                  else       setBookings(p=>[...p,{...form,id:Date.now()}]);
                }
                onClose();
              } catch (err) {
                alert("저장 오류: " + (err.message || JSON.stringify(err)));
              }
            }}>
              <Icon n="check" s={13}/>
              {hasConflict ? "⚠️ 강행 저장" : isEdit?"저장":"추가"}
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
};

const BOOKING_COLORS = ["#EA580C","#C2410C","#7C2D12","#9A3412","#DC2626","#2563EB","#7C3AED","#059669"];

// 과정별 고정 색상 팔레트 (순서대로 자동 배정)
const COURSE_PALETTE = [
  "#2563EB","#7C3AED","#059669","#DC2626","#D97706",
  "#0891B2","#DB2777","#65A30D","#EA580C","#0F766E",
  "#4F46E5","#BE185D","#15803D","#B45309","#6D28D9",
];
// courseId → 팔레트 색상 (courses 배열 내 인덱스 기반)
const getCourseColor = (courseId, courses) => {
  const idx = courses.findIndex(c => c.id === courseId);
  return COURSE_PALETTE[(idx >= 0 ? idx : 0) % COURSE_PALETTE.length];
};
    
    
/* shared style for active pill tab — defined here so RoomMgmt can use it */
const TAB_PILL_SHADOW = `0 1px 6px rgba(0,0,0,.10),0 0 0 1px rgba(234,88,12,.18)`;

/* 충돌 방지 ID 생성기 */
let _idCounter = Date.now();
