    // ATTENDANCE
    const AttendanceMgmt = (props) => {
      const students = props.students;
      const courses = props.courses;
      const [course, setCourse] = useState(courses[3] || courses[0]);
      const [qrType, setQrType] = useState("in");
      const [records, setRecords] = useState({});
      const [startH, setStartH] = useState(9);
      const [startM, setStartM] = useState(0);
      const [lateH, setLateH] = useState(9);
      const [lateM, setLateM] = useState(30);
      const [endH, setEndH] = useState(13);
      const [endM, setEndM] = useState(0);
      const [simRunning, setSimRunning] = useState(false);

      const startTotal = startH * 60 + startM;
      const lateTotal = lateH * 60 + lateM;
      const fmtTime = (h, m) => String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");

      const calcStatus = (inMins) => {
        if (inMins === null) return "A";
        if (inMins <= lateTotal) return "O";
        return "L";
      };

      const courseStudents = students.filter(s => s.cid === course.id);
      const checkedInCnt = Object.keys(records).filter(k => records[k].in).length;
      const presentCnt = Object.keys(records).filter(k => records[k].in && calcStatus(records[k].in.mins) === "O").length;
      const lateCnt = Object.keys(records).filter(k => records[k].in && calcStatus(records[k].in.mins) === "L").length;

      const startSim = () => {
        if (simRunning) return;
        setSimRunning(true);
        if (qrType === "in") setRecords({});

        courseStudents.forEach((s, idx) => {
          setTimeout(() => {
            const offsetMins = Math.floor(Math.random() * 80) - 10;
            const mins = Math.max(0, startTotal + offsetMins);
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            const time = fmtTime(h, m);

            setRecords(prev => {
              const newRec = Object.assign({}, prev);
              if (newRec[s.id] === undefined) newRec[s.id] = {};
              if (qrType === "in") {
                newRec[s.id].in = { time: time, mins: mins };
              }
              return newRec;
            });
          }, idx * 250);
        });

        setTimeout(() => setSimRunning(false), courseStudents.length * 250);
      };

      const ATT_MAP = {
        O: { label: "출석", bg: "#ECFDF5", color: T.ok },
        L: { label: "지각", bg: "#FFFBEB", color: T.warn },
        A: { label: "결석", bg: "#FEF2F2", color: T.danger },
      };

      return (
        <div className="page">
          <div style={{ marginBottom: 18 }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: T.tx }}>출결 관리</h2>
            <p style={{ fontSize: 12, color: T.mu, marginTop: 3 }}>QR 코드로 실시간 출석을 관리합니다</p>
          </div>

          <Card style={{ padding: "14px 18px", marginBottom: 16, display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 10, color: T.mu, marginBottom: 5, fontWeight: 600 }}>과정</div>
              <select value={course.id} onChange={e => setCourse(courses.find(c => c.id === +e.target.value) || courses[0])} style={{ padding: "7px 10px", border: "1px solid " + T.bd, borderRadius: 8, fontSize: 12, outline: "none", background: T.s2, cursor: "pointer", color: T.tx }}>
                {courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div style={{ marginLeft: "auto", display: "flex", gap: 14, alignItems: "center" }}>
              {[{ v: presentCnt, l: "출석", c: T.ok }, { v: lateCnt, l: "지각", c: T.warn }, { v: courseStudents.length - checkedInCnt, l: "미확인", c: T.danger }].map(x => (
                <div key={x.l} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 18, fontWeight: 800, color: x.c }}>{x.v}</div>
                  <div style={{ fontSize: 9, color: T.mu }}>{x.l}</div>
                </div>
              ))}
              <div style={{ fontSize: 13, color: T.mu }}>/ {courseStudents.length}명</div>
            </div>
          </Card>

          <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: 16 }}>
            <Card style={{ padding: 20, width: 280, flexShrink: 0 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 16 }}>
                {[{ id: "in", label: "📥 입실 QR" }, { id: "out", label: "📤 퇴실 QR" }].map(x => (
                  <button key={x.id} onClick={() => setQrType(x.id)} style={{ padding: "10px 6px", borderRadius: 9, border: "none", cursor: "pointer", background: qrType === x.id ? T.p : T.s3, color: qrType === x.id ? "#fff" : T.mu, fontWeight: 700, fontSize: 11 }}>
                    {x.label}
                  </button>
                ))}
              </div>
              <div style={{ fontSize: 10, color: T.mu, lineHeight: 1.8, padding: "8px 10px", background: T.s2, borderRadius: 7, border: "1px solid " + T.bd }}>
                <b style={{ color: T.tx }}>과정:</b> {course.name}
              </div>
            </Card>

            <Card style={{ overflow: "hidden", display: "flex", flexDirection: "column" }}>
              <div style={{ padding: "12px 18px", borderBottom: "1px solid " + T.bd, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.tx }}>📡 실시간 출석</div>
                <Btn size="sm" onClick={startSim} variant={simRunning ? "ghost" : "primary"}>
                  <Icon n="refresh" s={13}/>
                  {simRunning ? "스캔 중..." : (qrType === "in" ? "입실" : "퇴실") + " 시뮬레이션"}
                </Btn>
              </div>
              <div style={{ flex: 1, padding: 14, overflowY: "auto", maxHeight: 400 }}>
                {courseStudents.map(s => {
                  const rec = records[s.id] || {};
                  const inRec = rec.in;
                  const status = inRec ? calcStatus(inRec.mins) : "A";
                  const att = ATT_MAP[inRec ? status : "A"];
                  return (
                    <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 8, marginBottom: 6, background: inRec ? att.bg : T.s2, border: "1px solid " + (inRec ? att.color + "30" : T.bd) }}>
                      <div style={{ width: 34, height: 34, borderRadius: 9, flexShrink: 0, background: inRec ? att.color + "20" : T.bd, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: inRec ? att.color : T.mu }}>
                        {inRec ? att.label[0] : "?"}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: T.tx }}>{s.name}</div>
                        <div style={{ fontSize: 10, color: T.mu, marginTop: 1 }}>
                          {inRec ? <span style={{ color: "#2563EB" }}>📥 {inRec.time}</span> : "대기 중"}
                        </div>
                      </div>
                      <div>
                        {inRec ? <Chip label={att.label} bg={att.bg} color={att.color}/> : <Chip label="미확인" bg={T.s3} color={T.mu}/>}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ padding: "11px 18px", borderTop: "1px solid " + T.bd, background: T.s2 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                  <span style={{ fontSize: 11, color: T.mu }}>입실 진행률</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: T.p }}>
                    {courseStudents.length ? Math.round(checkedInCnt / courseStudents.length * 100) : 0}%
                  </span>
                </div>
                <RBar r={courseStudents.length ? checkedInCnt / courseStudents.length * 100 : 0} h={8}/>
              </div>
            </Card>
          </div>
        </div>
      );
    };

    // COMPLETION
    const CompletionMgmt = (props) => {
      const students = props.students;
      const courses = props.courses;
      const [course, setCourse] = useState(courses[3] || courses[0]);
      const [threshold, setThr] = useState(80);
      const list = students.filter(s => s.cid === course.id);

      const rate = list.length ? Math.round(completed / list.length * 100) : 0;

      return (
        <div className="page">
          <div style={{ marginBottom: 18 }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: T.tx }}>수료 관리</h2>

          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>

              <button key={c.id} onClick={() => setCourse(c)} style={{ padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, background: course.id === c.id ? c.cc : T.s3, color: course.id === c.id ? "#fff" : T.mu }}>

                <input type="range" min={60} max={95} step={5} value={threshold} onChange={e => setThr(+e.target.value)} style={{ flex: 1, accentColor: T.p }}/>
                <span style={{ fontSize: 26, fontWeight: 900, color: T.p, minWidth: 52 }}>{threshold}%</span>
              </div>
            </div>
            <Card style={{ padding: "16px 22px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: T.mu }}>수료율</div>
              <div style={{ fontSize: 32, fontWeight: 900, color: rate >= 90 ? T.p : T.danger }}>{rate}%</div>
              <div style={{ fontSize: 11, color: T.mu }}>{completed}/{list.length}명</div>
            </Card>
          </Card>

          <Card style={{ overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: T.s2 }}>
                  {["이름", "출석률", "상태", ""].map(h => (
                    <th key={h} style={{ padding: "10px 14px", textAlign: h === "이름" ? "left" : "center", fontSize: 11, color: T.mu, fontWeight: 700, borderBottom: "1px solid " + T.bd }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {list.map(s => (
                  <tr key={s.id} className="row-hover" style={{ borderBottom: "1px solid " + T.bd }}>
                    <td style={{ padding: "12px 14px", fontSize: 13, fontWeight: 700, color: T.tx }}>{s.name}</td>
                    <td style={{ padding: "12px 14px", textAlign: "center" }}>
                      <span style={{ fontSize: 15, fontWeight: 800, color: rateColor(s.rate) }}>{s.rate}%</span>

                    <td style={{ padding: "12px 14px", textAlign: "center" }}>
                      <Chip label={s.rate >= threshold ? "수료" : "미수료"} bg={s.rate >= threshold ? T.pbg : "#FEF2F2"} color={s.rate >= threshold ? T.p : T.danger}/>
                    </td>
                    <td style={{ padding: "12px 14px" }}></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      );

    // CERTIFICATE
    const printCert = (s, c, certNo, issueDate) => {
      const birthFmt = s.birth ? s.birth.replace(/(\d{4})-(\d{2})-(\d{2})/, (_, y, m, d) => y + ". " + String(+m) + ". " + String(+d)) : "　　. 　. 　";
      const periodLine = (c.dateFrom || "") + (c.dateTo ? " ~ " + c.dateTo : "") + (c.schedDays ? " / 매주 " + c.schedDays : "") + ((c.schedTimeFrom && c.schedTimeTo) ? " " + c.schedTimeFrom + " ∼ " + c.schedTimeTo : "");
      const addr = s.addrCity || "　　　　　　　　　";

      const html = "<!DOCTYPE html><html><head><meta charset='UTF-8'/><title>수강증명서</title><style>*{margin:0;padding:0}body{font-family:'맑은 고딕',sans-serif;background:#fff}table{width:100%;border-collapse:collapse}.doc{width:210mm;height:297mm;padding:22mm 24mm;background:#fff;display:flex;flex-direction:column}.title{text-align:center;margin-bottom:28px}.title h1{font-size:24pt;letter-spacing:12px;border-bottom:3px double #333;display:inline-block;padding-bottom:8px}.no{font-size:10pt;text-align:right;margin-bottom:20px}.section{border:1.5px solid #333}.section-title{background:#f0f0f0;padding:5px 12px;font-size:11pt;font-weight:800;border-bottom:1px solid #bbb}.row{display:flex;min-height:36px;border-bottom:1px solid #ccc}.field-no{width:26px;background:#f8f8f8;display:flex;align-items:center;justify-content:center;font-size:9pt;border-right:1px solid #ccc;flex-shrink:0}.field-label{width:88px;padding:7px 10px;font-size:10pt;font-weight:700;border-right:1px solid #ccc;flex-shrink:0}.field-value{flex:1;padding:7px 12px;font-size:11pt;display:flex;align-items:center}.sign{text-align:center;margin-top:28px}.date{font-size:12pt;margin-bottom:36px}.sign-line{display:inline-flex;gap:16px;align-items:center}.sign-title{font-size:14pt;font-weight:700;letter-spacing:3px}.stamp{width:54px;height:54px;border:2px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13pt;font-weight:900}.print-btn{position:fixed;bottom:24px;right:24px;background:#EA580C;color:#fff;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;z-index:99}</style></head><body><div class='doc'><div class='title'><h1>직업교육훈련 수강증명서</h1></div><div class='no'>제 2026-북부-수강-" + certNo + " 호</div><div class='section'><div class='section-title'>훈련생</div><div class='row'><div class='field-no'>①</div><div class='field-label'>성명</div><div class='field-value' style='font-weight:800;font-size:13pt'>" + s.name + "</div></div><div class='row'><div class='field-no'>②</div><div class='field-label'>생년월일</div><div class='field-value'>" + birthFmt + "</div></div><div class='row'><div class='field-no'>③</div><div class='field-label'>주소</div><div class='field-value'>" + addr + "</div></div></div><div class='section' style='margin-top:0'><div class='section-title'>수강명세</div><div class='row'><div class='field-no'>④</div><div class='field-label'>훈련기관</div><div class='field-value'>경기도일자리재단 북부사업본부</div></div><div class='row'><div class='field-no'>⑤</div><div class='field-label'>수강직종</div><div class='field-value'>" + c.name + "</div></div><div class='row' style='min-height:46px'><div class='field-no'>⑥</div><div class='field-label'>수강기간</div><div class='field-value' style='font-size:10.5pt'>" + periodLine + "</div></div></div><div style='text-align:center;font-size:11pt;line-height:2.2;margin-top:28px;margin-bottom:24px'>위의 사실이 틀림없음을 증명합니다.</div><div class='sign'><div class='date'>" + issueDate + "</div><div class='sign-line'><div class='sign-title'>경기도일자리재단 대표이사</div><div class='stamp'>(인)</div></div></div></div><button class='print-btn' onclick='window.print()'>🖨️ PDF 저장</button></body></html>";

      const w = window.open("", "_blank", "width=900,height=1200");
      w.document.write(html);
      w.document.close();
    };

    const CertMgmt = (props) => {
      const students = props.students;
      const courses = props.courses;
      const [course, setCourse] = useState(courses[3] || courses[0]);
      const [issueDate, setIssueDate] = useState("2026년 　 월 　 일");
      const eligible = students.filter(s => s.cid === course.id && s.rate > 0);

      const handleIssue = (s, idx) => {
        const no = course.code + "-" + String(idx + 1).padStart(3, "0");
        printCert(s, course, no, issueDate);
      };

      return (
        <div className="page">
          <div style={{ marginBottom: 16 }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: T.tx }}>증명서 발급</h2>
            <p style={{ fontSize: 12, color: T.mu, marginTop: 3 }}>수강증명서 공식 양식 출력</p>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            {courses.map(c => (
              <button key={c.id} onClick={() => setCourse(c)} style={{ padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, background: course.id === c.id ? c.cc : T.s3, color: course.id === c.id ? "#fff" : T.mu }}>
                {c.name.length > 14 ? c.name.slice(0, 14) + "..." : c.name}
              </button>
            ))}
          </div>

          <Card style={{ padding: "14px 18px", marginBottom: 16, display: "flex", gap: 16, alignItems: "center" }}>
            <div style={{ fontSize: 12, fontWeight: 700 }}>📅 발급일자</div>
            <input type="date" onChange={e => setIssueDate(e.target.value ? e.target.value.slice(0, 4) + "년 " + e.target.value.slice(5, 7) + "월 " + e.target.value.slice(8) + "일" : "")} style={{ padding: "6px 10px", border: "1px solid " + T.bd, borderRadius: 8, fontSize: 12, outline: "none", background: T.s2, cursor: "pointer" }}/>
            <div style={{ fontSize: 12, color: T.mu }}>→ <b style={{ color: T.p }}>{issueDate}</b></div>
            <div style={{ marginLeft: "auto" }}>
              <Btn size="sm" onClick={() => eligible.forEach((s, i) => handleIssue(s, i))}>
                <Icon n="dl" s={13}/>
                전체 {eligible.length}명 출력
              </Btn>
            </div>
          </Card>

          <Card style={{ overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: T.s2 }}>
                  {["번호", "이름", "생년월일", "출석률", ""].map(h => (
                    <th key={h} style={{ padding: "10px 14px", textAlign: h === "이름" ? "left" : "center", fontSize: 11, color: T.mu, fontWeight: 700, borderBottom: "1px solid " + T.bd }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {eligible.map((s, idx) => (
                  <tr key={s.id} className="row-hover" style={{ borderBottom: "1px solid " + T.bd }}>
                    <td style={{ padding: "12px 14px", textAlign: "center", fontSize: 12, color: T.mu }}>{idx + 1}</td>
                    <td style={{ padding: "12px 14px", fontSize: 13, fontWeight: 700, color: T.tx }}>{s.name}</td>
                    <td style={{ padding: "12px 14px", textAlign: "center", fontSize: 12, color: T.mu }}>{s.birth || "—"}</td>
                    <td style={{ padding: "12px 14px", textAlign: "center", fontSize: 14, fontWeight: 800, color: rateColor(s.rate) }}>{s.rate}%</td>
                    <td style={{ padding: "12px 14px", textAlign: "center" }}>
                      <Btn size="sm" onClick={() => handleIssue(s, idx)}>
                        <Icon n="dl" s={12}/>
                        발급
                      </Btn>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      );
    };

    // APP
    const NAV_ITEMS = [
      { id: "dash", label: "대시보드", icon: "dash" },
      { id: "courses", label: "과정 현황", icon: "book" },
      { id: "students", label: "훈련생 관리", icon: "people" },
      { id: "instructors", label: "강사 관리", icon: "award" },
      { id: "rooms", label: "강의실 관리", icon: "cal" },
      { id: "attendance", label: "출결 관리", icon: "check" },
      { id: "completion", label: "수료 관리", icon: "check" },
      { id: "cert", label: "증명서 발급", icon: "dl" },
    ];

    function App() {
      const [currentUser, setCurrentUser] = useState(() => {
        try { const u = sessionStorage.getItem("gjf_user"); return u ? JSON.parse(u) : null; } catch { return null; }
      });
      const [page, setPage] = useState("dash");
      const [collapsed, setCollapsed] = useState(false);
      const [students] = useState(SEED_STUDENTS);
      const [courses] = useState(COURSES);
      const [instructors] = useState(SEED_INSTRUCTORS);

      if (!currentUser) {
        return <LoginScreen onLogin={user => { sessionStorage.setItem("gjf_user", JSON.stringify(user)); setCurrentUser(user); }}/>;
      }

      const renderPage = () => {
        switch (page) {
          case "dash": return <Dashboard students={students} courses={courses}/>;
          case "courses": return <CourseList courses={courses}/>;
          case "students": return <StudentMgmt students={students} courses={courses}/>;
          case "instructors": return <InstructorMgmt instructors={instructors} courses={courses}/>;
          case "rooms": return <RoomMgmt/>;
          case "attendance": return <AttendanceMgmt students={students} courses={courses}/>;
          case "completion": return <CompletionMgmt students={students} courses={courses}/>;
          case "cert": return <CertMgmt students={students} courses={courses}/>;
          default: return null;
        }
      };

      return (
        <>
          <GStyle/>
          <div style={{ display: "flex", height: "100vh", background: "linear-gradient(160deg,#FED7AA 0%,#FDBA74 12%,#FFF7ED 45%,#F1F5F9 75%,#FFEDD5 100%)", fontFamily: "'Pretendard',-apple-system,sans-serif", overflow: "hidden" }}>
            <div style={{ width: collapsed ? 64 : 240, flexShrink: 0, transition: "width .25s ease", background: "linear-gradient(180deg," + T.sb + " 0%," + T.p + " 55%,#F97316 100%)", display: "flex", flexDirection: "column", overflow: "hidden", boxShadow: "4px 0 24px rgba(0,0,0,.15)" }}>
              <div style={{ padding: collapsed ? "16px 0" : "16px 18px", borderBottom: "1px solid rgba(255,255,255,.1)", display: "flex", alignItems: "center", justifyContent: collapsed ? "center" : "space-between" }}>
                {!collapsed && (
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 900, color: "#fff" }}>경기북부 직업교육</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 3 }}>
                      <span style={{ background: "rgba(253,186,116,.3)", color: "#FED7AA", padding: "1px 6px", borderRadius: 4, fontSize: 9, fontWeight: 700 }}>2026</span>
                      <span style={{ fontSize: 10, color: "rgba(255,255,255,.45)" }}>학사관리</span>
                    </div>
                  </div>
                )}
                <button onClick={() => setCollapsed(!collapsed)} style={{ width: 28, height: 28, borderRadius: 6, background: "rgba(255,255,255,.1)", border: "none", color: "rgba(255,255,255,.6)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <Icon n="bars" s={14}/>
                </button>
              </div>

              <nav style={{ flex: 1, padding: "10px 0", overflowY: "auto" }}>
                {NAV_ITEMS.map(item => {
                  const active = page === item.id;
                  return (
                    <button key={item.id} className="btn-nav" onClick={() => setPage(item.id)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: collapsed ? "13px 0" : "11px 18px", justifyContent: collapsed ? "center" : "flex-start", background: active ? "rgba(255,255,255,.13)" : "transparent", border: "none", cursor: "pointer", borderLeft: active ? "3px solid #FED7AA" : "3px solid transparent", color: active ? "#fff" : "rgba(255,255,255,.45)", fontWeight: active ? 700 : 400, fontSize: 13 }}>
                      <Icon n={item.icon} s={16}/>
                      {!collapsed && <span style={{ whiteSpace: "nowrap" }}>{item.label}</span>}
                    </button>
                  );
                })}
              </nav>

              {!collapsed && (
                <div style={{ padding: "13px 18px", borderTop: "1px solid rgba(255,255,255,.1)" }}>
                  <button onClick={() => { if (window.confirm("로그아웃?")) { sessionStorage.removeItem("gjf_user"); setCurrentUser(null); } }} style={{ width: "100%", padding: "6px 0", borderRadius: 7, border: "1px solid rgba(255,255,255,.2)", background: "rgba(255,255,255,.08)", color: "rgba(255,255,255,.7)", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>🚪 로그아웃</button>
                </div>
              )}
            </div>

            <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
              <div style={{ height: 52, background: "rgba(255,255,255,.9)", borderBottom: "1px solid " + T.bd, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 22px", flexShrink: 0 }}>
                <div style={{ fontSize: 12, color: T.mu }}>
                  <span style={{ color: T.p, fontWeight: 700 }}>경기도일자리재단</span>
                  <span style={{ margin: "0 6px", color: T.bd }}>·</span>
                  직업교육 학사관리 v2026
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 10px", background: T.pbg, borderRadius: 8 }}>
                  <div style={{ width: 24, height: 24, borderRadius: 6, background: T.p, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>
                    <Icon n="user" s={12}/>
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: T.p }}>{currentUser.name}</span>
                </div>
              </div>

              <div style={{ flex: 1, overflowY: "auto", padding: 22 }}>
                {renderPage()}
              </div>
            </div>
          </div>
        </>
      );
    }

    const LoginScreen = (props) => {
      const accounts = [
        { id: 1, name: "관리자", pw: "admin1234" },
        { id: 2, name: "김담당", pw: "gjf2026" },
        { id: 3, name: "이담당", pw: "gjf2026" },
      ];
      const [selId, setSelId] = useState(1);
      const [pw, setPw] = useState("");
      const [error, setError] = useState("");
      const [agreed, setAgreed] = useState(false);
      const [shaking, setShaking] = useState(false);

      const handleLogin = () => {
        if (!agreed) { setError("동의 필수"); return; }
        const acc = accounts.find(a => a.id === selId);
        if (!acc || acc.pw !== pw) {
          setError("비밀번호 오류");
          setShaking(true);
          setTimeout(() => setShaking(false), 500);
          setPw("");
          return;
        }
        props.onLogin(acc);
      };

      return (
        <>
          <GStyle/>
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg,#7C2D12 0%,#EA580C 40%,#F97316 70%,#FED7AA 100%)", padding: 20 }}>
            <div style={{ width: "100%", maxWidth: 440 }}>
              <div style={{ textAlign: "center", marginBottom: 28 }}>
                <div style={{ fontSize: 28, marginBottom: 14 }}>🎓</div>
                <div style={{ fontSize: 18, fontWeight: 900, color: "#fff" }}>경기북부 직업교육</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,.6)", marginTop: 4 }}>학사관리 v2026</div>
              </div>

              <div style={{ background: "rgba(255,255,255,.96)", borderRadius: 20, padding: "30px 32px", boxShadow: "0 24px 64px rgba(0,0,0,.25)", animation: shaking ? "shake .4s ease" : "none" }}>
                <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 22, textAlign: "center" }}>🔐 로그인</div>

                <div style={{ marginBottom: 14 }}>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {accounts.map(a => (
                      <button key={a.id} onClick={() => { setSelId(a.id); setError(""); }} style={{ padding: "8px 16px", borderRadius: 10, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 700, background: selId === a.id ? T.p : T.s3, color: selId === a.id ? "#fff" : T.mu }}>
                        {a.name}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ marginBottom: 16 }}>
                  <input type="password" value={pw} onChange={e => { setPw(e.target.value); setError(""); }} onKeyDown={e => { if (e.key === "Enter") handleLogin(); }} placeholder="비밀번호" style={{ width: "100%", padding: "11px 14px", border: "1.5px solid " + (error ? T.danger : T.bd), borderRadius: 10, fontSize: 14, outline: "none", background: "#fff" }}/>
                  {error && (<div style={{ marginTop: 6, fontSize: 11, color: T.danger, fontWeight: 600 }}>⚠️ {error}</div>)}
                </div>

                <div style={{ marginBottom: 20, padding: "12px 14px", borderRadius: 10, background: "#FFF7ED", border: "1px solid " + T.pl + "50" }}>
                  <div style={{ display: "flex", gap: 10 }}>
                    <input type="checkbox" id="piAgree" checked={agreed} onChange={e => setAgreed(e.target.checked)} style={{ marginTop: 2, accentColor: T.p, cursor: "pointer", flexShrink: 0 }}/>
                    <label htmlFor="piAgree" style={{ fontSize: 11, color: T.tx, lineHeight: 1.6, cursor: "pointer" }}>
                      개인정보보호법 준수 동의
                    </label>
                  </div>
                </div>

                <button onClick={handleLogin} style={{ width: "100%", padding: "13px 0", borderRadius: 11, border: "none", background: agreed ? ("linear-gradient(135deg," + T.sb + "," + T.p + ")") : T.s3, color: agreed ? "#fff" : T.mu, fontSize: 14, fontWeight: 800, cursor: agreed ? "pointer" : "not-allowed", boxShadow: agreed ? ("0 6px 20px rgba(234,88,12,.35)") : "none" }}>로그인</button>
              </div>
            </div>
          </div>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    (function hideSplash() {
      let attempts = 0;
      const timer = setInterval(function() {
        attempts++;
        if (document.getElementById('root').children.length > 0 || attempts > 60) {
          clearInterval(timer);
          const l = document.getElementById('loading');
          if (l) { l.style.opacity = '0'; setTimeout(function() { if (l.parentNode) l.parentNode.removeChild(l); }, 400); }
        }
      }, 200);
    })();
  </script>
</body>
</html>
