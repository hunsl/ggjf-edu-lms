  "Content-Type":  "application/json",

/* ── 공통 fetch 래퍼 ── */
const sbGet = async (table, params = "") => {
  const res = await fetch(`${API}/${table}?${params}`, { headers: H });
  const data = await res.json();
  if (!res.ok) return { data: null, error: data };
  return { data, error: null };
};
const sbInsert = async (table, body) => {
  const res = await fetch(`${API}/${table}`, {
    method: "POST", headers: H,
    body: JSON.stringify(Array.isArray(body) ? body : [body]),
  });
  const data = await res.json();
  if (!res.ok) return { data: null, error: data };
  return { data: Array.isArray(body) ? data : data[0], error: null };
};
const sbUpdate = async (table, filter, body) => {
  const res = await fetch(`${API}/${table}?${filter}`, {
    method: "PATCH", headers: H,
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) return { data: null, error: data };
  return { data, error: null };
};
const sbDelete = async (table, filter) => {
  const res = await fetch(`${API}/${table}?${filter}`, {
    method: "DELETE", headers: H,
  });
  if (!res.ok) { const e = await res.json(); return { error: e }; }
  return { error: null };
};

/* ── Supabase Storage — PDF 업로드 (Base64 대신 URL 저장) ── */
const sbStorageUpload = async (bucket, path, file) => {
  const res = await fetch(`${SB_URL}/storage/v1/object/${bucket}/${path}`, {
    method: "POST",
    headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` },
    body: file,
  });
  if (!res.ok) { const e = await res.json(); return { url: null, error: e }; }
  const publicUrl = `${SB_URL}/storage/v1/object/public/${bucket}/${path}`;
  return { url: publicUrl, error: null };
};

/* ===========================================================
   QR CODE (로컬 생성 — api.qrserver.com 대신 qrcode-generator CDN 사용)
   Tracking Prevention 오류를 방지하기 위해 canvas에 직접 렌더링
=========================================================== */
const QRCanvas = ({ data, size = 200, color = "#000000", bgColor = "#ffffff", style = {} }) => {
  const canvasRef = useRef(null);
  const [libMissing, setLibMissing] = useState(false);
  useEffect(() => {
    if (!canvasRef.current || !data) return;
    if (typeof window.qrcode !== "function") {
      console.warn("QRCanvas: qrcode-generator 라이브러리를 로드할 수 없습니다. CDN을 확인하세요.");
      setLibMissing(true);
      return;
    }
    try {
      const qr = window.qrcode(0, "M");
      qr.addData(data);
      qr.make();
      const cells = qr.getModuleCount();
      const canvas = canvasRef.current;
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width  = size + "px";
      canvas.style.height = size + "px";
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      const cellSize = size / cells;
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = color;
      for (let r = 0; r < cells; r++) {
        for (let c = 0; c < cells; c++) {
          if (qr.isDark(r, c)) ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
        }
      }
    } catch (e) {
      console.error("QR 생성 오류:", e);
      setLibMissing(true);
    }
  }, [data, size, color, bgColor]);
  if (libMissing) return (
    <div style={{ width:size, height:size, display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center", background:"#F1F5F9",
      borderRadius:8, fontSize:11, color:"#64748B", textAlign:"center", padding:8, ...style }}>
      <div style={{ fontSize:28, marginBottom:4 }}>⚠️</div>
      QR 라이브러리 로드 실패<br/>페이지를 새로고침 하세요
    </div>
  );
  return <canvas ref={canvasRef} style={{ display:"block", borderRadius:8, ...style }} />;
};

// 과정 날짜 범위 내 날짜 배열 생성 (주말 포함, dateFrom~min(dateTo, 오늘))
const buildCourseDates = (course) => {
  if (!course?.dateFrom) return [new Date().toISOString().slice(0, 10)];
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const start = new Date(course.dateFrom);
  // 과정이 아직 시작 전이면 오늘 날짜만 반환
  if (start > today) return [course.dateFrom];
  const end = course.dateTo
    ? new Date(Math.min(new Date(course.dateTo).getTime(), today.getTime()))
    : today;
  const dates = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    dates.push(new Date(d).toISOString().slice(0, 10));
  }
  return dates.length ? dates : [today.toISOString().slice(0, 10)];
};

// 과정명 한글 요약 (드롭다운 등에서 간결하게 표시)
const shortCourseName = (name = "", maxLen = 13) => {
  if (!name) return "";
  // 기수 정보 추출 (1기, 2기 등)
  const kiMatch = name.match(/\((\d+기)\)/);
  const ki = kiMatch ? ` (${kiMatch[1]})` : "";
  // 불필요한 단어 제거
  let short = name
    .replace(/\([^)]*\)/g, "")                    // 괄호 내용 제거
    .replace(/전문강사 양성|강사 양성|양성과정|양성|실무자|교육|과정/g, "")
    .replace(/\s{2,}/g, " ")
    .trim();
  if (short.length > maxLen) short = short.slice(0, maxLen) + "…";
  return short + ki;
};

              <div style={{ fontSize:24, fontWeight:800, color:T.tx, lineHeight:1 }}>{k.val}</div>
              <div style={{ fontSize:11, color:T.mu, marginTop:3 }}>{k.label}</div>
              {k.sub && <div style={{ fontSize:10, color:k.color, marginTop:1, fontWeight:600 }}>{k.sub}</div>}
            </div>
          </Card>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))", gap:14, marginBottom:14 }}>
        {/* 분야별 현황 */}
        <Card style={{ padding:22 }}>
          <div style={{ fontSize:13, fontWeight:700, color:T.tx, marginBottom:16, display:"flex", gap:8 }}>
            <Icon n="book" s={15}/> 분야별 과정 현황
          </div>
          {Object.entries(catMap).map(([cat,info]) => (
            <div key={cat} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
              <div style={{ width:3, height:36, background:info.color, borderRadius:2, flexShrink:0 }}/>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:T.tx }}>{cat}</span>
                  <span style={{ fontSize:10, color:T.mu }}>{info.cnt}과정 · {info.tgt}명</span>
                </div>
                <div style={{ height:5, background:T.bd, borderRadius:3, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${info.tgt/totalTgt*100}%`, background:info.color, borderRadius:3 }}/>
                </div>
              </div>
            </div>
          ))}
          <div style={{ marginTop:14, padding:"12px 14px", background:T.pbg, borderRadius:8, border:`1px solid #FDBA74` }}>
            <div style={{ fontSize:10, color:T.mu }}>2026 총 사업 예산 (출연금 100%)</div>
            <div style={{ fontSize:20, fontWeight:800, color:T.p, marginTop:2 }}>278,500천원</div>
          </div>
        </Card>

        {/* 위험 훈련생 */}
        <Card style={{ padding:22 }}>
          <div style={{ fontSize:13, fontWeight:700, color:T.tx, marginBottom:14, display:"flex", gap:8, alignItems:"center" }}>
            <Icon n="alert" s={15}/> 수료 위험 훈련생
            <span style={{ marginLeft:"auto", fontSize:10, color:T.mu }}>출석률 80% 미만</span>
          </div>
          {atRisk.length === 0
            ? <div style={{ textAlign:"center", color:T.mu, padding:"28px 0", fontSize:13 }}>위험 훈련생 없음 🎉</div>
            : atRisk.sort((a,b)=>a.rate-b.rate).map(s => {
                const c = courses.find(x=>x.id===s.cid);
                return (
                  <div key={s.id} style={{ display:"flex", gap:10, alignItems:"center",
                    padding:"9px 11px", borderRadius:8, marginBottom:6,
                    background: s.rate<70?"#FEF2F2":"#FFFBEB",
                    border:`1px solid ${s.rate<70?"#FECACA":"#FDE68A"}` }}>
                    <div style={{ width:36, height:36, borderRadius:8, flexShrink:0,
                      background: s.rate<70?"#FEE2E2":"#FEF3C7",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:12, fontWeight:900, color:s.rate<70?T.danger:T.warn }}>
                      {s.rate}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, fontWeight:700, color:T.tx }}>{s.name}</div>
                      <div style={{ fontSize:10, color:T.mu, marginTop:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c?.name}</div>
                    </div>
                    <Chip label={s.rate<70?"위험":"주의"} bg={s.rate<70?"#FEE2E2":"#FEF3C7"} color={s.rate<70?T.danger:T.warn}/>
                  </div>
                );
              })
          }
        </Card>
      </div>

      {/* 사업 개요 */}
      <Card style={{ padding:20 }}>
        <div style={{ fontSize:13, fontWeight:700, color:T.tx, marginBottom:14, display:"flex", gap:8 }}>
          <Icon n="info" s={15}/> 2026년 사업 개요
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10 }}>
          {[
            {l:"사업기간",v:"2026.01 ~ 12월"},
            {l:"사업대상",v:"만 18세↑ 미취업 경기도민"},
            {l:"총 사업량",v:"13개 과정 / 240명"},
            {l:"수료율 목표",v:"90% 이상"},
            {l:"취업률 목표",v:"65% 이상"},
            {l:"만족도 목표",v:"PCSI 90점 이상"},
          ].map(({l,v})=>(
            <div key={l} style={{ padding:"11px 13px", background:T.s2, borderRadius:8, border:`1px solid ${T.bd}` }}>
              <div style={{ fontSize:10, color:T.mu }}>{l}</div>
              <div style={{ fontSize:12, fontWeight:700, color:T.tx, marginTop:3 }}>{v}</div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
};

/* ===========================================================
   COURSE EDIT MODAL
=========================================================== */
const CAT_COLORS = {
  "늘봄강사양성":"#EA580C","지역연계·기여":"#C2410C",
  "사무분야":"#9A3412","식품분야":"#DC2626","IT 신직무":"#F97316",
};
const CAT_LIST = Object.keys(CAT_COLORS);

const CourseModal = ({ course, onSave, onClose, isNew=false }) => {
  const empty = {
    cat:"늘봄강사양성", cc:"#EA580C", name:"", code:"",
    dateFrom:"", dateTo:"", period:"",
    method:"대면", hours:0, tgt:20, cGoal:18, eGoal:12,
    schedDays:"", schedTimeFrom:"09:00", schedTimeTo:"13:00",
    links:[], notes:"", pdfName:"", pdfData:""
  };
  const [form, setForm] = useState(course ? {
    ...course,
    dateFrom: course.dateFrom||"", dateTo: course.dateTo||"",
    links: course.links||[], notes: course.notes||"",
    pdfName: course.pdfName||"", pdfData: course.pdfData||"",
    schedDays: course.schedDays||"", schedTimeFrom: course.schedTimeFrom||"09:00", schedTimeTo: course.schedTimeTo||"13:00"
  } : empty);
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const inp = { width:"100%", padding:"8px 10px", border:`1px solid ${T.bd}`,
    borderRadius:8, fontSize:12, outline:"none", color:T.tx, background:T.s2 };
  const pdfRef = useRef();

  // 링크 관리
  const addLink   = () => set("links", [...(form.links||[]), {label:"", url:""}]);
  const updLink   = (i,k,v) => set("links", form.links.map((l,idx)=>idx===i?{...l,[k]:v}:l));
  const delLink   = i => set("links", form.links.filter((_,idx)=>idx!==i));

  // PDF 업로드 — Supabase Storage에 파일 저장 후 URL만 form에 저장
  const PDF_MAX_BYTES = 10 * 1024 * 1024; // 10MB
  const [pdfUploading, setPdfUploading] = useState(false);
  const onPdfUpload = async e => {
    const f = e.target.files[0];
    if(!f) return;
    if(f.size > PDF_MAX_BYTES) { alert("PDF 용량이 10MB를 초과합니다."); return; }
    setPdfUploading(true);
    // 랜덤 UUID 기반 경로로 path traversal 방지
    const ext = f.name.split(".").pop().toLowerCase().replace(/[^a-z0-9]/g, "") || "pdf";
    const uid = typeof crypto.randomUUID === "function" ? crypto.randomUUID() : Date.now().toString(36);
    const path = `syllabi/${uid}.${ext}`;
    const { url, error } = await sbStorageUpload("course-pdfs", path, f);
    setPdfUploading(false);
    if (error) {
      // Storage 업로드 실패 시 Base64 폴백 (로컬 미리보기용)
      console.warn("Storage 업로드 실패 — Base64 폴백:", error);
      const r = new FileReader();
      r.onload = ev => { set("pdfData", ev.target.result); set("pdfName", f.name); };
      r.readAsDataURL(f);
      return;
    }
    set("pdfData", url);
    set("pdfName", f.name);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:999,
      display:"flex", alignItems:"center", justifyContent:"center" }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:T.s, borderRadius:16, width:560, maxWidth:"96vw",
        maxHeight:"92vh", display:"flex", flexDirection:"column",
        boxShadow:"0 24px 64px rgba(0,0,0,.28)", overflow:"hidden", animation:"fadeUp .2s ease" }}>

        <div style={{ background:`linear-gradient(135deg,${T.sb},${T.p})`,
          padding:"16px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:800, color:"#fff" }}>{isNew ? "과정 추가" : "과정 수정"}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,.55)", marginTop:2 }}>{isNew ? "새 교육과정 정보를 입력하세요" : form.code}</div>
          </div>
          <button onClick={onClose} style={{ width:28,height:28,borderRadius:6,border:"none",
            background:"rgba(255,255,255,.15)",color:"#fff",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center" }}>
            <Icon n="x" s={14}/>
          </button>
        </div>

        <div style={{ flex:1, overflowY:"auto", padding:"20px 22px", display:"flex", flexDirection:"column", gap:14 }}>

          {/* 분야 */}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:6 }}>분야 <span style={{color:T.danger}}>*</span></label>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {CAT_LIST.map(cat=>(
                <button key={cat} type="button" onClick={()=>{set("cat",cat);set("cc",CAT_COLORS[cat]);}}
                  style={{ padding:"6px 13px", borderRadius:20, border:"none", cursor:"pointer",
                    fontSize:11, fontWeight:600, transition:"all .15s",
                    background: form.cat===cat ? CAT_COLORS[cat] : T.s3,
                    color: form.cat===cat ? "#fff" : T.mu }}>{cat}</button>
              ))}
            </div>
          </div>

          {/* 과정명 */}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>과정명 <span style={{color:T.danger}}>*</span></label>
            <input value={form.name||""} onChange={e=>set("name",e.target.value)} placeholder="예) 행정회계 사무 OA 과정" style={inp}/>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
            <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>과정코드 <span style={{color:T.danger}}>*</span></label>
              <input value={form.code||""} onChange={e=>set("code",e.target.value)} placeholder="SM-01" style={inp}/>
            </div>
            <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>
                교육 시작일 <span style={{color:T.danger}}>*</span>
              </label>
              <input type="date" value={form.dateFrom||""} onChange={e=>set("dateFrom",e.target.value)} style={inp}/>
            </div>
            <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>
                교육 종료일 <span style={{color:T.danger}}>*</span>
              </label>
              <input type="date" value={form.dateTo||""} onChange={e=>set("dateTo",e.target.value)}
                style={{...inp, borderColor: (form.dateFrom && form.dateTo && form.dateTo < form.dateFrom) ? T.danger : T.bd }}/>
            </div>
          </div>
          {/* 기간 자동 표시 */}
          {(form.dateFrom || form.dateTo) && (
            <div style={{ padding:"7px 12px", borderRadius:7, background:T.s2,
              border:`1px solid ${T.bd}`, fontSize:11, color:T.mu, display:"flex", gap:8, alignItems:"center" }}>
              📅
              <span style={{ color:T.tx, fontWeight:600 }}>
                {form.dateFrom||"미정"} ~ {form.dateTo||"미정"}
              </span>
              {form.dateFrom && form.dateTo && form.dateTo >= form.dateFrom && (() => {
                const ms = new Date(form.dateTo) - new Date(form.dateFrom);
                const days = Math.round(ms / 86400000) + 1;
                const weeks = Math.round(days / 7);
                return <span style={{ color:T.mu }}>(총 {days}일 · 약 {weeks}주)</span>;
              })()}
              {form.dateFrom && form.dateTo && form.dateTo < form.dateFrom && (
                <span style={{ color:T.danger }}>⚠️ 종료일이 시작일보다 빠릅니다</span>
              )}
            </div>
          )}
          <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>교육방식</label>
              <select value={form.method||"대면"} onChange={e=>set("method",e.target.value)} style={{...inp,cursor:"pointer"}}>
                {["대면","비대면","블렌디드","-"].map(v=><option key={v} value={v}>{v}</option>)}
              </select>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10 }}>
            {[{label:"총 시수",key:"hours",ph:"200"},{label:"교육목표",key:"tgt",ph:"20"},{label:"수료목표",key:"cGoal",ph:"18"},{label:"취업목표",key:"eGoal",ph:"12"}].map(({label,key,ph})=>(
              <div key={key}>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>{label}</label>
                <input type="number" value={form[key]||""} onChange={e=>set(key,+e.target.value)} placeholder={ph} style={inp}/>
              </div>
            ))}
          </div>

          {/* 수업 요일 · 시간대 — 수강증명서 ⑥ 수강기간에 자동 반영 */}
          <div style={{ padding:"12px 14px", borderRadius:10, background:"#FFFBEB",
            border:"1px solid #FDE68A" }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#92400E", marginBottom:10 }}>
              📋 수업 요일 · 시간대 <span style={{ fontWeight:400, color:T.mu }}>— 수강증명서 ⑥ 수강기간에 자동 반영</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:10, alignItems:"end" }}>
              <div>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>
                  수업 요일 <span style={{ fontWeight:400 }}>(예: 월, 화, 목)</span>
                </label>
                <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                  {["월","화","수","목","금","토"].map(d => {
                    const active = (form.schedDays||"").includes(d);
                    return (
                      <button key={d} type="button"
                        onClick={()=>{
                          const arr = (form.schedDays||"").split(",").map(x=>x.trim()).filter(Boolean);
                          const next = active ? arr.filter(x=>x!==d) : [...arr, d];
                          // 요일 순서 정렬
                          const order = ["월","화","수","목","금","토"];
                          set("schedDays", next.sort((a,b)=>order.indexOf(a)-order.indexOf(b)).join(", "));
                        }}
                        style={{ width:30, height:30, borderRadius:7, border:"none", cursor:"pointer",
                          fontSize:12, fontWeight:700,
                          background: active ? "#EA580C" : T.s3,
                          color: active ? "#fff" : T.mu }}>
                        {d}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>수업 시작</label>
                <input type="time" value={form.schedTimeFrom||"09:00"} onChange={e=>set("schedTimeFrom",e.target.value)}
                  style={{...inp, width:110, cursor:"pointer"}}/>
              </div>
              <div>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>수업 종료</label>
                <input type="time" value={form.schedTimeTo||"13:00"} onChange={e=>set("schedTimeTo",e.target.value)}
                  style={{...inp, width:110, cursor:"pointer"}}/>
              </div>
            </div>
            {/* 미리보기 */}
            {(form.period || form.schedDays || form.schedTimeFrom) && (
              <div style={{ marginTop:9, fontSize:11, color:"#92400E", background:"#FFFCE8",
                padding:"6px 10px", borderRadius:6, border:"1px solid #FDE68A" }}>
                <b>⑥ 수강기간 미리보기:</b>{" "}
                {form.dateFrom && form.dateTo
                  ? `${form.dateFrom} ~ ${form.dateTo}`
                  : form.dateFrom || form.dateTo || "(기간 미입력)"
                }
                {form.schedDays ? ` / 매주 ${form.schedDays}` : ""}
                {(form.schedTimeFrom && form.schedTimeTo) ? ` ${form.schedTimeFrom} ∼ ${form.schedTimeTo}` : ""}
              </div>
            )}
          </div>

          {/* 참고사항 메모 */}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>📝 참고사항</label>
            <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)}
              placeholder="과정 운영 참고사항, 특이사항 등 자유 기재"
              rows={2} style={{ ...inp, resize:"vertical", fontFamily:"inherit", lineHeight:1.6 }}/>
          </div>

          {/* 참고 링크 */}
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu }}>🔗 참고 링크</label>
              <button type="button" onClick={addLink} style={{
                fontSize:11, padding:"4px 10px", borderRadius:6, border:`1px solid ${T.p}`,
                background:"transparent", color:T.p, cursor:"pointer", fontWeight:600 }}>+ 추가</button>
            </div>
            {(form.links||[]).length===0 && (
              <div style={{ fontSize:11, color:T.bd, textAlign:"center", padding:"10px 0" }}>링크가 없습니다</div>
            )}
            {(form.links||[]).map((lk,i)=>(
              <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr 2fr auto", gap:6, marginBottom:6 }}>
                <input value={lk.label||""} onChange={e=>updLink(i,"label",e.target.value)}
                  placeholder="링크 설명 (예: 강의계획서)" style={{...inp, fontSize:11}}/>
                <input value={lk.url||""} onChange={e=>updLink(i,"url",e.target.value)}
                  placeholder="https://..." style={{...inp, fontSize:11}}/>
                <button type="button" onClick={()=>delLink(i)} style={{
                  width:30, height:34, borderRadius:6, border:"none",
                  background:"#FEF2F2", color:T.danger, cursor:"pointer",
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <Icon n="x" s={12}/>
                </button>
              </div>
            ))}
          </div>

          {/* 강의계획서 · 수업일정표 PDF */}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:8 }}>📄 강의계획서 / 수업일정표 (PDF, 최대 5MB)</label>
            <input ref={pdfRef} type="file" accept=".pdf" style={{display:"none"}} onChange={onPdfUpload}/>
            {form.pdfData ? (
              <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 14px",
                borderRadius:8, background:T.pbg, border:`1px solid ${T.pl}50` }}>
                <span style={{ fontSize:20 }}>📕</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:T.p }}>{form.pdfName}</div>
                  <div style={{ fontSize:10, color:T.mu }}>업로드 완료</div>
                </div>
                <Btn size="sm" variant="outline" onClick={()=>{ const w=window.open(); w.document.write(`<iframe src="${form.pdfData}" style="width:100%;height:100vh;border:none;"/>`); }}>미리보기</Btn>
                <button type="button" onClick={()=>{set("pdfData","");set("pdfName","");}} style={{
                  width:26,height:26,borderRadius:6,border:"none",background:"#FEF2F2",color:T.danger,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="x" s={12}/></button>
              </div>
            ) : (
              <button type="button" onClick={()=>!pdfUploading && pdfRef.current.click()} style={{
                width:"100%", padding:"14px", borderRadius:8, border:`2px dashed ${T.bd}`,
                background:T.s2, cursor: pdfUploading ? "not-allowed" : "pointer", fontSize:12, color:T.mu,
                display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                <Icon n="upload" s={16}/> {pdfUploading ? "업로드 중…" : "PDF 파일 선택 (강의계획서 / 수업일정표)"}
              </button>
            )}
          </div>

          {/* 미리보기 카드 */}
          <div style={{ padding:"12px 14px", borderRadius:10, background:T.s2, border:`1px solid ${T.bd}`, borderLeft:`4px solid ${form.cc||T.p}` }}>
            <div style={{ fontSize:11, color:T.mu, marginBottom:4 }}>미리보기</div>
            <div style={{ fontSize:13, fontWeight:700, color:T.tx }}>{form.name||"(과정명 없음)"}</div>
            <div style={{ fontSize:11, color:T.mu, marginTop:2 }}>{form.code} · {form.period||"기간 미정"} · {form.method} · {form.hours||0}시간</div>
          </div>
        </div>

        <div style={{ padding:"13px 22px", borderTop:`1px solid ${T.bd}`, display:"flex", justifyContent:"flex-end", gap:8, background:T.s2 }}>
          <Btn variant="ghost" onClick={onClose}>취소</Btn>
          <Btn onClick={()=>{
            if(!form.name||!form.code) return alert("과정명과 과정코드는 필수입니다.");
            onSave({ ...form, id: form.id || Date.now() });
            onClose();
          }}><Icon n="check" s={13}/> {isNew?"추가":"저장"}</Btn>
        </div>
      </div>
    </div>
  );
};

const CourseList = ({ courses, onAdd, onUpdate, onDelete }) => {
  const [cat, setCat]         = useState("전체");
  const [editCourse, setEdit] = useState(null);   // null = 닫힘, {} = 신규, {id...} = 수정
  const [isNew, setIsNew]     = useState(false);

  const cats = ["전체", ...new Set(courses.map(c=>c.cat))];
  const list = cat==="전체" ? courses : courses.filter(c=>c.cat===cat);

  const openNew  = () => { setIsNew(true);  setEdit({}); };
  const openEdit = c  => { setIsNew(false); setEdit(c);  };

  const handleDelete = c => {
    if(!window.confirm(`"${c.name}" 과정을 삭제하시겠습니까?\n※ 해당 과정 훈련생 데이터는 유지됩니다.`)) return;
    onDelete(c.id);
  };

  return (
    <div className="page">
      {editCourse !== null && (
        <CourseModal
          course={isNew ? null : editCourse}
          isNew={isNew}
          onSave={isNew ? onAdd : onUpdate}
          onClose={()=>setEdit(null)}
        />
      )}

      <SectionHead
        title="과정 현황"
        sub={`2026년 경기북부 직업교육 · 총 ${courses.length}개 과정`}
        right={
          <Btn size="sm" onClick={openNew}>
            <Icon n="plus" s={13}/> 과정 추가
          </Btn>
        }
      />

      {/* 분야 필터 */}
      <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap" }}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)} style={{
            padding:"6px 14px", borderRadius:20, border:"none", cursor:"pointer",
            fontSize:11, fontWeight:600, transition:"all .15s",
            background: cat===c ? T.p : T.s3, color: cat===c ? "#fff" : T.mu }}>
            {c}
          </button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:12 }}>
        {list.map(c=>(
          <div key={c.id} className="course-card" style={{
            background:T.s, borderRadius:12, padding:18,
            border:`1px solid ${T.bd}`, borderLeft:`4px solid ${c.cc}`,
            boxShadow:"0 1px 4px rgba(0,0,0,.05)", position:"relative"

            {/* 수정/삭제 */}
            <div style={{ position:"absolute", top:12, right:12, display:"flex", gap:5 }}>
              <button onClick={()=>openEdit(c)} style={{ width:26,height:26,borderRadius:6,border:"none", background:T.pbg,color:T.p,cursor:"pointer", display:"flex",alignItems:"center",justifyContent:"center" }}><Icon n="edit" s={12}/></button>
              <button onClick={()=>handleDelete(c)} style={{ width:26,height:26,borderRadius:6,border:"none", background:"#FEF2F2",color:T.danger,cursor:"pointer", display:"flex",alignItems:"center",justifyContent:"center" }}><Icon n="x" s={12}/></button>
            </div>

            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, paddingRight:60 }}>
              <Chip label={c.cat} bg={`${c.cc}15`} color={c.cc}/>
              <Chip label={c.method||"-"} bg={T.s3} color={T.mu}/>
            </div>
            <div style={{ fontSize:13, fontWeight:700, color:T.tx, lineHeight:1.45, marginBottom:3, paddingRight:60 }}>{c.name}</div>
            <div style={{ fontSize:11, color:T.mu, marginBottom:10 }}>{c.code} · {c.period||"기간미정"} · {c.hours>0?`${c.hours}시간`:"미정"}
              {c.schedDays && <span style={{ color:T.p, marginLeft:6 }}>📅 {c.schedDays}</span>}

            {/* 목표 수치 */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:5, marginBottom:12 }}>
              {[{l:"교육목표",v:c.tgt},{l:"수료목표",v:c.cGoal},{l:"취업목표",v:c.eGoal}].map(({l,v})=>(

            {/* 참고 링크 */}
            {(c.links||[]).filter(l=>l.url).length > 0 && (
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                {(c.links||[]).filter(l=>l.url).map((lk,i)=>(

            {c.notes && (
              <div style={{ marginTop:8, padding:"7px 10px", borderRadius:7, background:T.s3,

  );
};

/* ===========================================================
   STUDENT MANAGEMENT  ★ Excel Upload / Download
=========================================================== */
const StudentMgmt = ({ students, courses, onAdd, onEdit, onUpdate, onDelete, onNew }) => {
  const [search, setSearch] = useState("");
  const [cFilter, setCFilter] = useState(0);
  const [riskOnly, setRisk] = useState(false);
  const [dragging, setDragging] = useState(false);
  const [preview, setPreview] = useState(null);   // parsed excel rows
  const [tab, setTab] = useState("list");          // "list" | "import"
  const fileRef = useRef();

  const filtered = useMemo(() => students.filter(s => {
    if(cFilter && s.cid!==cFilter) return false;
    if(riskOnly && s.rate>=80) return false;
    if(search && !s.name.includes(search) && !s.phone.includes(search)) return false;
    return true;
  }), [students, cFilter, riskOnly, search]);

  const parseFile = file => {
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:"" });
      setPreview(rows);
      setTab("import");
    };
    reader.readAsArrayBuffer(file);
  };

  const onDrop = e => { e.preventDefault(); setDragging(false); const f=e.dataTransfer.files[0]; if(f) parseFile(f); };

  const confirmImport = () => {
    if(!preview) return;
    const yn = v => String(v||"").trim().toUpperCase() === "Y";
    const toAdd = [];
    const toUpdate = [];
    preview.forEach((r,i) => {
      const code = r["과정코드"] || "";
      const c = courses.find(x=>x.code===code) || courses[0];
      const phone = String(r["연락처"] || "").replace(/[^0-9]/g, ""); // 숫자만 정규화
      const base = {
        cid:        c.id,
        name:       r["이름"]              || "",
        gender:     r["성별"]              || "",
        birth:      r["생년월일"]           || "",
        idBack:     String(r["주민번호뒷자리"]||""),
        phone,
        phone2:     String(r["비상연락처"]  ||""),
        addrCity:   r["거주시"]            || "",
        addrDetail: r["상세주소"]           || "",
        edu:        r["최종학력"]           || "",
        major:      r["전공"]              || "",
        career:     r["경력"]              || "",
        cert:       r["자격증"]            || "",
        status:     r["취업형태"]           || "미취업",
        unemp:      yn(r["실업급여수급"]),
        disabled:   yn(r["장애여부"]),
        veteran:    yn(r["보훈여부"]),
        itvDate:    r["면접일자"]           || "",
        itvScore:   r["면접점수"]           || "",
        itvGrade:   r["면접등급"]           || "",
        itvPass:    yn(r["합격여부"]),
        memo:       r["특이사항"]           || "",
      };
      const existing = phone ? students.find(s => s.phone && s.phone === phone) : null;
      if (existing) {
        toUpdate.push({ ...existing, ...base });
      } else {
        toAdd.push({ ...base, rate: 0 }); // ID는 DB 자동 생성
      }
    });
    if (toAdd.length > 0) onAdd(toAdd);
    if (toUpdate.length > 0 && onUpdate) toUpdate.forEach(s => onUpdate(s));
    setPreview(null);
    setTab("list");
    const msg = [
      toAdd.length    && `신규 ${toAdd.length}명 등록`,
      toUpdate.length && `기존 ${toUpdate.length}명 업데이트`,
    ].filter(Boolean).join(" / ");
    alert(`✅ ${msg} 완료`);
  };

  return (
    <div className="page">
      <SectionHead
        title="훈련생 관리"
        sub="훈련생 등록, 이력 조회 및 출석 현황"
        right={
          <div style={{ display:"flex", gap:8 }}>
            <Btn variant="ghost" size="sm" onClick={()=>downloadTemplate(courses)}>
              <Icon n="dl" s={13}/> 양식 다운로드
            </Btn>
            <Btn variant="ghost" size="sm" onClick={()=>setTab(tab==="import"?"list":"import")}>
              <Icon n="upload" s={13}/> {tab==="import"?"목록으로":"엑셀 업로드"}
            </Btn>
            <Btn size="sm" onClick={onNew}>
              <Icon n="plus" s={13}/> 신규 등록
            </Btn>
          </div>
        }
      />

      {tab === "import" ? (
        <div>
          {/* 드래그앤드롭 업로드 영역 */}
          {!preview && (
            <Card style={{ marginBottom:16 }}>
              <div
                className={`drop-zone${dragging?" drag-over":""}`}
                onDragOver={e=>{e.preventDefault();setDragging(true)}}
                onDragLeave={()=>setDragging(false)}
                onDrop={onDrop}
                onClick={()=>fileRef.current.click()}
                style={{ padding:"48px 24px", textAlign:"center", cursor:"pointer",
                  border:`2px dashed ${T.pl}`, borderRadius:12, margin:16 }}>
                <div style={{ fontSize:36, marginBottom:12 }}>📂</div>
                <div style={{ fontSize:14, fontWeight:700, color:T.tx, marginBottom:6 }}>엑셀 파일을 여기에 끌어다 놓으세요</div>
                <div style={{ fontSize:12, color:T.mu, marginBottom:16 }}>또는 클릭해서 파일 선택 (.xlsx, .xls 지원)</div>
                <Btn size="sm" onClick={e=>{e.stopPropagation();fileRef.current.click()}}>
                  <Icon n="upload" s={13}/> 파일 선택
                </Btn>
                <input ref={fileRef} type="file" accept=".xlsx,.xls"
                  style={{ display:"none" }}
                  onChange={e=>{if(e.target.files[0]) parseFile(e.target.files[0])}}
                />
              </div>

              {/* 양식 안내 */}
              <div style={{ padding:"14px 20px", background:T.s2,
                borderTop:`1px solid ${T.bd}`, display:"flex", gap:20, alignItems:"center" }}>
                <Icon n="info" s={16}/>
                <div style={{ fontSize:12, color:T.mu, flex:1 }}>
                  엑셀 양식은 <b style={{ color:T.p }}>양식 다운로드</b> 버튼에서 받으실 수 있습니다.
                  필수 컬럼: <b>이름, 생년월일, 연락처, 과정코드</b>
                </div>
                <Btn variant="ghost" size="sm" onClick={downloadTemplate}>
                  <Icon n="dl" s={12}/> 양식 받기
                </Btn>
              </div>
            </Card>
          )}

          {/* 미리보기 테이블 */}
          {preview && (
            <Card style={{ overflow:"hidden" }}>
              <div style={{ padding:"14px 18px", borderBottom:`1px solid ${T.bd}`,
                display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <span style={{ fontWeight:700, fontSize:13, color:T.tx }}>📋 업로드 미리보기</span>
                  <span style={{ fontSize:12, color:T.mu, marginLeft:10 }}>{preview.length}명 확인</span>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <Btn variant="ghost" size="sm" onClick={()=>{setPreview(null)}}>
                    <Icon n="x" s={12}/> 취소
                  </Btn>
                  <Btn size="sm" onClick={confirmImport}>
                    <Icon n="check" s={12}/> {preview.length}명 등록 확정
                  </Btn>
                </div>
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse" }}>
                  <thead>
                    <tr style={{ background:T.s2 }}>
                      {TEMPLATE_HEADERS.map(h=>(
                        <th key={h} style={{ padding:"9px 14px", textAlign:"left",

                  </thead>
                  <tbody>
                    {preview.map((r,i)=>{
                      const c = courses.find(x=>x.code===r["과정코드"]);

              </div>
            </Card>

              <div style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)", color:T.mu, pointerEvents:"none" }}>
                <Icon n="search" s={13}/>
              </div>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="이름·연락처 검색" style={{
                  paddingLeft:28, paddingRight:12, paddingTop:7, paddingBottom:7,
                  border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12,
                  outline:"none", background:T.s2, width:180, color:T.tx }}/>
            </div>
            <select value={cFilter} onChange={e=>setCFilter(+e.target.value)} style={{
              padding:"7px 10px", border:`1px solid ${T.bd}`, borderRadius:8,
              fontSize:12, outline:"none", background:T.s2, color:T.tx, cursor:"pointer" }}>
              <option value={0}>전체 과정</option>
              {courses.map(c=><option key={c.id} value={c.id}>{shortCourseName(c.name)} [{c.code}]</option>)}
            </select>
            <button onClick={()=>setRisk(!riskOnly)} style={{
              display:"flex", alignItems:"center", gap:5, padding:"7px 13px",
              border:`1px solid ${riskOnly?T.danger:T.bd}`, borderRadius:8,
              background:riskOnly?"#FEF2F2":T.s2, color:riskOnly?T.danger:T.mu,

                        {s.career && s.career!=="없음" && (
                          <div style={{ fontSize:10, color:T.p, marginTop:2,
                            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:120 }}>
                            {s.career}
                          </div>
                        )}
                      </td>

                      {/* 취약계층 뱃지 */}
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        <div style={{ display:"flex", gap:3, justifyContent:"center", flexWrap:"wrap" }}>
                          {badges.length > 0
                            ? badges.map(b=>(
                                <Chip key={b.l} label={b.l} bg={b.bg} color={b.c} size={10}/>
                              ))
                            : <span style={{ fontSize:10, color:T.bd }}>—</span>
                          }
                        </div>
                      </td>

                      {/* 면접 */}
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        {s.itvScore ? (
                          <>
                            <div style={{ display:"inline-flex", alignItems:"center", gap:5 }}>
                              <span style={{ fontSize:13, fontWeight:800,
                                color: gradeColor(s.itvGrade) }}>{s.itvGrade}</span>
                              <span style={{ fontSize:11, color:T.mu }}>{s.itvScore}점</span>
                            </div>
                            <div style={{ marginTop:2 }}>
                              <Chip
                                label={s.itvPass?"합격":"불합격"}
                                bg={s.itvPass?T.pbg:"#FEF2F2"}
                                color={s.itvPass?T.p:T.danger}
                                size={10}
                              />
                            </div>
                          </>
                        ) : <span style={{ fontSize:10, color:T.bd }}>미입력</span>}
                      </td>

                      {/* 출석률 */}
                      <td style={{ padding:"11px 12px", textAlign:"center", minWidth:80 }}>
                        <div style={{ fontSize:14, fontWeight:800, color:col }}>{s.rate}%</div>
                        <RBar r={s.rate} h={4}/>
                        <div style={{ fontSize:9, color:col, marginTop:2 }}>
                          {s.rate>=80?"정상":s.rate>=70?"주의":"위험"}
                        </div>
                      </td>

                      {/* 수정·삭제 */}
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        <div style={{ display:"flex", gap:4, justifyContent:"center" }}>
                          <button onClick={()=>onEdit(s)} title="수정" style={{
                            width:28, height:28, borderRadius:6, border:"none",
                            background:T.pbg, color:T.p, cursor:"pointer",
                            display:"flex", alignItems:"center", justifyContent:"center" }}>
                            <Icon n="edit" s={13}/>
                          </button>
                          <button onClick={()=>onDelete(s.id)} title="삭제" style={{
                            width:28, height:28, borderRadius:6, border:"none",
                            background:"#FEF2F2", color:T.danger, cursor:"pointer",
                            display:"flex", alignItems:"center", justifyContent:"center" }}>
                            <Icon n="x" s={13}/>
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            </div>
            {filtered.length===0 && (
              <div style={{ padding:40, textAlign:"center", color:T.mu, fontSize:13 }}>검색 결과가 없습니다</div>
            )}
          </Card>
        </>
      )}
    </div>
  );
};

/* ===========================================================
   QR ATTENDANCE  ★ QR 출석 체크
=========================================================== */
const AttendanceMgmt = ({ students, courses, onRatesUpdated }) => {
  const initCourse = courses[3] || courses[0];
  const initDates  = buildCourseDates(initCourse);
  const [course, setCourse]   = useState(initCourse);
  const [date, setDate]       = useState(initDates[initDates.length-1] || new Date().toISOString().slice(0,10));
  const [mode, setMode]       = useState("qr");
  const [qrType, setQrType]   = useState("in");
  const [simRunning, setSimRunning] = useState(false);
  const [manualAtt, setManualAtt]   = useState({});
  const simRef = useRef(null);

  // ── 시간 설정 — 과정별 schedTimeFrom/To에서 자동 로드, 수동 수정 가능 ──
  const parseHM = (str, defH, defM) => {
    if(!str) return [defH, defM];
    const [h, m] = str.split(":").map(Number);
    return [isNaN(h)?defH:h, isNaN(m)?defM:m];
  };
  const initTimes = (c) => {
    const [sh, sm] = parseHM(c?.schedTimeFrom, 9,  0);
    const [eh, em] = parseHM(c?.schedTimeTo,   13, 0);
    // 지각기준: 수업시작 + 30분 기본
    const lateMins = sh*60+sm+30;
    return { sh, sm, lh:Math.floor(lateMins/60), lm:lateMins%60, eh, em };
  };
  const initC = courses[3] || courses[0];
  const init0 = initTimes(initC);

  const [startH, setStartH] = useState(init0.sh);
  const [startM, setStartM] = useState(init0.sm);
  const [lateH,  setLateH]  = useState(init0.lh);
  const [lateM,  setLateM]  = useState(init0.lm);
  const [endH,   setEndH]   = useState(init0.eh);
  const [endM,   setEndM]   = useState(init0.em);
  const [showTimeSetting, setShowTimeSetting] = useState(false);
  const [timeCustomized,  setTimeCustomized]  = useState(false); // 수동 수정 여부

  // 과정 변경 시 시간 자동 갱신 (수동 수정 중이면 유지)
  const handleCourseChange = (c) => {
    setCourse(c);
    setRecords({});
    const newDates = buildCourseDates(c);
    setDate(newDates[newDates.length-1] || new Date().toISOString().slice(0,10));
    if(!timeCustomized) {
      const t = initTimes(c);
      setStartH(t.sh); setStartM(t.sm);
      setLateH(t.lh);  setLateM(t.lm);
      setEndH(t.eh);   setEndM(t.em);
    }
  };

  const startTotal = startH * 60 + startM;  // 총 분
  const lateTotal  = lateH  * 60 + lateM;
  const endTotal   = endH   * 60 + endM;

  const fmtTime = (h, m) => `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;

  // ── QR 데이터 ──
  // 현재 페이지 URL에 ?mode=checkin 파라미터를 붙여 실제 모바일 출석 페이지로 라우팅
  const qrToken   = `${course.code}-${date}-${qrType.toUpperCase()}-2026GJF`;
  const pageBase  = window.location.origin + window.location.pathname;
  const qrData    = `${pageBase}?mode=checkin&cid=${course.id}&date=${date}&type=${qrType}&t=${encodeURIComponent(qrToken)}`;
  const qrColor   = qrType === "in" ? "#2563EB" : "#9A3412";
  // qrUrl 제거 — QRCanvas 컴포넌트로 로컬 생성 (Tracking Prevention 대응)

  // ── 출결 기록 (입실/퇴실 분리) ──
  const [records, setRecords] = useState({}); // { studentId: { in:{time,status}, out:{time} } }

  // ── Supabase에서 출결 데이터 로드 ──
  useEffect(() => {
    if (!course || !date) return;
    const loadAttendance = async () => {
      try {
        const courseStudentIds = courseStudents.map(s => s.id);
        if (courseStudentIds.length === 0) return;

        const { data, error } = await sbGet(
          "attendance",
          `select=*&student_id=in.(${courseStudentIds.join(",")})&date=eq.${date}`
        );
        if (error) throw error;

        // 데이터를 records 형태로 변환
        const newRecords = {};
        (data || []).forEach(att => {
          if (!newRecords[att.student_id]) newRecords[att.student_id] = {};
          const [h, m] = att.time.split(":").map(Number);
          const mins = h * 60 + m;
          if (att.type === "in") {
            newRecords[att.student_id].in = { time: att.time, mins };
          } else if (att.type === "out") {
            newRecords[att.student_id].out = { time: att.time };
          }
        });
        setRecords(newRecords);
        console.log(`✅ ${date} 출결 데이터 로드 완료:`, Object.keys(newRecords).length, "명");
      } catch (err) {
        console.error("출결 로드 오류:", err);
      }
    };
    loadAttendance();
  }, [course, date]);

  // ── 실시간 출결 업데이트 구독 (안정화 버전) ──
  useEffect(() => {
    if (!course || !date) return;

    let intentionallyClosed = false;
    let heartbeatId         = null;
    let currentWs           = null;
    let retryDelay          = 2000;
    let refCount            = 0;
    const channel = `realtime:public:attendance`;
    const joinRef = String(++refCount);
    let   subIds  = [];

    const send = (obj) => {
      if (currentWs?.readyState === WebSocket.OPEN) currentWs.send(JSON.stringify(obj));
    };

    const connect = () => {
      if (intentionallyClosed) return;

      const ws = new WebSocket(
        `wss://${SB_URL.replace("https://","")}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`
      );
      currentWs = ws;

      ws.onopen = () => {
        retryDelay = 2000;
        console.log(`🔔 [출결 Realtime] ${date} 구독 시작`);
        send({
          topic:    channel,
          event:    "phx_join",
          payload:  {
            config: {
              broadcast:        { self: false },
              presence:         { key: "" },
              postgres_changes: [{
                event:  "*",
                schema: "public",
                table:  "attendance",
                filter: `date=eq.${date}`
              }]
            },
            access_token: SB_KEY
          },
          ref:      joinRef,
          join_ref: joinRef
        });

        heartbeatId = setInterval(() => {
          send({ topic: "phoenix", event: "heartbeat", payload: {}, ref: String(++refCount) });
        }, 25000);
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);

          // phx_reply 확인
          if (msg.event === "phx_reply" && msg.ref === joinRef) {
            if (msg.payload?.status === "ok") {
              subIds = (msg.payload.response?.postgres_changes || []).map(c => c.id);
              console.log(`✅ [출결 Realtime] 구독 확인 (${date}) IDs:`, subIds);
            } else {
              console.error(`❌ [출결 Realtime] 구독 실패:`, msg.payload?.response);
            }
            return;
          }

          // CDC 이벤트
          if (msg.event === "postgres_changes" && msg.payload?.data) {
            const ids = msg.payload.ids || [];
            if (subIds.length > 0 && !ids.some(id => subIds.includes(id))) return;

            const { type: eventType, record: newRecord } = msg.payload.data;
            if (eventType === "INSERT" || eventType === "UPDATE") {
              // 현재 날짜 필터 (서버 필터와 함께 클라이언트 이중 확인)
              if (newRecord?.date !== date) return;
              const [h, m] = (newRecord?.time || "00:00").split(":").map(Number);
              const mins = h * 60 + m;
              setRecords(prev => ({
                ...prev,
                [newRecord.student_id]: {
                  ...(prev[newRecord.student_id] || {}),
                  [newRecord.type]: newRecord.type === "in"
                    ? { time: newRecord.time, mins }
                    : { time: newRecord.time }
                }
              }));
              console.log(`📌 [출결 Realtime] ${newRecord.type} ← 학생 ID ${newRecord.student_id}`);
            }
          }
        } catch (err) {
          console.error("[출결 Realtime] 메시지 파싱 오류:", err);
        }
      };

      ws.onerror = () => console.warn("⚠️ [출결 Realtime] 소켓 오류");
      ws.onclose = (ev) => {
        clearInterval(heartbeatId);
        heartbeatId = null;
        if (!intentionallyClosed) {
          console.warn(`🔌 [출결 Realtime] 연결 끊김 (code:${ev.code}) — ${retryDelay/1000}초 후 재연결`);
          setTimeout(connect, retryDelay);
          retryDelay = Math.min(retryDelay * 2, 30000);
        }
      };
    };

    connect();

    return () => {
      intentionallyClosed = true;
      clearInterval(heartbeatId);
      heartbeatId = null;
      currentWs?.close();
    };
  }, [course, date]);

  // 상태 계산 (입실 시각 → 출석/지각/결석)
  const calcStatus = (inMins) => {
    if (inMins === null) return "A";
    if (inMins <= lateTotal) return "O";
    return "L";
  };

  const checkedInCnt  = Object.values(records).filter(r=>r.in).length;
  const checkedOutCnt = Object.values(records).filter(r=>r.out).length;
  const presentCnt    = Object.values(records).filter(r=>r.in && calcStatus(r.in.mins)==="O").length;
  const lateCnt       = Object.values(records).filter(r=>r.in && calcStatus(r.in.mins)==="L").length;
  const courseStudents = students.filter(s=>s.cid===course.id);
  const absentCnt = courseStudents.length - checkedInCnt;

  // ── 시뮬레이션 ──
  const startSim = () => {
    if(simRunning) return;
    setSimRunning(true);
    if(qrType==="in") setRecords({});
    const students2 = [...courseStudents];
    let i = 0;
    simRef.current = setInterval(() => {
      if(i >= students2.length) { clearInterval(simRef.current); setSimRunning(false); return; }
      const s = students2[i];
      const offsetMins = Math.floor(Math.random() * 80) - 10; // -10 ~ +70분
      const mins = startTotal + offsetMins;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      const time = fmtTime(Math.max(0,h), Math.max(0,m));
      if(qrType === "in") {
        setRecords(prev => ({...prev, [s.id]: { in: { time, mins } }}));
      } else {
        const outOffset = endTotal + Math.floor(Math.random()*20) - 5;
        const oh = Math.floor(outOffset/60), om = outOffset%60;
        setRecords(prev => ({...prev, [s.id]: { ...(prev[s.id]||{}), out: { time: fmtTime(oh,om) } }}));
      }
      i++;
    }, 500);
  };

  useEffect(() => () => clearInterval(simRef.current), []);

  const ATT_MAP = {
    O: { label:"출석", bg:"#ECFDF5", color:T.ok    },
    L: { label:"지각", bg:"#FFFBEB", color:T.warn   },
    A: { label:"결석", bg:"#FEF2F2", color:T.danger },
    E: { label:"외출", bg:"#F5F3FF", color:"#7C3AED" },
  };

  const inpSel = {
    padding:"5px 8px", border:`1px solid ${T.bd}`, borderRadius:7,
    fontSize:12, outline:"none", background:T.s2, color:T.tx, cursor:"pointer",
    width:64,
  };

  return (
    <div className="page">
      <SectionHead
        title="출결 관리"
        sub="QR 코드 출석 또는 수동 입력으로 출결을 관리합니다"
        right={
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={()=>setMode("qr")} style={{
              padding:"7px 14px", borderRadius:20, border:"none", cursor:"pointer",
              fontSize:11, fontWeight:600,
              background:mode==="qr"?T.p:T.s3, color:mode==="qr"?"#fff":T.mu }}>
              📱 QR 출석
            </button>
            <button onClick={()=>setMode("manual")} style={{
              padding:"7px 14px", borderRadius:20, border:"none", cursor:"pointer",
              fontSize:11, fontWeight:600,
              background:mode==="manual"?T.p:T.s3, color:mode==="manual"?"#fff":T.mu }}>
              ✏️ 수동 입력
            </button>
          </div>
        }
      />

      {/* 2026 기준 안내 */}
      <div style={{ background:"#FFFBEB", border:`1px solid #FDE68A`, borderRadius:8,
        padding:"10px 14px", marginBottom:14, display:"flex", gap:10, fontSize:12, color:"#92400E" }}>
        <Icon n="info" s={14}/>
        <span><b>2026 개정 출결 기준:</b> 하루 수업시간 50% 미만 수강 시 결석 처리 · 총 교육시간 <b>80% 이상</b> 출석 시 수료</span>
      </div>

      {/* ── 시간 설정 카드 ── */}
      <Card style={{ marginBottom:14, padding:0, overflow:"hidden" }}>
        <button onClick={()=>setShowTimeSetting(v=>!v)}
          style={{ width:"100%", padding:"11px 18px", border:"none", background:"transparent",
            cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>
          <Icon n="cal" s={14}/>
          <div style={{ fontSize:12, fontWeight:700, color:T.tx }}>⏰ 수업 시간 설정</div>
          {timeCustomized && (
            <span style={{ fontSize:10, fontWeight:700, color:T.warn,
              background:"#FFFBEB", padding:"1px 7px", borderRadius:4, border:`1px solid ${T.warn}40` }}>
              수동 수정됨
            </span>
          )}
          <div style={{ marginLeft:"auto", display:"flex", gap:12, alignItems:"center", fontSize:12 }}>
            <span style={{ color:T.ok }}>수업 {fmtTime(startH,startM)} ~ {fmtTime(endH,endM)}</span>
            <span style={{ color:T.warn }}>지각기준 {fmtTime(lateH,lateM)} 이후</span>
            <span style={{ fontSize:10, color:T.mu }}>{showTimeSetting?"▲":"▼"}</span>
          </div>
        </button>
        {showTimeSetting && (
          <div style={{ padding:"14px 18px", borderTop:`1px solid ${T.bd}`,
            display:"flex", gap:20, flexWrap:"wrap", alignItems:"flex-end" }}>
            {[
              { label:"수업 시작", h:startH, m:startM, setH:(v)=>{setStartH(v);setTimeCustomized(true);}, setM:(v)=>{setStartM(v);setTimeCustomized(true);}, color:T.ok },
              { label:"지각 기준 (이후)", h:lateH,  m:lateM,  setH:(v)=>{setLateH(v);setTimeCustomized(true);},  setM:(v)=>{setLateM(v);setTimeCustomized(true);},  color:T.warn },
              { label:"수업 종료", h:endH,   m:endM,   setH:(v)=>{setEndH(v);setTimeCustomized(true);},   setM:(v)=>{setEndM(v);setTimeCustomized(true);},   color:T.p },
            ].map(({label,h,m,setH,setM,color})=>(
              <div key={label}>
                <label style={{ fontSize:11, fontWeight:600, color:T.mu, display:"block", marginBottom:5 }}>
                  {label}
                </label>
                <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                  <select value={h} onChange={e=>setH(+e.target.value)} style={{...inpSel,borderColor:color}}>
                    {Array.from({length:24},(_,i)=>i).map(v=>(
                      <option key={v} value={v}>{String(v).padStart(2,"0")}시</option>
                    ))}
                  </select>
                  <span style={{ fontSize:14, fontWeight:700, color:T.mu }}>:</span>
                  <select value={m} onChange={e=>setM(+e.target.value)} style={{...inpSel,borderColor:color}}>
                    {[0,10,20,30,40,50].map(v=>(
                      <option key={v} value={v}>{String(v).padStart(2,"0")}분</option>
                    ))}
                  </select>
                </div>
              </div>
            ))}
            <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
              <div style={{ padding:"8px 12px", borderRadius:8, background:T.s2,
                border:`1px solid ${T.bd}`, fontSize:11, color:T.mu, lineHeight:1.7 }}>
                📋 <b style={{color:T.tx}}>현재 기준</b><br/>
                출석: {fmtTime(startH,startM)} ~ {fmtTime(lateH,lateM)}<br/>
                지각: {fmtTime(lateH,lateM)} 이후 입실<br/>
                수업: ~ {fmtTime(endH,endM)} 종료
              </div>
              {timeCustomized && (
                <button onClick={()=>{
                  const t = initTimes(course);
                  setStartH(t.sh); setStartM(t.sm);
                  setLateH(t.lh);  setLateM(t.lm);
                  setEndH(t.eh);   setEndM(t.em);
                  setTimeCustomized(false);
                }} style={{ padding:"6px 10px", borderRadius:7, border:`1px solid ${T.bd}`,
                  background:"transparent", cursor:"pointer", fontSize:11, fontWeight:600,
                  color:T.mu, textAlign:"center" }}>
                  🔄 과정 시간으로 초기화
                </button>
              )}
            </div>
          </div>
        )}
      </Card>

      {/* 과정·날짜 선택 + 요약 */}
      <Card style={{ padding:"14px 18px", marginBottom:16, display:"flex", gap:14, alignItems:"center", flexWrap:"wrap" }}>
        <div>
          <div style={{ fontSize:10, color:T.mu, marginBottom:5, fontWeight:600 }}>과정 선택</div>
          <select value={course.id} onChange={e=>handleCourseChange(courses.find(c=>c.id===+e.target.value)||courses[0])}
            style={{ padding:"7px 10px", border:`1px solid ${T.bd}`, borderRadius:8,
              fontSize:12, outline:"none", background:T.s2, cursor:"pointer", color:T.tx }}>
            {courses.map(c=><option key={c.id} value={c.id}>{shortCourseName(c.name)} [{c.code}]</option>)}
          </select>
        </div>
        <div>
          <div style={{ fontSize:10, color:T.mu, marginBottom:5, fontWeight:600 }}>수업일</div>
          <select value={date} onChange={e=>setDate(e.target.value)}
            style={{ padding:"7px 10px", border:`1px solid ${T.bd}`, borderRadius:8,
              fontSize:12, outline:"none", background:T.s2, cursor:"pointer", color:T.tx }}>
            {buildCourseDates(course).map(d=><option key={d} value={d}>{d}</option>)}
          </select>
        </div>
        <div style={{ marginLeft:"auto", display:"flex", gap:14, alignItems:"center" }}>
          {[
            {v:presentCnt,   l:"출석",   c:T.ok      },
            {v:lateCnt,      l:"지각",   c:T.warn     },
            {v:absentCnt,    l:"미확인", c:T.danger   },
            {v:checkedOutCnt,l:"퇴실",   c:T.info     },
          ].map(({v,l,c})=>(
            <div key={l} style={{ textAlign:"center" }}>
              <div style={{ fontSize:18, fontWeight:800, color:c }}>{v}</div>
              <div style={{ fontSize:9, color:T.mu }}>{l}</div>
            </div>
          ))}
          <div style={{ fontSize:13, color:T.mu }}>/ {courseStudents.length}명</div>
          {/* 결석 일괄 마감 버튼 */}
          <button onClick={async () => {
            const absentStudents = courseStudents.filter(s => !records[s.id]?.in);
            if (absentStudents.length === 0) { alert("미확인 인원이 없습니다."); return; }
            if (!window.confirm(`미확인 ${absentStudents.length}명을 결석으로 일괄 처리하시겠습니까?`)) return;
            try {
              const now = new Date();
              const toInsert = absentStudents.map(s => ({
                student_id: s.id, date, type: "in",
                time: "00:00", status: "A", created_at: now.toISOString()
              }));
              const { error } = await sbInsert("attendance", toInsert);
              if (error) throw error;
              // 로컬 records 업데이트
              setRecords(prev => {
                const next = { ...prev };
                absentStudents.forEach(s => { next[s.id] = { ...(next[s.id]||{}), in: { time:"결석", mins:null, status:"A" } }; });
                return next;
              });
              alert(`✅ ${absentStudents.length}명 결석 일괄 처리 완료`);
              if (onRatesUpdated) onRatesUpdated(course.id);
            } catch(err) {
              alert("마감 오류: " + (err.message || JSON.stringify(err)));

          }} style={{ padding:"8px 12px", borderRadius:9, border:`1.5px solid ${T.danger}`,
            background:"#FEF2F2", color:T.danger, cursor:"pointer",
            fontSize:11, fontWeight:700, display:"flex", alignItems:"center", gap:5,
            whiteSpace:"nowrap" }}>

      </Card>

                <button key={id} onClick={()=>setQrType(id)} style={{

                    color: qrType===id ? "rgba(255,255,255,.7)" : T.mu }}>{sub}</div>
                </button>

            </div>

            {/* QR 이미지 — 로컬 canvas 렌더링 (Tracking Prevention 대응) */}

              <div style={{ border:`2px solid ${qrType==="in"?"#2563EB":T.pl}`, borderRadius:10, overflow:"hidden", lineHeight:0 }}>
                <QRCanvas data={qrData} size={200} color={qrColor} bgColor="#ffffff" />
              </div>
              <div style={{ position:"absolute", top:0, left:0, right:0, bottom:0, pointerEvents:"none",
                overflow:"hidden", borderRadius:10 }}>
                <div style={{ position:"absolute", left:0, right:0, height:2,
                  background:`linear-gradient(90deg,transparent,${qrType==="in"?"#2563EB":T.pl},transparent)`,
                  animation:"scanLine 2s linear infinite", opacity:.7 }}/>
              </div>
            </div>

            {/* 시간 정보 */}
            <div style={{ fontSize:10, color:T.mu, lineHeight:1.8, marginBottom:10,
              padding:"8px 10px", background:T.s2, borderRadius:7, border:`1px solid ${T.bd}` }}>
              <b style={{color:T.tx}}>과정:</b> {course.name}<br/>
              <b style={{color:T.tx}}>날짜:</b> {date}<br/>
              <b style={{color:T.ok}}>수업시작:</b> {fmtTime(startH,startM)}<br/>
              <b style={{color:T.warn}}>지각기준:</b> {fmtTime(lateH,lateM)} 이후<br/>
              <b style={{color:T.p}}>수업종료:</b> {fmtTime(endH,endM)}<br/>
              <b style={{color:"#2563EB"}}>현재 QR:</b> {qrType==="in"?"입실":"퇴실"}
            </div>

            <div style={{ padding:"8px 10px", background:T.pbg, borderRadius:6,
              fontSize:10, color:T.mu, wordBreak:"break-all", marginBottom:10 }}>
              {qrData.slice(0,60)}…
            </div>

            <div style={{ background:T.s2, borderRadius:8, padding:"9px 11px",
              border:`1px solid ${T.bd}`, fontSize:11, color:T.mu, lineHeight:1.8 }}>
              <b style={{color:T.tx, display:"block", marginBottom:3}}>📱 스캔 절차</b>
              1. 학생이 폰으로 QR 스캔<br/>
              2. 모바일 출석 페이지 자동 이동<br/>
              3. 이름 확인 후 출석 버튼 탭<br/>

            </div>

              background:"#ECFDF5", border:"1px solid #6EE7B7", fontSize:10, color:"#065F46" }}>
              ✅ <b>실시간 연동</b> — QR 스캔 즉시 출결 반영 (Supabase Realtime)
            </div>
          </Card>

          {/* 실시간 출석 현황 */}
          <Card style={{ overflow:"hidden", display:"flex", flexDirection:"column" }}>
            <div style={{ padding:"12px 18px", borderBottom:`1px solid ${T.bd}`,
              display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:13, fontWeight:700, color:T.tx, display:"flex", alignItems:"center", gap:8 }}>
                📡 실시간 출석 현황
                {simRunning && (
                  <span style={{ fontSize:10, color:T.ok, display:"inline-flex", alignItems:"center", gap:4 }}>
                    <span style={{ width:6,height:6,background:T.ok,borderRadius:"50%",
                      display:"inline-block",animation:"ping 1.2s ease infinite"}}/>
                    LIVE
                  </span>
                )}
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <Btn size="sm" variant="ghost" onClick={()=>{ setRecords({}); setSimRunning(false); clearInterval(simRef.current); }}>
                  초기화
                </Btn>
                <Btn size="sm" onClick={startSim} variant={simRunning?"ghost":"primary"}>
                  <Icon n={simRunning?"refresh":"phone"} s={13}/>
                  {simRunning ? "스캔 중…" : `${qrType==="in"?"입실":"퇴실"} 시뮬레이션`}
                </Btn>
              </div>
            </div>

            <div style={{ flex:1, padding:14, overflowY:"auto", maxHeight:400 }}>
              {courseStudents.length === 0 && (
                <div style={{ textAlign:"center", color:T.mu, padding:"40px 0", fontSize:13 }}>
                  이 과정에 등록된 훈련생이 없습니다
                </div>
              )}
              {courseStudents.map(s => {
                const rec    = records[s.id] || {};
                const inRec  = rec.in;
                const outRec = rec.out;
                const status = inRec ? calcStatus(inRec.mins) : "A";
                const att    = ATT_MAP[inRec ? status : "A"];
                return (
                  <div key={s.id} className={inRec?"checkin-row":""} style={{
                    display:"flex", alignItems:"center", gap:12,
                    padding:"10px 12px", borderRadius:8, marginBottom:6,
                    background: inRec ? att.bg : T.s2,
                    border:`1px solid ${inRec ? att.color+"30" : T.bd}`,
                    transition:"all .3s"
                  }}>
                    <div style={{ width:34, height:34, borderRadius:9, flexShrink:0,
                      background: inRec ? `${att.color}20` : T.bd,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:11, fontWeight:800, color: inRec ? att.color : T.mu }}>
                      {inRec ? att.label[0] : "?"}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:700, color:T.tx }}>{s.name}</div>
                      <div style={{ fontSize:10, color:T.mu, marginTop:1, display:"flex", gap:8 }}>

                        {outRec && <span style={{color:T.p}}>📤 퇴실 {outRec.time}</span>}

                    </div>
                    <div style={{ display:"flex", gap:5, alignItems:"center" }}>
                      {inRec && <Chip label={att.label} bg={att.bg} color={att.color}/>}
                      {outRec && <Chip label="퇴실완료" bg="#EFF6FF" color="#2563EB"/>}
                      {!inRec && <Chip label="미확인" bg={T.s3} color={T.mu}/>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 진행 바 */}
            <div style={{ padding:"11px 18px", borderTop:`1px solid ${T.bd}`, background:T.s2 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                <span style={{ fontSize:11, color:T.mu }}>입실 진행률</span>
                <span style={{ fontSize:11, fontWeight:700, color:T.p }}>
                  {courseStudents.length ? Math.round(checkedInCnt/courseStudents.length*100) : 0}%
                  <span style={{ fontSize:10, color:T.mu, fontWeight:400, marginLeft:4 }}>
                    ({checkedInCnt}/{courseStudents.length})
                  </span>
                </span>
              </div>
              <RBar r={courseStudents.length ? checkedInCnt/courseStudents.length*100 : 0} h={8}/>
            </div>
          </Card>
        </div>
      ) : (
        /* ── 수동 입력 모드 ── */
        <Card style={{ overflow:"hidden" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead>
              <tr style={{ background:T.s2 }}>
                {["이름","누적 출석률","당일 출결 입력"].map(h=>(
                  <th key={h} style={{ padding:"10px 16px",
                    textAlign:h==="이름"?"left":"center",
                    fontSize:11, color:T.mu, fontWeight:700,
                    borderBottom:`1px solid ${T.bd}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {courseStudents.map(s=>{
                const cur = manualAtt[s.id] || "O";
                return (
                  <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                    <td style={{ padding:"12px 16px", fontSize:13, fontWeight:700, color:T.tx }}>
                      {s.name}
                      {s.rate<80 && <span style={{ marginLeft:6, fontSize:10, color:T.danger }}>⚠</span>}
                    </td>
                    <td style={{ padding:"12px 16px", textAlign:"center" }}>
                      <div style={{ fontSize:14, fontWeight:800, color:rateColor(s.rate) }}>{s.rate}%</div>
                      <RBar r={s.rate} h={4}/>
                    </td>
                    <td style={{ padding:"12px 16px" }}>
                      <div style={{ display:"flex", gap:5, justifyContent:"center" }}>
                        {Object.entries(ATT_MAP).map(([k,v])=>(
                          <button key={k}
                            onClick={()=>setManualAtt(p=>({...p,[s.id]:k}))}
                            style={{ width:46, height:30, border:"none", borderRadius:6,
                              cursor:"pointer", fontSize:11, fontWeight:700, transition:"all .15s",
                              background: cur===k ? v.color : T.s2,
                              color: cur===k ? "#fff" : T.mu }}>
                            {v.label}
                          </button>
                        ))}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          
          {/* 수동 입력 저장 버튼 */}
          <div style={{ padding:"14px 18px", borderTop:`1px solid ${T.bd}`, 
            display:"flex", gap:10, justifyContent:"flex-end", alignItems:"center" }}>
            <div style={{ fontSize:11, color:T.mu }}>
              {Object.keys(manualAtt).length}명 입력됨
            </div>
            <Btn onClick={async ()=>{
              if(Object.keys(manualAtt).length === 0) {
                alert("입력된 출결이 없습니다");
                return;
              }
              try {
                const now = new Date();
                const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                
                // 수동 입력은 입실 기록으로 저장
                const records = Object.entries(manualAtt).map(([studentId, status]) => ({
                  student_id: parseInt(studentId),
                  date: date,
                  type: 'in',
                  time: time,
                  status: status, // O, L, A, E
                  created_at: now.toISOString()
                }));

                const { error } = await sbInsert("attendance", records);
                if (error) throw error;

                alert(`✅ ${records.length}명 출결 저장 완료`);
                setManualAtt({});
                // DB 트리거가 없는 환경을 위한 클라이언트 폴백: 해당 과정 rate 재조회
                if (onRatesUpdated) onRatesUpdated(course.id);
              } catch(err) {
                alert("저장 오류: " + (err.message || JSON.stringify(err)));
              }
            }}>
              <Icon n="check" s={13}/>
              출결 저장
            </Btn>
          </div>
        </Card>
      )}
    </div>
  );
};

const CompletionMgmt = ({ students, courses }) => {
  const [course, setCourse] = useState(courses[3] || courses[0]);
  const [threshold, setThr] = useState(80);
  const [overrides, setOvr] = useState({});
  const list = students.filter(s=>s.cid===course.id);
  const get  = s => overrides[s.id] ?? (s.rate>=threshold?"수료":"미수료");
  const completed = list.filter(s=>get(s)==="수료").length;
  const rate = list.length ? Math.round(completed/list.length*100) : 0;

  return (
    <div className="page">
      <SectionHead title="수료 관리" sub="출석률 기준 자동 판정 · 담당자 수동 조정 가능"/>

      <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap" }}>
        {courses.map(c=>(
          <button key={c.id} onClick={()=>setCourse(c)} style={{
            padding:"6px 13px", borderRadius:20, border:"none", cursor:"pointer",
            fontSize:11, fontWeight:600, whiteSpace:"nowrap",
            background: course.id===c.id ? c.cc : T.s3,
            color: course.id===c.id ? "#fff" : T.mu }}>
            {shortCourseName(c.name)}
          </button>
        ))}
      </div>

      {/* 컨트롤 */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:12, marginBottom:18 }}>
        <Card style={{ padding:"16px 20px", display:"flex", gap:20, alignItems:"center" }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:11, color:T.mu, marginBottom:6, fontWeight:600 }}>수료 기준 출석률</div>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <input type="range" min={60} max={95} step={5} value={threshold}
                onChange={e=>setThr(+e.target.value)}
                style={{ flex:1, accentColor:T.p }}/>
              <span style={{ fontSize:26, fontWeight:900, color:T.p, minWidth:52 }}>{threshold}%</span>
            </div>
            <div style={{ fontSize:10, color:T.mu }}>※ 매뉴얼 기준: 총 교육시간의 80% 이상</div>
          </div>
          <Btn onClick={()=>{
            const j={};
            list.forEach(s=>{ j[s.id]=s.rate>=threshold?"수료":"미수료"; });
            setOvr(j);
          }}>자동 판정</Btn>
        </Card>
        <Card style={{ padding:"16px 22px", textAlign:"center" }}>
          <div style={{ fontSize:11, color:T.mu }}>수료율</div>
          <div style={{ fontSize:32, fontWeight:900, color:rate>=90?T.p:T.danger, lineHeight:1.1 }}>{rate}%</div>
          <div style={{ fontSize:11, color:T.mu }}>{completed}/{list.length}명</div>
          <Chip label={rate>=90?"목표달성":"목표미달"} bg={rate>=90?T.pbg:"#FEF2F2"} color={rate>=90?T.p:T.danger} size={10}/>
        </Card>
        <Card style={{ padding:"16px 22px" }}>
          <div style={{ fontSize:11, color:T.mu }}>과정 목표</div>
          <div style={{ fontSize:16, fontWeight:800, color:T.tx, marginTop:4 }}>{course.cGoal}명 수료</div>
          <div style={{ fontSize:11, color:T.mu, marginTop:2 }}>{course.eGoal}명 취업 목표</div>
        </Card>
      </div>

      <Card style={{ overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.s2 }}>
              {["이름","출석률","자동판정","최종결과","비고"].map(h=>(
                <th key={h} style={{ padding:"10px 16px",
                  textAlign:h==="이름"?"left":"center",
                  fontSize:11, color:T.mu, fontWeight:700,
                  borderBottom:`1px solid ${T.bd}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {list.map(s=>{
              const auto = s.rate>=threshold?"수료":"미수료";
              const final = get(s);
              const changed = overrides[s.id]!==undefined && overrides[s.id]!==auto;
              return (
                <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                  <td style={{ padding:"12px 16px", fontSize:13, fontWeight:700, color:T.tx }}>{s.name}</td>
                  <td style={{ padding:"12px 16px", textAlign:"center" }}>
                    <span style={{ fontSize:15, fontWeight:800, color:rateColor(s.rate) }}>{s.rate}%</span>
                    <RBar r={s.rate} h={3}/>
                  </td>
                  <td style={{ padding:"12px 16px", textAlign:"center" }}>
                    <Chip label={auto} bg={auto==="수료"?T.pbg:"#FEF2F2"} color={auto==="수료"?T.p:T.danger}/>
                  </td>
                  <td style={{ padding:"12px 16px" }}>
                    <div style={{ display:"flex", gap:6, justifyContent:"center" }}>
                      {["수료","미수료"].map(v=>(
                        <button key={v} onClick={()=>setOvr(p=>({...p,[s.id]:v}))} style={{
                          padding:"5px 14px", border:"none", borderRadius:6,
                          cursor:"pointer", fontWeight:700, fontSize:12, transition:"all .15s",
                          background: final===v?(v==="수료"?T.p:T.danger):"#F1F5F9",
                          color: final===v?"#fff":T.mu }}>
                          {v}
                        </button>
                      ))}
                    </div>
                  </td>
                  <td style={{ padding:"12px 16px", textAlign:"center", fontSize:11 }}>
                    {changed && <Chip label="수동조정" bg="#FFFBEB" color={T.warn}/>}
                    {s.rate<60 && <Chip label="1년 제한 검토" bg="#FEF2F2" color={T.danger} size={10}/>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

const printCertificate = (s, c, certNo, issueDate) => {
  const birthFmt = s.birth

const printAttendCert = (s, c, certNo, issueDate) => {
  const birthFmt = s.birth
    ? s.birth.replace(/(\d{4})-(\d{2})-(\d{2})/, "$1. $2. $3")
    : "　　. 　. 　";

  // 수강기간 포맷: "2026. 3. 2 ~ 5. 30 / 매주 월·화·목 09:00 ~ 13:00"
  const periodLine = (() => {
    const fmtDate = d => d ? d.replace(/(\d{4})-(\d{2})-(\d{2})/, (_, y, m, day) =>
      `${y}. ${String(+m)}. ${String(+day)}`) : "　　. 　. 　";
    const p = (c.dateFrom || c.dateTo)
      ? `${fmtDate(c.dateFrom)} ~ ${fmtDate(c.dateTo)}`
      : (c.period || "　　. 　. 　 ~ 　　. 　. 　");
    const days  = c.schedDays     || "";
    const tFrom = c.schedTimeFrom || "";
    const tTo   = c.schedTimeTo   || "";
    const dayStr  = days        ? ` / 매주 ${days}` : "";
    const timeStr = (tFrom&&tTo) ? ` ${tFrom} ∼ ${tTo}` : "";
    return p + dayStr + timeStr;
