    /* ═══════════════════════════════════════════════════════════

    ═══════════════════════════════════════════════════════════ */

    function StudentManager({ students, setStudents, courses }) {
      const [search, setSearch] = useState("");
      const [cFilter, setCFilter] = useState(0);
      const [tab, setTab] = useState("list");
      const fileRef = useRef();

      const filtered = useMemo(() => students.filter(s => {
        if (cFilter && s.cid !== cFilter) return false;
        if (search && !s.name.includes(search) && !s.phone.includes(search)) return false;
        return true;
      }), [students, cFilter, search]);

      const handleExcelImport = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = evt => {
          const wb = XLSX.read(new Uint8Array(evt.target.result), { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
          const newStudents = rows.map((r, i) => ({
            id: Date.now() + i,
            cid: courses[0]?.id || 1,
            name: r["이름"] || "",
            gender: r["성별"] || "남",
            birth: r["생년월일"] || "",
            idBack: r["주민번호뒷자리"] || "",
            phone: r["연락처"] || "",
            addrCity: r["거주시"] || "",
            edu: r["최종학력"] || "",
            major: r["전공"] || "",
            career: r["경력"] || "",
            unemployment: r["실업급여수급"] === "Y",
            disabled: r["장애여부"] === "Y",
            veteran: r["보훈여부"] === "Y",
            itvDate: r["면접일자"] || "",
            itvScore: parseInt(r["면접점수"]) || 0,
            itvGrade: r["면접등급"] || "",
            itvPass: r["합격여부"] === "Y",
            memo: r["특이사항"] || "",
            rate: Math.round(60 + Math.random() * 40)
          }));
          if (window.confirm(`${newStudents.length}명을 등록하시겠습니까?`)) {
            setStudents([...students, ...newStudents]);
            alert("✅ 등록 완료!");
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleExcelExport = () => {
        const data = filtered.map(s => ({
          "이름": s.name,
          "성별": s.gender,
          "생년월일": s.birth,
          "연락처": s.phone,
          "과정": courses.find(c => c.id === s.cid)?.name || "",
          "출석률(%)": s.rate,
          "상태": s.rate >= 80 ? "수료" : "진행중"
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "훈련생명부");
        XLSX.writeFile(wb, `훈련생명부_${new Date().toISOString().slice(0, 10)}.xlsx`);
      };

      return (
        <div>
          <SectionHead
            title="훈련생 관리"
            sub={`총 ${students.length}명`}
            right={
              <div style={{ display: "flex", gap: 8 }}>
                <input
                  ref={fileRef}
                  type="file"
                  accept=".xlsx,.xls"
                  onChange={handleExcelImport}
                  style={{ display: "none" }}
                />
                <Btn onClick={() => fileRef.current?.click()} variant="ghost" size="sm">
                  <Icon n="upload" s={14} />엑셀 등록
                </Btn>
                <Btn onClick={handleExcelExport} variant="ghost" size="sm">
                  <Icon n="download" s={14} />다운로드
                </Btn>
              </div>
            }
          />

          {/* Search & Filter */}
          <Card style={{ padding: 14, marginBottom: 16, display: "flex", gap: 10, alignItems: "center" }}>
            <div style={{ position: "relative", flex: 1, maxWidth: 300 }}>
              <Icon n="search" s={14} style={{ position: "absolute", left: 8, top: "50%", transform: "translateY(-50%)", opacity: 0.5 }} />
              <input
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="이름·연락처 검색…"
                style={{
                  width: "100%",
                  paddingLeft: 32,
                  padding: "8px",
                  border: `1px solid ${THEME.border}`,
                  borderRadius: 8,
                  fontSize: 12,
                  outline: "none"
                }}
              />
            </div>
            <select
              value={cFilter}
              onChange={e => setCFilter(parseInt(e.target.value))}
              style={{
                padding: "8px 10px",
                border: `1px solid ${THEME.border}`,
                borderRadius: 8,
                fontSize: 12,
                outline: "none",
                cursor: "pointer"
              }}
            >
              <option value={0}>전체 과정</option>
              {courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <div style={{ fontSize: 12, fontWeight: 700, color: THEME.muted }}>
              {filtered.length}명
            </div>
          </Card>

          {/* Student Table */}
          <Card style={{ overflow: "hidden" }}>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 800 }}>
                <thead>
                  <tr style={{ background: THEME.bgTertiary, borderBottom: `1px solid ${THEME.border}` }}>
                    {["이름", "성별", "생년월일", "연락처", "과정", "출석률", "상태"].map(h => (
                      <th key={h} style={{
                        padding: 12,
                        fontSize: 11,
                        fontWeight: 700,
                        color: THEME.muted,
                        textAlign: "left",
                        whiteSpace: "nowrap"
                      }}>
                        {h}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((s, i) => {
                    const c = courses.find(x => x.id === s.cid);
                    return (
                      <tr key={s.id} style={{
                        borderBottom: `1px solid ${THEME.border}`,
                        background: i % 2 === 0 ? THEME.bg : THEME.bgSecond
                      }}>
                        <td style={{ padding: 12, fontSize: 12, fontWeight: 700, color: THEME.text }}>
                          {s.name}
                        </td>
                        <td style={{ padding: 12, fontSize: 12, color: THEME.muted }}>
                          {s.gender}
                        </td>
                        <td style={{ padding: 12, fontSize: 12, color: THEME.muted }}>
                          {s.birth}
                        </td>
                        <td style={{ padding: 12, fontSize: 12, color: THEME.muted }}>
                          {s.phone}
                        </td>
                        <td style={{ padding: 12, fontSize: 11, fontWeight: 600, color: c?.cc }}>
                          {c?.code}
                        </td>
                        <td style={{ padding: 12, fontSize: 12, fontWeight: 800, color: s.rate >= 80 ? THEME.success : s.rate >= 60 ? THEME.warning : THEME.danger }}>
                          {s.rate}%
                        </td>
                        <td style={{ padding: 12 }}>
                          <Chip
                            label={s.rate >= 80 ? "수료" : "진행"}
                            bg={s.rate >= 80 ? THEME.primaryBg : THEME.bgTertiary}
                            tx={s.rate >= 80 ? THEME.primary : THEME.muted}
                            size="10px"
                          />
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════════════
       9️⃣ REMAINING MODULES (Stub)
    ═══════════════════════════════════════════════════════════ */

    function InstructorManager() {
      return (
        <div>
          <SectionHead title="강사 관리" sub="개발 중입니다" />
          <Card style={{ padding: 40, textAlign: "center", color: THEME.muted }}>
            강사관리 모듈 - 개발 진행 중
          </Card>
        </div>
      );
    }

    function RoomManager() {
      return (
        <div>
          <SectionHead title="강의실 관리" sub="개발 중입니다" />
          <Card style={{ padding: 40, textAlign: "center", color: THEME.muted }}>
            강의실관리 모듈 - 개발 진행 중
          </Card>
        </div>
      );
    }

    function AttendanceManager() {
      return (
        <div>
          <SectionHead title="출결 관리" sub="QR 코드 및 수동 입력" />
          <Card style={{ padding: 40, textAlign: "center", color: THEME.muted }}>
            출결관리 모듈 - QR 코드 시스템 개발 진행 중
          </Card>
        </div>
      );
    }

    function CompletionManager() {
      return (
        <div>
          <SectionHead title="수료 관리" sub="자동 판정 및 통계" />
          <Card style={{ padding: 40, textAlign: "center", color: THEME.muted }}>
            수료관리 모듈 - 개발 진행 중
          </Card>
        </div>
      );
    }

    function CertificateManager() {
      return (
        <div>
          <SectionHead title="증명서 발급" sub="수료증 및 수강증명서" />
          <Card style={{ padding: 40, textAlign: "center", color: THEME.muted }}>
            증명서발급 모듈 - A4 인쇄 시스템 개발 진행 중
          </Card>
        </div>
      );
    }

    function AccountManager() {
      return (
        <div>
          <SectionHead title="계정 관리" sub="권한 및 감사로그" />
          <Card style={{ padding: 40, textAlign: "center", color: THEME.muted }}>
            계정관리 모듈 - 개발 진행 중
          </Card>
        </div>
      );
    }

    // Render App
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
