<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>경기북부 직업교육 학사관리시스템</title>
  <meta name="description" content="경기도일자리재단 북부사업본부 북부교육팀 학사관리"/>

  <!-- Pretendard 폰트 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (JSX → JS 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- XLSX (엑셀 내보내기) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8F9FA;
      -webkit-font-smoothing: antialiased;
    }
    /* 로딩 스피너 (Babel 컴파일 전 표시) */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #7C2D12, #EA580C, #FFF7ED);
      font-family: 'Pretendard', sans-serif;
      z-index: 9999;
    }
    #loading .icon { font-size: 48px; margin-bottom: 16px; animation: pulse 1.5s ease infinite; }
    #loading .msg  { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    #loading .sub  { font-size: 12px; color: rgba(255,255,255,.6); }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  </style>
</head>
<body>
  <!-- 로딩 화면 (앱 렌더링 전) -->
  <div id="loading">
    <div class="icon">🎓</div>
    <div class="msg">경기북부 학사관리시스템</div>
    <div class="sub">시스템을 준비하는 중입니다…</div>
  </div>

  <!-- React 앱 마운트 포인트 -->
  <div id="root"></div>

  <!-- JSX 앱 (Babel이 브라우저에서 컴파일) -->
  <script type="text/babel" src="./경기북부_학사관리_v3.jsx" data-type="module" defer></script>

  <script>
    // 앱 로드되면 로딩 화면 제거
    window.addEventListener('load', function() {
      setTimeout(function() {
        var l = document.getElementById('loading');
        if (l) { l.style.opacity = '0'; l.style.transition = 'opacity .4s'; setTimeout(function(){ l.remove(); }, 400); }
      }, 800);
    });
  </script>
</body>
</html>
