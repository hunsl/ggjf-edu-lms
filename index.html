    const Dashboard = ({ students, courses }) => {
      const totalTgt = courses.reduce((a, b) => a + b.tgt, 0);
      const totalCG = courses.reduce((a, b) => a + b.cGoal, 0);
      const totalEG = courses.reduce((a, b) => a + b.eGoal, 0);
      const avgRate = students.length ? (students.reduce((a, b) => a + b.rate, 0) / students.length).toFixed(1) : 0;
      const atRisk = students.filter(s => s.rate < 80);

      return (
        <div className="page">
          <div className="section-head">
            <div>
              <div className="section-title">📊 대시보드</div>

            {[
              { label: "총 모집 목표", val: `${totalTgt}명`, sub: `${courses.length}개 과정`, icon: "people", color: "#EA580C" },
              { label: "수료 목표", val: `${totalCG}명`, sub: "90% 기준", icon: "check", color: "#059669" },
              { label: "취업 목표", val: `${totalEG}명`, sub: "65% 기준", icon: "award", color: "#D97706" },
              { label: "위험 훈련생", val: `${atRisk.length}명`, sub: "출석률 80% 미만", icon: "alert", color: "#DC2626" },
              { label: "평균 출석률", val: `${avgRate}%`, sub: "전체 훈련생", icon: "cal", color: "#2563EB" },
            ].map((kpi, i) => (
              <Card key={i} style={{ padding: 24, display: "flex", gap: 16, alignItems: "flex-start" }}>
                <div style={{ width: 50, height: 50, borderRadius: 12, background: `${kpi.color}15`, color: kpi.color, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <Icon name={kpi.icon} size={24} color={kpi.color} />
                </div>
                <div>
                  <div style={{ fontSize: 26, fontWeight: 900, color: "#1E293B" }}>{kpi.val}</div>
                  <div style={{ fontSize: 12, color: "#64748B", marginTop: 4 }}>{kpi.label}</div>
                  <div style={{ fontSize: 11, color: kpi.color, marginTop: 2, fontWeight: 700 }}>{kpi.sub}</div>
                </div>
              </Card>
            ))}
          </div>

          {/* 분야별 현황 */}
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20 }}>
            <Card style={{ padding: 28 }}>
              <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 20, display: "flex", gap: 8, alignItems: "center" }}>
                <Icon name="book" size={18} /> 분야별 과정
              </div>
              {(() => {
                const cats = {};
                courses.forEach(c => {
                  if (!cats[c.cat]) cats[c.cat] = { color: c.cc, cnt: 0, tgt: 0 };
                  cats[c.cat].cnt++;
                  cats[c.cat].tgt += c.tgt;
                });
                return Object.entries(cats).map(([cat, info]) => (
                  <div key={cat} style={{ marginBottom: 18 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#1E293B" }}>{cat}</span>
                      <span style={{ fontSize: 11, color: "#64748B" }}>{info.cnt}개 · {info.tgt}명</span>
                    </div>
                    <RBar rate={(info.tgt / totalTgt) * 100} height={8} />
                  </div>
                ));
              })()}
            </Card>

            {/* 위험 훈련생 */}
            <Card style={{ padding: 28 }}>
              <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 16, display: "flex", gap: 8, alignItems: "center" }}>
                <Icon name="alert" size={18} /> 위험군
              </div>
              {atRisk.length === 0 ? (
                <div style={{ textAlign: "center", padding: 24, color: "#64748B" }}>안전합니다 🎉</div>
              ) : (
                atRisk.sort((a, b) => a.rate - b.rate).map(s => {
                  const c = courses.find(x => x.id === s.cid);
                  return (
                    <div key={s.id} style={{ padding: 12, marginBottom: 8, borderRadius: 8, background: s.rate < 70 ? "#FEF2F2" : "#FFFBEB", border: `1px solid ${s.rate < 70 ? "#FECACA" : "#FDE68A"}` }}>

                      <div style={{ fontSize: 13, fontWeight: 800, color: s.rate < 70 ? "#DC2626" : "#D97706", marginTop: 4 }}>{s.rate}%</div>
                    </div>
                  );
                })
              )}
            </Card>
          </div>
        </div>
      );
    };

                  fontSize: 12,
                  fontWeight: 700,
                  background: filter === cat ? "#EA580C" : "#F1F5F9",
                  color: filter === cat ? "#fff" : "#64748B",
                }}
              >
                {cat}
              </button>
            ))}
          </div>

          {/* 과정 카드 */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
            {list.map(course => (
              <Card key={course.id} style={{ padding: 20, borderLeft: `4px solid ${course.cc}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                  <div>
                    <Chip label={course.cat} type="info" />
                    <div style={{ fontSize: 14, fontWeight: 800, color: "#1E293B", marginTop: 8, lineHeight: 1.4 }}>{course.name}</div>
                  </div>
                  <button style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18 }}>⋯</button>
                </div>
                <div style={{ fontSize: 12, color: "#64748B", marginBottom: 12 }}>
                  {course.code} · {course.period || "미정"} · {course.hours || 0}시간
                  {course.schedDays && <div>📅 {course.schedDays}</div>}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  {[{ l: "교육목표", v: course.tgt }, { l: "수료목표", v: course.cGoal }, { l: "취업목표", v: course.eGoal }].map(x => (
                    <div key={x.l} style={{ textAlign: "center", padding: 8, background: "#F1F5F9", borderRadius: 8 }}>
                      <div style={{ fontSize: 16, fontWeight: 800, color: "#1E293B" }}>{x.v}</div>
                      <div style={{ fontSize: 10, color: "#64748B" }}>{x.l}</div>
                    </div>
                  ))}
                </div>
              </Card>
            ))}
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       👥 STUDENTS PAGE
    ═══════════════════════════════════════════════════════════ */
    const StudentsPage = ({ students, setStudents, courses }) => {
      const [search, setSearch] = useState("");
      const [filter, setFilter] = useState(0);
      const [riskOnly, setRiskOnly] = useState(false);

      const filtered = students.filter(s => {
        if (filter && s.cid !== filter) return false;
        if (riskOnly && s.rate >= 80) return false;
        if (search && !s.name.includes(search)) return false;
        return true;
      });

      return (
        <div className="page">
          <div className="section-head">
            <div>
              <div className="section-title">👥 훈련생관리</div>
              <div className="section-sub">총 {students.length}명</div>
            </div>
            <Btn variant="primary">+ 신규 등록</Btn>
          </div>

          {/* 필터 */}
          <Card style={{ padding: 14, marginBottom: 20, display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
            <input
              type="text"
              placeholder="이름 검색..."
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={{ flex: 1, minWidth: 180, padding: 8 }}
            />
            <select value={filter} onChange={e => setFilter(Number(e.target.value))} style={{ padding: 8, borderRadius: 8 }}>
              <option value={0}>전체 과정</option>
              {courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <button
              onClick={() => setRiskOnly(!riskOnly)}
              style={{
                padding: "8px 14px",
                borderRadius: 8,
                border: `1px solid ${riskOnly ? "#DC2626" : "#E2E8F0"}`,
                background: riskOnly ? "#FEF2F2" : "transparent",
                color: riskOnly ? "#DC2626" : "#64748B",
                cursor: "pointer",
                fontSize: 12,
                fontWeight: 700,
              }}
            >
              {riskOnly ? "⚠️ 위험군만" : "모든 훈련생"}
            </button>
          </Card>

          {/* 테이블 */}
          <Card style={{ overflow: "auto" }}>
            <table>
              <thead>
                <tr>
                  <th>이름</th>
                  <th>과정</th>
                  <th>연락처</th>
                  <th>나이</th>
                  <th>출석률</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(s => {
                  const c = courses.find(x => x.id === s.cid);
                  const age = new Date().getFullYear() - new Date(s.birth).getFullYear();
                  return (
                    <tr key={s.id} className="row-hover">
                      <td style={{ fontWeight: 700 }}>{s.name}</td>
                      <td>{c?.name}</td>
                      <td>{s.phone}</td>
                      <td>{age}세</td>
                      <td>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <RBar rate={s.rate} height={4} />
                          <span style={{ fontWeight: 700, minWidth: 40 }}>{s.rate}%</span>
                        </div>
                      </td>
                      <td>
                        <Chip label={s.rate >= 80 ? "정상" : s.rate >= 70 ? "주의" : "위험"} type={s.rate >= 80 ? "success" : s.rate >= 70 ? "warn" : "danger"} />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       🎬 RENDER ROOT
    ═══════════════════════════════════════════════════════════ */
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
