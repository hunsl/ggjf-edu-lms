/* ── React hooks (CDN global) ── */
const { useState, useMemo, useEffect, useRef, useCallback } = React;
/* ── XLSX (CDN global) ── */
// XLSX is loaded via CDN script tag in index.html

/* ── 스토리지 안전 래퍼 (Tracking Prevention / 서드파티 쿠키 차단 대응) ──
   Edge/Safari의 Intelligent Tracking Prevention이 cross-origin iframe 환경에서
   sessionStorage/localStorage 접근을 차단할 때 인메모리로 폴백합니다.
   앱 시작 시 probe 쓰기/읽기로 실제 사용 가능 여부를 먼저 검사하고,
   차단된 경우 반복 콘솔 경고 없이 즉시 인메모리로 전환합니다. */
const _mem = {};

// 앱 시작 시 스토리지 실제 읽기/쓰기 가능 여부를 probe로 확인
const _probe = (storage) => {
  if (!storage || typeof storage.setItem !== "function") return false;
  try {
    const k = "__tp_probe__";
    storage.setItem(k, "1");
    const ok = storage.getItem(k) === "1";
    storage.removeItem(k);
    return ok;
  } catch { return false; }
};
// storage 객체가 존재하지 않는 환경(SSR 등)은 즉시 false
const _sessionOk = (typeof sessionStorage !== "undefined") ? _probe(sessionStorage) : false;
const _localOk   = (typeof localStorage  !== "undefined") ? _probe(localStorage)  : false;
// 차단 여부를 외부에서 읽을 수 있도록 공개
const storageBlocked = !_sessionOk || !_localOk;

const safeSession = {
  get:    k => { if(!_sessionOk) return _mem["s_"+k]||null;
    try { return sessionStorage.getItem(k); } catch { return _mem["s_"+k]||null; } },
  set:    (k,v) => { if(!_sessionOk) { _mem["s_"+k]=v; return; }
    try { sessionStorage.setItem(k,v); } catch { _mem["s_"+k]=v; } },
  remove: k => { if(!_sessionOk) { delete _mem["s_"+k]; return; }
    try { sessionStorage.removeItem(k); } catch { delete _mem["s_"+k]; } },
};
const safeLocal = {
  get:    k => { if(!_localOk) return _mem["l_"+k]||null;
    try { return localStorage.getItem(k); } catch { return _mem["l_"+k]||null; } },
  set:    (k,v) => { if(!_localOk) { _mem["l_"+k]=v; return; }
    try { localStorage.setItem(k,v); } catch { _mem["l_"+k]=v; } },
  remove: k => { if(!_localOk) { delete _mem["l_"+k]; return; }
    try { localStorage.removeItem(k); } catch { delete _mem["l_"+k]; } },
};
if (storageBlocked) {
  console.warn(
    "⚠️ [스토리지] 브라우저 추적 방지(Tracking Prevention)로 인해",
    "localStorage/sessionStorage 접근이 차단됐습니다.",
    "인메모리 모드로 동작합니다.",
    "로그인 세션과 감사 로그는 페이지 새로고침 시 초기화됩니다."
  );
}


/* ==========================================================
   ★★★ Supabase 연결 설정 ★★★
   처음 설치 시 아래 두 줄만 본인 Supabase 정보로 교체하세요.
   Supabase 프로젝트 → Settings → API 에서 확인할 수 있습니다.
   ▶ Project URL  : https://xxxx.supabase.co
   ▶ anon public  : eyJhbGci... 로 시작하는 긴 키
========================================================== */
const SB_URL = "https://vqkjakgbrsnsererwmma.supabase.co";  // ← 여기에 Project URL
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxa2pha2dicnNuc2VyZXJ3bW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDA2MjIsImV4cCI6MjA4ODkxNjYyMn0.caGpzJdTcfT3CZTkJi2Mctte3nNvh3e6xTtFVaCfkiM";  // ← 여기에 anon public key
const API   = `${SB_URL}/rest/v1`;
const H     = {
  "apikey":        SB_KEY,
  "Authorization": `Bearer ${SB_KEY}`,
  "Content-Type":  "application/json",
  "Prefer":        "return=representation",
};
const QR_TOKEN_SUFFIX = "2026GJF"; // QR 토큰 서픽스 — 연도 변경 시 이 상수만 수정

/* ── 공통 fetch 래퍼 ── */
const sbGet = async (table, params = "") => {
  const res = await fetch(`${API}/${table}?${params}`, { headers: H });
  const data = await res.json();
  if (!res.ok) return { data: null, error: data };
  return { data, error: null };
};
const sbInsert = async (table, body) => {
  const res = await fetch(`${API}/${table}`, {
    method: "POST", headers: H,
    body: JSON.stringify(Array.isArray(body) ? body : [body]),
  });
  const data = await res.json();
  if (!res.ok) return { data: null, error: data };
  return { data: Array.isArray(body) ? data : data[0], error: null };
};
const sbUpsert = async (table, body, conflictCols = "") => {
  const H2 = { ...H, "Prefer": "resolution=merge-duplicates,return=minimal" };
  const qp = conflictCols ? `?on_conflict=${encodeURIComponent(conflictCols)}` : "";
  const res = await fetch(`${API}/${table}${qp}`, {
    method: "POST", headers: H2,
    body: JSON.stringify(Array.isArray(body) ? body : [body]),
  });
  if (!res.ok) { const data = await res.json(); return { data: null, error: data }; }
  return { data: null, error: null };
};
// 스키마 캐시 오류를 감지하여 더 친절한 안내 메시지로 변환
const fmtSaveError = (err) => {
  const msg = err?.message || JSON.stringify(err);
  if (msg.includes("schema cache") || msg.includes("Could not find")) {
    return `${msg}\n\n💡 해결 방법:\n1. supabase-setup.sql을 Supabase SQL Editor에서 다시 실행하세요.\n2. 그래도 안 되면 Supabase 대시보드 → 설정(Settings) → API → Reload schema 클릭`;
  }
  return msg;
};
const sbUpdate = async (table, filter, body) => {
  const res = await fetch(`${API}/${table}?${filter}`, {
    method: "PATCH", headers: H,
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) return { data: null, error: data };
  return { data, error: null };
};
const sbDelete = async (table, filter) => {
  const res = await fetch(`${API}/${table}?${filter}`, {
    method: "DELETE", headers: H,
  });
  if (!res.ok) { const e = await res.json(); return { error: e }; }
  return { error: null };
};

/* ── Supabase Storage — PDF 업로드 (Base64 대신 URL 저장) ── */
const sbStorageUpload = async (bucket, path, file) => {
  const res = await fetch(`${SB_URL}/storage/v1/object/${bucket}/${path}`, {
    method: "POST",
    headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` },
    body: file,
  });
  if (!res.ok) { const e = await res.json(); return { url: null, error: e }; }
  const publicUrl = `${SB_URL}/storage/v1/object/public/${bucket}/${path}`;
  return { url: publicUrl, error: null };
};

// Excel serial date number → ISO "YYYY-MM-DD" string (or null if empty)
const excelDateToISO = v => {
  if (!v && v !== 0) return null;
  if (typeof v === 'number') {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return d.toISOString().slice(0, 10);
  }
  const s = String(v).trim();
  if (/^\d{8}$/.test(s)) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  return s || null;
};

/* ===========================================================
   QR CODE (로컬 생성 — api.qrserver.com 대신 qrcode-generator CDN 사용)
   Tracking Prevention 오류를 방지하기 위해 canvas에 직접 렌더링
=========================================================== */
const QRCanvas = ({ data, size = 200, color = "#000000", bgColor = "#ffffff", style = {} }) => {
  const canvasRef = useRef(null);
  const [libMissing, setLibMissing] = useState(false);
  useEffect(() => {
    if (!canvasRef.current || !data) return;
    if (typeof window.qrcode !== "function") {
      console.warn("QRCanvas: qrcode-generator 라이브러리를 로드할 수 없습니다. CDN을 확인하세요.");
      setLibMissing(true);
      return;
    }
    try {
      const qr = window.qrcode(0, "M");
      qr.addData(data);
      qr.make();
      const cells = qr.getModuleCount();
      const canvas = canvasRef.current;
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width  = size + "px";
      canvas.style.height = size + "px";
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      const cellSize = size / cells;
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = color;
      for (let r = 0; r < cells; r++) {
        for (let c = 0; c < cells; c++) {
          if (qr.isDark(r, c)) ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
        }
      }
    } catch (e) {
      console.error("QR 생성 오류:", e);
      setLibMissing(true);
    }
  }, [data, size, color, bgColor]);
  if (libMissing) return (
    <div style={{ width:size, height:size, display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center", background:"#F1F5F9",
      borderRadius:8, fontSize:11, color:"#64748B", textAlign:"center", padding:8, ...style }}>
      <div style={{ fontSize:28, marginBottom:4 }}>⚠️</div>
      QR 라이브러리 로드 실패<br/>페이지를 새로고침 하세요
    </div>
  );
  return <canvas ref={canvasRef} style={{ display:"block", borderRadius:8, ...style }} />;
};

// 과정 날짜 범위 내 날짜 배열 생성 (주말 포함, dateFrom~min(dateTo, 오늘))
const buildCourseDates = (course) => {
  // 💡 핵심: toISOString()의 9시간 시차 버그를 막아주는 로컬 날짜 변환 함수
  const getLocalStr = (d) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };

  const dateFrom = course?.dateFrom ?? course?.date_from;
  const dateTo = course?.dateTo ?? course?.date_to;
  const schedDaysRaw = course?.schedDays ?? course?.sched_days;

  // 시작일이 아예 없으면 오늘 날짜 반환 (시차 버그 방지 적용)
  if (!dateFrom) return [getLocalStr(new Date())];

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const start = new Date(dateFrom);
  start.setHours(0, 0, 0, 0);

  // 아직 개강 전이면 시작일만 반환
  if (start > today) return [String(dateFrom).slice(0, 10)];

  const endCandidate = dateTo ? new Date(dateTo) : today;
  endCandidate.setHours(0, 0, 0, 0);
  const end = new Date(Math.min(endCandidate.getTime(), today.getTime()));

  // 요일 파싱: "월"~"일" / "0"~"6" 혼재 지원 (작성하신 훌륭한 로직 유지)
  const DAY_MAP = { 일: 0, 월: 1, 화: 2, 수: 3, 목: 4, 금: 5, 토: 6 };

  const allowedDows =
    schedDaysRaw && String(schedDaysRaw).trim().length
      ? new Set(
          String(schedDaysRaw)
            .split(",")
            .map((s) => s.trim())
            .filter(Boolean)
            .map((s) => (/^[0-6]$/.test(s) ? Number(s) : DAY_MAP[s]))
            .filter((d) => d !== undefined)
        )
      : new Set([1, 2, 3, 4, 5]); // 없으면 기본 평일

  const out = [];
  
  // 💡 잘려있던 반복문 추가 및 시차 버그 없는 getLocalStr 적용
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    if (allowedDows.has(d.getDay())) {
      out.push(getLocalStr(d));
    }
  }

  // 뽑아낸 날짜가 없으면 오늘 날짜 반환
  return out.length ? out : [getLocalStr(today)];
};

// 과정 기간 표시 — date_from/date_to 기반으로 통일 (period 문자열 대체)
// 예: "2026.3.2 ~ 2026.5.29"  (앞자리 0 없음 — 한국 날짜 표기 관례)
const formatCoursePeriod = (c) => {
  if (!c?.dateFrom) return "기간 미정";
  const fmt = d => {
    const [y, m, day] = (d || "").split("-");
    return `${y}.${String(+m)}.${String(+day)}`;
  };
  return c.dateTo ? `${fmt(c.dateFrom)} ~ ${fmt(c.dateTo)}` : `${fmt(c.dateFrom)} ~`;
};

// 과정명 한글 요약 (드롭다운 등에서 간결하게 표시)
const shortCourseName = (name = "", maxLen = 13) => {
  if (!name) return "";
  // 기수 정보 추출 (1기, 2기 등)
  const kiMatch = name.match(/\((\d+기)\)/);
  const ki = kiMatch ? ` (${kiMatch[1]})` : "";
  // 불필요한 단어 제거
  let short = name
    .replace(/\([^)]*\)/g, "")                    // 괄호 내용 제거
    .replace(/전문강사 양성|강사 양성|양성과정|양성|실무자|교육|과정/g, "")
    .replace(/\s{2,}/g, " ")
    .trim();
  if (short.length > maxLen) short = short.slice(0, maxLen) + "…";
  return short + ki;
};

const Dashboard = ({ students, courses }) => {
  const today    = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const tomorrowStr = new Date(today.getTime() + 86400000).toISOString().slice(0,10);

  // ── 내부 데이터 (강사, 강의실, 예약, 오늘 출결) ──
  const [instructors, setInstructors] = useState(SEED_INSTRUCTORS);
  const [dashRooms,    setDashRooms]    = useState(SEED_ROOMS);
  const [bookings,    setBookings2]   = useState([]);
  const [todayAtt,    setTodayAtt]    = useState({}); // { courseId: { present, late, absent, total } }
  const [loadTick,    setLoadTick]    = useState(0);  // 1분마다 재로드

  useEffect(() => {
    let cancelled = false;
    const load = async () => {
      try {
        const [iRes, rRes, bRes] = await Promise.all([
          sbGet("instructors",  "select=*&order=id"),
          sbGet("rooms",        "select=*&order=id"),
          sbGet("room_bookings","select=*&order=id"),
        ]);
        if (!cancelled) {
          if (!iRes.error && iRes.data?.length) setInstructors(iRes.data.map(toInstructor));
          if (!rRes.error && rRes.data?.length) setDashRooms(rRes.data.map(toRoom));
          if (!bRes.error && bRes.data?.length) setBookings2(bRes.data.map(toBooking));
        }
      } catch {}
      // 오늘 출결 로드 (attendance 테이블은 student_id만 가짐 → students prop으로 cid 매핑)
      try {
        const attRes = await sbGet("attendance", `select=student_id,status&date=eq.${todayStr}`);
        if (!cancelled && !attRes.error && attRes.data) {
          const sidToCid = {};
          students.forEach(s => { sidToCid[s.id] = s.cid; });
          const map = {};
          attRes.data.forEach(r => {
            const cid = sidToCid[r.student_id];
            if (!cid) return;
            if (!map[cid]) map[cid] = { present:0, absent:0 };
            if (r.status === "O") map[cid].present++;
            else if (r.status === "A") map[cid].absent++;
          });
          if (!cancelled) setTodayAtt(map);
        }
      } catch {}
    };
    load();
    const timer = setInterval(() => setLoadTick(t => t+1), 60000);
    return () => { cancelled = true; clearInterval(timer); };
  }, [loadTick, students]);

  // ── 파생 데이터 ──
  const DAY_MAP2 = { 일:0, 월:1, 화:2, 수:3, 목:4, 금:5, 토:6 };
  const isTodayClass = (c) => {
    if (!c.dateFrom) return false;
    if (c.dateFrom > todayStr || (c.dateTo && c.dateTo < todayStr)) return false;
    if (!c.schedDays) return today.getDay()>0 && today.getDay()<6;
    const allowed = new Set(c.schedDays.split(",").map(s=>DAY_MAP2[s.trim()]).filter(d=>d!==undefined));
    return allowed.has(today.getDay());
  };
  const liveCourses = courses.filter(isTodayClass);

  const totalTgt = courses.reduce((a,b)=>a+b.tgt,0);
  const avgRate  = students.length ? (students.reduce((a,b)=>a+b.rate,0)/students.length).toFixed(1) : 0;
  const atRisk   = students.filter(s=>s.rate<80);

  const courseProgress = courses.map(c => {
    const cs       = students.filter(s => s.cid === c.id);
    const enrolled = cs.length;
    const avgR     = cs.length ? Math.round(cs.reduce((a,b)=>a+b.rate,0)/cs.length) : 0;
    const isActive = c.dateFrom && c.dateFrom <= todayStr && (!c.dateTo || c.dateTo >= todayStr);
    const status   = isActive ? "진행중" : (c.dateTo && c.dateTo < todayStr) ? "종료" : "예정";
    return { ...c, enrolled, avgR, isActive, status };
  }).sort((a,b) => (a.dateFrom||"9").localeCompare(b.dateFrom||"9") || a.name.localeCompare(b.name));

  const activeCnt = courseProgress.filter(c=>c.isActive).length;

  // ── 요주의 알림 생성 ──
  const alerts = [];
  // 내일 개강하는 과정 중 강의실 배정 없는 과정
  courses.filter(c => c.dateFrom === tomorrowStr).forEach(c => {
    const hasRoom = bookings.some(b => b.courseId===c.id && b.start <= tomorrowStr && b.end >= tomorrowStr);
    if (!hasRoom) alerts.push({ level:"warn", msg:`내일 개강 [${c.name}] 과정에 배정된 강의실이 없습니다.` });
  });
  // 오늘 진행 중인 과정 중 출석률 50% 미만
  liveCourses.forEach(c => {
    const cs = students.filter(s=>s.cid===c.id);
    const att = todayAtt[c.id] || {};
    const confirmed = (att.present||0) + (att.absent||0);
    if (confirmed > 0 && cs.length > 0) {
      const presentPct = Math.round((att.present||0) / cs.length * 100);
      if (presentPct < 50) {
        alerts.push({ level:"danger", msg:`[${c.name}] 오늘 출석률 미달(${presentPct}%) — 미출석 ${cs.length-(att.present||0)}명` });
      }
    }
  });
  // 위험 훈련생 수
  if (atRisk.length > 0) {
    alerts.push({ level:"info", msg:`누적 출석률 80% 미만 수료 위험 훈련생 ${atRisk.length}명` });
  }

  return (
    <div className="page">
      {/* ─── 히어로 배너 ─── */}
      <div className="dash-hero" style={{
        background:"linear-gradient(135deg,#7C2D12 0%,#9A3412 25%,#EA580C 60%,#F97316 100%)",
        borderRadius:18, padding:"22px 28px", marginBottom:20, position:"relative",
        overflow:"hidden", color:"#fff",
        boxShadow:"0 8px 32px rgba(234,88,12,.35)",
        animation:"heroGlow 4s ease-in-out infinite" }}>
        <div style={{ position:"absolute",top:-40,right:-40,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,.07)",pointerEvents:"none" }}/>
        <div style={{ position:"absolute",bottom:-50,right:100,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,.05)",pointerEvents:"none" }}/>
        <div style={{ position:"relative" }}>
          <div style={{ fontSize:10,fontWeight:700,letterSpacing:2.5,opacity:.7,marginBottom:5,textTransform:"uppercase" }}>
            경기도일자리재단 북부사업본부 북부교육팀
          </div>
          <div style={{ fontSize:22,fontWeight:900,letterSpacing:"-.5px" }}>일일 운영 컨트롤 타워</div>
          <div style={{ display:"flex",gap:16,marginTop:8,flexWrap:"wrap" }}>
            <span style={{ fontSize:11,opacity:.8 }}>📅 {todayStr} 기준</span>
            <span style={{ fontSize:11,opacity:.8 }}>📚 {courses.length}개 과정 운영</span>
            <span style={{ fontSize:11,opacity:.8 }}>👥 훈련생 {students.length}명</span>
            {liveCourses.length > 0 && <span style={{ fontSize:11,background:"rgba(255,255,255,.2)",borderRadius:20,padding:"1px 10px",fontWeight:700 }}>오늘 {liveCourses.length}개 강의 진행중</span>}
          </div>
        </div>
      </div>

      {/* ══════════════════════════════════════════
          🟢 1구역: 오늘의 라이브 강의 현황
      ══════════════════════════════════════════ */}
      <Card style={{ padding:22, marginBottom:16 }}>
        <div style={{ fontSize:13, fontWeight:700, color:T.tx, marginBottom:14, display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ width:10, height:10, borderRadius:"50%", background:"#22C55E",
            boxShadow:"0 0 0 3px #22C55E40", display:"inline-block", animation:"heroGlow 2s infinite" }}/>
          오늘의 라이브 강의 현황
          <span style={{ marginLeft:"auto", fontSize:10, color:T.mu }}>실시간 · 1분마다 갱신</span>
        </div>
        {liveCourses.length === 0 ? (
          <div style={{ textAlign:"center", color:T.mu, padding:"32px 0", fontSize:13 }}>
            오늘({todayStr}) 진행 중인 강의가 없습니다.
          </div>
        ) : (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))", gap:14 }}>
            {liveCourses.map(c => {
              const cs        = students.filter(s=>s.cid===c.id);
              const total     = cs.length;
              const att       = todayAtt[c.id] || {};
              const present   = att.present  || 0;
              const absent    = att.absent   || 0;
              const unconfirmed = Math.max(0, total - present - absent);
              const pPct = total > 0 ? Math.round(present / total * 100) : 0;
              // 담당 강사
              const courseInst = instructors.filter(i => (i.cids||[]).includes(c.id));
              // 배정 강의실
              const booking = bookings.find(b => b.courseId===c.id && b.start <= todayStr && b.end >= todayStr);
              const room    = booking ? dashRooms.find(r=>r.id===booking.roomId) : null;
              return (
                <div key={c.id} style={{
                  border:`1.5px solid ${c.cc}30`, borderRadius:14,
                  background:`linear-gradient(145deg,#fff,${c.cc}08)`,
                  padding:"16px 18px", position:"relative", overflow:"hidden" }}>
                  <div style={{ position:"absolute", top:0, left:0, width:4, height:"100%",
                    background:c.cc, borderRadius:"14px 0 0 14px" }}/>
                  <div style={{ marginLeft:8 }}>
                    {/* 과정명 + 시간 */}
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                      <div>
                        <div style={{ fontSize:13, fontWeight:800, color:T.tx }}>{c.name}</div>
                        <div style={{ fontSize:11, color:T.mu, marginTop:1 }}>{c.code}</div>
                      </div>
                      {c.schedTimeFrom && (
                        <span style={{ fontSize:11, fontWeight:700, color:c.cc,
                          background:`${c.cc}15`, borderRadius:8, padding:"3px 9px", whiteSpace:"nowrap", marginLeft:8 }}>
                          {c.schedTimeFrom} ~ {c.schedTimeTo||""}
                        </span>
                      )}
                    </div>
                    {/* 강사 · 강의실 */}
                    <div style={{ display:"flex", gap:8, marginBottom:10, flexWrap:"wrap" }}>
                      <span style={{ fontSize:11, color:T.mu, display:"flex", alignItems:"center", gap:3 }}>
                        <Icon n="people" s={11}/>
                        {courseInst.length > 0
                          ? courseInst.map(i=>`${i.name} ${i.type}`).join(", ")
                          : "강사 미배정"}
                      </span>
                      <span style={{ fontSize:11, color:T.mu, display:"flex", alignItems:"center", gap:3 }}>
                        <Icon n="book" s={11}/>
                        {room ? room.name : "강의실 미배정"}
                      </span>
                    </div>
                    {/* 출결 프로그레스 바 */}
                    <div style={{ fontSize:10, color:T.mu, marginBottom:5, display:"flex", justifyContent:"space-between" }}>
                      <span>오늘 출결 현황 ({total}명)</span>
                      <span style={{ fontWeight:700, color: pPct>=80?T.ok:pPct>=60?T.warn:T.danger }}>{pPct}% 출석</span>
                    </div>
                    <div style={{ display:"flex", height:8, borderRadius:6, overflow:"hidden", background:T.bd, marginBottom:6 }}>
                      {present > 0 && <div style={{ width:`${present/total*100}%`, background:T.ok, transition:"width .4s" }} title={`출석 ${present}명`}/>}
                      {absent  > 0 && <div style={{ width:`${absent/total*100}%`,  background:T.danger, transition:"width .4s" }} title={`결석 ${absent}명`}/>}
                      {unconfirmed > 0 && <div style={{ width:`${unconfirmed/total*100}%`, background:T.bd, transition:"width .4s" }} title={`미확인 ${unconfirmed}명`}/>}
                    </div>
                    <div style={{ display:"flex", gap:10, fontSize:10 }}>
                      {[{l:"출석",v:present,c:T.ok},{l:"결석",v:absent,c:T.danger},{l:"미확인",v:unconfirmed,c:T.mu}].map(({l,v,c:col})=>(
                        <span key={l} style={{ color:col, fontWeight:700 }}>{l} {v}</span>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Card>

      {/* ══════════════════════════════════════════
          🟡 2구역: 통합 KPI + 요주의 알림
      ══════════════════════════════════════════ */}

      {/* 요주의 알림 */}
      {alerts.length > 0 && (
        <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:16 }}>
          {alerts.map((al, i) => {
            const bg    = al.level==="danger"?"#FEF2F2":al.level==="warn"?"#FFFBEB":"#EFF6FF";
            const border= al.level==="danger"?"#FECACA":al.level==="warn"?"#FDE68A":"#BFDBFE";
            const col   = al.level==="danger"?T.danger:al.level==="warn"?"#D97706":T.info;
            const icon  = al.level==="danger"?"alert":al.level==="warn"?"alert":"info";
            return (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:10,
                padding:"11px 16px", borderRadius:10, background:bg, border:`1px solid ${border}` }}>
                <Icon n={icon} s={15} style={{ color:col, flexShrink:0 }}/>
                <span style={{ fontSize:12, color:col, fontWeight:600 }}>⚠ {al.msg}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* KPI 카드 */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10, marginBottom:16 }}>
        {[
          { label:"총 모집 목표", val:`${totalTgt}명`, sub:`${courses.length}개 과정`, icon:"people", color:T.p },
          { label:"이번달 진행중", val:`${activeCnt}개`, sub:"운영 과정 수", icon:"cal", color:T.ok },
          { label:"평균 출석률", val:`${avgRate}%`, sub:"전체 훈련생", icon:"check", color:T.info },
          { label:"수료 위험", val:`${atRisk.length}명`, sub:"출석률 80% 미만", icon:"alert", color:T.danger },
        ].map((k,i) => (
          <div key={i} style={{
            background:T.s, borderRadius:12, border:`1.5px solid ${k.color}20`,
            boxShadow:`0 2px 8px ${k.color}12`, padding:"16px 18px",
            display:"flex", gap:12, alignItems:"center",
            backgroundImage:`linear-gradient(145deg,#fff,${k.color}08)` }}>
            <div style={{ width:40, height:40, borderRadius:11, flexShrink:0,
              background:`linear-gradient(135deg,${k.color}28,${k.color}15)`, color:k.color,
              display:"flex", alignItems:"center", justifyContent:"center" }}>
              <Icon n={k.icon} s={20}/>
            </div>
            <div>
              <div style={{ fontSize:22, fontWeight:900, color:T.tx, lineHeight:1 }}>{k.val}</div>
              <div style={{ fontSize:10, color:T.mu, marginTop:3 }}>{k.label}</div>
              {k.sub && <div style={{ fontSize:9, color:k.color, fontWeight:700 }}>{k.sub}</div>}
            </div>
          </div>
        ))}
      </div>

      {/* 위험 훈련생 */}
      {atRisk.length > 0 && (
        <Card style={{ padding:20, marginBottom:16 }}>
          <div style={{ fontSize:13, fontWeight:700, color:T.tx, marginBottom:12, display:"flex", gap:8, alignItems:"center" }}>
            <Icon n="alert" s={15}/> 수료 위험 훈련생
            <span style={{ marginLeft:"auto", fontSize:10, color:T.mu }}>출석률 80% 미만</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:8 }}>
            {atRisk.sort((a,b)=>a.rate-b.rate).map(s => {
              const c = courses.find(x=>x.id===s.cid);
              return (
                <div key={s.id} style={{ display:"flex", gap:10, alignItems:"center",
                  padding:"9px 11px", borderRadius:8,
                  background: s.rate<70?"#FEF2F2":"#FFFBEB",
                  border:`1px solid ${s.rate<70?"#FECACA":"#FDE68A"}` }}>
                  <div style={{ width:36, height:36, borderRadius:8, flexShrink:0,
                    background: s.rate<70?"#FEE2E2":"#FEF3C7",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    fontSize:12, fontWeight:900, color:s.rate<70?T.danger:T.warn }}>
                    {s.rate}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12, fontWeight:700, color:T.tx }}>{s.name}</div>
                    <div style={{ fontSize:10, color:T.mu, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c?.name}</div>
                  </div>
                  <Chip label={s.rate<70?"위험":"주의"} bg={s.rate<70?"#FEE2E2":"#FEF3C7"} color={s.rate<70?T.danger:T.warn}/>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* ══════════════════════════════════════════
          🔵 3구역: 전체 개설 과정 진행률
      ══════════════════════════════════════════ */}
      <Card style={{ padding:22, marginBottom:14 }}>
        <div style={{ fontSize:13, fontWeight:700, color:T.tx, marginBottom:14, display:"flex", gap:8, alignItems:"center" }}>
          <Icon n="cal" s={15}/> 전체 개설 과정 진행률
          <span style={{ marginLeft:6, fontSize:11, fontWeight:600, color:T.p,
            background:T.pbg, border:`1px solid #FDBA74`, borderRadius:10, padding:"2px 8px" }}>
            진행중 {activeCnt}개
          </span>
          <span style={{ marginLeft:"auto", fontSize:10, color:T.mu }}>교육기간 · 모집/훈련생 수</span>
        </div>
        {courseProgress.length === 0
          ? <div style={{ textAlign:"center", color:T.mu, padding:"24px 0", fontSize:13 }}>등록된 과정이 없습니다.</div>
          : (
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead>
                  <tr style={{ borderBottom:`2px solid ${T.bd}` }}>
                    {["분야","과정명","교육기간","모집목표","등록","출석률","강사","강의실","상태"].map(h => (
                      <th key={h} style={{ padding:"7px 10px", textAlign:"left", fontSize:10,
                        color:T.mu, fontWeight:700, whiteSpace:"nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {courseProgress.map((c) => {
                    const fillPct   = c.tgt > 0 ? Math.min(100, Math.round(c.enrolled/c.tgt*100)) : 0;
                    const stColor   = c.status==="진행중"?T.ok:c.status==="종료"?T.mu:T.info;
                    const stBg      = c.status==="진행중"?"#F0FDF4":c.status==="종료"?T.s2:"#EFF6FF";
                    const courseInst= instructors.filter(i=>(i.cids||[]).includes(c.id));
                    const bk        = bookings.find(b=>b.courseId===c.id && b.start<=todayStr && b.end>=todayStr);
                    const roomName  = bk ? (dashRooms.find(r=>r.id===bk.roomId)?.name||"") : "";
                    return (
                      <tr key={c.id} style={{ borderBottom:`1px solid ${T.bd}`,
                        background: c.isActive ? `${T.pbg}60` : "transparent" }}>
                        <td style={{ padding:"9px 10px" }}>
                          <span style={{ display:"inline-block", width:8, height:8, borderRadius:2,
                            background:c.cc, marginRight:5 }}/>
                          <span style={{ fontSize:10, color:T.mu }}>{c.cat}</span>
                        </td>
                        <td style={{ padding:"9px 10px", fontWeight:700, color:T.tx, maxWidth:180,
                          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                          {c.name}
                          {c.code && <span style={{ marginLeft:5, fontSize:10, color:T.mu,
                            background:T.s3, borderRadius:4, padding:"1px 4px" }}>{c.code}</span>}
                        </td>
                        <td style={{ padding:"9px 10px", color:T.mu, whiteSpace:"nowrap", fontSize:11 }}>
                          {formatCoursePeriod(c)}
                          {c.schedTimeFrom && (
                            <span style={{ display:"block", fontSize:10, color:T.mu }}>
                              {c.schedDays} {c.schedTimeFrom}~{c.schedTimeTo}
                            </span>
                          )}
                        </td>
                        <td style={{ padding:"9px 10px", textAlign:"center" }}>{c.tgt}명</td>
                        <td style={{ padding:"9px 10px" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                            <span style={{ fontWeight:700, color:fillPct>=80?T.ok:fillPct>=50?T.warn:T.danger }}>{c.enrolled}명</span>
                            <div style={{ flex:1, height:5, background:T.bd, borderRadius:3, overflow:"hidden", minWidth:36 }}>
                              <div style={{ height:"100%", width:`${fillPct}%`,
                                background:fillPct>=80?T.ok:fillPct>=50?T.warn:T.danger, borderRadius:3 }}/>
                            </div>
                            <span style={{ fontSize:10, color:T.mu }}>{fillPct}%</span>
                          </div>
                        </td>
                        <td style={{ padding:"9px 10px", textAlign:"center" }}>
                          {c.enrolled > 0
                            ? <span style={{ fontWeight:700, color:c.avgR>=80?T.ok:c.avgR>=70?T.warn:T.danger }}>{c.avgR}%</span>
                            : <span style={{ color:T.mu }}>—</span>}
                        </td>
                        <td style={{ padding:"9px 10px", fontSize:11, color:T.mu, whiteSpace:"nowrap" }}>
                          {courseInst.length>0 ? courseInst.map(i=>i.name).join(", ") : "—"}
                        </td>
                        <td style={{ padding:"9px 10px", fontSize:11, color:T.mu, whiteSpace:"nowrap" }}>
                          {roomName || "—"}
                        </td>
                        <td style={{ padding:"9px 10px" }}>
                          <span style={{ display:"inline-block", padding:"2px 8px", borderRadius:10,
                            fontSize:10, fontWeight:700, color:stColor, background:stBg,
                            border:`1px solid ${stColor}30` }}>
                            {c.status}
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )
        }
      </Card>
    </div>
  );
};

=========================================================== */
const CAT_COLORS = {
  "늘봄강사양성":"#EA580C","지역연계·기여":"#C2410C",
  "사무분야":"#9A3412","식품분야":"#DC2626","IT 신직무":"#F97316",
};
const CAT_LIST = Object.keys(CAT_COLORS);

const CourseModal = ({ course, onSave, onClose, isNew=false }) => {
  const empty = {
    cat:"늘봄강사양성", cc:"#EA580C", name:"", code:"",
    dateFrom:"", dateTo:"", period:"",
    method:"대면", hours:0, tgt:20, cGoal:18, eGoal:12,
    schedDays:"", schedTimeFrom:"09:00", schedTimeTo:"13:00",
    links:[], notes:"", pdfName:"", pdfData:""
  };
  const [form, setForm] = useState(course ? {
    ...course,
    dateFrom: course.dateFrom||"", dateTo: course.dateTo||"",
    links: course.links||[], notes: course.notes||"",
    pdfName: course.pdfName||"", pdfData: course.pdfData||"",
    schedDays: course.schedDays||"", schedTimeFrom: course.schedTimeFrom||"09:00", schedTimeTo: course.schedTimeTo||"13:00"
  } : empty);
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const inp = { width:"100%", padding:"8px 10px", border:`1px solid ${T.bd}`,
    borderRadius:8, fontSize:12, outline:"none", color:T.tx, background:T.s2 };
  const pdfRef = useRef();

  // 링크 관리
  const addLink   = () => set("links", [...(form.links||[]), {label:"", url:""}]);
  const updLink   = (i,k,v) => set("links", form.links.map((l,idx)=>idx===i?{...l,[k]:v}:l));
  const delLink   = i => set("links", form.links.filter((_,idx)=>idx!==i));

  // PDF 업로드 — Supabase Storage에 파일 저장 후 URL만 form에 저장
  const PDF_MAX_BYTES = 10 * 1024 * 1024; // 10MB
  const [pdfUploading, setPdfUploading] = useState(false);
  const onPdfUpload = async e => {
    const f = e.target.files[0];
    if(!f) return;
    if(f.size > PDF_MAX_BYTES) { alert("PDF 용량이 10MB를 초과합니다."); return; }
    setPdfUploading(true);
    // 랜덤 UUID 기반 경로로 path traversal 방지
    const ext = f.name.split(".").pop().toLowerCase().replace(/[^a-z0-9]/g, "") || "pdf";
    const uid = typeof crypto.randomUUID === "function" ? crypto.randomUUID() : Date.now().toString(36);
    const path = `syllabi/${uid}.${ext}`;
    const { url, error } = await sbStorageUpload("course-pdfs", path, f);
    setPdfUploading(false);
    if (error) {
      // Storage 업로드 실패 시 Base64 폴백 (로컬 미리보기용)
      console.warn("Storage 업로드 실패 — Base64 폴백:", error);
      const r = new FileReader();
      r.onload = ev => { set("pdfData", ev.target.result); set("pdfName", f.name); };
      r.readAsDataURL(f);
      return;
    }
    set("pdfData", url);
    set("pdfName", f.name);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:999,
      display:"flex", alignItems:"center", justifyContent:"center" }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:T.s, borderRadius:16, width:560, maxWidth:"96vw",
        maxHeight:"92vh", display:"flex", flexDirection:"column",
        boxShadow:"0 24px 64px rgba(0,0,0,.28)", overflow:"hidden", animation:"fadeUp .2s ease" }}>

        <div style={{ background:`linear-gradient(135deg,${T.sb},${T.p})`,
          padding:"16px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:800, color:"#fff" }}>{isNew ? "과정 추가" : "과정 수정"}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,.55)", marginTop:2 }}>{isNew ? "새 교육과정 정보를 입력하세요" : form.code}</div>
          </div>
          <button onClick={onClose} style={{ width:28,height:28,borderRadius:6,border:"none",
            background:"rgba(255,255,255,.15)",color:"#fff",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center" }}>
            <Icon n="x" s={14}/>
          </button>
        </div>

        <div style={{ flex:1, overflowY:"auto", padding:"20px 22px", display:"flex", flexDirection:"column", gap:14 }}>

          {/* 분야 */}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:6 }}>분야 <span style={{color:T.danger}}>*</span></label>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {CAT_LIST.map(cat=>(
                <button key={cat} type="button" onClick={()=>{set("cat",cat);set("cc",CAT_COLORS[cat]);}}
                  style={{ padding:"6px 13px", borderRadius:20, border:"none", cursor:"pointer",
                    fontSize:11, fontWeight:600, transition:"all .15s",
                    background: form.cat===cat ? CAT_COLORS[cat] : T.s3,
                    color: form.cat===cat ? "#fff" : T.mu }}>{cat}</button>
              ))}
            </div>
          </div>

          {/* 과정명 */}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>과정명 <span style={{color:T.danger}}>*</span></label>
            <input value={form.name||""} onChange={e=>set("name",e.target.value)} placeholder="예) 행정회계 사무 OA 과정" style={inp}/>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
            <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>과정코드 <span style={{color:T.danger}}>*</span></label>
              <input value={form.code||""} onChange={e=>set("code",e.target.value)} placeholder="SM-01" style={inp}/>
            </div>
            <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>
                교육 시작일 <span style={{color:T.danger}}>*</span>
              </label>
              <input type="date" value={form.dateFrom||""} onChange={e=>set("dateFrom",e.target.value)} style={inp}/>
            </div>
            <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>
                교육 종료일 <span style={{color:T.danger}}>*</span>
              </label>
              <input type="date" value={form.dateTo||""} onChange={e=>set("dateTo",e.target.value)}
                style={{...inp, borderColor: (form.dateFrom && form.dateTo && form.dateTo < form.dateFrom) ? T.danger : T.bd }}/>
            </div>
          </div>
          {/* 기간 자동 표시 */}
          {(form.dateFrom || form.dateTo) && (
            <div style={{ padding:"7px 12px", borderRadius:7, background:T.s2,
              border:`1px solid ${T.bd}`, fontSize:11, color:T.mu, display:"flex", gap:8, alignItems:"center" }}>
              📅
              <span style={{ color:T.tx, fontWeight:600 }}>
                {form.dateFrom||"미정"} ~ {form.dateTo||"미정"}
              </span>
              {form.dateFrom && form.dateTo && form.dateTo >= form.dateFrom && (() => {
                const ms = new Date(form.dateTo) - new Date(form.dateFrom);
                const days = Math.round(ms / 86400000) + 1;
                const weeks = Math.round(days / 7);
                return <span style={{ color:T.mu }}>(총 {days}일 · 약 {weeks}주)</span>;
              })()}
              {form.dateFrom && form.dateTo && form.dateTo < form.dateFrom && (
                <span style={{ color:T.danger }}>⚠️ 종료일이 시작일보다 빠릅니다</span>
              )}
            </div>
          )}
          <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>교육방식</label>
              <select value={form.method||"대면"} onChange={e=>set("method",e.target.value)} style={{...inp,cursor:"pointer"}}>
                {["대면","비대면","블렌디드","-"].map(v=><option key={v} value={v}>{v}</option>)}
              </select>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10 }}>
            {[{label:"총 시수",key:"hours",ph:"200"},{label:"교육목표",key:"tgt",ph:"20"},{label:"수료목표",key:"cGoal",ph:"18"},{label:"취업목표",key:"eGoal",ph:"12"}].map(({label,key,ph})=>(
              <div key={key}>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>{label}</label>
                <input type="number" value={form[key]||""} onChange={e=>set(key,+e.target.value)} placeholder={ph} style={inp}/>
              </div>
            ))}
          </div>

          {/* 수업 요일 · 시간대 — 수강증명서 ⑥ 수강기간에 자동 반영 */}
          <div style={{ padding:"12px 14px", borderRadius:10, background:"#FFFBEB",
            border:"1px solid #FDE68A" }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#92400E", marginBottom:10 }}>
              📋 수업 요일 · 시간대 <span style={{ fontWeight:400, color:T.mu }}>— 수강증명서 ⑥ 수강기간에 자동 반영</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:10, alignItems:"end" }}>
              <div>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>
                  수업 요일 <span style={{ fontWeight:400 }}>(예: 월, 화, 목)</span>
                </label>
                <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                  {["월","화","수","목","금","토"].map(d => {
                    const active = (form.schedDays||"").includes(d);
                    return (
                      <button key={d} type="button"
                        onClick={()=>{
                          const arr = (form.schedDays||"").split(",").map(x=>x.trim()).filter(Boolean);
                          const next = active ? arr.filter(x=>x!==d) : [...arr, d];
                          // 요일 순서 정렬
                          const order = ["월","화","수","목","금","토"];
                          set("schedDays", next.sort((a,b)=>order.indexOf(a)-order.indexOf(b)).join(", "));
                        }}
                        style={{ width:30, height:30, borderRadius:7, border:"none", cursor:"pointer",
                          fontSize:12, fontWeight:700,
                          background: active ? "#EA580C" : T.s3,
                          color: active ? "#fff" : T.mu }}>
                        {d}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>수업 시작</label>
                <input type="time" value={form.schedTimeFrom||"09:00"} onChange={e=>set("schedTimeFrom",e.target.value)}
                  style={{...inp, width:110, cursor:"pointer"}}/>
              </div>
              <div>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>수업 종료</label>
                <input type="time" value={form.schedTimeTo||"13:00"} onChange={e=>set("schedTimeTo",e.target.value)}
                  style={{...inp, width:110, cursor:"pointer"}}/>
              </div>
            </div>
            {/* 미리보기 */}
            {(form.period || form.schedDays || form.schedTimeFrom) && (
              <div style={{ marginTop:9, fontSize:11, color:"#92400E", background:"#FFFCE8",
                padding:"6px 10px", borderRadius:6, border:"1px solid #FDE68A" }}>
                <b>⑥ 수강기간 미리보기:</b>{" "}
                {form.dateFrom && form.dateTo
                  ? `${form.dateFrom} ~ ${form.dateTo}`
                  : form.dateFrom || form.dateTo || "(기간 미입력)"
                }
                {form.schedDays ? ` / 매주 ${form.schedDays}` : ""}
                {(form.schedTimeFrom && form.schedTimeTo) ? ` ${form.schedTimeFrom} ∼ ${form.schedTimeTo}` : ""}
              </div>
            )}
          </div>

          {/* 참고사항 메모 */}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>📝 참고사항</label>
            <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)}
              placeholder="과정 운영 참고사항, 특이사항 등 자유 기재"
              rows={2} style={{ ...inp, resize:"vertical", fontFamily:"inherit", lineHeight:1.6 }}/>
          </div>

          {/* 참고 링크 */}
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu }}>🔗 참고 링크</label>
              <button type="button" onClick={addLink} style={{
                fontSize:11, padding:"4px 10px", borderRadius:6, border:`1px solid ${T.p}`,
                background:"transparent", color:T.p, cursor:"pointer", fontWeight:600 }}>+ 추가</button>
            </div>
            {(form.links||[]).length===0 && (
              <div style={{ fontSize:11, color:T.bd, textAlign:"center", padding:"10px 0" }}>링크가 없습니다</div>
            )}
            {(form.links||[]).map((lk,i)=>(
              <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr 2fr auto", gap:6, marginBottom:6 }}>
                <input value={lk.label||""} onChange={e=>updLink(i,"label",e.target.value)}
                  placeholder="링크 설명 (예: 강의계획서)" style={{...inp, fontSize:11}}/>
                <input value={lk.url||""} onChange={e=>updLink(i,"url",e.target.value)}
                  placeholder="https://..." style={{...inp, fontSize:11}}/>
                <button type="button" onClick={()=>delLink(i)} style={{
                  width:30, height:34, borderRadius:6, border:"none",
                  background:"#FEF2F2", color:T.danger, cursor:"pointer",
                  display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <Icon n="x" s={12}/>
                </button>
              </div>
            ))}
          </div>

          {/* 강의계획서 · 수업일정표 PDF */}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:8 }}>📄 강의계획서 / 수업일정표 (PDF, 최대 5MB)</label>
            <input ref={pdfRef} type="file" accept=".pdf" style={{display:"none"}} onChange={onPdfUpload}/>
            {form.pdfData ? (
              <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 14px",
                borderRadius:8, background:T.pbg, border:`1px solid ${T.pl}50` }}>
                <span style={{ fontSize:20 }}>📕</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:T.p }}>{form.pdfName}</div>
                  <div style={{ fontSize:10, color:T.mu }}>업로드 완료</div>
                </div>
                <Btn size="sm" variant="outline" onClick={()=>{ const w=window.open(); w.document.write(`<iframe src="${form.pdfData}" style="width:100%;height:100vh;border:none;"/>`); }}>미리보기</Btn>
                <button type="button" onClick={()=>{set("pdfData","");set("pdfName","");}} style={{
                  width:26,height:26,borderRadius:6,border:"none",background:"#FEF2F2",color:T.danger,cursor:"pointer",
                  display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="x" s={12}/></button>
              </div>
            ) : (
              <button type="button" onClick={()=>!pdfUploading && pdfRef.current.click()} style={{
                width:"100%", padding:"14px", borderRadius:8, border:`2px dashed ${T.bd}`,
                background:T.s2, cursor: pdfUploading ? "not-allowed" : "pointer", fontSize:12, color:T.mu,
                display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                <Icon n="upload" s={16}/> {pdfUploading ? "업로드 중…" : "PDF 파일 선택 (강의계획서 / 수업일정표)"}
              </button>
            )}
          </div>

          {/* 미리보기 카드 */}
          <div style={{ padding:"12px 14px", borderRadius:10, background:T.s2, border:`1px solid ${T.bd}`, borderLeft:`4px solid ${form.cc||T.p}` }}>
            <div style={{ fontSize:11, color:T.mu, marginBottom:4 }}>미리보기</div>
            <div style={{ fontSize:13, fontWeight:700, color:T.tx }}>{form.name||"(과정명 없음)"}</div>
            <div style={{ fontSize:11, color:T.mu, marginTop:2 }}>{form.code} · {formatCoursePeriod(form)} · {form.method} · {form.hours||0}시간</div>
          </div>
        </div>

        <div style={{ padding:"13px 22px", borderTop:`1px solid ${T.bd}`, display:"flex", justifyContent:"flex-end", gap:8, background:T.s2 }}>
          <Btn variant="ghost" onClick={onClose}>취소</Btn>
          <Btn onClick={async ()=>{
            if(!form.name||!form.code) return alert("과정명과 과정코드는 필수입니다.");
            await onSave({ ...form, id: form.id ? form.id : undefined });
            onClose();
          }}><Icon n="check" s={13}/> {isNew?"추가":"저장"}</Btn>
        </div>
      </div>
    </div>
  );
};

/* ===========================================================
   COURSE LIST  ★ 과정 추가 / 수정 / 삭제
=========================================================== */
const CourseList = ({ courses, onAdd, onUpdate, onDelete }) => {
  const [cat, setCat]         = useState("전체");
  const [editCourse, setEdit] = useState(null);   // null = 닫힘, {} = 신규, {id...} = 수정
  const [isNew, setIsNew]     = useState(false);

  const cats = ["전체", ...new Set(courses.map(c=>c.cat))];
  const list = cat==="전체" ? courses : courses.filter(c=>c.cat===cat);

  const openNew  = () => { setIsNew(true);  setEdit({}); };
  const openEdit = c  => { setIsNew(false); setEdit(c);  };

  const handleDelete = c => {
    if(!window.confirm(`"${c.name}" 과정을 삭제하시겠습니까?\n※ 해당 과정 훈련생 데이터는 유지됩니다.`)) return;
    onDelete(c.id);
  };

  return (
    <div className="page">
      {editCourse !== null && (
        <CourseModal
          course={isNew ? null : editCourse}
          isNew={isNew}
          onSave={isNew ? onAdd : onUpdate}
          onClose={()=>setEdit(null)}
        />
      )}

      <SectionHead
        title="과정 현황"
        sub={`2026년 경기북부 직업교육 · 총 ${courses.length}개 과정`}
        right={
          <Btn size="sm" onClick={openNew}>
            <Icon n="plus" s={13}/> 과정 추가
          </Btn>
        }
      />

      {/* 분야 필터 */}
      <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap" }}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)} style={{
            padding:"6px 14px", borderRadius:20, border:"none", cursor:"pointer",
            fontSize:11, fontWeight:600, transition:"all .15s",
            background: cat===c ? T.p : T.s3, color: cat===c ? "#fff" : T.mu }}>
            {c}
          </button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:12 }}>
        {list.map(c=>(
          <div key={c.id} className="course-card" style={{
            background:T.s, borderRadius:12, padding:18,
            border:`1px solid ${T.bd}`, borderLeft:`4px solid ${c.cc}`,
            boxShadow:"0 1px 4px rgba(0,0,0,.05)", position:"relative"
          }}>
            {/* 수정/삭제 */}
            <div style={{ position:"absolute", top:12, right:12, display:"flex", gap:5 }}>
              <button onClick={()=>openEdit(c)} style={{ width:26,height:26,borderRadius:6,border:"none", background:T.pbg,color:T.p,cursor:"pointer", display:"flex",alignItems:"center",justifyContent:"center" }}><Icon n="edit" s={12}/></button>
              <button onClick={()=>handleDelete(c)} style={{ width:26,height:26,borderRadius:6,border:"none", background:"#FEF2F2",color:T.danger,cursor:"pointer", display:"flex",alignItems:"center",justifyContent:"center" }}><Icon n="x" s={12}/></button>
            </div>

            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, paddingRight:60 }}>
              <Chip label={c.cat} bg={`${c.cc}15`} color={c.cc}/>
              <Chip label={c.method||"-"} bg={T.s3} color={T.mu}/>
            </div>
            <div style={{ fontSize:13, fontWeight:700, color:T.tx, lineHeight:1.45, marginBottom:3, paddingRight:60 }}>{c.name}</div>
            <div style={{ fontSize:11, color:T.mu, marginBottom:10 }}>{c.code} · {formatCoursePeriod(c)} · {c.hours>0?`${c.hours}시간`:"미정"}
              {c.schedDays && <span style={{ color:T.p, marginLeft:6 }}>📅 {c.schedDays}</span>}
              {(c.schedTimeFrom&&c.schedTimeTo) && <span style={{ color:T.mu, marginLeft:4 }}>{c.schedTimeFrom}∼{c.schedTimeTo}</span>}
            </div>

            {/* 목표 수치 */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:5, marginBottom:12 }}>
              {[{l:"교육목표",v:c.tgt},{l:"수료목표",v:c.cGoal},{l:"취업목표",v:c.eGoal}].map(({l,v})=>(
                <div key={l} style={{ textAlign:"center", padding:"7px 4px", background:T.s2, borderRadius:6, border:`1px solid ${T.bd}` }}>
                  <div style={{ fontSize:16, fontWeight:800, color:T.tx }}>{v}</div>
                  <div style={{ fontSize:9, color:T.mu, marginTop:1 }}>{l}</div>
                </div>
              ))}
            </div>

            {/* PDF 첨부 */}
            {c.pdfData && (
              <button onClick={()=>{ const w=window.open(); w.document.write(`<iframe src="${c.pdfData}" style="width:100%;height:100vh;border:none;"/>`); }}
                style={{ width:"100%", padding:"7px 10px", borderRadius:7, border:`1px solid ${T.pl}60`,
                  background:T.pbg, color:T.p, cursor:"pointer", fontSize:11, fontWeight:600,
                  display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                <span>📕</span> {c.pdfName||"첨부 PDF 미리보기"}
              </button>
            )}

            {/* 참고 링크 */}
            {(c.links||[]).filter(l=>l.url).length > 0 && (
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                {(c.links||[]).filter(l=>l.url).map((lk,i)=>(
                  <a key={i} href={lk.url} target="_blank" rel="noopener noreferrer"
                    style={{ display:"flex", alignItems:"center", gap:6, padding:"5px 8px",
                      borderRadius:6, background:T.s2, border:`1px solid ${T.bd}`,
                      color:T.p, textDecoration:"none", fontSize:11, fontWeight:600 }}>
                    <Icon n="info" s={12}/>
                    <span style={{ flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {lk.label || lk.url}
                    </span>
                    <span style={{ fontSize:9, color:T.mu }}>↗</span>
                  </a>
                ))}
              </div>
            )}

            {/* 참고사항 */}
            {c.notes && (
              <div style={{ marginTop:8, padding:"7px 10px", borderRadius:7, background:T.s3,
                fontSize:11, color:T.mu, lineHeight:1.5 }}>
                📝 {c.notes}
              </div>
            )}
          </div>
        ))}

        {/* 빈 카드 — 과정 추가 버튼 */}
        <div onClick={openNew} className="course-card" style={{
          background:T.s2, borderRadius:12, padding:18,
          border:`2px dashed ${T.bd}`, cursor:"pointer",
          display:"flex", flexDirection:"column", alignItems:"center",
          justifyContent:"center", gap:10, minHeight:180,
          transition:"all .2s" }}>
          <div style={{ width:40,height:40,borderRadius:12,background:`${T.p}15`,
            color:T.p,display:"flex",alignItems:"center",justifyContent:"center" }}>
            <Icon n="plus" s={20}/>
          </div>
          <div style={{ fontSize:12, fontWeight:700, color:T.mu }}>새 과정 추가</div>
        </div>
      </div>
    </div>
  );
};

/* ===========================================================
   STUDENT MANAGEMENT  ★ Excel Upload / Download
=========================================================== */
const StudentMgmt = ({ students, courses, onAdd, onEdit, onUpdate, onDelete, onNew }) => {
  const [search, setSearch] = useState("");
  const [cFilter, setCFilter] = useState(0);
  const [riskOnly, setRisk] = useState(false);
  const [dragging, setDragging] = useState(false);
  const [preview, setPreview] = useState(null);   // parsed excel rows
  const [tab, setTab] = useState("list");          // "list" | "import"
  const fileRef = useRef();

  // ── 출결 상세 모달 ──
  const [attModal, setAttModal] = useState(null);         // 선택된 학생 (또는 null)
  const [attRecords, setAttRecords] = useState([]);       // 출결 일별 기록
  const [attLoading, setAttLoading] = useState(false);

  // 모달 열릴 때 출결 데이터 로드
  useEffect(() => {
    if (!attModal) { setAttRecords([]); return; }
    let cancelled = false;
    setAttLoading(true);
    const studentId = Number(attModal.id);
    if (!studentId) { setAttLoading(false); return; }
    const load = async () => {
      try {
        const { data, error } = await sbGet(
          "attendance",
          `select=date,check_in,check_out,status&student_id=eq.${studentId}&order=date.asc`
        );
        if (!cancelled) setAttRecords(error ? [] : (data || []));
      } catch { if (!cancelled) setAttRecords([]); }
      if (!cancelled) setAttLoading(false);
    };
    load();
    return () => { cancelled = true; };
  }, [attModal]);

  // 모달이 열린 동안 Realtime 구독 (해당 학생 출결 실시간 갱신)
  useEffect(() => {
    if (!attModal) return;
    const studentId = Number(attModal.id);
    if (!studentId) return;
    let intentionallyClosed = false;
    let heartbeatId = null;
    let currentWs   = null;
    let retryDelay  = 2000;
    let refCount    = 0;
    const channel = `realtime:public:attendance`;
    const joinRef = String(++refCount);
    let subIds = [];

    const send = (obj) => {
      if (currentWs?.readyState === WebSocket.OPEN) currentWs.send(JSON.stringify(obj));
    };
    const connect = () => {
      if (intentionallyClosed) return;
      const ws = new WebSocket(
        `wss://${SB_URL.replace("https://","")}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`
      );
      currentWs = ws;
      ws.onopen = () => {
        retryDelay = 2000;
        send({
          topic: channel, event: "phx_join",
          payload: {
            config: {
              broadcast: { self: false }, presence: { key: "" },
              postgres_changes: [{ event: "*", schema: "public", table: "attendance",
                filter: `student_id=eq.${studentId}` }]
            },
            access_token: SB_KEY
          },
          ref: joinRef, join_ref: joinRef
        });
        heartbeatId = setInterval(() => {
          send({ topic: "phoenix", event: "heartbeat", payload: {}, ref: String(++refCount) });
        }, 25000);
      };
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.event === "phx_reply" && msg.ref === joinRef) {
            subIds = (msg.payload?.response?.postgres_changes || []).map(c => c.id);
            return;
          }
          if (msg.event === "postgres_changes" && msg.payload?.data) {
            const ids = msg.payload.ids || [];
            if (subIds.length > 0 && !ids.some(id => subIds.includes(id))) return;
            const { type: evType, record: nr } = msg.payload.data;
            if ((evType === "INSERT" || evType === "UPDATE") && Number(nr?.student_id) === studentId) {
              setAttRecords(prev => {
                const idx = prev.findIndex(r => r.date === nr.date);
                const updated = { date: nr.date, check_in: nr.check_in, check_out: nr.check_out, status: nr.status };
                if (idx >= 0) { const next = [...prev]; next[idx] = updated; return next; }
                return [...prev, updated].sort((a, b) => a.date.localeCompare(b.date));
              });
            } else if (evType === "DELETE" && Number(msg.payload.data?.old_record?.student_id) === studentId) {
              setAttRecords(prev => prev.filter(r => r.date !== msg.payload.data.old_record?.date));
            }
          }
        } catch {}
      };
      ws.onerror = () => {};
      ws.onclose = (ev) => {
        clearInterval(heartbeatId);
        heartbeatId = null;
        if (!intentionallyClosed) { setTimeout(connect, retryDelay); retryDelay = Math.min(retryDelay * 2, 30000); }
      };
    };
    connect();
    return () => {
      intentionallyClosed = true;
      clearInterval(heartbeatId);
      heartbeatId = null;
      currentWs?.close();
    };
  }, [attModal]);

  const filtered = useMemo(() => students.filter(s => {
    if(cFilter && s.cid!==cFilter) return false;
    if(riskOnly && s.rate>=80) return false;
    if(search && !s.name.includes(search) && !s.phone.includes(search)) return false;
    return true;
  }), [students, cFilter, riskOnly, search]);

  const parseFile = file => {
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:"" });
      setPreview(rows);
      setTab("import");
    };
    reader.readAsArrayBuffer(file);
  };

  const onDrop = e => { e.preventDefault(); setDragging(false); const f=e.dataTransfer.files[0]; if(f) parseFile(f); };

  const confirmImport = () => {
    if(!preview) return;
    const yn = v => String(v||"").trim().toUpperCase() === "Y";
    const toAdd = [];
    const toUpdate = [];
    preview.forEach((r,i) => {
      const code = r["과정코드"] || "";
      const c = courses.find(x=>x.code===code) || courses[0];
      const phone = String(r["연락처"] || "").replace(/[^0-9]/g, ""); // 숫자만 정규화
      // 주민등록번호 처리: 새 양식(YYMMDD-XXXXXXX) 또는 구 양식(생년월일+뒷자리) 모두 지원
      let birth = r["생년월일"] || "";
      let idBack = String(r["주민번호뒷자리"]||"");
      const idNum = String(r["주민등록번호"]||"").replace(/[^0-9]/g,"");
      if (idNum.length >= 13) {
        const front6 = idNum.slice(0,6);
        const back7  = idNum.slice(6,13);
        const yy = front6.slice(0,2), mm = front6.slice(2,4), dd = front6.slice(4,6);
        const f1 = back7[0]||"";
        const yyyy = (f1==="3"||f1==="4"||f1==="7"||f1==="8") ? `20${yy}` : `19${yy}`;
        birth  = `${yyyy}-${mm}-${dd}`;
        idBack = back7;
      }
      const base = {
        cid:        c.id,
        name:       r["이름"]              || "",
        gender:     r["성별"]              || "",
        birth:      birth,
        idBack:     idBack,
        phone,
        phone2:     String(r["비상연락처"]  ||"").replace(/[^0-9]/g, ""),
        addrCity:   r["거주시"]   || r["거주시군"]  || "",
        addrDetail: r["상세주소"]           || "",
        edu:        r["최종학력"]           || "",
        major:      r["전공"]              || "",
        career:     r["경력"]              || "",
        cert:       r["자격증"]            || "",
        status:     r["취업형태"]           || "미취업",
        unemp:      yn(r["실업급여수급"]),
        disabled:   yn(r["장애여부"]),
        veteran:    yn(r["보훈여부"]),
        itvDate:    r["면접일자"]  || r["면접일"]    || "",
        itvScore:   r["면접점수"]           || "",
        itvGrade:   r["면접등급"]           || "",
        itvPass:    yn(r["합격여부"]) || String(r["합격여부"]||"").trim() === "합격",
        memo:       r["특이사항"]           || "",
      };
      const existing = phone ? students.find(s => s.phone && s.phone === phone) : null;
      if (existing) {
        toUpdate.push({ ...existing, ...base });
      } else {
        toAdd.push({ ...base, rate: 0 }); // ID는 DB 자동 생성
      }
    });
    if (toAdd.length > 0) onAdd(toAdd);
    if (toUpdate.length > 0 && onUpdate) toUpdate.forEach(s => onUpdate(s));
    setPreview(null);
    setTab("list");
    const msg = [
      toAdd.length    && `신규 ${toAdd.length}명 등록`,
      toUpdate.length && `기존 ${toUpdate.length}명 업데이트`,
    ].filter(Boolean).join(" / ");
    alert(`✅ ${msg} 완료`);
  };

  return (
    <div className="page">
      <SectionHead
        title="훈련생 관리"
        sub="훈련생 등록, 이력 조회 및 출석 현황"
        right={
          <div style={{ display:"flex", gap:8 }}>
            <Btn variant="ghost" size="sm" onClick={()=>downloadTemplate(courses)}>
              <Icon n="dl" s={13}/> 양식 다운로드
            </Btn>
            <Btn variant="ghost" size="sm" onClick={()=>setTab(tab==="import"?"list":"import")}>
              <Icon n="upload" s={13}/> {tab==="import"?"목록으로":"엑셀 업로드"}
            </Btn>
            <Btn size="sm" onClick={onNew}>
              <Icon n="plus" s={13}/> 신규 등록
            </Btn>
          </div>
        }
      />

      {tab === "import" ? (
        <div>
          {/* 드래그앤드롭 업로드 영역 */}
          {!preview && (
            <Card style={{ marginBottom:16 }}>
              <div
                className={`drop-zone${dragging?" drag-over":""}`}
                onDragOver={e=>{e.preventDefault();setDragging(true)}}
                onDragLeave={()=>setDragging(false)}
                onDrop={onDrop}
                onClick={()=>fileRef.current.click()}
                style={{ padding:"48px 24px", textAlign:"center", cursor:"pointer",
                  border:`2px dashed ${T.pl}`, borderRadius:12, margin:16 }}>
                <div style={{ fontSize:36, marginBottom:12 }}>📂</div>
                <div style={{ fontSize:14, fontWeight:700, color:T.tx, marginBottom:6 }}>엑셀 파일을 여기에 끌어다 놓으세요</div>
                <div style={{ fontSize:12, color:T.mu, marginBottom:16 }}>또는 클릭해서 파일 선택 (.xlsx, .xls 지원)</div>
                <Btn size="sm" onClick={e=>{e.stopPropagation();fileRef.current.click()}}>
                  <Icon n="upload" s={13}/> 파일 선택
                </Btn>
                <input ref={fileRef} type="file" accept=".xlsx,.xls"
                  style={{ display:"none" }}
                  onChange={e=>{if(e.target.files[0]) parseFile(e.target.files[0])}}
                />
              </div>

              {/* 양식 안내 */}
              <div style={{ padding:"14px 20px", background:T.s2,
                borderTop:`1px solid ${T.bd}`, display:"flex", gap:20, alignItems:"center" }}>
                <Icon n="info" s={16}/>
                <div style={{ fontSize:12, color:T.mu, flex:1 }}>
                  엑셀 양식은 <b style={{ color:T.p }}>양식 다운로드</b> 버튼에서 받으실 수 있습니다.
                  필수 컬럼: <b>이름, 주민등록번호, 연락처, 과정코드</b>　(구 양식: 생년월일 + 주민번호뒷자리도 호환)
                </div>
                <Btn variant="ghost" size="sm" onClick={downloadTemplate}>
                  <Icon n="dl" s={12}/> 양식 받기
                </Btn>
              </div>
            </Card>
          )}

          {/* 미리보기 테이블 */}
          {preview && (
            <Card style={{ overflow:"hidden" }}>
              <div style={{ padding:"14px 18px", borderBottom:`1px solid ${T.bd}`,
                display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <span style={{ fontWeight:700, fontSize:13, color:T.tx }}>📋 업로드 미리보기</span>
                  <span style={{ fontSize:12, color:T.mu, marginLeft:10 }}>{preview.length}명 확인</span>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <Btn variant="ghost" size="sm" onClick={()=>{setPreview(null)}}>
                    <Icon n="x" s={12}/> 취소
                  </Btn>
                  <Btn size="sm" onClick={confirmImport}>
                    <Icon n="check" s={12}/> {preview.length}명 등록 확정
                  </Btn>
                </div>
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse" }}>
                  <thead>
                    <tr style={{ background:T.s2 }}>
                      {TEMPLATE_HEADERS.map(h=>(
                        <th key={h} style={{ padding:"9px 14px", textAlign:"left",
                          fontSize:11, color:T.mu, fontWeight:700, borderBottom:`1px solid ${T.bd}` }}>{h}</th>
                      ))}
                      <th style={{ padding:"9px 14px", fontSize:11, color:T.mu, fontWeight:700, borderBottom:`1px solid ${T.bd}` }}>매칭 과정</th>
                    </tr>
                  </thead>
                  <tbody>
                    {preview.map((r,i)=>{
                      const c = courses.find(x=>x.code===r["과정코드"]);
                      return (
                        <tr key={i} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                          {TEMPLATE_HEADERS.map(h=>(
                            <td key={h} style={{ padding:"10px 14px", fontSize:12, color:T.tx }}>{r[h]||""}</td>
                          ))}
                          <td style={{ padding:"10px 14px" }}>
                            {c
                              ? <Chip label={shortCourseName(c.name)} bg={`${c.cc}12`} color={c.cc}/>
                              : <Chip label="과정코드 오류" bg="#FEF2F2" color={T.danger}/>
                            }
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </Card>
          )}
        </div>
      ) : (
        <>
          {/* 검색 필터 바 */}
          <Card style={{ padding:"13px 16px", marginBottom:14, display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
            <div style={{ position:"relative" }}>
              <div style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)", color:T.mu, pointerEvents:"none" }}>
                <Icon n="search" s={13}/>
              </div>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="이름·연락처 검색" style={{
                  paddingLeft:28, paddingRight:12, paddingTop:7, paddingBottom:7,
                  border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12,
                  outline:"none", background:T.s2, width:180, color:T.tx }}/>
            </div>
            <select value={cFilter} onChange={e=>setCFilter(+e.target.value)} style={{
              padding:"7px 10px", border:`1px solid ${T.bd}`, borderRadius:8,
              fontSize:12, outline:"none", background:T.s2, color:T.tx, cursor:"pointer" }}>
              <option value={0}>전체 과정</option>
              {courses.map(c=><option key={c.id} value={c.id}>{shortCourseName(c.name)} [{c.code}]</option>)}
            </select>
            <button onClick={()=>setRisk(!riskOnly)} style={{
              display:"flex", alignItems:"center", gap:5, padding:"7px 13px",
              border:`1px solid ${riskOnly?T.danger:T.bd}`, borderRadius:8,
              background:riskOnly?"#FEF2F2":T.s2, color:riskOnly?T.danger:T.mu,
              cursor:"pointer", fontSize:12, fontWeight:600, transition:"all .15s" }}>
              <Icon n="alert" s={13}/> 위험만
            </button>
            <div style={{ marginLeft:"auto", fontSize:12, color:T.mu, fontWeight:600 }}>
              총 {filtered.length}명
            </div>
          </Card>

          {/* 훈련생 테이블 */}
          <Card style={{ overflow:"hidden" }}>
            <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:860 }}>
              <thead>
                <tr style={{ background:T.s2, borderBottom:`1px solid ${T.bd}` }}>
                  {[
                    {h:"이름·성별·나이",  align:"left"},
                    {h:"과정",            align:"left"},
                    {h:"거주지",          align:"center"},
                    {h:"연락처",          align:"center"},
                    {h:"학력·경력",       align:"left"},
                    {h:"취약계층",        align:"center"},
                    {h:"면접",            align:"center"},
                    {h:"출석률",          align:"center"},
                    {h:"출결조회",        align:"center"},
                    {h:"",               align:"center"},
                  ].map(({h,align})=>(
                    <th key={h} style={{ padding:"10px 12px",
                      textAlign:align, fontSize:11, color:T.mu, fontWeight:700,
                      whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(s=>{
                  const c = courses.find(x=>x.id===s.cid);
                  const col = rateColor(s.rate);
                  // 나이 계산
                  const age = (() => {
                    if(!s.birth) return "-";
                    const b = new Date(s.birth), t = new Date();
                    let a = t.getFullYear()-b.getFullYear();
                    if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate())) a--;
                    return `${a}세`;
                  })();
                  const badges = [
                    s.unemployment && {l:"실업급여",bg:"#EFF6FF",c:"#2563EB"},
                    s.disabled     && {l:"장애",    bg:"#F5F3FF",c:"#7C3AED"},
                    s.veteran      && {l:"보훈",    bg:"#ECFDF5",c:"#059669"},
                  ].filter(Boolean);
                  const gradeColor = g => g?.startsWith("A")?T.ok:g?.startsWith("B")?T.warn:T.danger;
                  return (
                    <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>

                      {/* 이름·성별·나이 */}
                      <td style={{ padding:"11px 12px" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <div style={{ width:32, height:32, borderRadius:9, flexShrink:0,
                            background: s.gender==="여" ? "#FDF2F8" : "#EFF6FF",
                            color: s.gender==="여" ? "#BE185D" : "#1D4ED8",
                            display:"flex", alignItems:"center", justifyContent:"center",
                            fontSize:11, fontWeight:900 }}>
                            {s.name?.[0]}
                          </div>
                          <div>
                            <div style={{ fontSize:13, fontWeight:700, color:T.tx, whiteSpace:"nowrap" }}>
                              {s.name}
                              <span style={{ marginLeft:5, fontSize:10, fontWeight:600,
                                color: s.gender==="여"?"#BE185D":"#1D4ED8" }}>
                                {s.gender||""}
                              </span>
                            </div>
                            <div style={{ fontSize:10, color:T.mu }}>{age} · {s.birth||"-"}</div>
                          </div>
                        </div>
                      </td>

                      {/* 과정 */}
                      <td style={{ padding:"11px 12px", maxWidth:150 }}>
                        <div style={{ fontSize:11, fontWeight:600, color:T.tx,
                          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                          {c?.name}
                        </div>
                        <div style={{ fontSize:10, marginTop:1 }}>
                          <span style={{ color:c?.cc, fontWeight:700 }}>{c?.code}</span>
                          <span style={{ color:T.mu, marginLeft:4 }}>{formatCoursePeriod(c)}</span>
                        </div>
                      </td>

                      {/* 거주지 */}
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        <div style={{ fontSize:12, fontWeight:600, color:T.tx, whiteSpace:"nowrap" }}>
                          {s.addrCity||s.addr?.split(" ")[0]||"-"}
                        </div>
                      </td>

                      {/* 연락처 */}
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        <div style={{ fontSize:11, color:T.tx, whiteSpace:"nowrap" }}>{s.phone||"-"}</div>
                      </td>

                      {/* 학력·경력 */}
                      <td style={{ padding:"11px 12px" }}>
                        <div style={{ fontSize:11, fontWeight:600, color:T.tx }}>{s.edu||"-"}</div>
                        {s.major && s.major!=="-" && (
                          <div style={{ fontSize:10, color:T.mu }}>{s.major}</div>
                        )}
                        {s.career && s.career!=="없음" && (
                          <div style={{ fontSize:10, color:T.p, marginTop:2,
                            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:120 }}>
                            {s.career}
                          </div>
                        )}
                      </td>

                      {/* 취약계층 뱃지 */}
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        <div style={{ display:"flex", gap:3, justifyContent:"center", flexWrap:"wrap" }}>
                          {badges.length > 0
                            ? badges.map(b=>(
                                <Chip key={b.l} label={b.l} bg={b.bg} color={b.c} size={10}/>
                              ))
                            : <span style={{ fontSize:10, color:T.bd }}>—</span>
                          }
                        </div>
                      </td>

                      {/* 면접 */}
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        {s.itvScore ? (
                          <>
                            <div style={{ display:"inline-flex", alignItems:"center", gap:5 }}>
                              <span style={{ fontSize:13, fontWeight:800,
                                color: gradeColor(s.itvGrade) }}>{s.itvGrade}</span>
                              <span style={{ fontSize:11, color:T.mu }}>{s.itvScore}점</span>
                            </div>
                            <div style={{ marginTop:2 }}>
                              <Chip
                                label={s.itvPass?"합격":"불합격"}
                                bg={s.itvPass?T.pbg:"#FEF2F2"}
                                color={s.itvPass?T.p:T.danger}
                                size={10}
                              />
                            </div>
                          </>
                        ) : <span style={{ fontSize:10, color:T.bd }}>미입력</span>}
                      </td>

                      {/* 출석률 */}
                      <td style={{ padding:"11px 12px", textAlign:"center", minWidth:80 }}>
                        <div style={{ fontSize:14, fontWeight:800, color:col }}>{s.rate}%</div>
                        <RBar r={s.rate} h={4}/>
                        <div style={{ fontSize:9, color:col, marginTop:2 }}>

  const initCourse = courses[3] || courses[0];
