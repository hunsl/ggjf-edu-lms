<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>경기북부 직업교육 학사관리 시스템 v2026 Master</title>
  
  <link rel="preconnect" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ══════════════════════════════════════════════════════════
       🎨 HIGH-END ADMINISTRATION DESIGN SYSTEM (테마 변수화)
    ══════════════════════════════════════════════════════════ */
    :root {
      /* Brand Colors */
      --p: #EA580C; --p-dark: #C2410C; --p-light: #FB923C; --p-soft: #FFF7ED;
      --sb: #7C2D12; --sb-light: #9A3412;
      
      /* Neutral Colors */
      --tx: #0F172A; --tx-sub: #334155; --mu: #64748B; --mu-light: #94A3B8;
      --bd: #E2E8F0; --bd-light: #F1F5F9;
      --s1: #FFFFFF; --s2: #F8FAFC; --s3: #F1F5F9;
      
      /* Semantic Colors */
      --ok: #10B981; --ok-soft: #ECFDF5;
      --warn: #F59E0B; --warn-soft: #FFFBEB;
      --danger: #EF4444; --danger-soft: #FEF2F2;
      --info: #3B82F6; --info-soft: #EFF6FF;
      --purple: #8B5CF6; --purple-soft: #F5F3FF;
      
      /* Shadow & Radius */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.04), 0 4px 6px -4px rgb(0 0 0 / 0.04);
      --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      --radius-sm: 8px; --radius-md: 16px; --radius-lg: 24px;
      --transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background: var(--s2); color: var(--tx); -webkit-font-smoothing: antialiased; }

    /* 🌊 고성능 애니메이션 프레임 */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.92); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    
    .animate-fade-up { animation: fadeUp 0.6s var(--transition) both; }
    .animate-pop { animation: popIn 0.4s var(--transition) both; }

    /* 💎 프리미엄 UI 컴포넌트 커스텀 */
    .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .premium-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .premium-scroll::-webkit-scrollbar-thumb { background: var(--mu-light); border-radius: 10px; }
    .premium-scroll::-webkit-scrollbar-track { background: transparent; }

    /* 사이드바 메뉴 인터랙션 */
    .nav-link {
      display: flex; align-items: center; gap: 14px; padding: 16px 24px; border-radius: 18px; 
      cursor: pointer; color: rgba(255,255,255,0.6); transition: all 0.25s ease; border: none; 
      background: transparent; width: 100%; text-align: left; font-size: 15px; font-weight: 600;
      margin-bottom: 6px; position: relative;
    }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); transform: translateX(5px); }
    .nav-link.active { color: #fff; background: linear-gradient(135deg, var(--p) 0%, var(--p-dark) 100%); font-weight: 800; box-shadow: 0 8px 20px rgba(124,45,18,0.35); }
    .nav-link.active::before { content: ''; position: absolute; left: 8px; width: 4px; height: 20px; background: #fff; border-radius: 4px; }

    /* 행정 데이터 테이블 고도화 */
    .master-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .master-table th { background: var(--s3); padding: 20px 16px; font-size: 13px; font-weight: 800; color: var(--mu); text-transform: uppercase; border-bottom: 2px solid var(--bd); }
    .master-table td { padding: 18px 16px; border-bottom: 1px solid var(--bd-light); transition: background 0.2s; font-size: 14.5px; }
    .master-table tr:hover td { background: var(--p-soft) !important; }

    /* 고기능 폼 컨트롤 */
    label { font-size: 13px; font-weight: 800; color: var(--tx-sub); margin-bottom: 8px; display: block; margin-left: 4px; }
    input, select, textarea { 
      width: 100%; padding: 14px 18px; border-radius: 14px; border: 2px solid var(--bd-light); 
      background: var(--s1); font-size: 15px; color: var(--tx); outline: none; transition: var(--transition); 
    }
    input:focus, select:focus { border-color: var(--p); box-shadow: 0 0 0 4px var(--p-soft); }
    input::placeholder { color: var(--mu-light); }

    /* 🚀 시스템 부팅 시퀀스 디자인 */
    #loading { 
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
      background: radial-gradient(circle at center, var(--sb-light), var(--sb)); z-index: 9999; transition: opacity 0.8s; color: #fff; 
    }
    .loading-orbit { width: 100px; height: 100px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin 1.2s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media print { .no-print { display: none !important; } body { background: #fff; overflow: visible; } .print-area { padding: 0 !important; } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-orbit"></div>
    <div style="margin-top: 32px; font-size: 28px; font-weight: 950; letter-spacing: -1.5px; text-shadow: 0 10px 20px rgba(0,0,0,0.3);">NORTHERN EDU CLOUD</div>
    <div style="font-size: 14px; opacity: 0.7; margin-top: 12px; font-weight: 500; letter-spacing: 2px;">SECURE INFRASTRUCTURE INITIALIZING...</div>
  </div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback } = React;

    /* ══════════════════════════════════════════════════════════
       1. CORE SYSTEM ARCHITECTURE (고성능 데이터 처리 엔진)
    ══════════════════════════════════════════════════════════ */
    const SB_URL = "https://vqkjakgbrsnsererwmma.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxa2pha2dicnNuc2VyZXJ3bW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDA2MjIsImV4cCI6MjA4ODkxNjYyMn0.caGpzJdTcfT3CZTkJi2Mctte3nNvh3e6xTtFVaCfkiM";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);
    const API = `${SB_URL}/rest/v1`;
    const H = { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json", "Prefer": "return=representation" };

    /* ── 전역 시스템 비동기 엔진 (Error Boundary 포함) ── */
    const sysDB = {
      async fetch(table, query = "select=*") {
        try {
          const r = await fetch(`${API}/${table}?${query}`, { headers: H });
          const d = await r.json();
          if (!r.ok) throw d;
          return { data: d, error: null };
        } catch (e) { console.error(`[DB_FETCH_ERR] ${table}:`, e); return { data: null, error: e }; }
      },
      async push(table, body) {
        try {
          const r = await fetch(`${API}/${table}`, { method: "POST", headers: H, body: JSON.stringify(Array.isArray(body)?body:[body]) });
          const d = await r.json();
          if (!r.ok) throw d;
          return { data: Array.isArray(body)?d:d[0], error: null };
        } catch (e) { console.error(`[DB_PUSH_ERR] ${table}:`, e); return { data: null, error: e }; }
      },
      async patch(table, filter, body) {
        try {
          const r = await fetch(`${API}/${table}?${filter}`, { method: "PATCH", headers: H, body: JSON.stringify(body) });
          const d = await r.json();
          if (!r.ok) throw d;
          return { data: d, error: null };
        } catch (e) { console.error(`[DB_PATCH_ERR] ${table}:`, e); return { data: null, error: e }; }
      },
      async remove(table, filter) {
        try {
          const r = await fetch(`${API}/${table}?${filter}`, { method: "DELETE", headers: H });
          if (!r.ok) throw true;
          return { error: null };
        } catch (e) { console.error(`[DB_REMOVE_ERR] ${table}:`, e); return { error: e }; }
      }
    };

    /* ── 데이터 모델 매퍼 (행정 표준 준수) ── */
    const mapper = {
      student: r => r ? {
        id: r.id, cid: r.course_id, name: r.name, gender: r.gender, birth: r.birth, phone: r.phone, 
        addr: r.addr_city, edu: r.edu, major: r.major, empStatus: r.employ_status || "미취업",
        itvScore: r.itv_score, itvGrade: r.itv_grade, itvPass: r.itv_pass, rate: r.rate || 0, memo: r.memo
      } : null,
      course: r => r ? {
        id: r.id, cat: r.category, code: r.code, name: r.name, from: r.date_from, to: r.date_to,
        hours: r.hours, tgt: r.target, cg: r.completion_goal, eg: r.employment_goal, method: r.method,
        days: r.sched_days, tFrom: r.sched_time_from, tTo: r.sched_time_to, cc: r.category === "늘봄강사양성" ? "#EA580C" : "#C2410C"
      } : null,
      attendance: r => r ? {
        id: r.id, sid: r.student_id, cid: r.course_id, date: r.attend_date, in: r.in_time, out: r.out_time, status: r.status, viaQr: !!r.via_qr
      } : null
    };

    /* ═══════════════════════════════════════════════════════════
       2. ATOMIC UI SYSTEMS (재사용 가능한 고성능 부품군)
    ═══════════════════════════════════════════════════════════ */
    const Icon = ({ n, s=20, c="currentColor", style={} }) => {
      const paths = {
        dash: <><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>,
        course: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>,
        students: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
        instr: <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>,
        room: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
        attend: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        completion: <><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>,
        cert: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
        plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
        qr: <><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><circle cx="12" cy="12" r="1"/></>,
        search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
        dl: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>
      };
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0, ...style}}>{paths[n]}</svg>;
    };

    const Btn = ({ children, onClick, variant="primary", size="md", style={}, disabled=false, icon }) => {
      const base = { border:"none", borderRadius:"14px", cursor:disabled?"not-allowed":"pointer", fontWeight:800, display:"inline-flex", alignItems:"center", justifyContent:"center", gap:"10px", transition:"all 0.3s cubic-bezier(0.16, 1, 0.3, 1)", opacity:disabled?0.5:1 };
      const sizes = { sm:{padding:"8px 16px",fontSize:13}, md:{padding:"14px 28px",fontSize:15}, lg:{padding:"18px 40px",fontSize:17} };
      const variants = {
        primary: { background:`linear-gradient(135deg, var(--p), var(--p-dark))`, color:"#fff", boxShadow:`0 4px 15px rgba(234, 88, 12, 0.25)` },
        white: { background:"#fff", color:"var(--tx)", border:"2px solid var(--bd-light)", boxShadow:"var(--shadow-sm)" },
        ghost: { background:"var(--bd-light)", color:"var(--tx-sub)", border:"none" },
        danger: { background: "var(--danger-soft)", color: "var(--danger)", border: "2px solid #FECACA" }
      };
      return (
        <button disabled={disabled} onClick={onClick} onMouseDown={e => !disabled && (e.currentTarget.style.transform = "scale(0.96)")} onMouseUp={e => !disabled && (e.currentTarget.style.transform = "scale(1)")} style={{...base, ...sizes[size], ...variants[variant], ...style}}>
          {icon && <Icon n={icon} s={size==='sm'?16:20} />}
          {children}
        </button>
      );
    };

    const Chip = ({ label, type="info", icon }) => {
      const colors = {
        info: { bg:"var(--info-soft)", tx:"var(--info)" },
        success: { bg:"var(--ok-soft)", tx:"var(--ok)" },
        warn: { bg:"var(--warn-soft)", tx:"var(--warn)" },
        danger: { bg:"var(--danger-soft)", tx:"var(--danger)" },
        purple: { bg:"var(--purple-soft)", tx:"var(--purple)" }
      };
      const c = colors[type] || colors.info;
      return (
        <span style={{ background:c.bg, color:c.tx, padding:"6px 14px", borderRadius:"20px", fontSize:12, fontWeight:900, whiteSpace:"nowrap", display:"inline-flex", alignItems:"center", gap:6 }}>
          {icon && <Icon n={icon} s={12} c={c.tx} />}
          {label}
        </span>
      );
    };

    const SectionHead = ({ title, sub, right }) => (
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:40, paddingBottom:20, borderBottom:`3px solid var(--bd-light)` }}>
        <div>
          <h2 style={{ fontSize:32, fontWeight:950, color:"var(--tx)", letterSpacing:"-1.5px", marginBottom:10 }}>{title}</h2>
          {sub && <p style={{ fontSize:16, fontWeight:500, color:"var(--mu)", letterSpacing:"-0.3px" }}>{sub}</p>}
        </div>
        {right}
      </div>
    );
    /* ═══════════════════════════════════════════════════════════
       3. INTELLECTUAL DATA ENGINE (지능형 행정 데이터 처리)
    ═══════════════════════════════════════════════════════════ */
    
    // 과정 카테고리별 정책 정의
    const COURSE_POLICIES = {
      "늘봄강사양성": { color: "#EA580C", icon: "book", minHours: 40 },
      "지역연계·기여": { color: "#C2410C", icon: "people", minHours: 20 },
      "사무분야": { color: "#9A3412", icon: "dash", minHours: 60 },
      "식품분야": { color: "#DC2626", icon: "dash", minHours: 80 },
      "IT 신직무": { color: "#F97316", icon: "qr", minHours: 100 }
    };

    // 엑셀 업무 자동화 템플릿 생성 엔진
    const ExcelEngine = {
      generateTemplate: (courses) => {
        const wb = XLSX.utils.book_new();
        const headers = [
          "이름", "성별(남/여)", "생년월일(YYYY-MM-DD)", "주민번호뒷자리", "연락처", 
          "거주지(시/군)", "최종학력", "전공", "경력사항", "자격증", 
          "취업상태(미취업/취업/과정유관)", "실업급여(Y/N)", "장애여부(Y/N)", "보훈여부(Y/N)",
          "면접점수", "면접등급(A~C)", "합격여부(Y/N)", "특이사항", "과정코드"
        ];
        
        // 1. 데이터 작성 시트
        const ws = XLSX.utils.aoa_to_sheet([headers]);
        ws["!cols"] = new Array(20).fill({ wch: 15 });
        XLSX.utils.book_append_sheet(wb, ws, "훈련생_입력양식");

        // 2. 유효성 검사 참조 시트 (과정코드 실수 방지)
        const refData = [["과정코드", "공식 과정명", "교육기간", "정원"]];
        courses.forEach(c => refData.push([c.code, c.name, `${c.from}~${c.to}`, c.tgt]));
        const wsRef = XLSX.utils.aoa_to_sheet(refData);
        wsRef["!cols"] = [{wch:12}, {wch:35}, {wch:25}, {wch:8}];
        XLSX.utils.book_append_sheet(wb, wsRef, "과정참조_수정금지");

        XLSX.writeFile(wb, `2026_경기북부_LMS_등록양식_v1.xlsx`);
      }
    };

    /* ═══════════════════════════════════════════════════════════
       4. DASHBOARD COMPONENT (고성능 성과 모니터링)
    ═══════════════════════════════════════════════════════════ */
    const Dashboard = ({ students, courses }) => {
      // 고차 함수를 활용한 실시간 통계 산출
      const computeStats = () => {
        const totalTgt = courses.reduce((a, b) => a + (b.tgt || 0), 0);
        const currentTotal = students.length;
        const avgRate = currentTotal ? (students.reduce((a, b) => a + b.rate, 0) / currentTotal).toFixed(1) : 0;
        const empRelevant = students.filter(s => s.empStatus === "과정유관 취업").length;
        const empGeneral = students.filter(s => s.empStatus === "취업").length;
        const riskGroup = students.filter(s => s.rate < 80);

        return { totalTgt, currentTotal, avgRate, empRelevant, empGeneral, riskGroup };
      };

      const s = useMemo(computeStats, [students, courses]);

      return (
        <div className="page-container animate-fade-up">
          <SectionHead 
            title="연간 사업 통합 대시보드" 
            sub="경기도일자리재단 북부사업본부 실시간 운영 성과"
            right={<Chip label="REALTIME SYNC" type="success" icon="dash" />}
          />

          {/* 메인 KPI 그리드 */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 24, marginBottom: 32 }}>
            {[
              { t: "누적 모집 달성률", v: `${s.totalTgt ? Math.round(s.currentTotal/s.totalTgt*100) : 0}%`, s: `${s.currentTotal}/${s.totalTgt}명`, c: "var(--p)", i: "students" },
              { t: "전체 평균 출석률", v: `${s.avgRate}%`, s: "전 과정 실시간 집계", c: "var(--info)", i: "attend" },
              { t: "전략 취업 성공", v: `${s.empRelevant}명`, s: `전체 취업 ${s.empRelevant + s.empGeneral}명`, c: "var(--purple)", i: "award" },

        <div className="page-container animate-fade-up">
          <SectionHead

                    </div>

                  <h4 style={{ fontSize: 18, fontWeight: 900, marginBottom: 8, color: "var(--tx)" }}>{c.name}</h4>

                    <div style={{ background: "var(--s2)", padding: "10px", borderRadius: "12px", textAlign: "center" }}>

                      <div style={{ fontSize: 15, fontWeight: 800 }}>{c.method}</div>

                  </div>

                    <Icon n="cal" s={16} c="var(--p)" />
                    <span style={{ fontSize: 12, fontWeight: 800, color: "var(--p-dark)" }}>매주 {c.days} | {c.tFrom} ~ {c.tTo}</span>
                  </div>
                </div>
              </div>
            ))}

            <CourseModal

              onSave={isNew ? onAdd : onUpdate} 
              onClose={() => setEdit(null)}

          )}
        </div>
      );
    };

    /* 과정 상세 설정 모달 */

      const [f, setF] = useState(course);
      const set = (k, v) => setF(p => ({ ...p, [k]: v }));

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(15, 23, 42, 0.8)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(8px)" }} onClick={e => e.target === e.currentTarget && onClose()}>

            <div style={{ padding: "28px 32px", background: `linear-gradient(135deg, var(--sb), var(--p))`, color: "#fff", display: "flex", justifyContent: "space-between", alignItems: "center" }}>

                <p style={{ fontSize: 12, opacity: 0.8, marginTop: 4, fontWeight: 500 }}>입력된 정보는 출석부 및 증명서 서식에 즉시 반영됩니다.</p>
              </div>
              <button onClick={onClose} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "#fff", width: 40, height: 40, borderRadius: 12, cursor: "pointer" }}><Icon n="x" s={22}/></button>
            </div>
            
            <div className="premium-scroll" style={{ padding: 32, overflowY: "auto", display: "flex", flexDirection: "column", gap: 24 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                <div>
                  <label>분야 카테고리</label>
                  <select value={f.cat} onChange={e => set("cat", e.target.value)}>

              <div><label>공식 과정명 (서식 출력용)</label><input value={f.name} onChange={e => set("name", e.target.value)} style={{ fontSize: 16, fontWeight: 800 }} /></div>
              
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1.2fr", gap: 20 }}>

              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20 }}>
                <div><label>총 교육 시간 (H)</label><input type="number" value={f.hours} onChange={e => set("hours", +e.target.value)} /></div>
                <div><label>모집 정원 (명)</label><input type="number" value={f.tgt} onChange={e => set("tgt", +e.target.value)} /></div>

              </div>

              <div style={{ padding: 24, background: "var(--s3)", borderRadius: 20, border: "2px dashed var(--bd)" }}>

                <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr 1fr", gap: 15 }}>
                  <div><label>수업 요일</label><input value={f.days} onChange={e => set("days", e.target.value)} placeholder="예: 월, 화, 목" /></div>
                  <div><label>시작 시간</label><input type="time" value={f.tFrom} onChange={e => set("tFrom", e.target.value)} /></div>
                  <div><label>종료 시간</label><input type="time" value={f.tTo} onChange={e => set("tTo", e.target.value)} /></div>
                </div>
              </div>
            </div>

            <div style={{ padding: "24px 32px", borderTop: "1.5px solid var(--bd)", background: "var(--s2)", display: "flex", justifyContent: "flex-end", gap: 12 }}>
              <Btn variant="ghost" onClick={onClose}>취소</Btn>
              <Btn onClick={() => { if(!f.name || !f.code) return alert("필수 항목을 입력해 주세요."); onSave(f); onClose(); }} style={{ padding: "12px 48px" }}>교육과정 설정 저장</Btn>
            </div>
          </div>
        </div>
      );

    ═══════════════════════════════════════════════════════════ */

      const [showModal, setShowModal] = useState(false);
      const [target, setTarget] = useState(null);

      return (
        <div className="page-container animate-fade-up">
          <SectionHead 
            title="시스템 계정 및 권한 관리" 
            sub="학사관리시스템에 접속 가능한 북부사업본부 운영진 계정을 관리합니다."

              </thead>
              <tbody>
                {accounts.map(acc => (
                  <tr key={acc.id}>
                    <td style={{ fontWeight: 800 }}>{acc.name}</td>
                    <td>{acc.dept}</td>
                    <td><Chip label={acc.rank} type="ghost" /></td>

                  </tr>

              </tbody>
            </table>

            <AccountModal 
              target={target} 
              onClose={() => setShowModal(false)} 
              onSave={(data) => { target ? onUpdate(data) : onAdd(data); setShowModal(false); }} 
            />
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       7. STUDENT MASTER & EMPLOYMENT (훈련생 및 취업 성과 관리)
    ═══════════════════════════════════════════════════════════ */
    const StudentMgmt = ({ students, courses, onUpdate, onDelete, onNew }) => {
      const [search, setSearch] = useState("");
      const [filterCid, setFilterCid] = useState(0);

      const filtered = useMemo(() => students.filter(s => {
        const matchCid = filterCid ? s.cid === filterCid : true;
        const matchSearch = s.name.includes(search) || (s.phone && s.phone.includes(search));
        return matchCid && matchSearch;
      }), [students, search, filterCid]);

      return (
        <div className="page-container animate-fade-up">
          <SectionHead 
            title="훈련생 마스터 데이터베이스" 
            sub="모집, 면접평가, 취업 성과를 통합적으로 추적 관리합니다."
            right={
              <div style={{ display: "flex", gap: 10 }}>
                <Btn variant="white" icon="dl" onClick={() => ExcelEngine.generateTemplate(courses)}>엑셀 양식</Btn>
                <Btn icon="plus" onClick={onNew}>신규 등록</Btn>
              </div>
            }
          />

          {/* 지능형 필터바 */}

                style={{ paddingLeft: 48, background: "#fff", border: "2px solid var(--bd-light)" }}
              />
            </div>
            <select 
              value={filterCid} onChange={e => setFilterCid(+e.target.value)}
              style={{ width: 300, background: "#fff", border: "2px solid var(--bd-light)" }}
            >
              <option value={0}>전체 교육과정 보기</option>
              {courses.map(c => <option key={c.id} value={c.id}>[{c.code}] {c.name}</option>)}
            </select>
          </div>

          <div className="premium-card">
            <table className="master-table">
              <thead>
                <tr>
                  <th>학번·성명</th>
                  <th>면접등급</th>
                  <th>취업 구분</th>

                {filtered.map(s => {
                  const course = courses.find(c => c.id === s.cid);
                  return (
                    <tr key={s.id}>
                      <td>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                          <div style={{ width: 40, height: 40, borderRadius: 12, background: "var(--s3)", color: "var(--tx)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900 }}>{s.name[0]}</div>
                          <div>
                            <div style={{ fontSize: "15px", fontWeight: 800 }}>{s.name}</div>
                            <div style={{ fontSize: "11px", color: "var(--p)", fontWeight: 700 }}>2026-{s.id}</div>
                          </div>
                        </div>
                      </td>
                      <td>
                        <div style={{ fontSize: "14px", fontWeight: 800 }}>{s.itvGrade}</div>

                      </td>
                      <td>
                        <select

                          onChange={(e) => onUpdate({ ...s, empStatus: e.target.value })}

                            color: s.empStatus === '과정유관 취업' ? 'var(--purple)' : s.empStatus === '취업' ? 'var(--info)' : 'var(--mu)',
                            background: s.empStatus === '과정유관 취업' ? 'var(--purple-soft)' : s.empStatus === '취업' ? 'var(--info-soft)' : 'var(--s3)',
                            border: "none"
                          }}
                        >
                          <option>미취업</option>

                        </div>
                      </td>
                    </tr>

          </div>
        </div>
      );

    /* ═══════════════════════════════════════════════════════════
       11. CONFLICT DETECTION ENGINE (중복 배정 방지 로직)
    ═══════════════════════════════════════════════════════════ */
    const checkConflict = (targetCourse, allCourses) => {
      // 시간 겹침 확인 함수 (Overlap Algorithm)
      const isOverlap = (c1, c2) => {
        if (c1.id === c2.id) return false; // 자기 자신은 제외
        const start1 = new Date(`${c1.from} ${c1.tFrom}`);
        const end1 = new Date(`${c1.to} ${c1.tTo}`);
        const start2 = new Date(`${c2.from} ${c2.tFrom}`);
        const end2 = new Date(`${c2.to} ${c2.tTo}`);
        
        // 날짜 범위가 겹치고 + 요일이 겹치고 + 시간대가 겹치는지 체크
        const dateMatch = (start1 <= end2 && end1 >= start2);
        const dayMatch = c1.days.split(',').some(d => c2.days.includes(d.trim()));
        const timeMatch = (c1.tFrom < c2.tTo && c1.tTo > c2.tFrom);
        
        return dateMatch && dayMatch && timeMatch;
      };

      const roomConflict = allCourses.find(c => c.roomId === targetCourse.roomId && isOverlap(targetCourse, c));
      const instrConflict = allCourses.find(c => c.instrId === targetCourse.instrId && isOverlap(targetCourse, c));

      if (roomConflict) return { type: 'ROOM', msg: `[강의실 충돌] ${roomConflict.name} 과정과 시간이 겹칩니다.` };
      if (instrConflict) return { type: 'INSTR', msg: `[강사 충돌] 해당 강사가 ${instrConflict.name} 강의 중입니다.` };
      return null;
    };

    /* ═══════════════════════════════════════════════════════════
       14. FINAL APP ROOT (실시간 라우팅 및 통합 마운트)
    ═══════════════════════════════════════════════════════════ */
    function App() {
      const [page, setPage] = useState("dash");
      const [students, setStudents] = useState([]);
      const [courses, setCourses] = useState([]);
      const [attendance, setAttendance] = useState([]);
      const [accounts, setAccounts] = useState([
        { id:1, name:"이상훈", dept:"북부교육팀", rank:"과장", level:"마스터", lastActive:"2026-03-15 09:22" }
      ]);
      const [resources, setResources] = useState({
        instr: [{ id:1, name:"김강사", phone:"010-1111-2222", org:"전문교육원", subject:"IT/코딩" }],
        room: [{ id:1, name:"북부교육장 1호", location:"재단본부 2층", capacity:25, equip:"빔프로젝터, PC 25대" }]
      });

      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode");
      const cid = params.get("cid");

      useEffect(() => {
        if (mode === 'checkin') return;
        const initLoad = async () => {
          const [c, s, a] = await Promise.all([
            sysDB.fetch("courses", "select=*&order=id"),
            sysDB.fetch("students", "select=*&order=id"),
            sysDB.fetch("attendance", `attend_date=eq.${new Date().toISOString().slice(0, 10)}`)
          ]);
          if (c.data) setCourses(c.data.map(mapper.course));
          if (s.data) setStudents(s.data.map(mapper.student));
          if (a.data) setAttendance(a.data.map(mapper.attendance));
          
          document.getElementById('loading').style.opacity = '0';
          setTimeout(() => document.getElementById('loading').remove(), 800);
        };
        initLoad();

        const channel = supabase.channel('realtime-master')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance' }, p => {
            if (p.eventType === 'INSERT') setAttendance(prev => [...prev, mapper.attendance(p.new)]);
            else if (p.eventType === 'UPDATE') setAttendance(prev => prev.map(x => x.id === p.new.id ? mapper.attendance(p.new) : x));
          }).subscribe();
        return () => supabase.removeChannel(channel);
      }, [mode]);

      if (mode === 'checkin' && cid) return <StudentMobileView cid={cid} />;

      const renderPage = () => {
        switch(page) {
          case "dash": return <Dashboard students={students} courses={courses} />;
          case "courses": return <CourseList courses={courses} onAdd={async c => { 
            const conflict = checkConflict(c, courses);
            if(conflict) return alert(conflict.msg);
            const {data} = await sysDB.post("courses", c); 
            if(data) setCourses(p=>[...p, mapper.course(data)]); 
          }} onUpdate={async c => {
            const conflict = checkConflict(c, courses);
            if(conflict) return alert(conflict.msg);
            await sysDB.patch("courses", `id=eq.${c.id}`, c); 
            setCourses(p=>p.map(x=>x.id===c.id?c:x));
          }} onDelete={async id => { if(confirm('과정을 삭제하시겠습니까?')){ await sysDB.remove("courses", `id=eq.${id}`); setCourses(p=>p.filter(x=>x.id!==id)); }}} />;
          case "students": return <StudentMgmt students
