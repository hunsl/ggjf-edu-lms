                </div>
              </Card>
            ))}
          </div>
          <Card style={{ padding:20 }}>
            <div style={{ fontSize:13, fontWeight:700, color:T.tx, marginBottom:14, display:"flex", gap:8 }}>
              <Icon n="info" s={15}/> 2026년 사업 개요
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10 }}>
              {[
                {l:"사업기간",v:"2026.01 ~ 12월"},
                {l:"사업대상",v:"만 18세↑ 미취업 경기도민"},
                {l:"총 사업량",v:"13개 과정 / 240명"},
                {l:"수료율 목표",v:"90% 이상"},
                {l:"취업률 목표",v:"65% 이상"},
              ].map(({l,v})=>(
                <div key={l} style={{ padding:"11px 13px", background:T.s2, borderRadius:8, border:`1px solid ${T.bd}` }}>
                  <div style={{ fontSize:10, color:T.mu }}>{l}</div>
                  <div style={{ fontSize:12, fontWeight:700, color:T.tx, marginTop:3 }}>{v}</div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      );
    };

    // ════════════════════════════════════════════════════════════
    // ATTENDANCE MANAGEMENT - QR
    // ════════════════════════════════════════════════════════════
    const AttendanceMgmt = ({ students, courses }) => {
      const [course, setCourse]   = useState(courses[3] || courses[0]);
      const [date, setDate]       = useState(DATES[DATES.length-1]);
      const [qrType, setQrType]   = useState("in");
      const [records, setRecords] = useState({});
      const [startH, setStartH] = useState(9);
      const [startM, setStartM] = useState(0);
      const [lateH,  setLateH]  = useState(9);
      const [lateM,  setLateM]  = useState(30);
      const [endH,   setEndH]   = useState(13);
      const [endM,   setEndM]   = useState(0);
      const [simRunning, setSimRunning] = useState(false);
      const [timeCustomized, setTimeCustomized] = useState(false);
      const [showTimeSetting, setShowTimeSetting] = useState(false);

      const startTotal = startH * 60 + startM;
      const lateTotal = lateH * 60 + lateM;
      const endTotal = endH * 60 + endM;

      const fmtTime = (h, m) => `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;

      const handleCourseChange = (c) => {
        setCourse(c);
        setRecords({});
        if (!timeCustomized) {
          const [sh, sm] = [c.schedTimeFrom?.split(":")[0]||9, c.schedTimeFrom?.split(":")[1]||0];
          const [eh, em] = [c.schedTimeTo?.split(":")[0]||13, c.schedTimeTo?.split(":")[1]||0];
          setStartH(+sh); setStartM(+sm);
          setEndH(+eh); setEndM(+em);
          setLateH(+sh); setLateM(+sm + 30);
        }
      };

      const calcStatus = (inMins) => {
        if (inMins === null) return "A";
        if (inMins <= lateTotal) return "O";
        return "L";
      };

      const courseStudents = students.filter(s=>s.cid===course.id);
      const checkedInCnt  = Object.values(records).filter(r=>r.in).length;
      const checkedOutCnt = Object.values(records).filter(r=>r.out).length;
      const presentCnt    = Object.values(records).filter(r=>r.in && calcStatus(r.in.mins)==="O").length;
      const lateCnt       = Object.values(records).filter(r=>r.in && calcStatus(r.in.mins)==="L").length;
      const absentCnt = courseStudents.length - checkedInCnt;

      const startSim = () => {
        if(simRunning) return;
        setSimRunning(true);
        if(qrType==="in") setRecords({});

        // ✅ FIX: 각 학생별 독립적 타이머로 처리 (중복 방지)
        courseStudents.forEach((s, idx) => {
          setTimeout(() => {
            const offsetMins = Math.floor(Math.random() * 80) - 10;
            const mins = Math.max(0, startTotal + offsetMins);
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            const time = fmtTime(h, m);

            if(qrType === "in") {
              setRecords(prev => ({...prev, [s.id]: { in: { time, mins } }}));
            } else {
              const outOffset = endTotal + Math.floor(Math.random()*20) - 5;
              const oh = Math.floor(outOffset/60), om = outOffset%60;
              setRecords(prev => ({...prev, [s.id]: { ...(prev[s.id]||{}), out: { time: fmtTime(oh,om) } }}));
            }
          }, idx * 250); // 250ms 간격
        });

        setTimeout(() => setSimRunning(false), courseStudents.length * 250);
      };

      const ATT_MAP = {
        O: { label:"출석", bg:"#ECFDF5", color:T.ok    },
        L: { label:"지각", bg:"#FFFBEB", color:T.warn   },
        A: { label:"결석", bg:"#FEF2F2", color:T.danger },
      };

      const inpSel = { padding:"5px 8px", border:`1px solid ${T.bd}`, borderRadius:7, fontSize:12, outline:"none", background:T.s2, color:T.tx, cursor:"pointer", width:64 };

      return (
        <div className="page">
          <SectionHead title="출결 관리" sub="QR 코드 출석으로 실시간 출결을 관리합니다"/>

          <Card style={{ padding:"14px 18px", marginBottom:16, display:"flex", gap:14, alignItems:"center", flexWrap:"wrap" }}>
            <button onClick={()=>setShowTimeSetting(v=>!v)} style={{ width:"100%", padding:"11px 18px", border:"none", background:"transparent", cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>
              <Icon n="cal" s={14}/>
              <div style={{ fontSize:12, fontWeight:700, color:T.tx }}>⏰ 수업 시간 설정</div>
              {timeCustomized && (<span style={{ fontSize:10, fontWeight:700, color:T.warn, background:"#FFFBEB", padding:"1px 7px", borderRadius:4 }}>수동 수정됨</span>)}
              <div style={{ marginLeft:"auto", display:"flex", gap:12, alignItems:"center", fontSize:12 }}>
                <span style={{ color:T.ok }}>수업 {fmtTime(startH,startM)} ~ {fmtTime(endH,endM)}</span>
                <span style={{ color:T.warn }}>지각기준 {fmtTime(lateH,lateM)} 이후</span>
              </div>
            </button>
            {showTimeSetting && (
              <div style={{ width:"100%", padding:"14px 18px", borderTop:`1px solid ${T.bd}`, display:"flex", gap:20, flexWrap:"wrap", alignItems:"flex-end" }}>
                {[
                  { label:"수업 시작", h:startH, m:startM, setH:(v)=>{setStartH(v);setTimeCustomized(true);}, setM:(v)=>{setStartM(v);setTimeCustomized(true);}, color:T.ok },
                  { label:"지각 기준", h:lateH, m:lateM, setH:(v)=>{setLateH(v);setTimeCustomized(true);}, setM:(v)=>{setLateM(v);setTimeCustomized(true);}, color:T.warn },
                  { label:"수업 종료", h:endH, m:endM, setH:(v)=>{setEndH(v);setTimeCustomized(true);}, setM:(v)=>{setEndM(v);setTimeCustomized(true);}, color:T.p },
                ].map(({label,h,m,setH,setM,color})=>(
                  <div key={label}>
                    <label style={{ fontSize:11, fontWeight:600, color:T.mu, display:"block", marginBottom:5 }}>{label}</label>
                    <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                      <select value={h} onChange={e=>setH(+e.target.value)} style={{...inpSel,borderColor:color, width:auto}}>
                        {Array.from({length:24},(_,i)=>i).map(v=><option key={v} value={v}>{String(v).padStart(2,"0")}시</option>)}
                      </select>
                      <span style={{ fontSize:14, fontWeight:700, color:T.mu }}>:</span>
                      <select value={m} onChange={e=>setM(+e.target.value)} style={{...inpSel,borderColor:color, width:auto}}>
                        {[0,10,20,30,40,50].map(v=><option key={v} value={v}>{String(v).padStart(2,"0")}분</option>)}
                      </select>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>

          <Card style={{ padding:"14px 18px", marginBottom:16, display:"flex", gap:14, alignItems:"center", flexWrap:"wrap" }}>
            <div>
              <div style={{ fontSize:10, color:T.mu, marginBottom:5, fontWeight:600 }}>과정 선택</div>
              <select value={course.id} onChange={e=>handleCourseChange(courses.find(c=>c.id===+e.target.value)||courses[0])} style={{ padding:"7px 10px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", background:T.s2, cursor:"pointer", color:T.tx }}>
                {courses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div>
              <div style={{ fontSize:10, color:T.mu, marginBottom:5, fontWeight:600 }}>수업일</div>
              <select value={date} onChange={e=>setDate(e.target.value)} style={{ padding:"7px 10px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", background:T.s2, cursor:"pointer", color:T.tx }}>
                {DATES.map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            </div>
            <div style={{ marginLeft:"auto", display:"flex", gap:14, alignItems:"center" }}>
              {[
                {v: Object.values(records).filter(r=>r.in && calcStatus(r.in.mins)==="O").length, l:"출석", c:T.ok},
                {v: Object.values(records).filter(r=>r.in && calcStatus(r.in.mins)==="L").length, l:"지각", c:T.warn},
                {v: courseStudents.length - Object.values(records).filter(r=>r.in).length, l:"미확인", c:T.danger},
              ].map(({v,l,c})=>(
                <div key={l} style={{ textAlign:"center" }}>
                  <div style={{ fontSize:18, fontWeight:800, color:c }}>{v}</div>
                  <div style={{ fontSize:9, color:T.mu }}>{l}</div>
                </div>
              ))}
              <div style={{ fontSize:13, color:T.mu }}>/ {courseStudents.length}명</div>
            </div>
          </Card>

          <div style={{ display:"grid", gridTemplateColumns:"auto 1fr", gap:16 }}>
            <Card style={{ padding:20, width:280, flexShrink:0 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:16 }}>
                {[
                  { id:"in",  label:"📥 입실 QR", color:"#2563EB" },
                  { id:"out", label:"📤 퇴실 QR", color:T.p },
                ].map(({id,label,color})=>(
                  <button key={id} onClick={()=>setQrType(id)} style={{ padding:"10px 6px", borderRadius:9, border:"none", cursor:"pointer", background: qrType===id ? color : T.s3, color: qrType===id ? "#fff" : T.mu, fontWeight:700, fontSize:11, transition:"all .15s" }}>{label}</button>
                ))}
              </div>
              <div style={{ fontSize:10, color:T.mu, lineHeight:1.8, marginBottom:10, padding:"8px 10px", background:T.s2, borderRadius:7, border:`1px solid ${T.bd}` }}>
                <b style={{color:T.tx}}>과정:</b> {course.name}<br/>
                <b style={{color:T.tx}}>날짜:</b> {date}<br/>
                <b style={{color:T.ok}}>수업시작:</b> {fmtTime(startH,startM)}<br/>
                <b style={{color:T.warn}}>지각기준:</b> {fmtTime(lateH,lateM)} 이후<br/>
                <b style={{color:T.p}}>수업종료:</b> {fmtTime(endH,endM)}<br/>
                <b style={{color:"#2563EB"}}>현재 QR:</b> {qrType==="in"?"입실":"퇴실"}
              </div>
            </Card>

            <Card style={{ overflow:"hidden", display:"flex", flexDirection:"column" }}>
              <div style={{ padding:"12px 18px", borderBottom:`1px solid ${T.bd}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ fontSize:13, fontWeight:700, color:T.tx, display:"flex", alignItems:"center", gap:8 }}>
                  📡 실시간 출석 현황
                  {simRunning && (<span style={{ fontSize:10, color:T.ok, display:"inline-flex", alignItems:"center", gap:4 }}><span style={{ width:6, height:6, background:T.ok, borderRadius:"50%", animation:"ping 1.2s ease infinite"}}/>LIVE</span>)}
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <Btn size="sm" variant="ghost" onClick={()=>{ setRecords({}); setSimRunning(false); }}>초기화</Btn>
                  <Btn size="sm" onClick={startSim} variant={simRunning?"ghost":"primary"}><Icon n="refresh" s={13}/>{simRunning ? "스캔 중…" : `${qrType==="in"?"입실":"퇴실"} 시뮬레이션`}</Btn>
                </div>
              </div>

              <div style={{ flex:1, padding:14, overflowY:"auto", maxHeight:400 }}>
                {courseStudents.map(s => {
                  const rec = records[s.id] || {};
                  const inRec = rec.in;
                  const status = inRec ? calcStatus(inRec.mins) : "A";
                  const att = ATT_MAP[inRec ? status : "A"];
                  return (
                    <div key={s.id} className={inRec?"checkin-row":""} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 12px", borderRadius:8, marginBottom:6, background: inRec ? att.bg : T.s2, border:`1px solid ${inRec ? att.color+"30" : T.bd}`, transition:"all .3s" }}>
                      <div style={{ width:34, height:34, borderRadius:9, flexShrink:0, background: inRec ? `${att.color}20` : T.bd, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color: inRec ? att.color : T.mu }}>{inRec ? att.label[0] : "?"}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:700, color:T.tx }}>{s.name}</div>
                        <div style={{ fontSize:10, color:T.mu, marginTop:1, display:"flex", gap:8 }}>{inRec ? <span style={{color:"#2563EB"}}>📥 입실 {inRec.time}</span> : "대기 중"}</div>
                      </div>
                      <div style={{ display:"flex", gap:5, alignItems:"center" }}>
                        {inRec && <Chip label={att.label} bg={att.bg} color={att.color}/>}
                        {!inRec && <Chip label="미확인" bg={T.s3} color={T.mu}/>}
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{ padding:"11px 18px", borderTop:`1px solid ${T.bd}`, background:T.s2 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                  <span style={{ fontSize:11, color:T.mu }}>입실 진행률</span>
                  <span style={{ fontSize:11, fontWeight:700, color:T.p }}>{courseStudents.length ? Math.round(checkedInCnt/courseStudents.length*100) : 0}% <span style={{ fontSize:10, color:T.mu, fontWeight:400, marginLeft:4 }}>({checkedInCnt}/{courseStudents.length})</span></span>
                </div>
                <RBar r={courseStudents.length ? checkedInCnt/courseStudents.length*100 : 0} h={8}/>
              </div>
            </Card>
          </div>
        </div>
      );
    };

    // ════════════════════════════════════════════════════════════
    // CERTIFICATE GENERATION
    // ════════════════════════════════════════════════════════════
    const printAttendCert = (s, c, certNo, issueDate) => {
      const birthFmt = s.birth ? s.birth.replace(/(\d{4})-(\d{2})-(\d{2})/, (_, y, m, day) => `${y}. ${String(+m)}. ${String(+day)}`) : "　　. 　. 　";
      
      // ✅ FIX: ⑥ 수강기간 실시간 포맷팅
      const periodLine = (() => {
        const fmtDate = d => d ? d.replace(/(\d{4})-(\d{2})-(\d{2})/, (_, y, m, day) => `${y}. ${String(+m)}. ${String(+day)}`) : "　　. 　. 　";
        const p = (c.dateFrom || c.dateTo) ? `${fmtDate(c.dateFrom)} ~ ${fmtDate(c.dateTo)}` : (c.period || "　　. 　. 　 ~ 　　. 　. 　");
        const days  = c.schedDays     || "";
        const tFrom = c.schedTimeFrom || "";
        const tTo   = c.schedTimeTo   || "";
        const dayStr  = days        ? ` / 매주 ${days}` : "";
        const timeStr = (tFrom&&tTo) ? ` ${tFrom} ∼ ${tTo}` : "";
        return p + dayStr + timeStr;
      })();

      const addr = s.addrCity || "　　　　　　　　　";

      const html = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/><title>수강증명서 - ${s.name}</title><style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Pretendard','맑은 고딕',sans-serif;background:#fff;display:flex;align-items:flex-start;justify-content:center;padding:20px 0;}
        .doc{width:210mm;min-height:297mm;padding:22mm 24mm 20mm;background:#fff;display:flex;flex-direction:column;}
        .doc-title{text-align:center;margin-bottom:28px;}
        .doc-title h1{font-size:24pt;font-weight:900;letter-spacing:12px;color:#111;border-bottom:3px double #333;display:inline-block;padding-bottom:8px;}
        .doc-no{font-size:10pt;color:#555;text-align:right;margin-bottom:20px;}
        .section{border:1.5px solid #333;margin-bottom:0;}
        .section+.section{border-top:none;}
        .section-title{background:#f0f0f0;padding:5px 12px;font-size:11pt;font-weight:800;color:#111;border-bottom:1px solid #bbb;letter-spacing:4px;}
        .row{display:flex;align-items:stretch;border-bottom:1px solid #ccc;min-height:36px;}
        .row:last-child{border-bottom:none;}
        .field-no{width:26px;background:#f8f8f8;display:flex;align-items:center;justify-content:center;font-size:9pt;color:#555;border-right:1px solid #ccc;flex-shrink:0;font-weight:700;}
        .field-label{width:88px;padding:7px 10px;font-size:10pt;font-weight:700;color:#222;border-right:1px solid #ccc;display:flex;align-items:center;background:#fafafa;flex-shrink:0;}
        .field-value{flex:1;padding:7px 12px;font-size:11pt;color:#111;display:flex;align-items:center;}
        .field-value.name-val{font-weight:800;font-size:13pt;}
        .body-text{text-align:center;font-size:11pt;line-height:2.2;color:#222;margin:28px 0 24px;}
        .sign-wrap{text-align:center;}
        .sign-date{font-size:12pt;color:#222;margin-bottom:36px;}
        .sign-line{display:inline-flex;align-items:center;gap:16px;}
        .sign-title{font-size:14pt;font-weight:700;color:#111;letter-spacing:3px;}
        .stamp-box{width:54px;height:54px;border:2px solid #333;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#333;font-size:13pt;font-weight:900;}
        .print-btn{position:fixed;bottom:24px;right:24px;background:#EA580C;color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(234,88,12,.4);font-family:'Pretendard',sans-serif;z-index:99;}
        @media print{body{padding:0;}.doc{padding:18mm 22mm 16mm;page-break-after:always;}.print-btn{display:none;}@page{size:A4 portrait;margin:0;}}
      </style></head><body><div class="doc">
        <div class="doc-title"><h1>직업교육훈련 수강증명서</h1></div>
        <div class="doc-no">제 2026-북부-수강-${certNo} 호</div>
        <div class="section">
          <div class="section-title">훈련생</div>
          <div class="row"><div class="field-no">①</div><div class="field-label">성　　명</div><div class="field-value name-val">${s.name}</div></div>
          <div class="row"><div class="field-no">②</div><div class="field-label">생년월일</div><div class="field-value">${birthFmt}</div></div>
          <div class="row"><div class="field-no">③</div><div class="field-label">주　　소</div><div class="field-value">${addr}</div></div>
        </div>
        <div class="section">
          <div class="section-title">수강명세</div>
          <div class="row"><div class="field-no">④</div><div class="field-label">훈련기관</div><div class="field-value">경기도일자리재단 북부사업본부</div></div>
          <div class="row"><div class="field-no">⑤</div><div class="field-label">수강직종</div><div class="field-value">${c.name}</div></div>
          <div class="row" style="min-height:46px;"><div class="field-no">⑥</div><div class="field-label">수강기간</div><div class="field-value" style="font-size:10.5pt;">${periodLine}</div></div>
        </div>
        <div class="body-text">위의 사실이 틀림없음을 증명합니다.</div>

          <div class="sign-date">${issueDate}</div>
          <div class="sign-line">
            <div class="sign-title">경기도일자리재단 대표이사</div>
            <div class="stamp-box">(인)</div>
          </div>
        </div>
      </div>
      <button class="print-btn" onclick="window.print()">🖨️ PDF 저장 / 인쇄</button>
      </body></html>`;

      const w = window.open("", "_blank", "width=900,height=1200");
      w.document.write(html);
      w.document.close();
    };

    const CertMgmt = ({ students, courses }) => {
      const [course, setCourse] = useState(courses[3] || courses[0]);
      const [issued, setIssued] = useState({});
      const [issueDate, setIssueDate] = useState("2026년 　 월 　 일");
      const [customDate, setCustomDate] = useState("");

      const eligible = students.filter(s => s.cid===course.id && s.rate>0);
      const getCertNo = (s, idx) => issued[s.id]?.no ?? `${course.code}-${String(idx+1).padStart(3,"0")}`;
      const fmtDate = raw => {
        if (!raw) return "";
        const [y,m,d] = raw.split("-");
        return `${y}년 ${m}월 ${d}일`;
      };

      const handleIssue = (s, idx) => {
        const no = getCertNo(s, idx);
        setIssued(p => ({ ...p, [s.id]: { no, date: issueDate } }));
        printAttendCert(s, course, no, issueDate);
      };

      const handleIssueAll = () => eligible.forEach((s, idx) => handleIssue(s, idx));

      return (
        <div className="page">
          <SectionHead title="증명서 발급" sub="수강증명서 공식 양식 출력 · 브라우저 인쇄 → PDF 저장"/>

          <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
            {courses.map(c => (
              <button key={c.id} onClick={()=>setCourse(c)} style={{ padding:"6px 12px", borderRadius:20, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, background: course.id===c.id ? c.cc : T.s3, color: course.id===c.id ? "#fff" : T.mu }}>
                {c.name.length>14 ? c.name.slice(0,14)+"…" : c.name}
              </button>
            ))}
          </div>

          <Card style={{ padding:"14px 18px", marginBottom:16, display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
            <div style={{ fontSize:12, fontWeight:700, color:T.tx }}>📅 발급일자</div>
            <input type="date" value={customDate} onChange={e => { setCustomDate(e.target.value); setIssueDate(fmtDate(e.target.value)); }} style={{ padding:"6px 10px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", background:T.s2, cursor:"pointer" }}/>
            <div style={{ fontSize:12, color:T.mu }}>→ <b style={{color:T.p}}>{issueDate}</b></div>
            <div style={{ marginLeft:"auto" }}>
              <Btn size="sm" onClick={handleIssueAll}><Icon n="dl" s={13}/> 전체 {eligible.length}명 출력</Btn>
            </div>
          </Card>

          <Card style={{ overflow:"hidden" }}>
            <div style={{ padding:"12px 18px", borderBottom:`1px solid ${T.bd}` }}>
              <span style={{ fontSize:13, fontWeight:700, color:T.tx }}>수강 대상자</span>
              <span style={{ fontSize:12, color:T.mu, marginLeft:8 }}>{eligible.length}명</span>
            </div>

            <table style={{ width:"100%", borderCollapse:"collapse" }}>
              <thead>
                <tr style={{ background:T.s2 }}>
                  {["번호","이름","생년월일","출석률","문서번호","발급여부",""].map(h=>(
                    <th key={h} style={{ padding:"10px 14px", textAlign:h==="이름"?"left":"center", fontSize:11, color:T.mu, fontWeight:700, borderBottom:`1px solid ${T.bd}` }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {eligible.length===0 && (
                  <tr><td colSpan={7} style={{ padding:"40px 0", textAlign:"center", fontSize:13, color:T.mu }}>수강자가 없습니다</td></tr>
                )}
                {eligible.map((s, idx) => {
                  const cert = issued[s.id];
                  const no = getCertNo(s, idx);
                  return (
                    <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                      <td style={{ padding:"12px 14px", textAlign:"center", fontSize:12, color:T.mu }}>{idx+1}</td>
                      <td style={{ padding:"12px 14px" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <div style={{ width:28, height:28, borderRadius:8, background:`${T.p}15`, color:T.p, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, flexShrink:0 }}>{s.name[0]}</div>
                          <span style={{ fontSize:13, fontWeight:700, color:T.tx }}>{s.name}</span>
                        </div>
                      </td>
                      <td style={{ padding:"12px 14px", textAlign:"center", fontSize:12, color:T.mu }}>{s.birth||"—"}</td>
                      <td style={{ padding:"12px 14px", textAlign:"center" }}>
                        <span style={{ fontSize:14, fontWeight:800, color: s.rate>=80?T.ok:s.rate>=60?T.warn:T.danger }}>{s.rate}%</span>
                      </td>
                      <td style={{ padding:"12px 14px", textAlign:"center", fontSize:11, color:T.mu, fontFamily:"monospace" }}>
                        {cert ? `2026-북부-수강-${no}호` : <span style={{color:T.bd}}>미발급</span>}
                      </td>
                      <td style={{ padding:"12px 14px", textAlign:"center" }}>
                        <Chip label={cert?"발급완료":"미발급"} bg={cert?T.pbg:T.s3} color={cert?T.p:T.mu}/>
                      </td>
                      <td style={{ padding:"12px 14px", textAlign:"center" }}>
                        <Btn size="sm" variant={cert?"ghost":"primary"} onClick={()=>handleIssue(s,idx)}><Icon n="dl" s={12}/>{cert?"재출력":"PDF 발급"}</Btn>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      );
    };

    // ════════════════════════════════════════════════════════════
    // APP ROOT
    // ════════════════════════════════════════════════════════════
    const NAV_ITEMS = [
      { id:"dash",       label:"대시보드", icon:"dash" },
      { id:"attendance", label:"출결 관리", icon:"check" },
      { id:"cert",       label:"증명서 발급", icon:"dl" },
    ];

    function App() {
      const [currentUser, setCurrentUser] = useState(() => {
        try { const u = sessionStorage.getItem("gjf_user"); return u ? JSON.parse(u) : null; }
        catch { return null; }
      });
      const [page, setPage] = useState("dash");
      const [collapsed, setCollapsed] = useState(false);
      const [students, setStudents] = useState(() => {
        try { const v = sessionStorage.getItem("gjf_students"); return v ? JSON.parse(v) : SEED_STUDENTS; }
        catch { return SEED_STUDENTS; }
      });
      const [courses, setCourses] = useState(() => {
        try { const v = sessionStorage.getItem("gjf_courses"); return v ? JSON.parse(v) : COURSES; }
        catch { return COURSES; }
      });

      useEffect(() => { try { sessionStorage.setItem("gjf_students", JSON.stringify(students)); } catch{} }, [students]);
      useEffect(() => { try { sessionStorage.setItem("gjf_courses", JSON.stringify(courses)); } catch{} }, [courses]);

      if (!currentUser) {
        const accounts = [
          { id:1, name:"관리자", role:"admin", pw:"admin1234" },
          { id:2, name:"김담당", role:"staff", pw:"gjf2026" },
          { id:3, name:"이담당", role:"staff", pw:"gjf2026" },
        ];
        return (
          <>
            <GStyle/>
            <LoginScreen accounts={accounts} onLogin={user => {
              sessionStorage.setItem("gjf_user", JSON.stringify(user));
              setCurrentUser(user);
            }}/>
          </>
        );
      }

      const renderPage = () => {
        switch(page) {
          case "dash": return <Dashboard students={students} courses={courses}/>;
          case "attendance": return <AttendanceMgmt students={students} courses={courses}/>;
          case "cert": return <CertMgmt students={students} courses={courses}/>;
          default: return null;
        }
      };

      return (
        <>
          <GStyle/>
          <div style={{ display:"flex", height:"100vh", background:"linear-gradient(160deg,#FED7AA 0%,#FDBA74 12%,#FFF7ED 45%,#F1F5F9 75%,#FFEDD5 100%)", fontFamily:"'Pretendard',-apple-system,sans-serif", overflow:"hidden" }}>
            <div style={{ width:collapsed?64:240, flexShrink:0, transition:"width .25s ease", background:`linear-gradient(180deg,${T.sb} 0%,${T.p} 55%,#F97316 100%)`, display:"flex", flexDirection:"column", overflow:"hidden", boxShadow:"4px 0 24px rgba(15,118,110,.25)" }}>
              <div style={{ padding:collapsed?"16px 0":"16px 18px", borderBottom:"1px solid rgba(255,255,255,.1)", display:"flex", alignItems:"center", justifyContent:collapsed?"center":"space-between" }}>
                {!collapsed && (
                  <div>
                    <div style={{ fontSize:13, fontWeight:900, color:"#fff", letterSpacing:"-.3px" }}>경기북부 직업교육</div>
                    <div style={{ display:"flex", alignItems:"center", gap:5, marginTop:3 }}>
                      <span style={{ background:"rgba(253,186,116,.3)", color:"#FED7AA", padding:"1px 6px", borderRadius:4, fontSize:9, fontWeight:700 }}>2026</span>
                      <span style={{ fontSize:10, color:"rgba(255,255,255,.45)" }}>학사관리시스템</span>
                    </div>
                  </div>
                )}
                <button onClick={()=>setCollapsed(!collapsed)} style={{ width:28, height:28, borderRadius:6, background:"rgba(255,255,255,.1)", border:"none", color:"rgba(255,255,255,.6)", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <Icon n="bars" s={14}/>
                </button>
              </div>

              <nav style={{ flex:1, padding:"10px 0", overflowY:"auto" }}>
                {NAV_ITEMS.map(item => {
                  const active = page===item.id;
                  return (
                    <button key={item.id} className="btn-nav" onClick={()=>setPage(item.id)} style={{ width:"100%", display:"flex", alignItems:"center", gap:10, padding:collapsed?"13px 0":"11px 18px", justifyContent:collapsed?"center":"flex-start", background:active?"rgba(255,255,255,.13)":"transparent", border:"none", cursor:"pointer", borderLeft:active?"3px solid #FED7AA":"3px solid transparent", color:active?"#fff":"rgba(255,255,255,.45)", fontWeight:active?700:400, fontSize:13 }}>
                      <Icon n={item.icon} s={16}/>
                      {!collapsed && <span style={{ whiteSpace:"nowrap" }}>{item.label}</span>}
                    </button>
                  );
                })}
              </nav>

              {!collapsed && (
                <div style={{ padding:"13px 18px", borderTop:"1px solid rgba(255,255,255,.1)" }}>
                  <button onClick={()=>{ if(window.confirm("로그아웃 하시겠습니까?")) { sessionStorage.removeItem("gjf_user"); setCurrentUser(null); } }} style={{ width:"100%", padding:"6px 0", borderRadius:7, border:"1px solid rgba(255,255,255,.2)", background:"rgba(255,255,255,.08)", color:"rgba(255,255,255,.7)", cursor:"pointer", fontSize:11, fontWeight:600 }}>🚪 로그아웃</button>
                </div>
              )}
            </div>

            <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
              <div style={{ height:52, background:"rgba(255,255,255,.9)", backdropFilter:"blur(12px)", borderBottom:`1px solid ${T.bd}`, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 22px", flexShrink:0 }}>
                <div style={{ fontSize:12, color:T.mu }}>
                  <span style={{ color:T.p, fontWeight:700 }}>경기도일자리재단 북부사업본부</span>
                  <span style={{ margin:"0 6px", color:T.bd }}>·</span>
                  직업교육 학사관리시스템 v2026
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:7, padding:"5px 10px", background:T.pbg, borderRadius:8 }}>
                  <div style={{ width:24, height:24, borderRadius:6, background:T.p, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <Icon n="user" s={12}/>
                  </div>
                  <span style={{ fontSize:11, fontWeight:700, color:T.p }}>{currentUser.name}</span>
                  {currentUser.role==="admin" && (<span style={{ fontSize:9, background:T.p, color:"#fff", padding:"1px 5px", borderRadius:3 }}>관리자</span>)}
                </div>
              </div>

              <div style={{ flex:1, overflowY:"auto", padding:22 }}>
                {renderPage()}
              </div>
            </div>
          </div>
        </>
      );
    }

    // ════════════════════════════════════════════════════════════
    // LOGIN SCREEN
    // ════════════════════════════════════════════════════════════
    const LoginScreen = ({ accounts, onLogin }) => {
      const [selId, setSelId] = useState(accounts[0]?.id || 1);
      const [pw, setPw] = useState("");
      const [showPw, setShowPw] = useState(false);
      const [error, setError] = useState("");
      const [agreed, setAgreed] = useState(false);
      const [shaking, setShaking] = useState(false);

      const handleLogin = () => {
        if(!agreed) { setError("개인정보 동의가 필요합니다."); return; }
        const acc = accounts.find(a => a.id === selId);
        if(!acc || acc.pw !== pw) {
          setError("비밀번호가 올바르지 않습니다.");
          setShaking(true);
          setTimeout(() => setShaking(false), 500);
          setPw("");
          return;
        }
        onLogin(acc);
      };

      const inp = { width:"100%", padding:"11px 14px", border:`1.5px solid ${T.bd}`, borderRadius:10, fontSize:14, outline:"none", color:T.tx, background:"#fff", fontFamily:"inherit", transition:"border-color .15s" };

      return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#7C2D12 0%,#EA580C 40%,#F97316 70%,#FED7AA 100%)", backgroundSize:"400% 400%", animation:"loginBg 12s ease infinite", fontFamily:"'Pretendard',-apple-system,sans-serif", padding:20 }}>
          <div style={{ width:"100%", maxWidth:440, animation:"fadeUp .5s ease" }}>
            <div style={{ textAlign:"center", marginBottom:28 }}>
              <div style={{ width:64, height:64, borderRadius:18, background:"rgba(255,255,255,.2)", backdropFilter:"blur(8px)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 14px", boxShadow:"0 8px 32px rgba(0,0,0,.2)" }}>
                <span style={{ fontSize:28 }}>🎓</span>
              </div>
              <div style={{ fontSize:18, fontWeight:900, color:"#fff", letterSpacing:"-.3px" }}>경기북부 직업교육</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,.6)", marginTop:4 }}>학사관리시스템 v2026</div>
            </div>

            <div style={{ background:"rgba(255,255,255,.96)", borderRadius:20, padding:"30px 32px", boxShadow:"0 24px 64px rgba(0,0,0,.25)", animation: shaking ? "shake .4s ease" : "none" }}>
              <div style={{ fontSize:15, fontWeight:800, color:T.tx, marginBottom:22, textAlign:"center" }}>🔐 담당자 로그인</div>

              <div style={{ marginBottom:14 }}>
                <label style={{ fontSize:11, fontWeight:700, color:T.mu, display:"block", marginBottom:6 }}>담당자 선택</label>
                <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                  {accounts.map(a => (
                    <button key={a.id} type="button" onClick={()=>{ setSelId(a.id); setError(""); }} style={{ padding:"8px 16px", borderRadius:10, border:"none", cursor:"pointer", fontSize:12, fontWeight:700, transition:"all .15s", background: selId===a.id ? T.p : T.s3, color: selId===a.id ? "#fff" : T.mu, boxShadow: selId===a.id ? "0 4px 12px rgba(234,88,12,.3)" : "none" }}>
                      {a.name} {a.role==="admin" && <span style={{ marginLeft:5, fontSize:9, background:"rgba(255,255,255,.2)", padding:"1px 5px", borderRadius:4 }}>관리자</span>}
                    </button>
                  ))}
                </div>
              </div>

              <div style={{ marginBottom:16 }}>
                <label style={{ fontSize:11, fontWeight:700, color:T.mu, display:"block", marginBottom:6 }}>비밀번호</label>
                <div style={{ position:"relative" }}>
                  <input type={showPw ? "text" : "password"} value={pw} onChange={e=>{ setPw(e.target.value); setError(""); }} onKeyDown={e=>{ if(e.key==="Enter") handleLogin(); }} placeholder="비밀번호를 입력하세요" style={{ ...inp, paddingRight:44, borderColor: error ? T.danger : T.bd }}/>
                  <button type="button" onClick={()=>setShowPw(v=>!v)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", border:"none", background:"transparent", cursor:"pointer", color:T.mu, fontSize:16, padding:0 }}>{showPw ? "🙈" : "👁️"}</button>
                </div>
                {error && (<div style={{ marginTop:6, fontSize:11, color:T.danger, fontWeight:600 }}>⚠️ {error}</div>)}
              </div>

              <div style={{ marginBottom:20, padding:"12px 14px", borderRadius:10, background:"#FFF7ED", border:`1px solid ${T.pl}50` }}>
                <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                  <input type="checkbox" id="piAgree" checked={agreed} onChange={e=>setAgreed(e.target.checked)} style={{ marginTop:2, accentColor:T.p, width:15, height:15, cursor:"pointer", flexShrink:0 }}/>
                  <label htmlFor="piAgree" style={{ fontSize:11, color:T.tx, lineHeight:1.7, cursor:"pointer" }}>
                    이 시스템은 <b>훈련생 개인정보</b>를 포함하고 있습니다.<br/>
                    「개인정보보호법」에 따라 업무 목적 외 사용·유출을 금지합니다.<br/>
                    <span style={{ color:T.p, fontWeight:700 }}>본인은 이를 준수할 것에 동의합니다.</span>
                  </label>
                </div>
              </div>

              <button onClick={handleLogin} style={{ width:"100%", padding:"13px 0", borderRadius:11, border:"none", background: agreed ? `linear-gradient(135deg,${T.sb},${T.p})` : T.s3, color: agreed ? "#fff" : T.mu, fontSize:14, fontWeight:800, cursor: agreed ? "pointer" : "not-allowed", boxShadow: agreed ? "0 6px 20px rgba(234,88,12,.35)" : "none", transition:"all .2s", letterSpacing:"1px" }}>로그인</button>

              <div style={{ marginTop:12, fontSize:10, color:T.mu, textAlign:"center" }}>비밀번호 분실 시 관리자에게 문의하세요 · 초기: <code style={{background:T.s3, padding:"1px 5px", borderRadius:4}}>gjf2026</code></div>
            </div>

            <div style={{ textAlign:"center", marginTop:16, fontSize:10, color:"rgba(255,255,255,.4)" }}>© 2026 경기도일자리재단 북부사업본부</div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    (function hideSplash() {
      let attempts = 0;
      const timer = setInterval(function() {
        attempts++;
        const root = document.getElementById('root');
        if ((root && root.children.length > 0) || attempts > 60) {
          clearInterval(timer);
          const l = document.getElementById('loading');
          if (l) { l.style.opacity = '0'; setTimeout(function(){ if(l.parentNode) l.parentNode.removeChild(l); }, 400); }
        }
      }, 200);
    })();
  </script>
</body>
</html>
