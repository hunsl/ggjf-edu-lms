function rateColor(r){ return r>=80?T.ok:r>=70?T.warn:T.danger; }
function calcAge(birth){
  if(!birth) return "-";
  const b=new Date(birth),t=new Date();
  let a=t.getFullYear()-b.getFullYear();
  if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate())) a--;
  return isNaN(a)?"-":`${a}세`;
}
function chip(label,bg,color,size=11){
  return `<span class="chip" style="background:${bg};color:${color};font-size:${size}px;padding:2px 8px">${label}</span>`;
}
function rbar(r,h=5){
  const c=rateColor(r);
  return `<div class="rbar-wrap" style="height:${h}px"><div class="rbar-fill" style="width:${Math.min(r,100)}%;background:${c};height:${h}px"></div></div>`;
}

// NAVIGATION
// ═══════════════════════════════════════════════════════════
function navigate(page, el){
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b=>{
    b.classList.remove('active');
    const dot = b.querySelector('.nav-dot');
    if(dot) dot.remove();
  });
  if(el){
    el.classList.add('active');
    el.innerHTML = el.innerHTML + '<span class="nav-dot" style="margin-left:auto;width:5px;height:5px;border-radius:50%;background:#FED7AA"></span>';
  }
  renderPage();
}
function toggleSidebar(){
  sidebarCollapsed = !sidebarCollapsed;
  const sb = document.getElementById('sidebar');
  const logoText = document.getElementById('logo-text');
  const userInfo = document.getElementById('user-info');
  const labels = document.querySelectorAll('.nav-label,.nav-dot');
  if(sidebarCollapsed){
    sb.classList.add('collapsed');
    if(logoText) logoText.style.display='none';
    if(userInfo) userInfo.style.display='none';
    labels.forEach(l=>l.style.display='none');
  } else {
    sb.classList.remove('collapsed');
    if(logoText) logoText.style.display='';
    if(userInfo) userInfo.style.display='';
    labels.forEach(l=>l.style.display='');
  }
}

function renderPage(){
  const c = document.getElementById('content');
  c.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'page';
  switch(currentPage){
    case 'dash':       div.innerHTML = renderDashboard(); break;
    case 'courses':    div.innerHTML = renderCourses(); break;
    case 'students':   div.innerHTML = renderStudents(); break;
    case 'attendance': div.innerHTML = renderAttendance(); break;
    case 'completion': div.innerHTML = renderCompletion(); break;
    case 'cert':       div.innerHTML = renderCert(); break;
  }
  c.appendChild(div);
  bindPageEvents();
}

      <td style="text-align:center;min-width:80px"><div style="font-size:14px;font-weight:800;color:${col}">${s.rate}%</div>${rbar(s.rate,4)}<div style="font-size:9px;color:${col};margin-top:2px">${s.rate>=80?"정상":s.rate>=70?"주의":"위험"}</div></td>

      <select onchange="studentCourseFilter=+this.value;renderPage()" style="padding:7px 10px;border:1px solid ${T.bd};border-radius:8px;font-size:12px;outline:none;background:${T.s2};color:${T.tx};cursor:pointer">
        <option value="0" ${studentCourseFilter===0?'selected':''}>전체 과정</option>${courseOpts}</select>
      <button onclick="studentRiskOnly=!studentRiskOnly;renderPage()" style="display:flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid ${studentRiskOnly?T.danger:T.bd};border-radius:8px;background:${studentRiskOnly?"#FEF2F2":T.s2};color:${studentRiskOnly?T.danger:T.mu};cursor:pointer;font-size:12px;font-weight:600;transition:all .15s">${svgIcon('alert',13)} 위험만</button>

      <table style="min-width:860px">
        <thead><tr>
          ${["이름·성별·나이","과정","거주지","연락처","학력·경력","취약계층","면접","출석률",""].map(h=>`<th style="text-align:${h==="이름·성별·나이"||h==="학력·경력"?"left":"center"}">${h}</th>`).join('')}

let importPreview = null;
function renderStudentImport(){
  if(!importPreview) return `
    <div class="section-head">
      <div><h2 style="font-size:20px;font-weight:800;color:${T.tx}">엑셀 업로드</h2></div>
      <button class="btn btn-ghost btn-sm" onclick="studentTab='list';renderPage()">${svgIcon('x',13)} 목록으로</button>

      <div id="dropZone" class="drop-zone" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event)" onclick="document.getElementById('fileInput').click()" style="padding:48px 24px;text-align:center;cursor:pointer;border:2px dashed ${T.pl};border-radius:12px;margin:16px">
        <div style="font-size:36px;margin-bottom:12px">📂</div>

        <div style="font-size:12px;color:${T.mu};margin-bottom:16px">또는 클릭해서 파일 선택 (.xlsx, .xls 지원)</div>
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();document.getElementById('fileInput').click()">${svgIcon('upload',13)} 파일 선택</button>
        <input id="fileInput" type="file" accept=".xlsx,.xls" style="display:none" onchange="handleFileInput(this)">
      </div>
      <div style="padding:14px 20px;background:${T.s2};border-top:1px solid ${T.bd};display:flex;gap:20px;align-items:center">
        ${svgIcon('info',16)}
        <div style="font-size:12px;color:${T.mu};flex:1">엑셀 양식은 <b style="color:${T.p}">양식 다운로드</b> 버튼에서 받으실 수 있습니다. 필수 컬럼: <b>이름, 생년월일, 연락처, 과정코드</b></div>
        <button class="btn btn-ghost btn-sm" onclick="downloadTemplate()">${svgIcon('dl',12)} 양식 받기</button>
      </div>
    </div>`;

  const rows = importPreview.map((r,i)=>{
    const c=COURSES.find(x=>x.code===r["과정코드"]);
    return `<tr class="row-hover">
      ${TEMPLATE_HEADERS.map(h=>`<td style="font-size:12px">${r[h]||''}</td>`).join('')}
      <td>${c?chip(c.name.length>14?c.name.slice(0,14)+'…':c.name,`${c.cc}12`,c.cc):chip("과정코드 오류","#FEF2F2",T.danger)}</td>
    </tr>`;}).join('');

  return `
    <div class="section-head">
      <div><h2 style="font-size:20px;font-weight:800;color:${T.tx}">업로드 미리보기</h2><p style="font-size:12px;color:${T.mu}">${importPreview.length}명 확인</p></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="importPreview=null;renderPage()">${svgIcon('x',12)} 취소</button>
        <button class="btn btn-primary btn-sm" onclick="confirmImport()">${svgIcon('check',12)} ${importPreview.length}명 등록 확정</button>
      </div>
    </div>
    <div class="card" style="overflow:hidden"><div style="overflow-x:auto">
      <table><thead><tr>${TEMPLATE_HEADERS.map(h=>`<th>${h}</th>`).join('')}<th>매칭 과정</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
}
function handleDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f) parseExcelFile(f);
}
function handleFileInput(inp){
  if(inp.files[0]) parseExcelFile(inp.files[0]);
}
function parseExcelFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    importPreview=XLSX.utils.sheet_to_json(ws,{defval:""});
    renderPage();
  };
  reader.readAsArrayBuffer(file);
}
function confirmImport(){
  if(!importPreview) return;
  const news=importPreview.map((r,i)=>{
    const code=r["과정코드"]||"";
    const c=COURSES.find(x=>x.code===code)||COURSES[0];
    return {id:Date.now()+i,cid:c.id,name:r["이름"]||"",birth:r["생년월일"]||"",gender:r["성별"]||"",
      phone:r["연락처"]||"",phoneEmer:r["비상연락처"]||"",addrCity:r["거주시"]||"",addrDong:r["거주읍면동"]||"",
      edu:r["최종학력"]||"",major:r["전공"]||"",career:r["경력"]||"",certs:r["자격증"]||"",
      empType:r["취업형태"]||"미취업",unemployment:r["실업급여수급"]==="Y",disabled:r["장애여부"]==="Y",veteran:r["보훈여부"]==="Y",
      itvDate:r["면접일자"]||"",itvScore:r["면접점수"]||"",itvGrade:r["면접등급"]||"",itvPass:r["합격여부"]==="Y",
      memo:r["특이사항"]||"",idBack:r["주민번호뒷자리"]||"",
      rate:Math.round(60+Math.random()*40)};
  });
  STUDENTS=[...STUDENTS,...news];
  importPreview=null;
  studentTab='list';
  alert(`✅ ${news.length}명이 성공적으로 등록되었습니다.`);
  renderPage();
}

  const ATT_MAP={O:{label:"출석",bg:"#FFF7ED",color:T.ok},L:{label:"지각",bg:"#FFFBEB",color:T.warn},A:{label:"결석",bg:"#FEF2F2",color:T.danger},E:{label:"외출",bg:"#F5F3FF",color:"#7C3AED"}};

function startSimulation(cid){
  if(simInterval) return;
  checkIns={};
  const students=STUDENTS.filter(s=>s.cid===cid);
  const btn=document.getElementById('simBtn');
  const liveTag=document.getElementById('liveTag');
  if(btn){btn.innerHTML=svgIcon('refresh',13)+' 스캔 중…';btn.disabled=true;}
  if(liveTag) liveTag.style.display='inline-flex';
  let i=0;
  simInterval=setInterval(()=>{
    if(i>=students.length){clearInterval(simInterval);simInterval=null;if(btn){btn.innerHTML=svgIcon('phone',13)+' QR 스캔 시뮬레이션';btn.disabled=false;}if(liveTag)liveTag.style.display='none';return;}
    const s=students[i];
    const minOffset=Math.floor(Math.random()*90)-15;
    const h=9+Math.floor((minOffset+15)/60);
    const m=((minOffset+15)%60+60)%60;
    const time=`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
    const status=minOffset<0?"O":minOffset<30?"O":Math.random()<0.3?"A":"L";
    checkIns[s.id]={time,status};
    // Update just the list without full re-render
    updateCheckInList(cid);
    i++;
  },600);
}
function updateCheckInList(cid){
  const course=COURSES.find(c=>c.id===cid)||COURSES[0];
  const courseStudents=STUDENTS.filter(s=>s.cid===cid);
  const ATT_MAP={O:{label:"출석",bg:"#FFF7ED",color:T.ok},L:{label:"지각",bg:"#FFFBEB",color:T.warn},A:{label:"결석",bg:"#FEF2F2",color:T.danger},E:{label:"외출",bg:"#F5F3FF",color:"#7C3AED"}};
  const checkedIn=Object.keys(checkIns).length;
  const presentCnt=Object.values(checkIns).filter(v=>v.status==="O").length;
  const lateCnt=Object.values(checkIns).filter(v=>v.status==="L").length;
  const prog=courseStudents.length?Math.round(checkedIn/courseStudents.length*100):0;
  const list=document.getElementById('checkInList');
  if(list){
    list.innerHTML=courseStudents.map(s=>{
      const ci=checkIns[s.id];
      const att=ATT_MAP[ci?.status||'X']||{label:"미확인",bg:T.s2,color:T.mu};
      return `<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;margin-bottom:6px;background:${ci?att.bg:T.s2};border:1px solid ${ci?att.color+"30":T.bd};transition:all .3s">
        <div style="width:36px;height:36px;border-radius:10px;flex-shrink:0;background:${ci?att.color+"20":T.bd};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${ci?att.color:T.mu}">${ci?att.label[0]:"?"}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:${T.tx}">${s.name}</div><div style="font-size:10px;color:${T.mu};margin-top:1px">${ci?`스캔 시각: ${ci.time}`:"대기 중"}</div></div>
        ${ci?chip(att.label,att.bg,att.color):chip("미확인",T.s3,T.mu)}
      </div>`;}).join('');
  }
  // update progress
  const pfill=document.querySelector('.progress-bar-fill');
  if(pfill) pfill.style.width=prog+'%';
  const pText=document.querySelector('.progress-bar-wrap + *');
}

let completionCourseId=4, completionThreshold=80;
function renderCompletion(){
  const course=COURSES.find(c=>c.id===completionCourseId)||COURSES[0];

  const getResult=s=>completionOverrides[s.id]??(s.rate>=completionThreshold?"수료":"미수료");

  const rate=list.length?Math.round(completed/list.length*100):0;

  let tabBtns=COURSES.map(c=>`<button class="tag-btn" onclick="completionCourseId=${c.id};renderPage()" style="background:${completionCourseId===c.id?c.cc:T.s3};color:${completionCourseId===c.id?"#fff":T.mu};white-space:nowrap">${c.name.length>14?c.name.slice(0,14)+'…':c.name}</button>`).join('');
  let rows=list.map(s=>{

        <div style="font-size:11px;color:${T.mu}">수료율</div>

function autoJudge(){
  const list=STUDENTS.filter(s=>s.cid===completionCourseId);
  list.forEach(s=>{ completionOverrides[s.id]=s.rate>=completionThreshold?"수료":"미수료"; });

}

function certFmtDate(raw){

function issueCert(sid, idx, code, hours, period, courseName, issueDate){

  certIssued[sid]={no,date:issueDate};
  printCertificate(s,{name:courseName,code,hours,period},no,issueDate);
  renderPage();
}
function issueAllCerts(code, hours, period, courseName, issueDate){
  const course={name:courseName,code,hours,period};

    certIssued[s.id]={no,date:issueDate};
    setTimeout(()=>printCertificate(s,course,no,issueDate),idx*300);
  });
  setTimeout(()=>renderPage(),eligible.length*300+100);
}

function selectCat(cat,cc){
  _curCat=cat; _curCc=cc;
  const CAT_COLORS={"늘봄강사양성":"#EA580C","지역연계·기여":"#C2410C","사무분야":"#9A3412","식품분야":"#DC2626","IT 신직무":"#F97316"};

  const preview=document.getElementById('coursePreview');

  const name=document.getElementById('cName')?.value||"";
  const code=document.getElementById('cCode')?.value||"";
  const period=document.getElementById('cPeriod')?.value||"";
  const method=document.getElementById('cMethod')?.value||"대면";
  const hours=document.getElementById('cHours')?.value||0;
  preview.style.borderLeftColor=_curCc||T.p;

  const obj={cat:_curCat,cc:_curCc,name,code,
    period:document.getElementById('cPeriod')?.value||"",

  });

function selectPass(v){
  _curPass=v;
  [true,false].forEach(x=>{
    const btn=document.getElementById('passBtn_'+x);

  const name=document.getElementById('sName')?.value||"";
  if(!name){alert("이름은 필수입니다.");return;}
  const obj={
    name,gender:_curGender,
    cid:+(document.getElementById('sCid')?.value||COURSES[0]?.id),
    birth:document.getElementById('sBirth')?.value||"",

    unemployment:document.getElementById('sUnemployment')?.checked||false,

    veteran:document.getElementById('sVeteran')?.checked||false,
    memo:document.getElementById('sMemo')?.value||"",
    rate:id===null?0:(STUDENTS.find(s=>s.id===id)?.rate||0),

              <div style="font-size:11px;color:${T.mu};line-height:1.6">훈련생 <b style="color:${T.p}">${STUDENTS.length}명</b> 전체 데이터와 과정별 집계를 엑셀(.xlsx) 2개 시트로 내보냅니다.</div>
              <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="backupAll()">${svgIcon('dl',13)} 백업 파일 다운로드</button>
            </div>
          </div>
        </div>
        <div style="padding:18px;background:#FEF2F2;border-radius:10px;border:1px solid #FECACA">
          <div style="display:flex;gap:12px;align-items:flex-start">
            <div style="width:40px;height:40px;border-radius:10px;background:#FEE2E2;color:${T.danger};display:flex;align-items:center;justify-content:center;flex-shrink:0">${svgIcon('refresh',20)}</div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:700;color:${T.tx};margin-bottom:3px">데이터 초기화</div>
              <div style="font-size:11px;color:${T.mu};line-height:1.6;margin-bottom:10px">샘플 포함 모든 훈련생 데이터를 삭제합니다. <b style="color:${T.danger}"> 되돌릴 수 없습니다.</b></div>
              <div id="resetArea"><button class="btn btn-danger btn-sm" onclick="showResetConfirm()">${svgIcon('alert',13)} 초기화</button></div>
            </div>
          </div>
        </div>
        <div style="font-size:11px;color:${T.mu};text-align:center">💡 초기화 전에 반드시 백업을 먼저 받아두세요</div>
      </div>
    </div>
  </div>`;
  document.getElementById('modals').innerHTML=html;
}
function showResetConfirm(){
  const area=document.getElementById('resetArea');
  if(!area) return;
  area.innerHTML=`<div style="background:#FEE2E2;border-radius:8px;padding:12px 14px">
    <div style="font-size:12px;font-weight:700;color:${T.danger};margin-bottom:8px">⚠️ 정말 초기화하시겠습니까?</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('resetArea').innerHTML='<button class=\\'btn btn-danger btn-sm\\' onclick=\\'showResetConfirm()\\'>${svgIcon('alert',13)} 초기화</button>'">취소</button>
      <button class="btn btn-danger btn-sm" onclick="STUDENTS=[];closeModal();renderPage()">네, 초기화합니다</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// EXCEL UTILITIES
// ═══════════════════════════════════════════════════════════
function downloadTemplate(){
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([TEMPLATE_HEADERS,
    ["홍길동","남","1990-01-01","1234567","010-1234-5678","010-9999-0000","의정부시","민락동","대졸","기계공학","물류창고 2년","지게차1종","미취업","Y","N","N","2026-02-14","88","A","Y","취업의지 강함","JY-01"],
    ["김영희","여","1995-05-15","2345678","010-9876-5432","010-8888-1111","양주시","회천동","고졸","-","없음","없음","미취업","N","N","N","2026-02-14","75","B","Y","성실함","SM-01"],
  ]);
  ws["!cols"]=[6,4,11,10,13,13,8,8,7,10,14,14,7,7,5,5,11,6,5,5,20,8].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,"훈련생명단");
  const wsRef=XLSX.utils.aoa_to_sheet([["과정코드","과정명","교육기간","방식","시수"],...COURSES.map(c=>[c.code,c.name,c.period,c.method,c.hours])]);
  XLSX.utils.book_append_sheet(wb,wsRef,"과정코드참고");
  const wsGuide=XLSX.utils.aoa_to_sheet([["항목","입력값 안내"],["성별","남 / 여"],["취업형태","미취업 / 자영업 / 단기근로"],["실업급여수급","Y / N"],["장애여부","Y / N"],["보훈여부","Y / N"],["합격여부","Y / N"],["면접등급","A+ / A / B+ / B / C / 탈락"]]);
  XLSX.utils.book_append_sheet(wb,wsGuide,"입력안내");
  const out=XLSX.write(wb,{bookType:"xlsx",type:"array"});
  const blob=new Blob([out],{type:"application/octet-stream"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="훈련생_등록양식_2026.xlsx";
  a.click();
}
function backupAll(){
  const wb=XLSX.utils.book_new();
  const rows=STUDENTS.map(s=>{
    const c=COURSES.find(x=>x.id===s.cid);
    return {"이름":s.name,"성별":s.gender||"","생년월일":s.birth,"주민번호뒷자리":s.idBack||"","연락처":s.phone,"거주시군":s.addrCity||"","거주읍면동":s.addrDong||"","과정코드":c?.code||"","과정명":c?.name||"","면접일":s.itvDate||"","면접점수":s.itvScore||"","면접등급":s.itvGrade||"","합격여부":s.itvPass?"합격":"불합격","특이사항":s.memo||"","출석률(%)":s.rate,"수료여부":s.rate>=80?"수료":"미수료"};
  });
  const ws1=XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb,ws1,"전체_훈련생");
  const byC={};
  STUDENTS.forEach(s=>{if(!byC[s.cid])byC[s.cid]={enrolled:0,completed:0,sumRate:0};byC[s.cid].enrolled++;if(s.rate>=80)byC[s.cid].completed++;byC[s.cid].sumRate+=s.rate;});
  const summary=COURSES.map(c=>{const d=byC[c.id]||{enrolled:0,completed:0,sumRate:0};return{"과정코드":c.code,"과정명":c.name,"분야":c.cat,"모집목표":c.tgt,"현재등록":d.enrolled,"수료목표":c.cGoal,"수료인원":d.completed,"수료율(%)":d.enrolled?Math.round(d.completed/d.enrolled*100):0};});
  const ws2=XLSX.utils.json_to_sheet(summary);
  XLSX.utils.book_append_sheet(wb,ws2,"과정별_집계");
  const out=XLSX.write(wb,{bookType:"xlsx",type:"array"});
  const blob=new Blob([out],{type:"application/octet-stream"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`경기북부_학사_백업_${new Date().toISOString().slice(0,10)}.xlsx`;
  a.click();
}
