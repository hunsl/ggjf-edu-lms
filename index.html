  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* 🎨 SANG HUN MASTER ERP DESIGN SYSTEM */
    :root {
      /* Brand Colors (Northern Gyeonggi Identity) */
      --p: #EA580C; --p-dark: #C2410C; --p-light: #FB923C; --p-soft: #FFF7ED;
      --sb: #7C2D12; --sb-dark: #451A03;
      
      /* Neutral Palette */
      --tx: #0F172A; --tx-sub: #334155; --mu: #64748B; --mu-light: #94A3B8;
      --bd: #E2E8F0; --bd-light: #F1F5F9;
      --s1: #FFFFFF; --s2: #F8FAFC; --s3: #F1F5F9;
      
      /* Semantic Colors */
      --ok: #10B981; --warn: #F59E0B; --danger: #EF4444; --info: #3B82F6; --purple: #8B5CF6;
      
      /* Geometry */
      --radius-sm: 8px; --radius-md: 16px; --radius-lg: 28px;
      --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background: var(--s2); color: var(--tx); }

    /* 🌊 Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-up { animation: fadeUp 0.6s var(--ease) both; }
    
    /* 🧭 Professional Sidebar */
    .nav-link {
      display: flex; align-items: center; gap: 16px; padding: 18px 24px; border-radius: 20px; 
      cursor: pointer; color: rgba(255,255,255,0.55); transition: all 0.3s ease; border: none; 
      background: transparent; width: 100%; text-align: left; font-size: 15.5px; font-weight: 600;
      margin-bottom: 6px; position: relative;
    }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); transform: translateX(5px); }
    .nav-link.active { color: #fff; background: linear-gradient(135deg, var(--p) 0%, var(--p-dark) 100%); font-weight: 800; box-shadow: 0 10px 25px rgba(124,45,18,0.35); }
    .nav-link.active::after { content: ''; position: absolute; left: 0; width: 5px; height: 24px; background: #fff; border-radius: 0 4px 4px 0; }

    /* 📊 Master Table Grid */
    .master-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .master-table th { background: var(--s3); padding: 22px 18px; font-size: 13px; font-weight: 800; color: var(--mu); text-transform: uppercase; border-bottom: 2px solid var(--bd); letter-spacing: 0.5px; }
    .master-table td { padding: 20px 18px; border-bottom: 1px solid var(--bd-light); font-size: 14.5px; transition: background 0.2s; }
    .master-table tr:hover td { background: var(--p-soft); }

    /* 폼 컨트롤 고도화 */
    input, select, textarea { width: 100%; padding: 15px 18px; border-radius: 14px; border: 2px solid var(--bd-light); background: #fff; font-size: 15px; outline: none; transition: var(--ease); }
    input:focus { border-color: var(--p); box-shadow: 0 0 0 4px var(--p-soft); }

    /* 시스템 로딩 */
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, var(--sb), var(--sb-dark)); z-index: 9999; transition: opacity 0.8s; color: #fff; }
    .loader-circle { width: 100px; height: 100px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media print { .no-print { display: none !important; } body { background: #fff; overflow: visible; } }
  </style>
</head>

    const SB_URL = "https://vqkjakgbrsnsererwmma.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxa2pha2dicnNuc2VyZXJ3bW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDA2MjIsImV4cCI6MjA4ODkxNjYyMn0.caGpzJdTcfT3CZTkJi2Mctte3nNvh3e6xTtFVaCfkiM";

    /* ── 13개 과정 테스트 시드 데이터 (한글 중심) ── */
    const SEED_COURSES = [
      { id: 1, name: "AI 생성형 도구 실무 (1기)", cat: "IT/신직무", target: 25, current: 24, from: "2026-03-02", to: "2026-06-25", rate: 98 },
      { id: 2, name: "늘봄 교실 강사 양성 (3기)", cat: "늘봄교실", target: 30, current: 30, from: "2026-03-10", to: "2026-05-20", rate: 100 },
      { id: 3, name: "전산세무회계 실무 (2기)", cat: "사무/회계", target: 20, current: 18, from: "2026-03-15", to: "2026-07-10", rate: 90 },
      { id: 4, name: "파이썬 데이터 분석 (1기)", cat: "IT/신직무", target: 20, current: 20, from: "2026-03-01", to: "2026-06-15", rate: 100 },
      { id: 5, name: "요양보호사 자격 취득 (5기)", cat: "사회복지", target: 35, current: 32, from: "2026-03-20", to: "2026-05-30", rate: 91 },
      { id: 6, name: "디지털 마케팅 전문가 (1기)", cat: "IT/신직무", target: 25, current: 25, from: "2026-04-01", to: "2026-07-30", rate: 100 },
      { id: 7, name: "한식 조리 기능사 (2기)", cat: "식품조리", target: 20, current: 19, from: "2026-03-05", to: "2026-05-15", rate: 95 },
      { id: 8, name: "쇼핑몰 창업 실무 (3기)", cat: "창업", target: 15, current: 15, from: "2026-03-12", to: "2026-06-01", rate: 100 },
      { id: 9, name: "GTX 연계 물류 관리 (1기)", cat: "물류/유통", target: 25, current: 23, from: "2026-04-10", to: "2026-08-20", rate: 92 },
      { id: 10, name: "반도체 공정 기초 (1기)", cat: "제조/기술", target: 20, current: 20, from: "2026-03-25", to: "2026-07-15", rate: 100 },
      { id: 11, name: "드론 정비 및 조종 (2기)", cat: "IT/신직무", target: 15, current: 14, from: "2026-03-01", to: "2026-05-10", rate: 93 },
      { id: 12, name: "커피 바리스타 마스터 (4기)", cat: "서비스", target: 15, current: 15, from: "2026-03-18", to: "2026-05-10", rate: 100 },
      { id: 13, name: "웹 디자인 기능사 (1기)", cat: "IT/신직무", target: 25, current: 25, from: "2026-04-15", to: "2026-08-30", rate: 100 }
    ];

    /* ═══════════════════════════════════════════════════════════
       2. REUSABLE ATOMS (고성능 벡터 아이콘 및 UI 부품)
    ═══════════════════════════════════════════════════════════ */
    const Icon = ({ n, s=20, c="currentColor", style={} }) => {
      const paths = {
        dash: <><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></>,
        course: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>,
        students: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></>,
        instr: <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>,
        room: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
        attend: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        completion: <><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>,
        cert: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
        people: <><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/></>,
        award: <><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>
      };
      return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0, ...style}}>{paths[n]}</svg>;
    };

    const Btn = ({ children, onClick, variant="primary", icon }) => {
      const vars = {
        primary: { background: "var(--p)", color: "#fff", boxShadow: "0 8px 15px rgba(234, 88, 12, 0.25)" },
        white: { background: "#fff", color: "var(--tx)", border: "2.5px solid var(--bd-light)" }
      };
      return (
        <button onClick={onClick} style={{ padding: "14px 30px", borderRadius: "16px", border: "none", cursor: "pointer", fontWeight: 800, fontSize: "15px", display: "inline-flex", alignItems: "center", gap: 10, transition: "0.2s", ...vars[variant] }}>
          {icon && <Icon n={icon} s={18} />} {children}
        </button>
      );
    };

    const Chip = ({ label, type="info" }) => {
      const colors = {
        info: { bg: "var(--info-soft)", tx: "var(--info)" },
        success: { bg: "var(--ok-soft)", tx: "var(--ok)" },
        warn: { bg: "var(--warn-soft)", tx: "var(--warn)" },
        danger: { bg: "var(--danger-soft)", tx: "var(--danger)" }
      };
      const c = colors[type] || colors.info;
      return <span style={{ background: c.bg, color: c.tx, padding: "7px 16px", borderRadius: "24px", fontSize: "12.5px", fontWeight: 900 }}>{label}</span>;
    };

    const SectionHead = ({ title, sub, right }) => (
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:45, paddingBottom:25, borderBottom: "4px solid var(--bd-light)" }}>
        <div className="animate-fade-up">
          <h2 style={{ fontSize:34, fontWeight:950, color:"var(--tx)", letterSpacing:"-1.5px" }}>{title}</h2>
          {sub && <p style={{ color:"var(--mu)", marginTop:8, fontSize:17, fontWeight:500 }}>{sub}</p>}
        </div>
        <div className="no-print">{right}</div>
      </div>
    );

    /* ═══════════════════════════════════════════════════════════
       3. DASHBOARD (학사 중심 실시간 관제 센터)
    ═══════════════════════════════════════════════════════════ */
    const Dashboard = ({ courses }) => {
      const stats = useMemo(() => {
        const totalCur = courses.reduce((a, b) => a + b.current, 0);
        const totalTgt = courses.reduce((a, b) => a + b.target, 0);
        const avgAttendance = 94.2; // 실시간 연동 예정 데이터
        const riskStudents = 8;     // 출석률 80% 미만 위험군
        return { totalCur, totalTgt, avgAttendance, riskStudents };
      }, [courses]);

      return (
        <div className="animate-fade-up">
          <SectionHead title="사업 통합 관제 대시보드" sub="2026년 경기북부 13개 과정 학사 운영 실시간 현황" />
          
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 24, marginBottom: 40 }}>
            {[
              { label: "현재 총 훈련생", val: `${stats.totalCur}명`, sub: `정원 ${stats.totalTgt}명 대비 입강률 96.5%`, icon: "students", color: "var(--p)" },
              { label: "실시간 출석률", val: `${stats.avgAttendance}%`, sub: "당일 13개 과정 전수 조사", icon: "attend", color: "var(--info)" },
              { label: "누적 취업 성공", val: "42명", sub: "과정유관 취업 38명 (90.4%)", icon: "award", color: "var(--ok)" },
              { label: "집중 상담 대상", val: `${stats.riskStudents}명`, sub: "출석률 80% 미만 위험군", icon: "cert", color: "var(--danger)" }
            ].map((k, i) => (
              <div key={i} className="premium-card" style={{ background: "#fff", borderRadius: "var(--radius-lg)", padding: 32, borderLeft: `8px solid ${k.color}`, boxShadow: "var(--shadow)" }}>
                <div style={{ color: "var(--mu)", fontSize: 14, fontWeight: 700, marginBottom: 12 }}>{k.label}</div>
                <div style={{ fontSize: 34, fontWeight: 950, marginBottom: 8, letterSpacing: "-1px" }}>{k.val}</div>
                <div style={{ fontSize: 12.5, color: k.color, fontWeight: 800 }}>{k.sub}</div>
              </div>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 30 }}>
            <div style={{ background: "#fff", borderRadius: "var(--radius-lg)", padding: 35, boxShadow: "var(--shadow)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 30 }}>
                <h3 style={{ fontSize: 20, fontWeight: 900 }}>분야별 학사 운영 달성도 (13개 과정)</h3>
                <Btn variant="white" size="sm">상세 보고서</Btn>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                {courses.slice(0, 6).map(c => (
                  <div key={c.id}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <span style={{ fontSize: 15, fontWeight: 800 }}>{c.name}</span>
                      <span style={{ fontSize: 13, fontWeight: 900, color: "var(--p)" }}>{c.current}/{c.target}명 ({Math.round(c.current/c.target*100)}%)</span>
                    </div>
                    <div style={{ height: 10, background: "var(--s3)", borderRadius: 5, overflow: "hidden" }}>
                      <div style={{ width: `${(c.current/c.target)*100}%`, height: "100%", background: `linear-gradient(90deg, var(--p), var(--p-light))`, borderRadius: 5, transition: "1s var(--ease)" }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 30 }}>
              <div style={{ background: "linear-gradient(135deg, var(--sb), var(--sb-dark))", borderRadius: "var(--radius-lg)", padding: 35, color: "#fff" }}>
                <h3 style={{ fontSize: 20, fontWeight: 900, marginBottom: 20 }}>📢 행정 긴급 알림</h3>
                <div style={{ display: "flex", flexDirection: "column", gap: 15 }}>
                  <div style={{ padding: 18, background: "rgba(255,255,255,0.1)", borderRadius: 16, fontSize: 14.5, lineHeight: 1.6 }}>
                    <b>IT 신직무 입학식:</b> 잠시 후 10시, 제1강의실에서 시작됩니다.
                  </div>
                  <div style={{ padding: 18, background: "rgba(255,255,255,0.1)", borderRadius: 16, fontSize: 14.5, lineHeight: 1.6 }}>
                    <b>출결 수정 필요:</b> 어제 '늘봄교실' 과정의 입실 오류 건(3건)을 확인하세요.
                  </div>
                </div>

              <div style={{ background: "#fff", borderRadius: "var(--radius-lg)", padding: 35, boxShadow: "var(--shadow)", flex: 1 }}>
                <h3 style={{ fontSize: 20, fontWeight: 900, marginBottom: 20 }}>🏢 강의실 가동 현황</h3>

    /* ═══════════════════════════════════════════════════════════

    ═══════════════════════════════════════════════════════════ */
    function App() {

        if (loader) {
          setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 800);

      const renderPage = () => {
        switch(page) {
          case "dash": return <Dashboard courses={courses} />;
          default: return <div className="animate-fade-up"><SectionHead title={NAV_ITEMS.find(n => n.id === page)?.label} sub="현재 파트에서 개발 중인 모듈입니다." /></div>;
        }
      };

      return (
        <div style={{ display: "flex", height: "100vh", overflow: "hidden" }}>
          {/* 🧭 프리미엄 사이드바 */}
          <aside style={{ width: 340, background: "var(--sb)", color: "#fff", display: "flex", flexDirection: "column", boxShadow: "10px 0 40px rgba(0,0,0,0.3)", zIndex: 100 }}>
            <div style={{ padding: "60px 45px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ fontSize: 30, fontWeight: 950, letterSpacing: "-1.5px" }}>NORTHERN ERP</div>
              <div style={{ fontSize: 13, color: "var(--p-light)", fontWeight: 800, marginTop: 10, letterSpacing: "1px" }}>Gyeonggi Job Foundation</div>
            </div>
            
            <nav style={{ flex: 1, padding: "40px 20px", overflowY: "auto" }}>
              {NAV_ITEMS.map(it => (
                <button key={it.id} onClick={() => setPage(it.id)} className={`nav-link ${page === it.id ? 'active' : ''}`}>
                  <Icon n={it.icon} s={22} /> {it.label}
                </button>
              ))}
            </nav>

            <div style={{ padding: "40px 30px", background: "rgba(0,0,0,0.2)", display: "flex", alignItems: "center", gap: 15 }}>
              <div style={{ width: 44, height: 44, borderRadius: 14, background: "var(--p)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900 }}>{currentUser.name[0]}</div>
              <div>
                <div style={{ fontSize: 16, fontWeight: 900 }}>{currentUser.name} {currentUser.rank}님</div>
                <div style={{ fontSize: 11, opacity: 0.5, marginTop: 4 }}>{currentUser.dept} 마스터</div>
              </div>

/* ═══════════════════════════════════════════════════════════
       5. COURSE MASTER (과정관리 및 충돌 감지 엔진)
    ═══════════════════════════════════════════════════════════ */
    const CourseMgmt = ({ courses, setCourses, rooms, instrs }) => {
      const [view, setView] = useState("list"); // list, form
      const [form, setForm] = useState(null);

      // 🛡️ 중복 체크 로직 (날짜/요일/시간 교차 검증)
      const checkConflict = (newVal) => {
        const conflict = courses.find(c => {
          if (c.id === newVal.id) return false;
          // 1. 강의실 또는 강사가 겹치는지
          const sameResource = c.room_id === newVal.room_id || c.instr_id === newVal.instr_id;
          if (!sameResource) return false;

          // 2. 날짜 기간이 겹치는지
          const dateOverlap = (newVal.from <= c.to && newVal.to >= c.from);
          if (!dateOverlap) return false;

          // 3. 수업 요일이 겹치는지 (쉼표로 구분된 요일 중 하나라도 겹치면)
          const days1 = newVal.days.split(',');
          const days2 = c.days.split(',');
          const dayOverlap = days1.some(d => days2.includes(d));
          if (!dayOverlap) return false;

          // 4. 시간대가 겹치는지
          const timeOverlap = (newVal.tFrom < c.tTo && newVal.tTo > c.tFrom);
          return timeOverlap;
        });
        return conflict;
      };

      const handleSave = async (e) => {
        e.preventDefault();
        const conflict = checkConflict(form);
        if (conflict) {
          alert(`⚠️ 자원 충돌 발생!\n\n현재 [${conflict.name}] 과정이\n동일한 자원/시간대에 배정되어 있습니다.`);
          return;
        }

        const { data, error } = await sysDB.upsert("courses", form, form.id ? `id=eq.${form.id}` : "");
        if (!error) {
          alert("성공적으로 저장되었습니다.");
          setCourses(prev => form.id ? prev.map(x => x.id === form.id ? form : x) : [...prev, data]);
          setView("list");

                <tbody>

                      <td>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <div style={{ flex: 1, height: 6, background: "#eee", borderRadius: 3, width: 60 }}>
                            <div style={{ width: `${(c.current/c.target)*100}%`, height: "100%", background: "var(--ok)", borderRadius: 3 }} />
                          </div>
                          <span style={{ fontSize: 12, fontWeight: 700 }}>{c.current}/{c.target}</span>
                        </div>
                      </td>
                      <td>
                        <button onClick={() => { setForm(c); setView("form"); }} style={{ border: "none", background: "none", cursor: "pointer", color: "var(--mu)" }}><Icon n="edit" s={18} /></button>

          ) : (
