const CertMgmt = ({ students, courses }) => {
  const [course, setCourse]       = useState(courses[3] || courses[0]);
  const [docType, setDocType]     = useState("cert");   // "cert" | "attend"
  const [issued, setIssued]       = useState({});
  const [issueDate, setIssueDate] = useState("2026년　　월　　일");
  const [customDate, setCustomDate] = useState("");

  // 수료증: 출석률 80% 이상
  // 수강증명서: 해당 과정 수강자 전체 (출석 1% 이상)
  const certEligible   = students.filter(s => s.cid===course.id && s.rate>=80);
  const attendEligible = students.filter(s => s.cid===course.id && s.rate>0);
  const eligible = docType==="cert" ? certEligible : attendEligible;

  const getCertNo = (s, idx) => {
    if (issued[s.id+docType]?.no) return issued[s.id+docType].no;
    const suffix = docType === "cert" ? "수료" : "수강";
    return `제 2026-북부-${suffix}-${String(idx+1).padStart(3,"0")}호`;
  };

  const handleIssue = (s, idx) => {
    const no = getCertNo(s, idx);
    setIssued(p => ({ ...p, [s.id+docType]: { no, date: issueDate } }));
    if(docType==="cert") printCertificate(s, course, no, issueDate);
    else                  printAttendCert(s, course, no, issueDate);
  };

  const handleIssueAll = () => eligible.forEach((s, idx) => handleIssue(s, idx));

  const fmtDate = raw => {
    if (!raw) return "";

    return `${y}년 ${m}월 ${d}일`;

          <button key={c.id} onClick={()=>setCourse(c)} style={{

      {/* 발급일자 */}

              ].map(({h,w})=>(

            {eligible.map((s, idx) => {
              const key  = s.id+docType;
              const cert = issued[key];
              const no   = getCertNo(s, idx);
              return (
                <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>

const calcAge = birth => {
  if(!birth) return "-";
  const today = new Date();
  const b = new Date(birth);
  let age = today.getFullYear() - b.getFullYear();
  if(today.getMonth() < b.getMonth() || (today.getMonth()===b.getMonth() && today.getDate()<b.getDate())) age--;
  return `${age}세`;
};

              rows={3} style={{ ...inpStyle, resize:"vertical", fontFamily:"inherit", lineHeight:1.6 }}/>

          <Btn onClick={async ()=>{
            if(!form.name||!form.name.trim()) return alert("이름은 필수 입력 항목입니다.");
            if(!form.birth) return alert("생년월일은 필수 입력 항목입니다.");
            await onSave({ ...form, id: form.id||undefined });
            onClose();
          }}>
            <Icon n="check" s={13}/> {isNew ? "등록" : "저장"}
          </Btn>
        </div>
      </div>
    </div>
  );
};

const InstructorMgmt = ({ courses }) => {
  const [instructors, setInst] = useState(SEED_INSTRUCTORS);
  const [editTarget, setEdit]  = useState(null);
  const [isNew, setIsNew]      = useState(false);
  const [search, setSearch]    = useState("");
  const [typeFilter, setTF]    = useState("전체");

  // ── Supabase 초기 로드 ──
  useEffect(() => {
    const load = async () => {
      try {
        const { data, error } = await sbGet("instructors", "select=*&order=id");
        if (error) throw error;
        if (data && data.length > 0) setInst(data.map(toInstructor));
      } catch (err) {
        console.warn("강사 목록 로드 실패 (시드 데이터 사용):", err.message || err);
      }
    };
    load();
  }, []);

  const filtered = instructors.filter(i => {
    if(typeFilter!=="전체" && i.type!==typeFilter) return false;
    if(search && !i.name.includes(search) && !i.subject.includes(search)) return false;
    return true;
  });

  const handleSave = async inst => {
    try {
      if (isNew) {
        const { data, error } = await sbInsert("instructors", fromInstructor(inst));
        if (error) throw error;
        const saved = (data && data[0]) ? toInstructor(data[0]) : { ...inst, id: Date.now() };
        setInst(p => [...p, saved]);
      } else {
        const { error } = await sbUpdate("instructors", `id=eq.${inst.id}`, fromInstructor(inst));
        if (error) throw error;
        setInst(p => p.map(x => x.id===inst.id ? inst : x));
      }
    } catch (err) {
      alert("저장 오류: " + (err.message || JSON.stringify(err)));
      // 로컬 state 폴백
      if (isNew) setInst(p => [...p, inst]);
      else       setInst(p => p.map(x => x.id===inst.id ? inst : x));
    }
  };
  const handleDel = async id => {
    if (!window.confirm("강사를 삭제하시겠습니까?")) return;
    try {
      const { error } = await sbDelete("instructors", `id=eq.${id}`);
      if (error) throw error;
    } catch (err) {
      console.warn("강사 삭제 오류:", err.message || err);
    }
    setInst(p => p.filter(x => x.id !== id));
  };

  const typeColors = {"주강사":T.p,"보조강사":T.ok,"외래강사":"#7C3AED","운영요원":T.warn};

  return (
    <div className="page">
      {editTarget!==null && (
        <InstructorModal inst={isNew?null:editTarget} isNew={isNew} courses={courses}
          onSave={handleSave} onClose={()=>setEdit(null)}/>
      )}

      <SectionHead
        title="강사 관리"
        sub={`등록 강사 ${instructors.length}명`}
        right={<Btn size="sm" onClick={()=>{setIsNew(true);setEdit({});}}>
          <Icon n="plus" s={13}/> 강사 추가
        </Btn>}
      />

      {/* 필터 바 */}
      <Card style={{ padding:"12px 16px", marginBottom:14, display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="이름 / 담당과목 검색…"
          style={{ padding:"7px 11px", border:`1px solid ${T.bd}`, borderRadius:8,
            fontSize:12, outline:"none", background:T.s2, color:T.tx, width:180 }}/>
        <div style={{ display:"flex", gap:5 }}>
          {["전체","주강사","보조강사","외래강사","운영요원"].map(t=>(
            <button key={t} onClick={()=>setTF(t)} style={{
              padding:"5px 12px", borderRadius:16, border:"none", cursor:"pointer",
              fontSize:11, fontWeight:600,
              background: typeFilter===t ? T.p : T.s3,
              color: typeFilter===t ? "#fff" : T.mu }}>{t}</button>
          ))}
        </div>
        <div style={{ marginLeft:"auto", fontSize:12, color:T.mu, fontWeight:600 }}>
          {filtered.length}명
        </div>
      </Card>

      {/* 강사 카드 그리드 */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:12 }}>
        {filtered.map(inst=>(
          <Card key={inst.id} style={{ padding:18, position:"relative" }}>
            {/* 수정/삭제 */}
            <div style={{ position:"absolute", top:12, right:12, display:"flex", gap:5 }}>
              <button onClick={()=>{setIsNew(false);setEdit(inst);}} style={{
                width:26,height:26,borderRadius:6,border:"none",background:T.pbg,color:T.p,
                cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon n="edit" s={12}/>
              </button>
              <button onClick={()=>handleDel(inst.id)} style={{
                width:26,height:26,borderRadius:6,border:"none",background:"#FEF2F2",color:T.danger,
                cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon n="x" s={12}/>
              </button>
            </div>

            {/* 아바타 + 이름 */}
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12, paddingRight:60 }}>
              <div style={{ width:44, height:44, borderRadius:12, flexShrink:0,
                background:`${typeColors[inst.type]||T.p}18`,
                color:typeColors[inst.type]||T.p,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:18, fontWeight:900 }}>{inst.name[0]}</div>
              <div>
                <div style={{ fontSize:14, fontWeight:800, color:T.tx }}>{inst.name}</div>
                <div style={{ display:"flex", gap:5, marginTop:3 }}>
                  <Chip label={inst.type} bg={`${typeColors[inst.type]||T.p}15`} color={typeColors[inst.type]||T.p}/>
                  {inst.subject && <Chip label={inst.subject} bg={T.s3} color={T.mu}/>}
                </div>
              </div>
            </div>

            {/* 상세 정보 */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginBottom:10 }}>
              {[
                {l:"📞",v:inst.phone},
                {l:"📧",v:inst.email},
                {l:"🏅",v:inst.cert||"—"},
                {l:"⏳",v:inst.career ? `경력 ${inst.career}` : "—"},
              ].map(({l,v})=>(
                <div key={l} style={{ fontSize:11, color:T.mu, display:"flex", gap:4, alignItems:"flex-start" }}>
                  <span>{l}</span>
                  <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{v||"—"}</span>
                </div>
              ))}
            </div>

            {/* 담당 과정 뱃지 */}
            {(inst.cids||[]).length > 0 && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                {inst.cids.map(cid=>{
                  const c = courses.find(x=>x.id===cid);
                  return c ? <Chip key={cid} label={c.code} bg={`${c.cc}15`} color={c.cc}/> : null;
                })}
              </div>
            )}

            {inst.note && (
              <div style={{ marginTop:8, fontSize:11, color:T.mu, background:T.s3,
                borderRadius:6, padding:"6px 9px" }}>📝 {inst.note}</div>
            )}
          </Card>
        ))}

        {/* 추가 카드 */}
        <div onClick={()=>{setIsNew(true);setEdit({});}} style={{
          borderRadius:12, padding:18, border:`2px dashed ${T.bd}`, cursor:"pointer",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          gap:10, minHeight:160, background:T.s2, transition:"all .2s" }}>
          <div style={{ width:40,height:40,borderRadius:12,background:`${T.p}15`,
            color:T.p,display:"flex",alignItems:"center",justifyContent:"center" }}>
            <Icon n="plus" s={20}/>
          </div>
          <div style={{ fontSize:12, fontWeight:700, color:T.mu }}>강사 추가</div>
        </div>
      </div>
    </div>
  );
};

/* ── BookModal: 강의 일정 추가/수정 (독립 컴포넌트) ── */
const BookModal = ({ init, onClose, rooms, bookings, courses, setBookings, onSave, onDelete }) => {
  const inp = { width:"100%", padding:"8px 10px", border:`1px solid ${T.bd}`,
    borderRadius:8, fontSize:12, outline:"none", color:T.tx, background:T.s2 };
  const empty = { roomId:rooms[0]?.id||1, courseId:courses[0]?.id||1,
    label:"", start:"", end:"", color:BOOKING_COLORS[0] };
  const [form, setForm] = useState(init||empty);
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const isEdit = !!(init?.id);

  // ── 요일 겹침 검사 헬퍼 ──
  const daysOverlap = (daysA, daysB) => {
    if (!daysA || !daysB) return true; // 정보 없으면 겹친다고 가정
    const setA = new Set(daysA.split(/[,\s]+/).map(d=>d.trim()).filter(Boolean));
    return daysB.split(/[,\s]+/).map(d=>d.trim()).filter(Boolean).some(d => setA.has(d));
  };
  // ── 시간대 겹침 검사 헬퍼 ──
  const timesOverlap = (fromA, toA, fromB, toB) => {
    if (!fromA || !toA || !fromB || !toB) return true;
    const toMins = t => { const [h,m] = t.split(":").map(Number); return h*60+m; };
    return toMins(fromA) < toMins(toB) && toMins(toA) > toMins(fromB);
  };

  const getCourseSchedule = (courseId) => courses.find(c=>c.id===courseId) || {};

  const conflicts = (form.start && form.end && form.roomId)
    ? bookings.filter(b => {
        if (b.roomId !== form.roomId) return false;
        if (b.id === init?.id) return false;
        // 1단계: 날짜 범위 겹침
        if (b.start > form.end || b.end < form.start) return false;
        // 2단계: 수업 요일 겹침
        const bCourse   = getCourseSchedule(b.courseId);
        const fCourse   = getCourseSchedule(form.courseId);
        if (!daysOverlap(bCourse.schedDays, fCourse.schedDays)) return false;
        // 3단계: 시간대 겹침
        if (!timesOverlap(bCourse.schedTimeFrom, bCourse.schedTimeTo,
                          fCourse.schedTimeFrom, fCourse.schedTimeTo)) return false;
        return true;
      })
    : [];
  const hasConflict = conflicts.length > 0;

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:1000,
      display:"flex", alignItems:"center", justifyContent:"center" }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:T.s, borderRadius:16, width:440, maxWidth:"96vw",
        boxShadow:"0 24px 64px rgba(0,0,0,.28)", overflow:"hidden", animation:"fadeUp .2s ease" }}>
        <div style={{ background:`linear-gradient(135deg,${T.sb},${T.p})`,
          padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ fontSize:14, fontWeight:800, color:"#fff" }}>
            {isEdit ? "강의 일정 수정" : "강의 일정 추가"}
          </div>
          <button onClick={onClose} style={{ width:26,height:26,borderRadius:6,border:"none",
            background:"rgba(255,255,255,.15)",color:"#fff",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center" }}>
            <Icon n="x" s={13}/>
          </button>
        </div>
        <div style={{ padding:"18px 20px", display:"flex", flexDirection:"column", gap:12 }}>
          <FLD label="강의실">
            <select value={form.roomId} onChange={e=>set("roomId",+e.target.value)}
              style={{...inp, cursor:"pointer",
                borderColor: hasConflict ? T.danger : T.bd,
                background: hasConflict ? "#FEF2F2" : T.s2 }}>
              {rooms.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </FLD>
          <FLD label="과정">
            <select value={form.courseId} onChange={e=>{ const c=courses.find(x=>x.id===+e.target.value); set("courseId",+e.target.value); set("label",c?.name||""); }}
              style={{...inp,cursor:"pointer"}}>
              {courses.map(c=><option key={c.id} value={c.id}>{shortCourseName(c.name)} [{c.code}]</option>)}
            </select>
          </FLD>
          <FLD label="표시 이름">
            <input value={form.label||""} onChange={e=>set("label",e.target.value)} placeholder="캘린더에 표시될 이름" style={inp}/>
          </FLD>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <FLD label="시작일">
              <input type="date" value={form.start||""} onChange={e=>set("start",e.target.value)}
                style={{...inp, borderColor: hasConflict ? T.danger : T.bd }}/>
            </FLD>
            <FLD label="종료일">
              <input type="date" value={form.end||""} onChange={e=>set("end",e.target.value)}
                style={{...inp, borderColor: hasConflict ? T.danger : T.bd }}/>
            </FLD>
          </div>
          {hasConflict && (
            <div style={{ padding:"10px 12px", borderRadius:8,
              background:"#FEF2F2", border:"1px solid #FECACA", fontSize:11, color:T.danger }}>
              <div style={{ fontWeight:700, marginBottom:4 }}>⚠️ 강의실 중복! 아래 일정과 겹칩니다</div>
              {conflicts.map(b=>(
                <div key={b.id} style={{ display:"flex", alignItems:"center", gap:6,
                  padding:"4px 0", borderTop:"1px solid #FEE2E2" }}>
                  <div style={{ width:8,height:8,borderRadius:2,background:b.color,flexShrink:0 }}/>
                  <span style={{ fontWeight:600 }}>{b.label}</span>
                  <span style={{ color:"#991B1B", marginLeft:"auto" }}>{b.start} ~ {b.end}</span>
                </div>
              ))}
            </div>
          )}
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:6 }}>색상</label>
            <div style={{ display:"flex", gap:6 }}>
              {BOOKING_COLORS.map(col=>(
                <button key={col} type="button" onClick={()=>set("color",col)} style={{
                  width:24, height:24, borderRadius:6, background:col, border:"none", cursor:"pointer",
                  outline: form.color===col ? `3px solid ${col}` : "none", outlineOffset:2 }}/>
              ))}
            </div>
          </div>
        </div>
        <div style={{ padding:"12px 20px", borderTop:`1px solid ${T.bd}`,
          display:"flex", justifyContent:"space-between", alignItems:"center", background:T.s2 }}>
          {isEdit
            ? <Btn variant="danger" size="sm" onClick={async ()=>{ if(onDelete) await onDelete(init.id); else setBookings(p=>p.filter(b=>b.id!==init.id)); onClose(); }}>삭제</Btn>
            : <div/>}
          <div style={{ display:"flex", gap:8 }}>
            <Btn variant="ghost" onClick={onClose}>취소</Btn>
            <Btn variant={hasConflict?"danger":"primary"} onClick={async ()=>{
              if(!form.label||!form.start||!form.end) return alert("이름·시작일·종료일은 필수입니다.");
              if(form.start>form.end) return alert("시작일이 종료일보다 늦습니다.");
              if(hasConflict && !window.confirm(`⚠️ 중복 예약됩니다.\n\n${conflicts.map(b=>`• ${b.label} (${b.start}~${b.end})`).join("\n")}\n\n그래도 저장하시겠습니까?`)) return;
              try {
                if(onSave) {
                  await onSave(isEdit ? { ...form } : { ...form, id: undefined });
                } else {
                  if(isEdit) setBookings(p=>p.map(b=>b.id===init.id?{...form}:b));
                  else       setBookings(p=>[...p,{...form,id:Date.now()}]);
                }
                onClose();
              } catch (err) {
                alert("저장 오류: " + (err.message || JSON.stringify(err)));
              }
            }}>
              <Icon n="check" s={13}/>
              {hasConflict ? "⚠️ 강행 저장" : isEdit?"저장":"추가"}
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── RoomGanttChart: 월간 Gantt 뷰 ── */
const RoomGanttChart = ({ rooms, bookings, courses, onEditBook }) => {
  const today = new Date();
  const [year,  setYear]  = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const MONTH_KR = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

  const dateStr = d => `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  return (
    <Card style={{ overflow:"auto", padding:0 }}>
      <div style={{ padding:"12px 18px", borderBottom:`1px solid ${T.bd}`,
        display:"flex", alignItems:"center", gap:12, background:T.s2 }}>
        <button onClick={prevMonth} style={{ width:30, height:30, borderRadius:8, border:`1px solid ${T.bd}`,
          background:T.s, cursor:"pointer", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
        <span style={{ fontSize:15, fontWeight:800, color:T.tx, minWidth:120, textAlign:"center" }}>{year}년 {MONTH_KR[month]}</span>
        <button onClick={nextMonth} style={{ width:30, height:30, borderRadius:8, border:`1px solid ${T.bd}`,
          background:T.s, cursor:"pointer", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>
        <button onClick={()=>{ setYear(today.getFullYear()); setMonth(today.getMonth()); }}
          style={{ padding:"5px 12px", borderRadius:8, border:`1px solid ${T.bd}`,
            background:T.s2, cursor:"pointer", fontSize:11, color:T.mu, marginLeft:4 }}>오늘</button>
      </div>
      <div style={{ minWidth: 140 + daysInMonth * 30, padding:"14px 14px 18px" }}>
        {/* 날짜 헤더 */}
        <div style={{ display:"grid", gridTemplateColumns:`140px repeat(${daysInMonth}, 30px)`, gap:1, marginBottom:6 }}>
          <div style={{ fontWeight:700, color:T.mu, fontSize:10, padding:"4px 8px" }}>강의실</div>
          {Array.from({length:daysInMonth}).map((_,i) => {
            const ds = dateStr(i+1);
            const dow = new Date(year, month, i+1).getDay();
            const isToday = ds === todayStr;
            return (
              <div key={i} style={{ textAlign:"center", fontSize:9,
                fontWeight:isToday?900:600,
                color: isToday?T.p : dow===0?"#EF4444" : dow===6?"#3B82F6" : T.mu,
                padding:"4px 0", background:isToday?T.pbg:"transparent", borderRadius:4 }}>
                {i+1}
              </div>
            );
          })}
        </div>
        {/* 강의실별 행 */}
        {rooms.map(room => (
          <div key={room.id} style={{ display:"grid",
            gridTemplateColumns:`140px repeat(${daysInMonth}, 30px)`, gap:1, marginBottom:3 }}>
            <div style={{ fontWeight:600, color:T.tx, fontSize:11, padding:"6px 8px",
              display:"flex", alignItems:"center", background:T.s2, borderRadius:6, overflow:"hidden" }}>
              <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{room.name}</span>
            </div>
            {Array.from({length:daysInMonth}).map((_,dayIdx) => {
              const ds = dateStr(dayIdx+1);
              const dayBooks = bookings.filter(b => b.roomId===room.id && b.start<=ds && b.end>=ds);
              const conflict = dayBooks.length > 1;
              const isToday  = ds === todayStr;
              return (
                <div key={dayIdx}
                  onClick={()=>{ if(dayBooks.length>0 && onEditBook) onEditBook(dayBooks[0]); }}
                  title={conflict ? "⚠️ 중복 예약!" : dayBooks[0]?.label || ""}
                  style={{ height:28, borderRadius:4,
                    background: dayBooks.length>0 ? dayBooks[0].color : isToday ? T.pbg : T.s2,
                    border: conflict ? `2px solid ${T.danger}` : isToday ? `1px solid ${T.pl}` : "none",
                    cursor: dayBooks.length>0 ? "pointer" : "default",
                    display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
                  {dayBooks.length > 0 && (
                    <span style={{ fontSize:8, color:"#fff", fontWeight:700,
                      padding:"0 3px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {conflict ? "⚠️" : dayBooks[0].label.slice(0,5)}
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        ))}
        {/* 범례 */}
        {bookings.length > 0 && (
          <div style={{ marginTop:12, display:"flex", flexWrap:"wrap", gap:8 }}>
            {[...new Map(bookings.map(b=>[b.label, b])).values()].map(b=>(
              <div key={b.label} style={{ display:"flex", alignItems:"center", gap:5 }}>
                <div style={{ width:10, height:10, borderRadius:3, background:b.color, flexShrink:0 }}/>
                <span style={{ fontSize:10, color:T.mu }}>{b.label}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </Card>
  );
};

const RoomMgmt = ({ courses }) => {
  const today = new Date();
  const [year,  setYear]  = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth()); // 0-based
  const [rooms,    setRooms]    = useState(SEED_ROOMS);
  const [bookings, setBookings] = useState([]);
  const [showRoomModal, setShowRM] = useState(false);
  const [showBookModal, setShowBM] = useState(null); // null | { roomId, date }
  const [editRoom,  setEditRoom]  = useState(null);
  const [editBook,  setEditBook]  = useState(null);
  const [selRoom,   setSelRoom]   = useState(0); // 0 = 전체
  const [viewMode,  setViewMode]  = useState("calendar"); // "calendar" | "gantt"

  // ── Supabase 초기 로드 ──
  useEffect(() => {
    const load = async () => {
      try {
        const [rRes, bRes] = await Promise.all([
          sbGet("rooms", "select=*&order=id"),
          sbGet("room_bookings", "select=*&order=id"),
        ]);
        if (!rRes.error && rRes.data && rRes.data.length > 0) setRooms(rRes.data.map(toRoom));
        if (!bRes.error && bRes.data) setBookings(bRes.data.map(toBooking));
      } catch (err) {
        console.warn("강의실 데이터 로드 실패 (시드 데이터 사용):", err.message || err);
      }
    };
    load();
  }, []);

  // ── 강의실 저장/삭제 핸들러 (BookModal, RoomModal에서 호출) ──
  const handleRoomSave = async (room) => {
    try {
      if (room.id) {
        await sbUpdate("rooms", `id=eq.${room.id}`, fromRoom(room));
        setRooms(p => p.map(r => r.id===room.id ? room : r));
      } else {
        const { data, error } = await sbInsert("rooms", fromRoom(room));
        if (error) throw error;
        const saved = (data && data[0]) ? toRoom(data[0]) : { ...room, id: Date.now() };
        setRooms(p => [...p, saved]);
      }
    } catch (err) {
      alert("강의실 저장 오류: " + (err.message || JSON.stringify(err)));
      setRooms(p => room.id ? p.map(r=>r.id===room.id?room:r) : [...p, {...room, id:Date.now()}]);
    }
  };

  const handleBookSave = async (book) => {
    try {
      if (book.id) {
        await sbUpdate("room_bookings", `id=eq.${book.id}`, fromBooking(book));
        setBookings(p => p.map(b => b.id===book.id ? book : b));
      } else {
        const { data, error } = await sbInsert("room_bookings", fromBooking(book));
        if (error) throw error;
        const saved = (data && data[0]) ? toBooking(data[0]) : { ...book, id: Date.now() };
        setBookings(p => [...p, saved]);
      }
    } catch (err) {
      alert("일정 저장 오류: " + (err.message || JSON.stringify(err)));
      setBookings(p => book.id ? p.map(b=>b.id===book.id?book:b) : [...p, {...book, id:Date.now()}]);
    }
  };

  const handleBookDelete = async (id) => {
    try {
      await sbDelete("room_bookings", `id=eq.${id}`);
    } catch (err) {
      console.warn("예약 삭제 오류:", err.message || err);
    }
    setBookings(p => p.filter(b => b.id !== id));
  };

  // 달력 날짜 생성
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const weeks = [];
  let day = 1 - firstDay;
  while(day <= daysInMonth) {
    const week = [];
    for(let d=0; d<7; d++, day++) week.push(day>0 && day<=daysInMonth ? day : null);
    weeks.push(week);
  }

  const dateStr = d => `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  const bookingsForDay = (roomId, d) => {
    if(!d) return [];
    const ds = dateStr(d);
    return bookings.filter(b =>
      (roomId===0 || b.roomId===roomId) && b.start<=ds && b.end>=ds
    );
  };

  // 특정 날 특정 강의실에서 중복 있는지 검사 (요일/시간 3단계)
  const hasConflictOnDay = d => {
    if(!d) return false;
    const ds = dateStr(d);
    const dayOfWeek = ["일","월","화","수","목","금","토"][new Date(ds).getDay()];
    const daysOverlapLocal = (daysA, daysB) => {
      if (!daysA || !daysB) return true;
      const setA = new Set(daysA.split(/[,\s]+/).map(x=>x.trim()).filter(Boolean));
      return daysB.split(/[,\s]+/).map(x=>x.trim()).filter(Boolean).some(x => setA.has(x));
    };
    const timesOverlapLocal = (fA, tA, fB, tB) => {
      if (!fA || !tA || !fB || !tB) return true;
      const m = t => { const [h,mn] = t.split(":").map(Number); return h*60+mn; };
      return m(fA) < m(tB) && m(tA) > m(fB);
    };
    const roomIds = [...new Set(bookings.map(b=>b.roomId))];
    return roomIds.some(rid => {
      const dayBkgs = bookings.filter(b => b.roomId===rid && b.start<=ds && b.end>=ds);
      if (dayBkgs.length < 2) return false;
      // 같은 강의실 예약 중 요일+시간이 겹치는 쌍이 있는지
      for (let i = 0; i < dayBkgs.length; i++) {
        for (let j = i+1; j < dayBkgs.length; j++) {
          const cA = courses.find(c=>c.id===dayBkgs[i].courseId)||{};
          const cB = courses.find(c=>c.id===dayBkgs[j].courseId)||{};
          if (daysOverlapLocal(cA.schedDays, cB.schedDays) &&
              (daysOverlapLocal(dayOfWeek, cA.schedDays) || !cA.schedDays) &&
              timesOverlapLocal(cA.schedTimeFrom, cA.schedTimeTo,
                                cB.schedTimeFrom, cB.schedTimeTo)) return true;
        }
      }
      return false;
    });
  };

  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  const MONTH_KR = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const DAY_KR   = ["일","월","화","수","목","금","토"];

              ))}
            </div>

              <Icon n="plus" s={13}/> 강의실 추가
            </Btn>
            <Btn size="sm" onClick={()=>setEditBook({})}>
              <Icon n="plus" s={13}/> 일정 추가
            </Btn>
          </div>
        }
      />

      {/* 강의실 목록 */}
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap", alignItems:"center" }}>
        <button onClick={()=>setSelRoom(0)} style={{
          padding:"6px 14px", borderRadius:20, border:"none", cursor:"pointer",
          fontSize:11, fontWeight:600, background: selRoom===0 ? T.p : T.s3,
          color: selRoom===0 ? "#fff" : T.mu }}>전체</button>
        {rooms.map(r=>(
          <button key={r.id} onClick={()=>setSelRoom(r.id)} style={{

              background:"transparent", color:T.mu, cursor:"pointer", fontSize:11 }}>
            <Icon n="edit" s={11}/> 수정
          </button>
        )}
      </div>

      {/* 강의실 정보 카드 */}
      {selRoom!==0 && (() => {

      {/* 캘린더 뷰 */}
      {viewMode === "calendar" && (<>

                    borderRight: di<6 ? `1px solid ${T.bd}` : "none",

                    cursor: d ? "pointer" : "default",

                          background: isToday?T.p:"transparent",
                          display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                          {d}
                        </div>
                        {isConflict && (
                          <span style={{ fontSize:8, fontWeight:800, color:T.danger,
                            background:"#FEE2E2", padding:"1px 4px", borderRadius:3 }}>
                            중복
                          </span>
                        )}
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                        {dayBkgs.slice(0,3).map((b,bi)=>(

                        )}
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </Card>

      {/* 이달 일정 요약 */}
      {(() => {
        const ms = `${year}-${String(month+1).padStart(2,"0")}`;
        const monthBkgs = bookings.filter(b =>
          (selRoom===0 || b.roomId===selRoom) &&
          (b.start.startsWith(ms) || b.end.startsWith(ms) ||
          (b.start<ms+"-01" && b.end>=ms+"-01"))
        );
        if(!monthBkgs.length) return null;

        // 중복 일정 쌍 찾기
        const conflictIds = new Set();
        monthBkgs.forEach(a => {
          monthBkgs.forEach(b => {
            if(a.id!==b.id && a.roomId===b.roomId && a.start<=b.end && a.end>=b.start) {
              conflictIds.add(a.id); conflictIds.add(b.id);

        });

        return (

                </span>
              )}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
              {monthBkgs.map(b=>{
                const r = rooms.find(x=>x.id===b.roomId);
                const isConflict = conflictIds.has(b.id);
                return (
                  <div key={b.id} onClick={()=>setEditBook(b)}
                    style={{ display:"flex", gap:10, alignItems:"center", padding:"8px 12px",
                      borderRadius:8, cursor:"pointer", transition:"background .1s",
                      border: isConflict ? "1px solid #FECACA" : `1px solid ${T.bd}`,
                      background: isConflict ? "#FFF1F2" : T.s2 }}>
                    <div style={{ width:10, height:10, borderRadius:3, background:b.color, flexShrink:0 }}/>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                        <span style={{ fontSize:12, fontWeight:700, color:T.tx }}>{b.label}</span>
                        {isConflict && (
                          <span style={{ fontSize:9, fontWeight:800, color:T.danger,
                            background:"#FEE2E2", padding:"1px 5px", borderRadius:3 }}>중복</span>
                        )}
                      </div>
                      <div style={{ fontSize:11, color:T.mu }}>{r?.name} · {b.start} ~ {b.end}</div>
                    </div>
                    <Icon n="edit" s={12}/>
                  </div>
                );
              })}
            </div>
          </Card>
        );
      })()}
      </>)}

      {/* Gantt 뷰 */}
      {viewMode === "gantt" && (
        <RoomGanttChart
          rooms={rooms}
          bookings={bookings}
          courses={courses}
          onEditBook={b=>setEditBook(b)}
        />
      )}
    </div>
  );
};

                      <div style={{ fontSize:12, fontWeight:700, color:T.tx, marginBottom:5 }}>
                        🗑️ 과정 훈련생 초기화
                      </div>
                      <div style={{ fontSize:11, color:T.mu, marginBottom:10 }}>
                        {selCourse.code} 훈련생 {selStudents.length}명 전체 삭제

                      </div>
                      {!confirmCourse ? (
                        <Btn variant="danger" size="sm"

                  </div>
                </div>
              </div>

              {/* 샘플 데이터 안내 */}

                실제 운영 시작 전에 과정별 또는 전체 초기화를 진행해 주세요.
              </div>

              {/* 전체 초기화 */}
              <div style={{ padding:18, background:"#FEF2F2", borderRadius:12,
                border:"1px solid #FECACA" }}>
                <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
                  <div style={{ width:40, height:40, borderRadius:10, background:"#FEE2E2",
                    color:T.danger, display:"flex", alignItems:"center", justifyContent:"center",
                    flexShrink:0, fontSize:20 }}>🗑️</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:T.tx, marginBottom:4 }}>
                      전체 훈련생 초기화
                    </div>
                    <div style={{ fontSize:11, color:T.mu, lineHeight:1.7, marginBottom:10 }}>
                      <b style={{color:T.danger}}>모든 과정의 훈련생 {students.length}명</b> 데이터가
                      삭제됩니다. 되돌릴 수 없습니다.
                    </div>
                    {!confirmAll ? (
                      <Btn variant="danger" size="sm" onClick={()=>setConfirmAll(true)}>
                        <Icon n="alert" s={13}/> 전체 초기화
                      </Btn>
                    ) : (
                      <div style={{ background:"#FEE2E2", borderRadius:8, padding:"12px 14px" }}>
                        <div style={{ fontSize:12, fontWeight:700, color:T.danger, marginBottom:4 }}>
                          ⚠️ 정말로 훈련생 {students.length}명을 모두 삭제하시겠습니까?
                        </div>
                        <div style={{ fontSize:11, color:T.mu, marginBottom:10 }}>
                          초기화 전에 반드시 백업을 먼저 받아두세요.
                        </div>
                        <div style={{ display:"flex", gap:8 }}>
                          <Btn variant="ghost" size="sm" onClick={()=>setConfirmAll(false)}>취소</Btn>
                          <Btn variant="danger" size="sm" onClick={()=>{ onResetAll(); onClose(); }}>
                            네, 전체 삭제합니다
                          </Btn>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div style={{ fontSize:11, color:T.mu, textAlign:"center", padding:"4px 0" }}>
                💡 초기화 전에 반드시 백업을 먼저 받아두세요
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const INIT_ACCOUNTS = [
  { id:1, name:"관리자",    role:"admin", pw:"admin1234" },
  { id:2, name:"김담당",    role:"staff", pw:"gjf2026"   },
  { id:3, name:"이담당",    role:"staff", pw:"gjf2026"   },
];

const LoginScreen = ({ onLogin, accounts }) => {
  const [selId,    setSelId]    = useState(accounts[0]?.id || 1);
  const [pw,       setPw]       = useState("");
  const [showPw,   setShowPw]   = useState(false);
  const [error,    setError]    = useState("");
  const [agreed,   setAgreed]   = useState(false);
  const [shaking,  setShaking]  = useState(false);
  const [showNotice, setShowNotice] = useState(false);

  const handleLogin = () => {
    if(!agreed) { setError("개인정보 수집·이용 동의가 필요합니다."); return; }
    const acc = accounts.find(a => a.id === selId);
    if(!acc || acc.pw !== pw) {
      setError("비밀번호가 올바르지 않습니다.");
      setShaking(true);
      setTimeout(() => setShaking(false), 500);
      setPw("");
      return;
    }
    onLogin(acc);
  };

    width:"100%", padding:"11px 14px", border:`1.5px solid ${T.bd}`,
    borderRadius:10, fontSize:14, outline:"none", color:T.tx,

    transition:"border-color .15s",

    <div style={{

          </div>
          <div style={{ fontSize:18, fontWeight:900, color:"#fff", letterSpacing:"-.3px" }}>
            경기북부 직업교육
          </div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,.6)", marginTop:4 }}>
            학사관리시스템 v2026
          </div>
        </div>

        {/* 로그인 카드 */}
        <div style={{
          background:"rgba(255,255,255,.96)", borderRadius:20, padding:"30px 32px",
          boxShadow:"0 24px 64px rgba(0,0,0,.25)",
          animation: shaking ? "shake .4s ease" : "none",

          <div style={{ fontSize:15, fontWeight:800, color:T.tx, marginBottom:22, textAlign:"center" }}>
            🔐 담당자 로그인

          {/* 담당자 선택 */}
          <div style={{ marginBottom:14 }}>
            <label style={{ fontSize:11, fontWeight:700, color:T.mu, display:"block", marginBottom:6 }}>
              담당자 선택
            </label>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {accounts.map(a => (
                <button key={a.id} type="button" onClick={()=>{ setSelId(a.id); setError(""); }}
                  style={{
                    padding:"8px 16px", borderRadius:10, border:"none", cursor:"pointer",
                    fontSize:12, fontWeight:700, transition:"all .15s",
                    background: selId===a.id ? T.p : T.s3,
                    color: selId===a.id ? "#fff" : T.mu,
                    boxShadow: selId===a.id ? "0 4px 12px rgba(234,88,12,.3)" : "none",
                  }}>
                  {a.name}
                  {a.role==="admin" && (
                    <span style={{ marginLeft:5, fontSize:9, background:"rgba(255,255,255,.2)",
                      padding:"1px 5px", borderRadius:4 }}>관리자</span>

                </button>
              ))}
            </div>

              </label>

                border:`1px solid ${T.pl}60`, borderRadius:5, padding:"2px 8px", cursor:"pointer" }}>

                <b style={{color:T.tx}}>담당부서:</b> 경기도일자리재단 북부사업본부 북부교육팀<br/>

/* ===========================================================
   📱 MOBILE CHECKIN  (스마트 라우팅: ?mode=checkin)
   로그인 없이 QR 스캔으로 출석 체크하는 학생용 페이지
=========================================================== */
const MobileCheckin = () => {
  const params   = new URLSearchParams(window.location.search);
  const cidParam = params.get("cid");
  const date     = params.get("date") || new Date().toISOString().slice(0,10);
  const type     = params.get("type") || "in"; // "in" | "out"
  const token    = params.get("t");

  const [course,   setCourse]   = useState(null);
  const [students, setStudents] = useState([]);
  const [status,   setStatus]   = useState("loading"); // loading | ready | success | error | expired | duplicate
  const [checkedId, setCheckedId] = useState(null);
  const [checkedTime, setCheckedTime] = useState("");
  const [errMsg,   setErrMsg]   = useState("");
  const [nowStr,   setNowStr]   = useState("");
  const [searchQ,  setSearchQ]  = useState("");
  const [countdown, setCountdown] = useState(0);

  // 현재 시각 표시 (매초 갱신)
  useEffect(() => {
    const tick = () => {
      const n = new Date();
      setNowStr(`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}:${String(n.getSeconds()).padStart(2,"0")}`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    const init = async () => {
      try {
        // 과정 정보 로드
        const { data: cData, error: cErr } = await sbGet("courses", `select=*&id=eq.${cidParam}`);
        if (cErr || !cData || cData.length === 0) { setStatus("error"); setErrMsg("과정을 찾을 수 없습니다."); return; }
        const c = toCourse(cData[0]);

        // 토큰 검증
        const expectedToken = `${c.code}-${date}-${type.toUpperCase()}-2026GJF`;

        {/* 과정명 + 날짜 */}

          {course?.name}

        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:4 }}>
          <div style={{ fontSize:12, color:"#94A3B8" }}>{fmtDate(date)}</div>

          <div style={{ fontSize:15, fontWeight:900, color:typeColor, letterSpacing:2,

      {/* 안내 배너 */}
      <div style={{ width:"100%", maxWidth:440, padding:"12px 16px", borderRadius:12,

  );

class RealtimeManager {
  constructor() {
    this.subscriptions = new Map(); // table -> state object
    this._refCount = 0;
  }

  _nextRef() { return String(++this._refCount); }

  subscribe(table, callbacks = {}) {
    if (this.subscriptions.has(table)) return;

    const { onInsert, onUpdate, onDelete } = callbacks;
    const channel = `realtime:public:${table}`;
    const joinRef  = this._nextRef();
    const state = {
      intentionallyClosed: false,
      heartbeatId:         null,
      ws:                  null,
      retryDelay:          2000,   // 지수 backoff 초기값
      subIds:              [],     // phx_reply에서 받은 subscription IDs
    };
    this.subscriptions.set(table, state);

    const send = (obj) => {
      if (state.ws?.readyState === WebSocket.OPEN) {
        state.ws.send(JSON.stringify(obj));
      }
    };

    const connect = () => {
      if (state.intentionallyClosed) return;

      const ws = new WebSocket(
        `wss://${SB_URL.replace("https://","")}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`
      );
      state.ws = ws;

      ws.onopen = () => {
        state.retryDelay = 2000; // 성공 시 backoff 리셋
        console.log(`✅ [Realtime] ${table} 연결됨`);

        // phx_join
        send({
          topic:    channel,
          event:    "phx_join",
          payload:  {
            config: {
              broadcast:        { self: false },
              presence:         { key: "" },
              postgres_changes: [{ event: "*", schema: "public", table }]
            },
            access_token: SB_KEY
          },
          ref:      joinRef,
          join_ref: joinRef
        });

        // Heartbeat 30초마다
        state.heartbeatId = setInterval(() => {
          send({ topic: "phoenix", event: "heartbeat", payload: {}, ref: this._nextRef() });
        }, 25000);
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);

          // phx_reply — join 확인 및 subscription ID 저장
          if (msg.event === "phx_reply" && msg.ref === joinRef) {
            if (msg.payload?.status === "ok") {
              state.subIds = (msg.payload.response?.postgres_changes || []).map(c => c.id);
              console.log(`🔔 [Realtime] ${table} 구독 확인 IDs:`, state.subIds);
            } else {
              console.error(`❌ [Realtime] ${table} 구독 실패:`, msg.payload?.response);
            }
            return;
          }

          // postgres_changes CDC 이벤트
          if (msg.event === "postgres_changes" && msg.payload?.data) {
            // IDs 필터: subIds가 비어있으면 모두 통과 (폴백)
            const ids = msg.payload.ids || [];
            if (state.subIds.length > 0 && !ids.some(id => state.subIds.includes(id))) return;

            const { type: eventType, record: newRecord, old_record: oldRecord } = msg.payload.data;
            switch (eventType) {
              case "INSERT": onInsert?.(newRecord);            break;
              case "UPDATE": onUpdate?.(newRecord, oldRecord); break;
              case "DELETE": onDelete?.(oldRecord);            break;
            }
          }
        } catch (err) {
          console.error(`[Realtime] ${table} 파싱 오류:`, err);
        }
      };

      ws.onerror = () => console.warn(`⚠️ [Realtime] ${table} 소켓 오류`);

      ws.onclose = (ev) => {
        clearInterval(state.heartbeatId);
        state.heartbeatId = null;
        if (!state.intentionallyClosed) {
          console.warn(`🔌 [Realtime] ${table} 연결 끊김 (code:${ev.code}) — ${state.retryDelay/1000}초 후 재연결`);
          setTimeout(connect, state.retryDelay);
          state.retryDelay = Math.min(state.retryDelay * 2, 30000); // 최대 30초
        }
      };
    };

    connect();
  }

  unsubscribeAll() {
    this.subscriptions.forEach(state => {
      state.intentionallyClosed = true;
      clearInterval(state.heartbeatId);
      state.heartbeatId = null;
      state.ws?.close();
    });
    this.subscriptions.clear();
  }
}

      who:    user || "시스템",

      action,
      detail,
    };

    });

  const [loading,    setLoading]    = useState(true);   // 최초 로딩 상태

  // ── 계정 로드 (앱 시작 시 1회) ──

      setLoading(true);
      setDbError("");
      try {
        const [cRes, sRes] = await Promise.all([
          sbGet("courses", "select=*&order=id"),
          sbGet("students", "select=*&order=id"),
        ]);

        if (sRes.error) throw sRes.error;
        if (cRes.data && cRes.data.length > 0) setCourses(cRes.data.map(toCourse));

        setDbError("DB 연결 오류: " + (e.message || JSON.stringify(e)));

        setLoading(false);

    }
    if (data && data.length > 0) {
      // Supabase가 저장된 레코드를 반환한 경우 로컬 state 즉시 반영
      setStudents(prev => {
        const newIds = new Set(data.map(r => r.id));
        const filtered = prev.filter(s => !newIds.has(s.id));
        return [...filtered, ...data.map(toStudent)];
      });
    } else {
      // 응답 데이터가 없으면 DB에서 전체 다시 로드 (Realtime 미연결 환경 대응)
      const { data: fresh, error: fetchErr } = await sbGet("students", "select=*&order=id");
      if (fetchErr) {
        console.error("❌ 학생 목록 재조회 실패:", fetchErr);
      } else if (fresh) {
        setStudents(fresh.map(toStudent));
      }
    }
    addAudit("훈련생 등록", `${newOnes.length}명 등록 (${newOnes.map(s=>s.name).join(", ")})`, currentUser?.name);
    console.log("✅ 학생 저장 완료:", (data||[]).length, "명");
  }, [addAudit, currentUser]);

  const updateStudent = useCallback(async (updated) => {
    const { error } = await sbUpdate("students", `id=eq.${updated.id}`, fromStudent(updated));
    if (error) { alert("수정 오류: " + (error.message||JSON.stringify(error))); return; }
    setStudents(prev => prev.map(s => s.id===updated.id ? updated : s));
    addAudit("훈련생 수정", `${updated.name} 정보 수정`, currentUser?.name);
  }, [addAudit, currentUser]);

  const deleteStudent = useCallback(async (id) => {
    if (!window.confirm("이 훈련생을 삭제하시겠습니까?")) return;
    const target = students.find(s => s.id === id);
    const { error } = await sbDelete("students", `id=eq.${id}`);
    if (error) { alert("삭제 오류: " + (error.message||JSON.stringify(error))); return; }
    setStudents(prev => prev.filter(s => s.id!==id));
    addAudit("훈련생 삭제", `${target?.name || id} 삭제`, currentUser?.name);
  }, [students, addAudit, currentUser]);

  const resetData = useCallback(async () => {
    const { error } = await sbDelete("students", "id=gte.0");
    if (error) { alert("초기화 오류: " + (error.message||JSON.stringify(error))); return; }
    setStudents([]);
    addAudit("전체 초기화", "모든 훈련생 데이터 삭제", currentUser?.name);
  }, [addAudit, currentUser]);

  const resetCoursStudents = useCallback(async (cid) => {
    const { error } = await sbDelete("students", `cid=eq.${cid}`);
    if (error) { alert("초기화 오류: " + (error.message||JSON.stringify(error))); return; }
    setStudents(prev => prev.filter(s => s.cid !== cid));
    addAudit("과정 초기화", `과정 ID ${cid} 훈련생 삭제`, currentUser?.name);
  }, [addAudit, currentUser]);

  // ── 과정 CRUD ──
  const addCourse = useCallback(async (c) => {
    const { data, error } = await sbInsert("courses", fromCourse(c));
    if (error) { 
      alert("과정 저장 오류: " + (error.message||JSON.stringify(error))); 
      console.error("❌ 과정 저장 실패:", error);
      return; 
    }
    // 로컬 state 즉시 반영
    if (data && data.length > 0) {
      setCourses(prev => {
        const newId = data[0].id;
        const filtered = prev.filter(x => x.id !== newId);
        return [...filtered, toCourse(data[0])];
      });
    }
    addAudit("과정 등록", `${c.name} (${c.code}) 추가`, currentUser?.name);
    console.log("✅ 과정 저장 완료:", data?.[0]?.name);
  }, [addAudit, currentUser]);

  const updateCourse = useCallback(async (c) => {
    const { error } = await sbUpdate("courses", `id=eq.${c.id}`, fromCourse(c));
    if (error) { 
      alert("과정 수정 오류: " + (error.message||JSON.stringify(error))); 
      console.error("❌ 과정 수정 실패:", error);
      return; 
    }
    addAudit("과정 수정", `${c.name} (${c.code}) 정보 수정`, currentUser?.name);
    console.log("✅ 과정 수정 완료:", c.name);
    setCourses(prev => prev.map(x => x.id===c.id ? c : x));
  }, [addAudit, currentUser]);

  const deleteCourse = useCallback(async (id) => {
    const target = courses.find(c => c.id === id);
    const { error } = await sbDelete("courses", `id=eq.${id}`);
    if (error) { 
      alert("과정 삭제 오류: " + (error.message||JSON.stringify(error))); 
      console.error("❌ 과정 삭제 실패:", error);
      return; 
    }
    addAudit("과정 삭제", `${target?.name || id} 삭제`, currentUser?.name);
    console.log("✅ 과정 삭제 완료: ID", id);
    setCourses(prev => prev.filter(c => c.id!==id));
  }, [courses, addAudit, currentUser]);

  // ── 출결 저장 후 해당 과정 훈련생 rate 재조회 (DB 트리거가 없을 경우 클라이언트 폴백) ──
  const refreshStudentRates = useCallback(async (courseId) => {
    try {
      const { data, error } = await sbGet("students", `select=id,rate&cid=eq.${courseId}`);
      if (error) throw error;
      if (data && data.length > 0) {
        setStudents(prev => prev.map(s => {
          const updated = data.find(d => d.id === s.id);
          return updated ? { ...s, rate: updated.rate } : s;
        }));
      }
    } catch (err) {
      console.warn("출석률 재조회 실패:", err.message || err);
    }
  }, []);

  // ── 스마트 라우팅: ?mode=checkin → 모바일 출석 페이지 (로그인 불필요) ──
  const urlMode = new URLSearchParams(window.location.search).get("mode");
  if (urlMode === "checkin") {
    return <><GStyle/><MobileCheckin/></>;
  }

  // ── 로그인 전이면 LoginScreen 표시 ──
  if (!currentUser) {
    return (
      <>
        <GStyle/>
        <LoginScreen accounts={accounts} onLogin={user => {
          try { sessionStorage.setItem("gjf_user", JSON.stringify(user)); } catch {}
          setCurrentUser(user); setPiDismissed(false); addAudit("로그인", `${user.name} 로그인`, user.name);
        }}/>
      </>
    );
  }

  // ── 로딩 화면 ──
  if (loading) {
    return (
      <>
        <GStyle/>
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center",
          background:"linear-gradient(135deg,#7C2D12,#EA580C,#FFF7ED)",
          fontFamily:"'Pretendard',-apple-system,sans-serif" }}>
          <div style={{ width:56, height:56, borderRadius:16, background:"rgba(255,255,255,.2)",
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:26, marginBottom:20, animation:"ping 1.5s ease infinite" }}>🎓</div>
          <div style={{ fontSize:15, fontWeight:800, color:"#fff", marginBottom:8 }}>
            데이터를 불러오는 중…
          </div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,.6)" }}>
            Supabase 연결 중 · 잠시만 기다려 주세요
          </div>
          {dbError && (
            <div style={{ marginTop:20, padding:"12px 20px", background:"#FEF2F2",
              borderRadius:10, fontSize:12, color:"#DC2626", maxWidth:340, textAlign:"center" }}>
              ⚠️ {dbError}<br/>
              <button onClick={()=>window.location.reload()}
                style={{ marginTop:8, padding:"5px 14px", borderRadius:7, border:"none",
                  background:"#DC2626", color:"#fff", cursor:"pointer", fontSize:11, fontWeight:700 }}>
                새로고침
              </button>
            </div>
          )}
        </div>
      </>
    );
  }

  const renderPage = () => {
    switch(page) {
      case "dash":        return <Dashboard students={students} courses={courses}/>;
      case "courses":     return <CourseList courses={courses} onAdd={addCourse} onUpdate={updateCourse} onDelete={deleteCourse}/>;
      case "students":    return <StudentMgmt students={students} courses={courses} onAdd={addStudents} onEdit={setEditTarget} onUpdate={updateStudent} onDelete={deleteStudent} onNew={()=>setShowNew(true)}/>;
      case "instructors": return <InstructorMgmt courses={courses}/>;
      case "rooms":       return <RoomMgmt courses={courses}/>;
      case "attendance":  return <AttendanceMgmt students={students} courses={courses} onRatesUpdated={refreshStudentRates}/>;
      case "completion":  return <CompletionMgmt students={students} courses={courses}/>;
      case "cert":        return <CertMgmt students={students} courses={courses}/>;
      default:            return null;
    }
  };

  return (
    <>
      <GStyle/>
      {/* ── 모달들 ── */}
      {showNew && (
        <EditModal student={null} isNew={true} courses={courses}
          onSave={s => addStudents([s])} onClose={()=>setShowNew(false)}/>
      )}
      {editTarget && (
        <EditModal student={editTarget} courses={courses}
          onSave={updateStudent} onClose={()=>setEditTarget(null)}/>
      )}
      {showDataMgr && (
        <DataManager
          students={students} courses={courses}
          onResetAll={resetData}
          onResetCourse={resetCoursStudents}
          onClose={()=>setShowDataMgr(false)}
        />
      )}
      {showAccMgr && currentUser.role==="admin" && (
        <AccountMgmt
          accounts={accounts}
          currentUser={currentUser}
          auditLog={auditLog}
          onSave={async (updated) => { 
            try {
              console.log("💾 계정 저장 중...");
              setAccounts(updated);
              setCurrentUser(prev => updated.find(a => a.id === prev.id) || prev);
              addAudit("계정 수정", `계정 목록 저장 (${updated.length}개)`, currentUser?.name);
              setTimeout(async () => {
                try {
                  await sbDelete("accounts", "id=gte.0");
                  const { error } = await sbInsert("accounts", updated.map(fromAccount));
                  if (error) throw error;
                  console.log("✅ 계정 저장 완료:", updated.length, "개");
                } catch (err) {
                  console.error("❌ 계정 저장 실패 (로컬은 유지):", err);
                }
              }, 100);
            } catch (err) {
              console.error("계정 저장 오류:", err);
            }
          }}
          onClose={()=>setShowAccMgr(false)}
        />
      )}

      <div style={{ display:"flex", height:"100vh",
        background:"linear-gradient(160deg,#FED7AA 0%,#FDBA74 10%,#FFF7ED 40%,#F8FAFC 70%,#FFEDD5 100%)",
        fontFamily:"'Pretendard',-apple-system,sans-serif", overflow:"hidden",
        flexDirection:"column" }}>

        {/* ── 개인정보 상단 배너 ── */}
        {!piDismissed && (
          <div style={{ background:"linear-gradient(90deg,#7C2D12,#B91C1C)",
            padding:"7px 22px", display:"flex", alignItems:"center", gap:10,
            fontSize:11, color:"#fff", flexShrink:0 }}>
            <span style={{ fontSize:13 }}>🔒</span>
            <span className="pi-banner-text">
              <b>개인정보 주의:</b> 이 시스템은 훈련생 개인정보를 포함합니다.
              업무 목적 외 사용·유출·캡처를 엄금합니다. 위반 시 「개인정보보호법」에 따라 처벌받을 수 있습니다.
            </span>
            <span className="pi-banner-icon" style={{ display:"none", fontSize:11 }}>개인정보 주의 — 외부 유출 금지</span>
            <button onClick={()=>setPiDismissed(true)}
              style={{ marginLeft:"auto", background:"rgba(255,255,255,.15)", border:"none",
                color:"#fff", borderRadius:5, padding:"2px 10px", cursor:"pointer", fontSize:11, flexShrink:0 }}>
              확인
            </button>
          </div>
        )}

        {/* ── 모바일 사이드바 오버레이 ── */}
        <div className={`sidebar-overlay${mobileSidebar?" active":""}`}
          onClick={()=>setMobileSidebar(false)}/>

        <div style={{ flex:1, display:"flex", overflow:"hidden", position:"relative" }}>
          {/* SIDEBAR */}
          <div className={`app-sidebar${mobileSidebar?" mobile-open":""}`}
            style={{ width:collapsed?64:240, flexShrink:0,
              background:`linear-gradient(175deg,${T.sb} 0%,#9A3412 40%,${T.p} 75%,#F97316 100%)`,
              display:"flex", flexDirection:"column", overflow:"hidden",
              boxShadow:"4px 0 32px rgba(124,45,18,.3)" }}>

            {/* Logo */}
            <div style={{ padding:collapsed?"16px 0":"16px 18px",
              borderBottom:"1px solid rgba(255,255,255,.1)",
              display:"flex", alignItems:"center",
              justifyContent:collapsed?"center":"space-between" }}>
              {!collapsed && (
                <div>
                  <div style={{ fontSize:13, fontWeight:900, color:"#fff", letterSpacing:"-.3px" }}>경기북부 직업교육</div>
                  <div style={{ display:"flex", alignItems:"center", gap:5, marginTop:3 }}>
                    <span style={{ background:"rgba(253,186,116,.3)", color:"#FED7AA",
                      padding:"1px 6px", borderRadius:4, fontSize:9, fontWeight:700 }}>2026</span>
                    <span style={{ fontSize:10, color:"rgba(255,255,255,.45)" }}>학사관리시스템</span>
                  </div>
                </div>
              )}
              <button onClick={()=>setCollapsed(!collapsed)} style={{ width:28, height:28, borderRadius:6,
                background:"rgba(255,255,255,.12)", border:"none", color:"rgba(255,255,255,.7)",
                cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <Icon n="bars" s={14}/>
              </button>
            </div>

            {/* Nav */}
            <nav style={{ flex:1, padding:"10px 0", overflowY:"auto" }}>
              {NAV_ITEMS.map(item => {
                const active = page===item.id;
                return (
                  <button key={item.id} className="btn-nav" onClick={()=>{ setPage(item.id); setMobileSidebar(false); }} style={{
                    width:"100%", display:"flex", alignItems:"center",
                    gap:10, padding:collapsed?"13px 0":"11px 18px",
                    justifyContent:collapsed?"center":"flex-start",
                    background:active?"rgba(255,255,255,.15)":"transparent",
                    border:"none", cursor:"pointer",
                    borderLeft:active?"3px solid #FED7AA":"3px solid transparent",
                    color:active?"#fff":"rgba(255,255,255,.5)",
                    fontWeight:active?700:400, fontSize:13 }}>
                    <Icon n={item.icon} s={16}/>
                    {!collapsed && <span style={{ whiteSpace:"nowrap" }}>{item.label}</span>}
                    {active && !collapsed && (
                      <div style={{ marginLeft:"auto", width:6, height:6,
                        borderRadius:"50%", background:"#FED7AA", flexShrink:0 }}/>
                    )}
                  </button>
                );
              })}
            </nav>

            {/* 사용자 + 로그아웃 */}
            {!collapsed && (
              <div style={{ padding:"13px 18px", borderTop:"1px solid rgba(255,255,255,.1)" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                  <div style={{ width:34, height:34, borderRadius:10, flexShrink:0,
                    background:"rgba(255,255,255,.15)",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    color:"rgba(255,255,255,.85)" }}><Icon n="user" s={15}/></div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:12, fontWeight:700, color:"#fff", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{currentUser.name}</div>
                    <div style={{ fontSize:9, color:"rgba(255,255,255,.4)" }}>
                      {currentUser.role==="admin" ? "관리자" : "담당자"} · 경기도일자리재단
                    </div>
                  </div>
                </div>
                {currentUser.role === "admin" && (
                  <button onClick={()=>setShowAccMgr(true)}
                    style={{ width:"100%", padding:"7px 0", borderRadius:8,
                      border:"1px solid rgba(255,255,255,.2)", background:"rgba(255,255,255,.08)",
                      color:"rgba(255,255,255,.75)", cursor:"pointer", fontSize:11, fontWeight:600,
                      marginBottom:6 }}>
                    👤 계정 관리
                  </button>
                )}
                <button onClick={()=>{ if(window.confirm("로그아웃 하시겠습니까?")) { try { sessionStorage.removeItem("gjf_user"); } catch {} addAudit("로그아웃", `${currentUser.name} 로그아웃`, currentUser.name); setCurrentUser(null); } }}
                  style={{ width:"100%", padding:"7px 0", borderRadius:8,
                    border:"1px solid rgba(255,255,255,.2)", background:"rgba(255,255,255,.08)",
                    color:"rgba(255,255,255,.75)", cursor:"pointer", fontSize:11, fontWeight:600 }}>
                  🚪 로그아웃
                </button>
              </div>
            )}
          </div>

          {/* MAIN */}
          <div className="app-main" style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>
            {/* Header */}
            <div style={{ height:52, background:"rgba(255,255,255,.92)", backdropFilter:"blur(16px)",
              borderBottom:`1px solid ${T.bd}`,
              display:"flex", alignItems:"center", justifyContent:"space-between",
              padding:"0 16px", flexShrink:0, gap:8 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                {/* 모바일 햄버거 메뉴 */}
                <button className="mobile-menu-btn" onClick={()=>setMobileSidebar(true)}
                  style={{ width:34, height:34, borderRadius:8, border:`1px solid ${T.bd}`,
                    background:T.s2, cursor:"pointer", display:"flex", alignItems:"center",
                    justifyContent:"center", color:T.mu, flexShrink:0 }}>
                  <Icon n="bars" s={16}/>
                </button>
                <div style={{ fontSize:12, color:T.mu, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  <span className="header-title-full" style={{ color:T.p, fontWeight:700 }}>경기도일자리재단 북부사업본부</span>
                  <span className="header-title-full" style={{ margin:"0 6px", color:T.bd }}>·</span>
                  <span className="header-title-full">직업교육 학사관리시스템 v2026</span>
                  <span className="header-title-short" style={{ display:"none", color:T.p, fontWeight:800, fontSize:13 }}>경기북부 LMS</span>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                {/* 개인정보 상시 아이콘 */}
                <div title="개인정보 포함 시스템 — 외부 유출 금지"
                  style={{ display:"flex", alignItems:"center", gap:4, padding:"4px 8px",
                    borderRadius:6, background:"#FEF2F2", border:"1px solid #FECACA",
                    fontSize:10, color:T.danger, fontWeight:700, cursor:"default", whiteSpace:"nowrap" }}>
                  🔒 <span className="header-title-full">개인정보 주의</span>
                </div>
                <button onClick={()=>setShowDataMgr(true)} style={{
                  display:"flex", alignItems:"center", gap:5, padding:"6px 12px",
                  background:T.s3, border:`1px solid ${T.bd}`, borderRadius:8,
                  cursor:"pointer", fontSize:11, fontWeight:700, color:T.mu,
                  transition:"all .15s", whiteSpace:"nowrap" }}>
                  <Icon n="dl" s={13}/> <span className="header-title-full">데이터 관리</span>
                </button>
                <div style={{ display:"flex", alignItems:"center", gap:6, padding:"5px 10px",
                  background:T.pbg, borderRadius:8, border:`1px solid rgba(234,88,12,.15)` }}>
                  <div style={{ width:24, height:24, borderRadius:6,
                    background:`linear-gradient(135deg,${T.pm},${T.p})`,
                    display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <Icon n="user" s={12}/>
                  </div>
                  <span style={{ fontSize:11, fontWeight:700, color:T.p, whiteSpace:"nowrap" }}>{currentUser.name}</span>
                  {currentUser.role==="admin" && (
                    <span style={{ fontSize:9, background:T.p, color:"#fff",
                      padding:"1px 5px", borderRadius:3, whiteSpace:"nowrap" }}>관리자</span>
                  )}
                </div>
              </div>
            </div>

            {/* Content */}
            <div style={{ flex:1, overflowY:"auto", padding:"18px 20px" }}>
              {renderPage()}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

/* ── 앱 마운트 ── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
