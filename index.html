    const RoomMgmt = ({ rooms, setRooms, bookings, setBookings, courses, onAudit }) => {
      const today = new Date();
      const [year, setYear] = useState(today.getFullYear());
      const [month, setMonth] = useState(today.getMonth());
      const [showRoomModal, setShowRM] = useState(false);
      const [showBookModal, setShowBM] = useState(false);
      const [editRoom, setEditRoom] = useState(null);
      const [editBook, setEditBook] = useState(null);
      const [selRoom, setSelRoom] = useState(0);
      const [viewMode, setViewMode] = useState("calendar"); // "calendar" | "gantt"

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const weeks = [];
      let day = 1 - firstDay;
      while(day <= daysInMonth) {
        const week = [];
        for(let d=0; d<7; d++, day++) week.push(day>0 && day<=daysInMonth ? day : null);
        weeks.push(week);
      }

      const dateStr = d => `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

      const bookingsForDay = (roomId, d) => {
        if(!d) return [];
        const ds = dateStr(d);
        return bookings.filter(b => (roomId===0||b.roomId===roomId) && b.start<=ds && b.end>=ds);
      };

      const hasConflictOnDay = d => {
        if(!d) return false;
        const ds = dateStr(d);
        const roomIds = [...new Set(bookings.map(b=>b.roomId))];
        return roomIds.some(rid => bookings.filter(b=>b.roomId===rid && b.start<=ds && b.end>=ds).length >= 2);
      };

      const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
      const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

      const MONTH_KR = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
      const DAY_KR = ["일","월","화","수","목","금","토"];

      return (
        <div className="page">
          {showBookModal && (
            <BookModal
              init={editBook?.id ? editBook : null}
              onClose={()=>{ setShowBM(false); setEditBook(null); }}
              rooms={rooms} bookings={bookings} courses={courses}
              setBookings={setBookings} onAudit={onAudit}/>
          )}
          {showRoomModal && (
            <RoomModal room={editRoom} onClose={()=>{ setShowRM(false); setEditRoom(null); }}
              setRooms={setRooms} onAudit={onAudit}/>
          )}

          <div style={{ marginBottom:18, display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
            <div>
              <h2 style={{ fontSize:20, fontWeight:800, color:T.tx }}>강의실 관리</h2>
              <p style={{ fontSize:12, color:T.mu, marginTop:3 }}>월간 캘린더 · 강의실 예약 · Gantt 차트</p>
            </div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <div style={{ display:"flex", borderRadius:8, overflow:"hidden", border:`1px solid ${T.bd}` }}>
                {[["calendar","📅 캘린더"],["gantt","📊 Gantt"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setViewMode(v)} style={{ padding:"6px 14px", border:"none", cursor:"pointer", fontSize:11, fontWeight:700, background:viewMode===v?T.p:T.s2, color:viewMode===v?"#fff":T.mu }}>{l}</button>
                ))}
              </div>
              <Btn variant="ghost" size="sm" onClick={()=>{ setEditRoom(null); setShowRM(true); }}><Icon n="plus" s={13}/> 강의실 추가</Btn>
              <Btn size="sm" onClick={()=>{ setEditBook({}); setShowBM(true); }}><Icon n="plus" s={13}/> 일정 추가</Btn>
            </div>
          </div>

          {/* 강의실 필터 탭 */}
          <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
            <button onClick={()=>setSelRoom(0)} style={{ padding:"6px 14px", borderRadius:20, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, background:selRoom===0?T.p:T.s3, color:selRoom===0?"#fff":T.mu }}>전체</button>
            {rooms.map(r=>(
              <button key={r.id} onClick={()=>setSelRoom(r.id)} style={{ padding:"6px 14px", borderRadius:20, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, background:selRoom===r.id?T.p:T.s3, color:selRoom===r.id?"#fff":T.mu }}>{r.name}</button>
            ))}
            {selRoom!==0 && (
              <button onClick={()=>{ setEditRoom(rooms.find(r=>r.id===selRoom)); setShowRM(true); }}
                style={{ padding:"5px 10px", borderRadius:16, border:`1px solid ${T.bd}`, background:"transparent", color:T.mu, cursor:"pointer", fontSize:11 }}>
                <Icon n="edit" s={11}/> 수정
              </button>
            )}
          </div>

          {selRoom!==0 && (() => {
            const r = rooms.find(x=>x.id===selRoom);
            return r ? (
              <Card style={{ padding:"12px 16px", marginBottom:14, display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
                <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                  <span style={{ fontSize:18 }}>🏫</span>
                  <div><div style={{ fontSize:13, fontWeight:800, color:T.tx }}>{r.name}</div><div style={{ fontSize:11, color:T.mu }}>{r.addr}</div></div>
                </div>
                <Chip label={`수용 ${r.capacity}명`} bg={T.pbg} color={T.p}/>
                <div style={{ fontSize:11, color:T.mu }}>{r.equip}</div>
              </Card>
            ) : null;
          })()}

          {viewMode === "gantt" ? (
            <RoomGanttChart rooms={rooms} bookings={bookings} courses={courses}
              onEditBook={(b)=>{ setEditBook(b); setShowBM(true); }}/>
          ) : (
            <Card style={{ padding:0, overflow:"hidden" }}>
              <div style={{ padding:"12px 18px", borderBottom:`1px solid ${T.bd}`, display:"flex", alignItems:"center", gap:12 }}>
                <button onClick={prevMonth} style={{ width:30, height:30, borderRadius:8, border:`1px solid ${T.bd}`, background:T.s2, cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
                <div style={{ fontSize:16, fontWeight:800, color:T.tx, minWidth:120, textAlign:"center" }}>{year}년 {MONTH_KR[month]}</div>
                <button onClick={nextMonth} style={{ width:30, height:30, borderRadius:8, border:`1px solid ${T.bd}`, background:T.s2, cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>
                <button onClick={()=>{ setYear(today.getFullYear()); setMonth(today.getMonth()); }}
                  style={{ padding:"5px 12px", borderRadius:8, border:`1px solid ${T.bd}`, background:T.s2, cursor:"pointer", fontSize:11, color:T.mu, marginLeft:4 }}>오늘</button>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", borderBottom:`1px solid ${T.bd}` }}>
                {DAY_KR.map((d,i)=>(
                  <div key={d} style={{ padding:"8px 0", textAlign:"center", fontSize:12, fontWeight:700, color:i===0?"#EF4444":i===6?"#3B82F6":T.mu, background:T.s2 }}>{d}</div>
                ))}
              </div>
              {weeks.map((week, wi)=>(
                <div key={wi} style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", borderBottom:`1px solid ${T.bd}` }}>
                  {week.map((d, di)=>{
                    const bdays = bookingsForDay(selRoom, d);
                    const conflict = hasConflictOnDay(d);
                    const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                    return (
                      <div key={di} onClick={()=>{ if(d){ setEditBook({ roomId:selRoom||rooms[0]?.id||1, start:dateStr(d), end:dateStr(d) }); setShowBM(true); } }}
                        style={{ minHeight:80, padding:6, borderRight:`1px solid ${T.bd}`, background:d?T.s:"#FAFAFA", cursor:d?"pointer":"default", position:"relative" }}>
                        {d && (
                          <>
                            <div style={{ fontSize:11, fontWeight:isToday?900:600, color:isToday?T.p:di===0?"#EF4444":di===6?"#3B82F6":T.tx, marginBottom:3 }}>{d}</div>
                            {conflict && <div style={{ fontSize:8, color:T.danger, fontWeight:700 }}>⚠️ 중복</div>}
                            {bdays.slice(0,2).map(b=>(
                              <div key={b.id} onClick={e=>{ e.stopPropagation(); setEditBook(b); setShowBM(true); }}
                                style={{ background:b.color, color:"#fff", fontSize:9, fontWeight:600, borderRadius:3, padding:"2px 4px", marginBottom:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", cursor:"pointer" }}>
                                {b.label}
                              </div>
                            ))}
                            {bdays.length > 2 && <div style={{ fontSize:9, color:T.mu }}>+{bdays.length-2}개</div>}
                          </>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}
            </Card>
          )}

          {/* 범례 */}
          <Card style={{ padding:12, marginTop:14, display:"flex", gap:16, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:11, fontWeight:600, color:T.tx }}>📌 범례</span>
            {BOOKING_COLORS.map((c,i)=>(
              <div key={i} style={{ display:"flex", gap:5, alignItems:"center" }}>
                <div style={{ width:14, height:14, borderRadius:3, background:c }}/>
                <span style={{ fontSize:10, color:T.mu }}>{COURSES[i]?.name?.slice(0,8) || "과정"}</span>
              </div>
            ))}
            <div style={{ display:"flex", gap:5, alignItems:"center" }}>
              <div style={{ width:14, height:14, borderRadius:3, border:`2px solid ${T.danger}`, background:T.s3 }}/>
              <span style={{ fontSize:10, color:T.mu }}>중복 예약</span>
            </div>
          </Card>
        </div>
      );
    };

    // GANTT CHART
    const RoomGanttChart = ({ rooms, bookings, courses, onEditBook }) => {
      const today = new Date();
      const [year, setYear] = useState(today.getFullYear());
      const [month, setMonth] = useState(today.getMonth());
      const daysInMonth = new Date(year, month+1, 0).getDate();
      const MONTH_KR = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

      const dateStr = d => `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

      const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
      const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

      return (
        <Card style={{ overflow:"auto", padding:0 }}>
          <div style={{ padding:"12px 16px", borderBottom:`1px solid ${T.bd}`, display:"flex", alignItems:"center", gap:12, background:T.s2 }}>
            <button onClick={prevMonth} style={{ padding:"5px 10px", borderRadius:6, border:"none", background:T.pbg, color:T.p, cursor:"pointer", fontSize:13 }}>◀</button>
            <span style={{ fontSize:14, fontWeight:800, color:T.tx, minWidth:120, textAlign:"center" }}>{year}년 {MONTH_KR[month]}</span>
            <button onClick={nextMonth} style={{ padding:"5px 10px", borderRadius:6, border:"none", background:T.pbg, color:T.p, cursor:"pointer", fontSize:13 }}>▶</button>
            <button onClick={()=>{ setYear(today.getFullYear()); setMonth(today.getMonth()); }}
              style={{ padding:"5px 12px", borderRadius:6, border:"none", background:T.s3, color:T.mu, cursor:"pointer", fontSize:11, marginLeft:"auto" }}>오늘</button>
          </div>
          <div style={{ minWidth: 120 + daysInMonth * 30, padding:14 }}>
            {/* 날짜 헤더 */}
            <div style={{ display:"grid", gridTemplateColumns:`120px repeat(${daysInMonth}, 30px)`, gap:1, marginBottom:8 }}>
              <div style={{ fontWeight:700, color:T.mu, fontSize:10, padding:"4px 6px" }}>강의실</div>
              {Array.from({length:daysInMonth}).map((_,i)=>{
                const ds = dateStr(i+1);
                const dow = new Date(year, month, i+1).getDay();
                const isToday = ds === `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
                return (
                  <div key={i} style={{ textAlign:"center", fontSize:9, fontWeight:isToday?900:600, color:isToday?T.p:dow===0?"#EF4444":dow===6?"#3B82F6":T.mu, padding:"4px 0", background:isToday?T.pbg:"transparent", borderRadius:4 }}>
                    {i+1}
                  </div>
                );
              })}
            </div>
            {/* 강의실별 행 */}
            {rooms.map(room=>(
              <div key={room.id} style={{ display:"grid", gridTemplateColumns:`120px repeat(${daysInMonth}, 30px)`, gap:1, marginBottom:4 }}>
                <div style={{ fontWeight:600, color:T.tx, fontSize:11, padding:"6px 6px", display:"flex", alignItems:"center", background:T.s2, borderRadius:6 }}>
                  {room.name.slice(0,7)}
                </div>
                {Array.from({length:daysInMonth}).map((_,dayIdx)=>{
                  const ds = dateStr(dayIdx+1);
                  const dayBooks = bookings.filter(b => b.roomId===room.id && b.start<=ds && b.end>=ds);
                  const conflict = dayBooks.length > 1;
                  return (
                    <div key={dayIdx}
                      onClick={()=>{ if(dayBooks.length>0 && onEditBook) onEditBook(dayBooks[0]); }}
                      title={conflict?"⚠️ 중복 예약!":dayBooks[0]?.label||""}
                      style={{ height:28, borderRadius:4, background:dayBooks.length>0?dayBooks[0].color:T.s2, border:conflict?`2px solid ${T.danger}`:"none", cursor:dayBooks.length>0?"pointer":"default", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
                      {dayBooks.length>0 && (
                        <span style={{ fontSize:8, color:"#fff", fontWeight:600, padding:"0 2px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                          {conflict?"⚠️":dayBooks[0].label.slice(0,4)}
                        </span>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </Card>
      );
    };

    // ATTENDANCE
    const AttendanceMgmt = (props) => {
      const students = props.students;
      const courses = props.courses;
      const [course, setCourse] = useState(courses[3] || courses[0]);
      const [qrType, setQrType] = useState("in");
      const [records, setRecords] = useState({});
      const [startH, setStartH] = useState(9);
      const [startM, setStartM] = useState(0);
      const [lateH, setLateH] = useState(9);
      const [lateM, setLateM] = useState(30);
      const [endH, setEndH] = useState(13);
      const [endM, setEndM] = useState(0);
      const [simRunning, setSimRunning] = useState(false);

      const startTotal = startH * 60 + startM;
      const lateTotal = lateH * 60 + lateM;
      const fmtTime = (h, m) => String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");

      const calcStatus = (inMins) => {
        if (inMins === null) return "A";
        if (inMins <= lateTotal) return "O";
        return "L";
      };

      const courseStudents = students.filter(s => s.cid === course.id);
      const checkedInCnt = Object.keys(records).filter(k => records[k].in).length;
      const presentCnt = Object.keys(records).filter(k => records[k].in && calcStatus(records[k].in.mins) === "O").length;
      const lateCnt = Object.keys(records).filter(k => records[k].in && calcStatus(records[k].in.mins) === "L").length;

      const startSim = () => {
        if (simRunning) return;
        setSimRunning(true);
        if (qrType === "in") setRecords({});

        courseStudents.forEach((s, idx) => {
          setTimeout(() => {
            const offsetMins = Math.floor(Math.random() * 80) - 10;
            const mins = Math.max(0, startTotal + offsetMins);
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            const time = fmtTime(h, m);

            setRecords(prev => {
              const newRec = Object.assign({}, prev);
              if (newRec[s.id] === undefined) newRec[s.id] = {};
              if (qrType === "in") {
                newRec[s.id].in = { time: time, mins: mins };
              }
              return newRec;
            });
          }, idx * 250);
        });

        setTimeout(() => setSimRunning(false), courseStudents.length * 250);
      };

      const ATT_MAP = {
        O: { label: "출석", bg: "#ECFDF5", color: T.ok },
        L: { label: "지각", bg: "#FFFBEB", color: T.warn },
        A: { label: "결석", bg: "#FEF2F2", color: T.danger },
      };

      return (
        <div className="page">
          <div style={{ marginBottom: 18 }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: T.tx }}>출결 관리</h2>
            <p style={{ fontSize: 12, color: T.mu, marginTop: 3 }}>QR 코드로 실시간 출석을 관리합니다</p>
          </div>

          <Card style={{ padding: "14px 18px", marginBottom: 16, display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 10, color: T.mu, marginBottom: 5, fontWeight: 600 }}>과정</div>
              <select value={course.id} onChange={e => setCourse(courses.find(c => c.id === +e.target.value) || courses[0])} style={{ padding: "7px 10px", border: "1px solid " + T.bd, borderRadius: 8, fontSize: 12, outline: "none", background: T.s2, cursor: "pointer", color: T.tx }}>
                {courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div style={{ marginLeft: "auto", display: "flex", gap: 14, alignItems: "center" }}>
              {[{ v: presentCnt, l: "출석", c: T.ok }, { v: lateCnt, l: "지각", c: T.warn }, { v: courseStudents.length - checkedInCnt, l: "미확인", c: T.danger }].map(x => (
                <div key={x.l} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 18, fontWeight: 800, color: x.c }}>{x.v}</div>
                  <div style={{ fontSize: 9, color: T.mu }}>{x.l}</div>
                </div>
              ))}
              <div style={{ fontSize: 13, color: T.mu }}>/ {courseStudents.length}명</div>
            </div>
          </Card>

          <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: 16 }}>
            <Card style={{ padding: 20, width: 280, flexShrink: 0 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 16 }}>
                {[{ id: "in", label: "📥 입실 QR" }, { id: "out", label: "📤 퇴실 QR" }].map(x => (
                  <button key={x.id} onClick={() => setQrType(x.id)} style={{ padding: "10px 6px", borderRadius: 9, border: "none", cursor: "pointer", background: qrType === x.id ? T.p : T.s3, color: qrType === x.id ? "#fff" : T.mu, fontWeight: 700, fontSize: 11 }}>
                    {x.label}
                  </button>
                ))}
              </div>
              <div style={{ fontSize: 10, color: T.mu, lineHeight: 1.8, padding: "8px 10px", background: T.s2, borderRadius: 7, border: "1px solid " + T.bd }}>
                <b style={{ color: T.tx }}>과정:</b> {course.name}
              </div>
            </Card>

            <Card style={{ overflow: "hidden", display: "flex", flexDirection: "column" }}>
              <div style={{ padding: "12px 18px", borderBottom: "1px solid " + T.bd, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.tx }}>📡 실시간 출석</div>
                <Btn size="sm" onClick={startSim} variant={simRunning ? "ghost" : "primary"}>
                  <Icon n="refresh" s={13}/>
                  {simRunning ? "스캔 중..." : (qrType === "in" ? "입실" : "퇴실") + " 시뮬레이션"}
                </Btn>
              </div>
              <div style={{ flex: 1, padding: 14, overflowY: "auto", maxHeight: 400 }}>
                {courseStudents.map(s => {
                  const rec = records[s.id] || {};
                  const inRec = rec.in;
                  const status = inRec ? calcStatus(inRec.mins) : "A";
                  const att = ATT_MAP[inRec ? status : "A"];
                  return (
                    <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 12px", borderRadius: 8, marginBottom: 6, background: inRec ? att.bg : T.s2, border: "1px solid " + (inRec ? att.color + "30" : T.bd) }}>
                      <div style={{ width: 34, height: 34, borderRadius: 9, flexShrink: 0, background: inRec ? att.color + "20" : T.bd, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: inRec ? att.color : T.mu }}>
                        {inRec ? att.label[0] : "?"}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: T.tx }}>{s.name}</div>
                        <div style={{ fontSize: 10, color: T.mu, marginTop: 1 }}>
                          {inRec ? <span style={{ color: "#2563EB" }}>📥 {inRec.time}</span> : "대기 중"}
                        </div>
                      </div>
                      <div>
                        {inRec ? <Chip label={att.label} bg={att.bg} color={att.color}/> : <Chip label="미확인" bg={T.s3} color={T.mu}/>}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ padding: "11px 18px", borderTop: "1px solid " + T.bd, background: T.s2 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                  <span style={{ fontSize: 11, color: T.mu }}>입실 진행률</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: T.p }}>
                    {courseStudents.length ? Math.round(checkedInCnt / courseStudents.length * 100) : 0}%
                  </span>
                </div>
                <RBar r={courseStudents.length ? checkedInCnt / courseStudents.length * 100 : 0} h={8}/>
              </div>
            </Card>
          </div>
        </div>
      );
    };

    // COMPLETION
    const CompletionMgmt = (props) => {
      const students = props.students;
      const courses = props.courses;
      const [course, setCourse] = useState(courses[3] || courses[0]);
      const [threshold, setThr] = useState(80);
      const list = students.filter(s => s.cid === course.id);
      const completed = list.filter(s => s.rate >= threshold).length;
      const rate = list.length ? Math.round(completed / list.length * 100) : 0;

      return (
        <div className="page">
          <div style={{ marginBottom: 18 }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: T.tx }}>수료 관리</h2>
            <p style={{ fontSize: 12, color: T.mu, marginTop: 3 }}>출석률 기준 자동 판정</p>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
            {courses.map(c => (
              <button key={c.id} onClick={() => setCourse(c)} style={{ padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, background: course.id === c.id ? c.cc : T.s3, color: course.id === c.id ? "#fff" : T.mu }}>
                {c.name.length > 14 ? c.name.slice(0, 14) + "..." : c.name}
              </button>
            ))}
          </div>

          <Card style={{ padding: "16px 20px", marginBottom: 14, display: "flex", gap: 20, alignItems: "center" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: T.mu, marginBottom: 6, fontWeight: 600 }}>수료 기준 출석률</div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <input type="range" min={60} max={95} step={5} value={threshold} onChange={e => setThr(+e.target.value)} style={{ flex: 1, accentColor: T.p }}/>
                <span style={{ fontSize: 26, fontWeight: 900, color: T.p, minWidth: 52 }}>{threshold}%</span>
              </div>
            </div>
            <Card style={{ padding: "16px 22px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: T.mu }}>수료율</div>
              <div style={{ fontSize: 32, fontWeight: 900, color: rate >= 90 ? T.p : T.danger }}>{rate}%</div>
              <div style={{ fontSize: 11, color: T.mu }}>{completed}/{list.length}명</div>
            </Card>
          </Card>

          <Card style={{ overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: T.s2 }}>
                  {["이름", "출석률", "상태", ""].map(h => (
                    <th key={h} style={{ padding: "10px 14px", textAlign: h === "이름" ? "left" : "center", fontSize: 11, color: T.mu, fontWeight: 700, borderBottom: "1px solid " + T.bd }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {list.map(s => (
                  <tr key={s.id} className="row-hover" style={{ borderBottom: "1px solid " + T.bd }}>
                    <td style={{ padding: "12px 14px", fontSize: 13, fontWeight: 700, color: T.tx }}>{s.name}</td>
                    <td style={{ padding: "12px 14px", textAlign: "center" }}>
                      <span style={{ fontSize: 15, fontWeight: 800, color: rateColor(s.rate) }}>{s.rate}%</span>
                      <RBar r={s.rate} h={3}/>
                    </td>
                    <td style={{ padding: "12px 14px", textAlign: "center" }}>
                      <Chip label={s.rate >= threshold ? "수료" : "미수료"} bg={s.rate >= threshold ? T.pbg : "#FEF2F2"} color={s.rate >= threshold ? T.p : T.danger}/>
                    </td>
                    <td style={{ padding: "12px 14px" }}></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      );
    };

    // CERTIFICATE
    const printCert = (s, c, certNo, issueDate) => {
      const birthFmt = s.birth ? s.birth.replace(/(\d{4})-(\d{2})-(\d{2})/, (_, y, m, d) => y + ". " + String(+m) + ". " + String(+d)) : "　　. 　. 　";
      const periodLine = (c.dateFrom || "") + (c.dateTo ? " ~ " + c.dateTo : "") + (c.schedDays ? " / 매주 " + c.schedDays : "") + ((c.schedTimeFrom && c.schedTimeTo) ? " " + c.schedTimeFrom + " ∼ " + c.schedTimeTo : "");
      const addr = s.addrCity || "　　　　　　　　　";

      const html = "<!DOCTYPE html><html><head><meta charset='UTF-8'/><title>수강증명서</title><style>*{margin:0;padding:0}body{font-family:'맑은 고딕',sans-serif;background:#fff}table{width:100%;border-collapse:collapse}.doc{width:210mm;height:297mm;padding:22mm 24mm;background:#fff;display:flex;flex-direction:column}.title{text-align:center;margin-bottom:28px}.title h1{font-size:24pt;letter-spacing:12px;border-bottom:3px double #333;display:inline-block;padding-bottom:8px}.no{font-size:10pt;text-align:right;margin-bottom:20px}.section{border:1.5px solid #333}.section-title{background:#f0f0f0;padding:5px 12px;font-size:11pt;font-weight:800;border-bottom:1px solid #bbb}.row{display:flex;min-height:36px;border-bottom:1px solid #ccc}.field-no{width:26px;background:#f8f8f8;display:flex;align-items:center;justify-content:center;font-size:9pt;border-right:1px solid #ccc;flex-shrink:0}.field-label{width:88px;padding:7px 10px;font-size:10pt;font-weight:700;border-right:1px solid #ccc;flex-shrink:0}.field-value{flex:1;padding:7px 12px;font-size:11pt;display:flex;align-items:center}.sign{text-align:center;margin-top:28px}.date{font-size:12pt;margin-bottom:36px}.sign-line{display:inline-flex;gap:16px;align-items:center}.sign-title{font-size:14pt;font-weight:700;letter-spacing:3px}.stamp{width:54px;height:54px;border:2px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13pt;font-weight:900}.print-btn{position:fixed;bottom:24px;right:24px;background:#EA580C;color:#fff;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;z-index:99}</style></head><body><div class='doc'><div class='title'><h1>직업교육훈련 수강증명서</h1></div><div class='no'>제 2026-북부-수강-" + certNo + " 호</div><div class='section'><div class='section-title'>훈련생</div><div class='row'><div class='field-no'>①</div><div class='field-label'>성명</div><div class='field-value' style='font-weight:800;font-size:13pt'>" + s.name + "</div></div><div class='row'><div class='field-no'>②</div><div class='field-label'>생년월일</div><div class='field-value'>" + birthFmt + "</div></div><div class='row'><div class='field-no'>③</div><div class='field-label'>주소</div><div class='field-value'>" + addr + "</div></div></div><div class='section' style='margin-top:0'><div class='section-title'>수강명세</div><div class='row'><div class='field-no'>④</div><div class='field-label'>훈련기관</div><div class='field-value'>경기도일자리재단 북부사업본부</div></div><div class='row'><div class='field-no'>⑤</div><div class='field-label'>수강직종</div><div class='field-value'>" + c.name + "</div></div><div class='row' style='min-height:46px'><div class='field-no'>⑥</div><div class='field-label'>수강기간</div><div class='field-value' style='font-size:10.5pt'>" + periodLine + "</div></div></div><div style='text-align:center;font-size:11pt;line-height:2.2;margin-top:28px;margin-bottom:24px'>위의 사실이 틀림없음을 증명합니다.</div><div class='sign'><div class='date'>" + issueDate + "</div><div class='sign-line'><div class='sign-title'>경기도일자리재단 대표이사</div><div class='stamp'>(인)</div></div></div></div><button class='print-btn' onclick='window.print()'>🖨️ PDF 저장</button></body></html>";

      const w = window.open("", "_blank", "width=900,height=1200");
      w.document.write(html);
      w.document.close();
    };

    const CertMgmt = (props) => {
      const students = props.students;
      const courses = props.courses;
      const [course, setCourse] = useState(courses[3] || courses[0]);
      const [issueDate, setIssueDate] = useState("2026년 　 월 　 일");
      const eligible = students.filter(s => s.cid === course.id && s.rate > 0);

      const handleIssue = (s, idx) => {
        const no = course.code + "-" + String(idx + 1).padStart(3, "0");
        printCert(s, course, no, issueDate);
      };

      return (
        <div className="page">
          <div style={{ marginBottom: 16 }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, color: T.tx }}>증명서 발급</h2>
            <p style={{ fontSize: 12, color: T.mu, marginTop: 3 }}>수강증명서 공식 양식 출력</p>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            {courses.map(c => (
              <button key={c.id} onClick={() => setCourse(c)} style={{ padding: "6px 12px", borderRadius: 20, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, background: course.id === c.id ? c.cc : T.s3, color: course.id === c.id ? "#fff" : T.mu }}>
                {c.name.length > 14 ? c.name.slice(0, 14) + "..." : c.name}
              </button>
            ))}
          </div>

          <Card style={{ padding: "14px 18px", marginBottom: 16, display: "flex", gap: 16, alignItems: "center" }}>
            <div style={{ fontSize: 12, fontWeight: 700 }}>📅 발급일자</div>
            <input type="date" onChange={e => setIssueDate(e.target.value ? e.target.value.slice(0, 4) + "년 " + e.target.value.slice(5, 7) + "월 " + e.target.value.slice(8) + "일" : "")} style={{ padding: "6px 10px", border: "1px solid " + T.bd, borderRadius: 8, fontSize: 12, outline: "none", background: T.s2, cursor: "pointer" }}/>
            <div style={{ fontSize: 12, color: T.mu }}>→ <b style={{ color: T.p }}>{issueDate}</b></div>
            <div style={{ marginLeft: "auto" }}>
              <Btn size="sm" onClick={() => eligible.forEach((s, i) => handleIssue(s, i))}>
                <Icon n="dl" s={13}/>
                전체 {eligible.length}명 출력
              </Btn>
            </div>
          </Card>

          <Card style={{ overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: T.s2 }}>
                  {["번호", "이름", "생년월일", "출석률", ""].map(h => (
                    <th key={h} style={{ padding: "10px 14px", textAlign: h === "이름" ? "left" : "center", fontSize: 11, color: T.mu, fontWeight: 700, borderBottom: "1px solid " + T.bd }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {eligible.map((s, idx) => (
                  <tr key={s.id} className="row-hover" style={{ borderBottom: "1px solid " + T.bd }}>
                    <td style={{ padding: "12px 14px", textAlign: "center", fontSize: 12, color: T.mu }}>{idx + 1}</td>
                    <td style={{ padding: "12px 14px", fontSize: 13, fontWeight: 700, color: T.tx }}>{s.name}</td>
                    <td style={{ padding: "12px 14px", textAlign: "center", fontSize: 12, color: T.mu }}>{s.birth || "—"}</td>
                    <td style={{ padding: "12px 14px", textAlign: "center", fontSize: 14, fontWeight: 800, color: rateColor(s.rate) }}>{s.rate}%</td>
                    <td style={{ padding: "12px 14px", textAlign: "center" }}>
                      <Btn size="sm" onClick={() => handleIssue(s, idx)}>
                        <Icon n="dl" s={12}/>
                        발급
                      </Btn>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      );
    };

    // AUDIT LOG VIEWER
    const AuditLogViewer = ({ auditLogs }) => {
      const [filter, setFilter] = useState({ table:"all", action:"all", days:30 });
      const [diffLog, setDiffLog] = useState(null);

      const cutoff = new Date(Date.now() - filter.days * 86400000).toISOString();
      const visible = auditLogs.filter(l => {
        if(l.changed_at < cutoff) return false;
        if(filter.table !== "all" && l.table_name !== filter.table) return false;
        if(filter.action !== "all" && l.action !== filter.action) return false;
        return true;
      });

      const sel = { padding:"6px 10px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:11, outline:"none", background:T.s2, cursor:"pointer", color:T.tx };

      const actionColor = a => a==="INSERT"?"#ECFDF5":a==="UPDATE"?"#FFFBEB":"#FEF2F2";
      const actionText  = a => a==="INSERT"?T.ok:a==="UPDATE"?T.warn:T.danger;

      return (
        <div>
          {diffLog && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center" }}
              onClick={()=>setDiffLog(null)}>
              <div style={{ background:T.s, borderRadius:16, width:520, maxWidth:"96vw", maxHeight:"80vh", overflow:"hidden", boxShadow:"0 24px 64px rgba(0,0,0,.3)", animation:"fadeUp .2s ease" }}
                onClick={e=>e.stopPropagation()}>
                <div style={{ background:`linear-gradient(135deg,${T.sb},${T.p})`, padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ fontSize:14, fontWeight:800, color:"#fff" }}>📋 변경 상세</div>
                  <button onClick={()=>setDiffLog(null)} style={{ width:26, height:26, borderRadius:6, border:"none", background:"rgba(255,255,255,.15)", color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon n="x" s={13}/></button>
                </div>
                <div style={{ padding:"16px 20px", overflowY:"auto", maxHeight:"calc(80vh - 56px)" }}>
                  <div style={{ marginBottom:12 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:T.mu, marginBottom:4 }}>변경 전 (OLD)</div>
                    <pre style={{ background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:8, padding:"10px 12px", fontSize:11, color:T.tx, overflowX:"auto", whiteSpace:"pre-wrap", wordBreak:"break-all" }}>
                      {diffLog.old_values ? JSON.stringify(diffLog.old_values, null, 2) : "(없음)"}
                    </pre>
                  </div>
                  <div>
                    <div style={{ fontSize:11, fontWeight:700, color:T.mu, marginBottom:4 }}>변경 후 (NEW)</div>
                    <pre style={{ background:"#ECFDF5", border:"1px solid #A7F3D0", borderRadius:8, padding:"10px 12px", fontSize:11, color:T.tx, overflowX:"auto", whiteSpace:"pre-wrap", wordBreak:"break-all" }}>
                      {diffLog.new_values ? JSON.stringify(diffLog.new_values, null, 2) : "(없음)"}
                    </pre>
                  </div>
                </div>
              </div>
            </div>
          )}
          <h3 style={{ fontSize:16, fontWeight:800, color:T.tx, marginBottom:12 }}>📋 감사 로그</h3>
          <Card style={{ padding:"12px 16px", marginBottom:14, display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
            <select value={filter.table} onChange={e=>setFilter({...filter, table:e.target.value})} style={sel}>
              <option value="all">전체 테이블</option>
              <option value="students">훈련생</option>
              <option value="courses">과정</option>
              <option value="attendance">출석</option>
              <option value="instructors">강사</option>
              <option value="rooms">강의실</option>
              <option value="bookings">예약</option>
            </select>
            <select value={filter.action} onChange={e=>setFilter({...filter, action:e.target.value})} style={sel}>
              <option value="all">전체 작업</option>
              <option value="INSERT">추가</option>
              <option value="UPDATE">수정</option>
              <option value="DELETE">삭제</option>
            </select>
            <input type="number" min="1" max="365" value={filter.days}
              onChange={e=>setFilter({...filter, days:Math.max(1,parseInt(e.target.value)||1)})}
              style={{...sel, width:80}} placeholder="일 수"/>
            <span style={{ fontSize:11, color:T.mu, marginLeft:"auto" }}>총 {visible.length}건</span>
          </Card>
          <Card style={{ overflow:"hidden" }}>
            {visible.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", color:T.mu, fontSize:13 }}>
                {auditLogs.length===0 ? "아직 기록된 감사 로그가 없습니다.\n강의실 예약·계정 변경 시 자동으로 기록됩니다." : "필터 조건에 맞는 로그가 없습니다."}
              </div>
            ) : (
              <table style={{ width:"100%", borderCollapse:"collapse" }}>
                <thead>
                  <tr style={{ background:T.s2 }}>
                    {["시간","사용자","테이블","작업","설명",""].map(h=>(
                      <th key={h} style={{ padding:"10px 12px", textAlign:"left", fontSize:11, fontWeight:700, borderBottom:`1px solid ${T.bd}`, color:T.mu }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {visible.map(log=>(
                    <tr key={log.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                      <td style={{ padding:"10px 12px", fontSize:11, color:T.mu, whiteSpace:"nowrap" }}>
                        {new Date(log.changed_at).toLocaleString("ko-KR")}
                      </td>
                      <td style={{ padding:"10px 12px", fontSize:12, fontWeight:600, color:T.tx }}>{log.user_name}</td>
                      <td style={{ padding:"10px 12px" }}><Chip label={log.table_name} bg={T.p+"15"} color={T.p}/></td>
                      <td style={{ padding:"10px 12px" }}>
                        <Chip label={log.action} bg={actionColor(log.action)} color={actionText(log.action)}/>
                      </td>
                      <td style={{ padding:"10px 12px", fontSize:11, color:T.mu, maxWidth:200, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{log.description}</td>
                      <td style={{ padding:"10px 12px", textAlign:"center" }}>
                        <button onClick={()=>setDiffLog(log)} style={{ fontSize:10, color:T.p, cursor:"pointer", border:"none", background:"none", fontWeight:600 }}>상세보기</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </Card>
        </div>
      );
    };

    // ACCOUNT TAB (계정 관리 + 감사 로그)
    const AccountTab = ({ accounts, setAccounts, currentUser, auditLogs, onAudit }) => {
      const [editIdx, setEditIdx] = useState(null);
      const [newPw, setNewPw] = useState("");
      const [newPw2, setNewPw2] = useState("");
      const [pwErr, setPwErr] = useState("");
      const [addForm, setAddForm] = useState({ name:"", role:"staff", pw:"", pw2:"" });
      const [showAdd, setShowAdd] = useState(false);
      const [subTab, setSubTab] = useState("accounts");

      const inp = { width:"100%", padding:"8px 10px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", color:T.tx, background:T.s2, fontFamily:"inherit" };

      const savePw = (idx) => {
        if(newPw.length < 4) { setPwErr("비밀번호는 4자 이상이어야 합니다."); return; }
        if(newPw !== newPw2)  { setPwErr("비밀번호가 일치하지 않습니다."); return; }
        const updated = accounts.map((a,i) => i===idx ? {...a, pw:newPw} : a);
        onAudit("accounts","UPDATE",accounts[idx].id, accounts[idx], {...accounts[idx],pw:"[변경됨]"});
        setAccounts(updated);
        setEditIdx(null); setNewPw(""); setNewPw2(""); setPwErr("");
      };

      const delAccount = (idx) => {
        if(accounts[idx].id === currentUser.id) { alert("현재 로그인 중인 계정은 삭제할 수 없습니다."); return; }
        if(!window.confirm(`"${accounts[idx].name}" 계정을 삭제하시겠습니까?`)) return;
        onAudit("accounts","DELETE",accounts[idx].id,accounts[idx],null);
        setAccounts(accounts.filter((_,i)=>i!==idx));
      };

      const addAccount = () => {
        if(!addForm.name.trim()) { alert("이름을 입력하세요."); return; }
        if(addForm.pw.length < 4) { alert("비밀번호는 4자 이상"); return; }
        if(addForm.pw !== addForm.pw2) { alert("비밀번호 불일치"); return; }
        const newAcc = { id:genId(), name:addForm.name.trim(), role:addForm.role, pw:addForm.pw };
        onAudit("accounts","INSERT",newAcc.id,null,{...newAcc,pw:"[설정됨]"});
        setAccounts(p=>[...p,newAcc]);
        setAddForm({ name:"", role:"staff", pw:"", pw2:"" });
        setShowAdd(false);
      };

      const roleColor = r => r==="admin"?T.p:T.ok;
      const roleLabel = r => r==="admin"?"관리자":"담당자";

      return (
        <div className="page">
          <div style={{ marginBottom:18 }}>
            <h2 style={{ fontSize:20, fontWeight:800, color:T.tx }}>계정 관리</h2>
            <p style={{ fontSize:12, color:T.mu, marginTop:3 }}>사용자 계정 · 비밀번호 · 감사 로그</p>
          </div>

          {/* 서브탭 */}
          <div style={{ display:"flex", gap:0, marginBottom:18, borderBottom:`2px solid ${T.bd}` }}>
            {[["accounts","👤 계정 관리"],["audit","📋 감사 로그"]].map(([v,l])=>(
              <button key={v} onClick={()=>setSubTab(v)} style={{
                padding:"10px 20px", border:"none", cursor:"pointer", fontSize:13, fontWeight:700,
                background:"transparent", color:subTab===v?T.p:T.mu,
                borderBottom:subTab===v?`2px solid ${T.p}`:"2px solid transparent", marginBottom:-2 }}>{l}</button>
            ))}
          </div>

          {subTab === "accounts" ? (
            <div style={{ maxWidth:600 }}>
              <div style={{ padding:"10px 14px", borderRadius:8, background:"#FFF7ED", border:`1px solid ${T.pl}60`, fontSize:11, color:"#92400E", marginBottom:16 }}>
                🔒 <b>비밀번호는 4자 이상</b>으로 설정하세요. 실제 운영 시 백엔드 서버 인증으로 교체를 권장합니다.
              </div>
              {accounts.map((acc, idx)=>(
                <Card key={acc.id} style={{ padding:"14px 16px", marginBottom:10, border:`1px solid ${editIdx===idx?T.p:T.bd}` }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:editIdx===idx?12:0 }}>
                    <div style={{ width:36, height:36, borderRadius:10, flexShrink:0, background:`${roleColor(acc.role)}18`, color:roleColor(acc.role), display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:900 }}>{acc.name[0]}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:700, color:T.tx, display:"flex", alignItems:"center", gap:7 }}>
                        {acc.name}
                        {acc.id===currentUser.id && <span style={{ fontSize:9, background:T.pbg, color:T.p, padding:"1px 6px", borderRadius:4, fontWeight:700 }}>현재</span>}
                      </div>
                      <div style={{ display:"flex", gap:5, marginTop:3 }}>
                        <span style={{ fontSize:10, background:`${roleColor(acc.role)}15`, color:roleColor(acc.role), padding:"1px 7px", borderRadius:4, fontWeight:700 }}>{roleLabel(acc.role)}</span>
                        <span style={{ fontSize:10, color:T.mu }}>비밀번호: {"•".repeat(Math.min(acc.pw.length,8))}</span>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:5 }}>
                      <button onClick={()=>{ setEditIdx(editIdx===idx?null:idx); setNewPw(""); setNewPw2(""); setPwErr(""); }}
                        style={{ padding:"5px 10px", borderRadius:7, border:`1px solid ${T.bd}`, background:"transparent", cursor:"pointer", fontSize:11, fontWeight:600, color:editIdx===idx?T.p:T.mu }}>
                        {editIdx===idx?"닫기":"비밀번호 변경"}
                      </button>
                      {acc.id !== currentUser.id && (
                        <button onClick={()=>delAccount(idx)} style={{ padding:"5px 10px", borderRadius:7, border:"1px solid #FECACA", background:"transparent", cursor:"pointer", fontSize:11, fontWeight:600, color:T.danger }}>삭제</button>
                      )}
                    </div>
                  </div>
                  {editIdx===idx && (
                    <div style={{ display:"flex", flexDirection:"column", gap:8, padding:"12px 14px", borderRadius:8, background:"#fff", border:`1px solid ${T.bd}` }}>
                      <input type="password" value={newPw} onChange={e=>{ setNewPw(e.target.value); setPwErr(""); }} placeholder="새 비밀번호 (4자 이상)" style={inp}/>
                      <input type="password" value={newPw2} onChange={e=>{ setNewPw2(e.target.value); setPwErr(""); }} placeholder="새 비밀번호 확인" style={inp}/>
                      {pwErr && <div style={{ fontSize:11, color:T.danger }}>⚠️ {pwErr}</div>}
                      <div style={{ display:"flex", gap:7, justifyContent:"flex-end" }}>
                        <Btn variant="ghost" size="sm" onClick={()=>{ setEditIdx(null); setNewPw(""); setNewPw2(""); setPwErr(""); }}>취소</Btn>
                        <Btn size="sm" onClick={()=>savePw(idx)}><Icon n="check" s={12}/> 변경 저장</Btn>
                      </div>
                    </div>
                  )}
                </Card>
              ))}
              {showAdd ? (
                <Card style={{ padding:"14px 16px", border:`1.5px dashed ${T.p}`, background:T.pbg }}>
                  <div style={{ fontSize:12, fontWeight:700, color:T.p, marginBottom:10 }}>새 계정 추가</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
                    <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:8 }}>
                      <input value={addForm.name} onChange={e=>setAddForm(p=>({...p,name:e.target.value}))} placeholder="이름 (예: 박담당)" style={inp}/>
                      <select value={addForm.role} onChange={e=>setAddForm(p=>({...p,role:e.target.value}))} style={{...inp, cursor:"pointer"}}>
                        <option value="staff">담당자</option>
                        <option value="admin">관리자</option>
                      </select>
                    </div>
                    <input type="password" value={addForm.pw} onChange={e=>setAddForm(p=>({...p,pw:e.target.value}))} placeholder="비밀번호 (4자 이상)" style={inp}/>
                    <input type="password" value={addForm.pw2} onChange={e=>setAddForm(p=>({...p,pw2:e.target.value}))} placeholder="비밀번호 확인" style={inp}/>
                    <div style={{ display:"flex", gap:7, justifyContent:"flex-end" }}>
                      <Btn variant="ghost" size="sm" onClick={()=>setShowAdd(false)}>취소</Btn>
                      <Btn size="sm" onClick={addAccount}><Icon n="plus" s={12}/> 추가</Btn>
                    </div>
                  </div>
                </Card>
              ) : (
                <button onClick={()=>setShowAdd(true)}
                  style={{ width:"100%", padding:"12px 0", borderRadius:10, border:`2px dashed ${T.bd}`, background:"transparent", cursor:"pointer", fontSize:12, fontWeight:700, color:T.mu, display:"flex", alignItems:"center", justifyContent:"center", gap:7 }}>
                  <Icon n="plus" s={14}/> 새 담당자 계정 추가
                </button>
              )}
            </div>
          ) : (
            <AuditLogViewer auditLogs={auditLogs}/>
          )}
        </div>
      );
    };

    // APP
    const NAV_ITEMS = [
      { id: "dash", label: "대시보드", icon: "dash" },
      { id: "courses", label: "과정 현황", icon: "book" },
      { id: "students", label: "훈련생 관리", icon: "people" },
      { id: "instructors", label: "강사 관리", icon: "award" },
      { id: "rooms", label: "강의실 관리", icon: "cal" },
      { id: "attendance", label: "출결 관리", icon: "check" },
      { id: "completion", label: "수료 관리", icon: "check" },
      { id: "cert", label: "증명서 발급", icon: "dl" },
      { id: "account", label: "계정 관리", icon: "user" },
    ];

    function App() {
      const [currentUser, setCurrentUser] = useState(() => {
        try { const u = sessionStorage.getItem("gjf_user"); return u ? JSON.parse(u) : null; } catch { return null; }
      });
      const [page, setPage] = useState("dash");
      const [collapsed, setCollapsed] = useState(false);
      const [students] = useState(SEED_STUDENTS);
      const [courses] = useState(COURSES);
      const [instructors] = useState(SEED_INSTRUCTORS);
      const [rooms, setRooms] = useState(SEED_ROOMS);
      const [bookings, setBookings] = useState(SEED_BOOKINGS);
      const [accounts, setAccounts] = useState(INIT_ACCOUNTS);
      const [auditLogs, setAuditLogs] = useState([]);

      const logAudit = (tableName, action, recordId, oldData, newData) => {
        const desc = `${tableName} ${action}: ID ${recordId}`;
        setAuditLogs(prev => [{
          id: genId(),
          user_id: currentUser?.id,
          user_name: currentUser?.name || "-",
          table_name: tableName,
          action: action,
          record_id: recordId,
          old_values: oldData,
          new_values: newData,
          description: desc,
          changed_at: new Date().toISOString(),
        }, ...prev]);
      };

      if (!currentUser) {
        return <LoginScreen accounts={accounts} onLogin={user => { sessionStorage.setItem("gjf_user", JSON.stringify(user)); setCurrentUser(user); }}/>;
      }

      const renderPage = () => {
        switch (page) {
          case "dash": return <Dashboard students={students} courses={courses}/>;
          case "courses": return <CourseList courses={courses}/>;
          case "students": return <StudentMgmt students={students} courses={courses}/>;
          case "instructors": return <InstructorMgmt instructors={instructors} courses={courses}/>;
          case "rooms": return <RoomMgmt rooms={rooms} setRooms={setRooms} bookings={bookings} setBookings={setBookings} courses={courses} onAudit={logAudit}/>;
          case "attendance": return <AttendanceMgmt students={students} courses={courses}/>;
          case "completion": return <CompletionMgmt students={students} courses={courses}/>;
          case "cert": return <CertMgmt students={students} courses={courses}/>;
          case "account": return <AccountTab accounts={accounts} setAccounts={setAccounts} currentUser={currentUser} auditLogs={auditLogs} onAudit={logAudit}/>;
          default: return null;
        }
      };

      return (
        <>
          <GStyle/>
          <div style={{ display: "flex", height: "100vh", background: "linear-gradient(160deg,#FED7AA 0%,#FDBA74 12%,#FFF7ED 45%,#F1F5F9 75%,#FFEDD5 100%)", fontFamily: "'Pretendard',-apple-system,sans-serif", overflow: "hidden" }}>
            <div style={{ width: collapsed ? 64 : 240, flexShrink: 0, transition: "width .25s ease", background: "linear-gradient(180deg," + T.sb + " 0%," + T.p + " 55%,#F97316 100%)", display: "flex", flexDirection: "column", overflow: "hidden", boxShadow: "4px 0 24px rgba(0,0,0,.15)" }}>
              <div style={{ padding: collapsed ? "16px 0" : "16px 18px", borderBottom: "1px solid rgba(255,255,255,.1)", display: "flex", alignItems: "center", justifyContent: collapsed ? "center" : "space-between" }}>
                {!collapsed && (
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 900, color: "#fff" }}>경기북부 직업교육</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 3 }}>
                      <span style={{ background: "rgba(253,186,116,.3)", color: "#FED7AA", padding: "1px 6px", borderRadius: 4, fontSize: 9, fontWeight: 700 }}>2026</span>
                      <span style={{ fontSize: 10, color: "rgba(255,255,255,.45)" }}>학사관리</span>
                    </div>
                  </div>
                )}
                <button onClick={() => setCollapsed(!collapsed)} style={{ width: 28, height: 28, borderRadius: 6, background: "rgba(255,255,255,.1)", border: "none", color: "rgba(255,255,255,.6)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <Icon n="bars" s={14}/>
                </button>
              </div>

              <nav style={{ flex: 1, padding: "10px 0", overflowY: "auto" }}>
                {NAV_ITEMS.map(item => {
                  const active = page === item.id;
                  return (
                    <button key={item.id} className="btn-nav" onClick={() => setPage(item.id)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: collapsed ? "13px 0" : "11px 18px", justifyContent: collapsed ? "center" : "flex-start", background: active ? "rgba(255,255,255,.13)" : "transparent", border: "none", cursor: "pointer", borderLeft: active ? "3px solid #FED7AA" : "3px solid transparent", color: active ? "#fff" : "rgba(255,255,255,.45)", fontWeight: active ? 700 : 400, fontSize: 13 }}>
                      <Icon n={item.icon} s={16}/>
                      {!collapsed && <span style={{ whiteSpace: "nowrap" }}>{item.label}</span>}
                    </button>
                  );
                })}
              </nav>

              {!collapsed && (
                <div style={{ padding: "13px 18px", borderTop: "1px solid rgba(255,255,255,.1)" }}>
                  <button onClick={() => { if (window.confirm("로그아웃?")) { sessionStorage.removeItem("gjf_user"); setCurrentUser(null); } }} style={{ width: "100%", padding: "6px 0", borderRadius: 7, border: "1px solid rgba(255,255,255,.2)", background: "rgba(255,255,255,.08)", color: "rgba(255,255,255,.7)", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>🚪 로그아웃</button>
                </div>
              )}
            </div>

            <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
              <div style={{ height: 52, background: "rgba(255,255,255,.9)", borderBottom: "1px solid " + T.bd, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 22px", flexShrink: 0 }}>
                <div style={{ fontSize: 12, color: T.mu }}>
                  <span style={{ color: T.p, fontWeight: 700 }}>경기도일자리재단</span>
                  <span style={{ margin: "0 6px", color: T.bd }}>·</span>
                  직업교육 학사관리 v2026
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "5px 10px", background: T.pbg, borderRadius: 8 }}>
                  <div style={{ width: 24, height: 24, borderRadius: 6, background: T.p, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>
                    <Icon n="user" s={12}/>
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: T.p }}>{currentUser.name}</span>
                </div>
              </div>

              <div style={{ flex: 1, overflowY: "auto", padding: 22 }}>
                {renderPage()}
              </div>
            </div>
          </div>
        </>
      );
    }

    const LoginScreen = (props) => {
      const accounts = props.accounts || INIT_ACCOUNTS;
      const [selId, setSelId] = useState(1);
      const [pw, setPw] = useState("");
      const [error, setError] = useState("");
      const [agreed, setAgreed] = useState(false);
      const [shaking, setShaking] = useState(false);

      const handleLogin = () => {
        if (!agreed) { setError("동의 필수"); return; }
        const acc = accounts.find(a => a.id === selId);
        if (!acc || acc.pw !== pw) {
          setError("비밀번호 오류");
          setShaking(true);
          setTimeout(() => setShaking(false), 500);
          setPw("");
          return;
        }
        props.onLogin(acc);
      };

      return (
        <>
          <GStyle/>
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg,#7C2D12 0%,#EA580C 40%,#F97316 70%,#FED7AA 100%)", padding: 20 }}>
            <div style={{ width: "100%", maxWidth: 440 }}>
              <div style={{ textAlign: "center", marginBottom: 28 }}>
                <div style={{ fontSize: 28, marginBottom: 14 }}>🎓</div>
                <div style={{ fontSize: 18, fontWeight: 900, color: "#fff" }}>경기북부 직업교육</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,.6)", marginTop: 4 }}>학사관리 v2026</div>
              </div>

              <div style={{ background: "rgba(255,255,255,.96)", borderRadius: 20, padding: "30px 32px", boxShadow: "0 24px 64px rgba(0,0,0,.25)", animation: shaking ? "shake .4s ease" : "none" }}>
                <div style={{ fontSize: 15, fontWeight: 800, marginBottom: 22, textAlign: "center" }}>🔐 로그인</div>

                <div style={{ marginBottom: 14 }}>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {accounts.map(a => (
                      <button key={a.id} onClick={() => { setSelId(a.id); setError(""); }} style={{ padding: "8px 16px", borderRadius: 10, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 700, background: selId === a.id ? T.p : T.s3, color: selId === a.id ? "#fff" : T.mu }}>
                        {a.name}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ marginBottom: 16 }}>
                  <input type="password" value={pw} onChange={e => { setPw(e.target.value); setError(""); }} onKeyDown={e => { if (e.key === "Enter") handleLogin(); }} placeholder="비밀번호" style={{ width: "100%", padding: "11px 14px", border: "1.5px solid " + (error ? T.danger : T.bd), borderRadius: 10, fontSize: 14, outline: "none", background: "#fff" }}/>
                  {error && (<div style={{ marginTop: 6, fontSize: 11, color: T.danger, fontWeight: 600 }}>⚠️ {error}</div>)}
                </div>

                <div style={{ marginBottom: 20, padding: "12px 14px", borderRadius: 10, background: "#FFF7ED", border: "1px solid " + T.pl + "50" }}>
                  <div style={{ display: "flex", gap: 10 }}>
                    <input type="checkbox" id="piAgree" checked={agreed} onChange={e => setAgreed(e.target.checked)} style={{ marginTop: 2, accentColor: T.p, cursor: "pointer", flexShrink: 0 }}/>
                    <label htmlFor="piAgree" style={{ fontSize: 11, color: T.tx, lineHeight: 1.6, cursor: "pointer" }}>
                      개인정보보호법 준수 동의
                    </label>
                  </div>
                </div>

                <button onClick={handleLogin} style={{ width: "100%", padding: "13px 0", borderRadius: 11, border: "none", background: agreed ? ("linear-gradient(135deg," + T.sb + "," + T.p + ")") : T.s3, color: agreed ? "#fff" : T.mu, fontSize: 14, fontWeight: 800, cursor: agreed ? "pointer" : "not-allowed", boxShadow: agreed ? ("0 6px 20px rgba(234,88,12,.35)") : "none" }}>로그인</button>
              </div>
            </div>
          </div>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    (function hideSplash() {
      let attempts = 0;
      const timer = setInterval(function() {
        attempts++;
        if (document.getElementById('root').children.length > 0 || attempts > 60) {
          clearInterval(timer);
          const l = document.getElementById('loading');
          if (l) { l.style.opacity = '0'; setTimeout(function() { if (l.parentNode) l.parentNode.removeChild(l); }, 400); }
        }
      }, 200);
    })();
  </script>
</body>
</html>
