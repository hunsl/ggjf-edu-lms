  "Content-Type":  "application/json",
  "Prefer":        "return=representation",
};

// 기본 REST API 함수들
const sbGet = async (table, params = "") => {
  const res = await fetch(`${API}/${table}?${params}`, { headers: H });
  const data = await res.json();
  if (!res.ok) return { data: null, error: data };
  return { data, error: null };
};
const sbInsert = async (table, body) => {
  const res = await fetch(`${API}/${table}`, {
    method: "POST", headers: H,
    body: JSON.stringify(Array.isArray(body) ? body : [body]),
  });
  const data = await res.json();
  if (!res.ok) return { data: null, error: data };
  return { data: Array.isArray(body) ? data : data[0], error: null };
};
const sbUpdate = async (table, filter, body) => {
  const res = await fetch(`${API}/${table}?${filter}`, {
    method: "PATCH", headers: H,
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) return { data: null, error: data };
  return { data, error: null };
};
const sbDelete = async (table, filter) => {
  const res = await fetch(`${API}/${table}?${filter}`, { method: "DELETE", headers: H });
  if (!res.ok) { const e = await res.json(); return { error: e }; }
  return { error: null };
};

const Dashboard = ({ students, courses }) => {
  const totalTgt = courses.reduce((a,b)=>a+b.tgt,0);
  const totalCG  = courses.reduce((a,b)=>a+b.cGoal,0);
  const totalEG  = courses.reduce((a,b)=>a+b.eGoal,0);
  const avgRate  = students.length ? (students.reduce((a,b)=>a+b.rate,0)/students.length).toFixed(1) : 0;
  const atRisk   = students.filter(s=>s.rate<80);

  const catMap = {};
  courses.forEach(c=>{ if(!catMap[c.cat]) catMap[c.cat]={color:c.cc,cnt:0,tgt:0}; catMap[c.cat].cnt++; catMap[c.cat].tgt+=c.tgt; });

  return (
    <div className="page">
      {/* KPIs */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))", gap:12, marginBottom:20 }}>
        {[
          { label:"총 모집 목표", val:`${totalTgt}명`, sub:`${courses.length}개 과정`, icon:"people", color:T.p },
          { label:"수료 목표 (90%)", val:`${totalCG}명`, sub:"연간 목표", icon:"check", color:T.ok },
          { label:"취업 목표 (65%)", val:`${totalEG}명`, sub:"수료자 기준", icon:"award", color:"#D97706" },
          { label:"현재 위험 훈련생", val:`${atRisk.length}명`, sub:"출석률 80% 미만", icon:"alert", color:T.danger },
          { label:"평균 출석률", val:`${avgRate}%`, sub:"전체 훈련생", icon:"cal", color:T.info },
        ].map((k,i) => (
          <Card key={i} style={{ padding:"18px 20px", display:"flex", gap:12, alignItems:"flex-start" }}>
            <div style={{ width:42, height:42, borderRadius:10, background:`${k.color}15`, color:k.color,
              display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <Icon n={k.icon} s={20}/>
            </div>
            <div>
              <div style={{ fontSize:24, fontWeight:800, color:T.tx, lineHeight:1 }}>{k.val}</div>
              <div style={{ fontSize:11, color:T.mu, marginTop:3 }}>{k.label}</div>
              {k.sub && <div style={{ fontSize:10, color:k.color, marginTop:1, fontWeight:600 }}>{k.sub}</div>}
            </div>
          </Card>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>

        <Card style={{ padding:22 }}>

        <div style={{ fontSize:13, fontWeight:700, color:T.tx, marginBottom:14, display:"flex", gap:8 }}>
          <Icon n="info" s={15}/> 2026년 사업 개요
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:10 }}>
          {[
            {l:"사업기간",v:"2026.01 ~ 12월"},
            {l:"사업대상",v:"만 18세↑ 미취업 경기도민"},
            {l:"총 사업량",v:"13개 과정 / 240명"},

      </Card>
    </div>
  );
};

const CAT_COLORS = {
  "늘봄강사양성":"#EA580C","지역연계·기여":"#C2410C",
  "사무분야":"#9A3412","식품분야":"#DC2626","IT 신직무":"#F97316",
};
const CAT_LIST = Object.keys(CAT_COLORS);

const CourseModal = ({ course, onSave, onClose, isNew=false }) => {
  const empty = {
    cat:"늘봄강사양성", cc:"#EA580C", name:"", code:"",
    dateFrom:"", dateTo:"", period:"",
    method:"대면", hours:0, tgt:20, cGoal:18, eGoal:12,
    schedDays:"", schedTimeFrom:"09:00", schedTimeTo:"13:00",
    links:[], notes:"", pdfName:"", pdfData:""
  };
  const [form, setForm] = useState(course ? {
    ...course,
    dateFrom: course.dateFrom||"", dateTo: course.dateTo||"",
    links: course.links||[], notes: course.notes||"",
    pdfName: course.pdfName||"", pdfData: course.pdfData||"",
    schedDays: course.schedDays||"", schedTimeFrom: course.schedTimeFrom||"09:00", schedTimeTo: course.schedTimeTo||"13:00"
  } : empty);
  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const inp = { width:"100%", padding:"8px 10px", border:`1px solid ${T.bd}`,
    borderRadius:8, fontSize:12, outline:"none", color:T.tx, background:T.s2 };
  const pdfRef = useRef();

  const addLink   = () => set("links", [...(form.links||[]), {label:"", url:""}]);
  const updLink   = (i,k,v) => set("links", form.links.map((l,idx)=>idx===i?{...l,[k]:v}:l));
  const delLink   = i => set("links", form.links.filter((_,idx)=>idx!==i));

  const onPdfUpload = e => {
    const f = e.target.files[0];
    if(!f) return;
    if(f.size > 5*1024*1024) { alert("PDF 용량이 5MB를 초과합니다."); return; }
    const r = new FileReader();
    r.onload = ev => { set("pdfData", ev.target.result); set("pdfName", f.name); };
    r.readAsDataURL(f);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:999,
      display:"flex", alignItems:"center", justifyContent:"center" }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:T.s, borderRadius:16, width:560, maxWidth:"96vw",
        maxHeight:"92vh", display:"flex", flexDirection:"column",
        boxShadow:"0 24px 64px rgba(0,0,0,.28)", overflow:"hidden", animation:"fadeUp .2s ease" }}>

        <div style={{ background:`linear-gradient(135deg,${T.sb},${T.p})`,
          padding:"16px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:15, fontWeight:800, color:"#fff" }}>{isNew ? "과정 추가" : "과정 수정"}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,.55)", marginTop:2 }}>{isNew ? "새 교육과정 정보를 입력하세요" : form.code}</div>
          </div>
          <button onClick={onClose} style={{ width:28,height:28,borderRadius:6,border:"none",
            background:"rgba(255,255,255,.15)",color:"#fff",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center" }}>
            <Icon n="x" s={14}/>
          </button>
        </div>

        <div style={{ flex:1, overflowY:"auto", padding:"20px 22px", display:"flex", flexDirection:"column", gap:14 }}>
          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:6 }}>분야 <span style={{color:T.danger}}>*</span></label>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {CAT_LIST.map(cat=>(
                <button key={cat} type="button" onClick={()=>{set("cat",cat);set("cc",CAT_COLORS[cat]);}}
                  style={{ padding:"6px 13px", borderRadius:20, border:"none", cursor:"pointer",
                    fontSize:11, fontWeight:600, transition:"all .15s",
                    background: form.cat===cat ? CAT_COLORS[cat] : T.s3,
                    color: form.cat===cat ? "#fff" : T.mu }}>{cat}</button>
              ))}
            </div>
          </div>

          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>과정명 <span style={{color:T.danger}}>*</span></label>
            <input value={form.name||""} onChange={e=>set("name",e.target.value)} placeholder="예) 행정회계 사무 OA 과정" style={inp}/>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
            <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>과정코드 <span style={{color:T.danger}}>*</span></label>
              <input value={form.code||""} onChange={e=>set("code",e.target.value)} placeholder="SM-01" style={inp}/>
            </div>
            <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>
                교육 시작일 <span style={{color:T.danger}}>*</span>
              </label>
              <input type="date" value={form.dateFrom||""} onChange={e=>set("dateFrom",e.target.value)} style={inp}/>
            </div>
            <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>
                교육 종료일 <span style={{color:T.danger}}>*</span>
              </label>
              <input type="date" value={form.dateTo||""} onChange={e=>set("dateTo",e.target.value)}
                style={{...inp, borderColor: (form.dateFrom && form.dateTo && form.dateTo < form.dateFrom) ? T.danger : T.bd }}/>
            </div>
          </div>
          {(form.dateFrom || form.dateTo) && (
            <div style={{ padding:"7px 12px", borderRadius:7, background:T.s2,
              border:`1px solid ${T.bd}`, fontSize:11, color:T.mu, display:"flex", gap:8, alignItems:"center" }}>
              📅
              <span style={{ color:T.tx, fontWeight:600 }}>
                {form.dateFrom||"미정"} ~ {form.dateTo||"미정"}
              </span>
              {form.dateFrom && form.dateTo && form.dateTo >= form.dateFrom && (() => {
                const ms = new Date(form.dateTo) - new Date(form.dateFrom);
                const days = Math.round(ms / 86400000) + 1;
                const weeks = Math.round(days / 7);
                return <span style={{ color:T.mu }}>(총 {days}일 · 약 {weeks}주)</span>;
              })()}
            </div>
          )}
          <div>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>교육방식</label>
              <select value={form.method||"대면"} onChange={e=>set("method",e.target.value)} style={{...inp,cursor:"pointer"}}>
                {["대면","비대면","블렌디드","-"].map(v=><option key={v} value={v}>{v}</option>)}
              </select>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10 }}>
            {[{label:"총 시수",key:"hours",ph:"200"},{label:"교육목표",key:"tgt",ph:"20"},{label:"수료목표",key:"cGoal",ph:"18"},{label:"취업목표",key:"eGoal",ph:"12"}].map(({label,key,ph})=>(
              <div key={key}>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>{label}</label>
                <input type="number" value={form[key]||""} onChange={e=>set(key,+e.target.value)} placeholder={ph} style={inp}/>
              </div>
            ))}
          </div>

          <div style={{ padding:"12px 14px", borderRadius:10, background:"#FFFBEB", border:"1px solid #FDE68A" }}>
            <div style={{ fontSize:11, fontWeight:700, color:"#92400E", marginBottom:10 }}>
              📋 수업 요일 · 시간대 <span style={{ fontWeight:400, color:T.mu }}>— 수강증명서 ⑥ 수강기간에 자동 반영</span>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:10, alignItems:"end" }}>
              <div>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>
                  수업 요일 <span style={{ fontWeight:400 }}>(예: 월, 화, 목)</span>
                </label>
                <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                  {["월","화","수","목","금","토"].map(d => {
                    const active = (form.schedDays||"").includes(d);
                    return (
                      <button key={d} type="button"
                        onClick={()=>{
                          const arr = (form.schedDays||"").split(",").map(x=>x.trim()).filter(Boolean);
                          const next = active ? arr.filter(x=>x!==d) : [...arr, d];
                          const order = ["월","화","수","목","금","토"];
                          set("schedDays", next.sort((a,b)=>order.indexOf(a)-order.indexOf(b)).join(", "));
                        }}
                        style={{ width:30, height:30, borderRadius:7, border:"none", cursor:"pointer",
                          fontSize:12, fontWeight:700, background: active ? "#EA580C" : T.s3, color: active ? "#fff" : T.mu }}>
                        {d}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>수업 시작</label>
                <input type="time" value={form.schedTimeFrom||"09:00"} onChange={e=>set("schedTimeFrom",e.target.value)} style={{...inp, width:110, cursor:"pointer"}}/>
              </div>
              <div>
                <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>수업 종료</label>
                <input type="time" value={form.schedTimeTo||"13:00"} onChange={e=>set("schedTimeTo",e.target.value)} style={{...inp, width:110, cursor:"pointer"}}/>
              </div>
            </div>
            {(form.period || form.schedDays || form.schedTimeFrom) && (
              <div style={{ marginTop:9, fontSize:11, color:"#92400E", background:"#FFFCE8", padding:"6px 10px", borderRadius:6, border:"1px solid #FDE68A" }}>
                <b>⑥ 수강기간 미리보기:</b>{" "}
                {form.dateFrom && form.dateTo ? `${form.dateFrom} ~ ${form.dateTo}` : form.dateFrom || form.dateTo || "(기간 미입력)"}
                {form.schedDays ? ` / 매주 ${form.schedDays}` : ""}
                {(form.schedTimeFrom && form.schedTimeTo) ? ` ${form.schedTimeFrom} ∼ ${form.schedTimeTo}` : ""}
              </div>
            )}
          </div>

          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:5 }}>📝 참고사항</label>
            <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)} placeholder="과정 운영 참고사항, 특이사항 등 자유 기재" rows={2} style={{ ...inp, resize:"vertical", fontFamily:"inherit", lineHeight:1.6 }}/>
          </div>

          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
              <label style={{ fontSize:11,fontWeight:600,color:T.mu }}>🔗 참고 링크</label>
              <button type="button" onClick={addLink} style={{ fontSize:11, padding:"4px 10px", borderRadius:6, border:`1px solid ${T.p}`, background:"transparent", color:T.p, cursor:"pointer", fontWeight:600 }}>+ 추가</button>
            </div>
            {(form.links||[]).length===0 && <div style={{ fontSize:11, color:T.bd, textAlign:"center", padding:"10px 0" }}>링크가 없습니다</div>}
            {(form.links||[]).map((lk,i)=>(
              <div key={i} style={{ display:"grid", gridTemplateColumns:"1fr 2fr auto", gap:6, marginBottom:6 }}>
                <input value={lk.label||""} onChange={e=>updLink(i,"label",e.target.value)} placeholder="링크 설명" style={{...inp, fontSize:11}}/>
                <input value={lk.url||""} onChange={e=>updLink(i,"url",e.target.value)} placeholder="https://..." style={{...inp, fontSize:11}}/>
                <button type="button" onClick={()=>delLink(i)} style={{ width:30, height:34, borderRadius:6, border:"none", background:"#FEF2F2", color:T.danger, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon n="x" s={12}/></button>
              </div>
            ))}
          </div>

          <div>
            <label style={{ fontSize:11,fontWeight:600,color:T.mu,display:"block",marginBottom:8 }}>📄 강의계획서 / 수업일정표 (PDF, 최대 5MB)</label>
            <input ref={pdfRef} type="file" accept=".pdf" style={{display:"none"}} onChange={onPdfUpload}/>
            {form.pdfData ? (
              <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 14px", borderRadius:8, background:T.pbg, border:`1px solid ${T.pl}50` }}>
                <span style={{ fontSize:20 }}>📕</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:T.p }}>{form.pdfName}</div>
                  <div style={{ fontSize:10, color:T.mu }}>업로드 완료</div>
                </div>
                <Btn size="sm" variant="outline" onClick={()=>{ const w=window.open(); w.document.write(`<iframe src="${form.pdfData}" style="width:100%;height:100vh;border:none;"/>`); }}>미리보기</Btn>
                <button type="button" onClick={()=>{set("pdfData","");set("pdfName","");}} style={{ width:26,height:26,borderRadius:6,border:"none",background:"#FEF2F2",color:T.danger,cursor:"pointer", display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="x" s={12}/></button>
              </div>
            ) : (
              <button type="button" onClick={()=>pdfRef.current.click()} style={{ width:"100%", padding:"14px", borderRadius:8, border:`2px dashed ${T.bd}`, background:T.s2, cursor:"pointer", fontSize:12, color:T.mu, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                <Icon n="upload" s={16}/> PDF 파일 선택 (강의계획서 / 수업일정표)
              </button>
            )}
          </div>
        </div>

        <div style={{ padding:"13px 22px", borderTop:`1px solid ${T.bd}`, display:"flex", justifyContent:"flex-end", gap:8, background:T.s2 }}>
          <Btn variant="ghost" onClick={onClose}>취소</Btn>
          <Btn onClick={()=>{
            if(!form.name||!form.code) return alert("과정명과 과정코드는 필수입니다.");
            onSave({ ...form, id: form.id || Date.now() });
            onClose();
          }}><Icon n="check" s={13}/> {isNew?"추가":"저장"}</Btn>
        </div>
      </div>
    </div>
  );
};

const CourseList = ({ courses, onAdd, onUpdate, onDelete }) => {
  const [cat, setCat]         = useState("전체");
  const [editCourse, setEdit] = useState(null);
  const [isNew, setIsNew]     = useState(false);

  const cats = ["전체", ...new Set(courses.map(c=>c.cat))];
  const list = cat==="전체" ? courses : courses.filter(c=>c.cat===cat);

  const openNew  = () => { setIsNew(true);  setEdit({}); };
  const openEdit = c  => { setIsNew(false); setEdit(c);  };

  const handleDelete = c => {
    if(!window.confirm(`"${c.name}" 과정을 삭제하시겠습니까?\n※ 해당 과정 훈련생 데이터는 유지됩니다.`)) return;
    onDelete(c.id);
  };

  return (
    <div className="page">
      {editCourse !== null && (
        <CourseModal course={isNew ? null : editCourse} isNew={isNew} onSave={isNew ? onAdd : onUpdate} onClose={()=>setEdit(null)} />
      )}
      <SectionHead title="과정 현황" sub={`2026년 경기북부 직업교육 · 총 ${courses.length}개 과정`} right={<Btn size="sm" onClick={openNew}><Icon n="plus" s={13}/> 과정 추가</Btn>} />

      <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap" }}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setCat(c)} style={{ padding:"6px 14px", borderRadius:20, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, transition:"all .15s", background: cat===c ? T.p : T.s3, color: cat===c ? "#fff" : T.mu }}>{c}</button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:12 }}>
        {list.map(c=>(
          <div key={c.id} className="course-card" style={{ background:T.s, borderRadius:12, padding:18, border:`1px solid ${T.bd}`, borderLeft:`4px solid ${c.cc}`, position:"relative" }}>
            <div style={{ position:"absolute", top:12, right:12, display:"flex", gap:5 }}>
              <button onClick={()=>openEdit(c)} style={{ width:26,height:26,borderRadius:6,border:"none", background:T.pbg,color:T.p,cursor:"pointer", display:"flex",alignItems:"center",justifyContent:"center" }}><Icon n="edit" s={12}/></button>
              <button onClick={()=>handleDelete(c)} style={{ width:26,height:26,borderRadius:6,border:"none", background:"#FEF2F2",color:T.danger,cursor:"pointer", display:"flex",alignItems:"center",justifyContent:"center" }}><Icon n="x" s={12}/></button>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, paddingRight:60 }}>
              <Chip label={c.cat} bg={`${c.cc}15`} color={c.cc}/>
              <Chip label={c.method||"-"} bg={T.s3} color={T.mu}/>
            </div>
            <div style={{ fontSize:13, fontWeight:700, color:T.tx, lineHeight:1.45, marginBottom:3, paddingRight:60 }}>{c.name}</div>
            <div style={{ fontSize:11, color:T.mu, marginBottom:10 }}>{c.code} · {c.period||"기간미정"} · {c.hours>0?`${c.hours}시간`:"미정"}
              {c.schedDays && <span style={{ color:T.p, marginLeft:6 }}>📅 {c.schedDays}</span>}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:5, marginBottom:12 }}>
              {[{l:"교육목표",v:c.tgt},{l:"수료목표",v:c.cGoal},{l:"취업목표",v:c.eGoal}].map(({l,v})=>(
                <div key={l} style={{ textAlign:"center", padding:"7px 4px", background:T.s2, borderRadius:6, border:`1px solid ${T.bd}` }}>
                  <div style={{ fontSize:16, fontWeight:800, color:T.tx }}>{v}</div>
                  <div style={{ fontSize:9, color:T.mu, marginTop:1 }}>{l}</div>
                </div>
              ))}
            </div>
            {c.pdfData && (
              <button onClick={()=>{ const w=window.open(); w.document.write(`<iframe src="${c.pdfData}" style="width:100%;height:100vh;border:none;"/>`); }}
                style={{ width:"100%", padding:"7px 10px", borderRadius:7, border:`1px solid ${T.pl}60`, background:T.pbg, color:T.p, cursor:"pointer", fontSize:11, fontWeight:600, display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                <span>📕</span> {c.pdfName||"첨부 PDF 미리보기"}
              </button>
            )}
            {(c.links||[]).filter(l=>l.url).length > 0 && (
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                {(c.links||[]).filter(l=>l.url).map((lk,i)=>(
                  <a key={i} href={lk.url} target="_blank" rel="noopener noreferrer" style={{ display:"flex", alignItems:"center", gap:6, padding:"5px 8px", borderRadius:6, background:T.s2, border:`1px solid ${T.bd}`, color:T.p, textDecoration:"none", fontSize:11, fontWeight:600 }}>
                    <Icon n="info" s={12}/><span style={{ flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{lk.label || lk.url}</span><span style={{ fontSize:9, color:T.mu }}>↗</span>
                  </a>
                ))}
              </div>
            )}
          </div>
        ))}
        <div onClick={openNew} className="course-card" style={{ background:T.s2, borderRadius:12, padding:18, border:`2px dashed ${T.bd}`, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:10, minHeight:180, transition:"all .2s" }}>
          <div style={{ width:40,height:40,borderRadius:12,background:`${T.p}15`, color:T.p,display:"flex",alignItems:"center",justifyContent:"center" }}><Icon n="plus" s={20}/></div>
          <div style={{ fontSize:12, fontWeight:700, color:T.mu }}>새 과정 추가</div>
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   STUDENT MANAGEMENT  ★ 엑셀 업로드 지원
═══════════════════════════════════════════════════════════ */
const StudentMgmt = ({ students, courses, onAdd, onEdit, onDelete, onNew }) => {
  const [search, setSearch] = useState("");
  const [cFilter, setCFilter] = useState(0);
  const [riskOnly, setRisk] = useState(false);
  const [dragging, setDragging] = useState(false);
  const [preview, setPreview] = useState(null);
  const [tab, setTab] = useState("list");
  const fileRef = useRef();

  const filtered = useMemo(() => students.filter(s => {
    if(cFilter && s.cid!==cFilter) return false;
    if(riskOnly && s.rate>=80) return false;
    if(search && !s.name.includes(search) && !s.phone.includes(search)) return false;
    return true;
  }), [students, cFilter, riskOnly, search]);

  const parseFile = file => {
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:"" });
      setPreview(rows);
      setTab("import");
    };
    reader.readAsArrayBuffer(file);
  };

  const onDrop = e => { e.preventDefault(); setDragging(false); const f=e.dataTransfer.files[0]; if(f) parseFile(f); };

  const confirmImport = () => {
    if(!preview) return;
    const newStudents = preview.map((r,i) => {
      const code = r["과정코드"] || "";
      const c = courses.find(x=>x.code===code) || courses[0];
      return {
        id: Date.now()+i, cid:c.id, name:r["이름"]||"", birth:r["생년월일"]||"",
        phone:r["연락처"]||"", addrCity:r["거주시"]||"", edu:r["최종학력"]||"", major:r["전공"]||"",
        career:r["경력"]||"", certs:r["자격증"]||"", gender:r["성별"]||"남", idBack:r["주민번호뒷자리"]||"",
        rate:Math.round(60+Math.random()*40), itvScore:r["면접점수"]||null, itvGrade:r["면접등급"]||"", itvPass: r["합격여부"]==="Y"||r["합격여부"]==="합격"
      };
    });
    onAdd(newStudents);
    setPreview(null);
    setTab("list");
  };

  return (
    <div className="page">
      <SectionHead
        title="훈련생 관리" sub="훈련생 등록, 이력 조회 및 출석 현황"
        right={
          <div style={{ display:"flex", gap:8 }}>
            <Btn variant="ghost" size="sm" onClick={()=>downloadTemplate(courses)}><Icon n="dl" s={13}/> 양식 다운로드</Btn>
            <Btn variant="ghost" size="sm" onClick={()=>setTab(tab==="import"?"list":"import")}><Icon n="upload" s={13}/> {tab==="import"?"목록으로":"엑셀 업로드"}</Btn>
            <Btn size="sm" onClick={onNew}><Icon n="plus" s={13}/> 신규 등록</Btn>
          </div>
        }
      />

      {tab === "import" ? (
        <div>
          {!preview && (
            <Card style={{ marginBottom:16 }}>
              <div className={`drop-zone${dragging?" drag-over":""}`} onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)} onDrop={onDrop} onClick={()=>fileRef.current.click()} style={{ padding:"48px 24px", textAlign:"center", cursor:"pointer", border:`2px dashed ${T.pl}`, borderRadius:12, margin:16 }}>
                <div style={{ fontSize:36, marginBottom:12 }}>📂</div>
                <div style={{ fontSize:14, fontWeight:700, color:T.tx, marginBottom:6 }}>엑셀 파일을 여기에 끌어다 놓으세요</div>
                <div style={{ fontSize:12, color:T.mu, marginBottom:16 }}>또는 클릭해서 파일 선택 (.xlsx, .xls 지원)</div>
                <Btn size="sm" onClick={e=>{e.stopPropagation();fileRef.current.click()}}><Icon n="upload" s={13}/> 파일 선택</Btn>
                <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{ display:"none" }} onChange={e=>{if(e.target.files[0]) parseFile(e.target.files[0])}} />
              </div>
              <div style={{ padding:"14px 20px", background:T.s2, borderTop:`1px solid ${T.bd}`, display:"flex", gap:20, alignItems:"center" }}>
                <Icon n="info" s={16}/>
                <div style={{ fontSize:12, color:T.mu, flex:1 }}>엑셀 양식은 <b style={{ color:T.p }}>양식 다운로드</b> 버튼에서 받으실 수 있습니다. 필수 컬럼: <b>이름, 생년월일, 연락처, 과정코드</b></div>
              </div>
            </Card>
          )}

          {preview && (
            <Card style={{ overflow:"hidden" }}>
              <div style={{ padding:"14px 18px", borderBottom:`1px solid ${T.bd}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div><span style={{ fontWeight:700, fontSize:13, color:T.tx }}>📋 업로드 미리보기</span><span style={{ fontSize:12, color:T.mu, marginLeft:10 }}>{preview.length}명 확인</span></div>
                <div style={{ display:"flex", gap:8 }}>
                  <Btn variant="ghost" size="sm" onClick={()=>{setPreview(null)}}><Icon n="x" s={12}/> 취소</Btn>
                  <Btn size="sm" onClick={confirmImport}><Icon n="check" s={12}/> {preview.length}명 등록 확정</Btn>
                </div>
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse" }}>
                  <thead>
                    <tr style={{ background:T.s2 }}>
                      {TEMPLATE_HEADERS.map(h=>(<th key={h} style={{ padding:"9px 14px", textAlign:"left", fontSize:11, color:T.mu, fontWeight:700, borderBottom:`1px solid ${T.bd}` }}>{h}</th>))}
                      <th style={{ padding:"9px 14px", fontSize:11, color:T.mu, fontWeight:700, borderBottom:`1px solid ${T.bd}` }}>매칭 과정</th>
                    </tr>
                  </thead>
                  <tbody>
                    {preview.map((r,i)=>{
                      const c = courses.find(x=>x.code===r["과정코드"]);
                      return (
                        <tr key={i} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                          {TEMPLATE_HEADERS.map(h=>(<td key={h} style={{ padding:"10px 14px", fontSize:12, color:T.tx }}>{r[h]||""}</td>))}
                          <td style={{ padding:"10px 14px" }}>
                            {c ? <Chip label={c.name.length>14?c.name.slice(0,14)+"…":c.name} bg={`${c.cc}12`} color={c.cc}/> : <Chip label="과정코드 오류" bg="#FEF2F2" color={T.danger}/>}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </Card>
          )}
        </div>
      ) : (
        <>
          <Card style={{ padding:"13px 16px", marginBottom:14, display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
            <div style={{ position:"relative" }}>
              <div style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)", color:T.mu, pointerEvents:"none" }}><Icon n="search" s={13}/></div>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름·연락처 검색" style={{ paddingLeft:28, paddingRight:12, paddingTop:7, paddingBottom:7, border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", background:T.s2, width:180, color:T.tx }}/>
            </div>
            <select value={cFilter} onChange={e=>setCFilter(+e.target.value)} style={{ padding:"7px 10px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", background:T.s2, color:T.tx, cursor:"pointer" }}>
              <option value={0}>전체 과정</option>
              {courses.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <button onClick={()=>setRisk(!riskOnly)} style={{ display:"flex", alignItems:"center", gap:5, padding:"7px 13px", border:`1px solid ${riskOnly?T.danger:T.bd}`, borderRadius:8, background:riskOnly?"#FEF2F2":T.s2, color:riskOnly?T.danger:T.mu, cursor:"pointer", fontSize:12, fontWeight:600, transition:"all .15s" }}><Icon n="alert" s={13}/> 위험만</button>
            <div style={{ marginLeft:"auto", fontSize:12, color:T.mu, fontWeight:600 }}>총 {filtered.length}명</div>
          </Card>

          <Card style={{ overflow:"hidden" }}>
            <div style={{ overflowX:"auto" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", minWidth:860 }}>
              <thead>
                <tr style={{ background:T.s2, borderBottom:`1px solid ${T.bd}` }}>
                  {[{h:"이름·성별·나이", align:"left"},{h:"과정", align:"left"},{h:"거주지", align:"center"},{h:"연락처", align:"center"},{h:"학력·경력", align:"left"},{h:"취약계층", align:"center"},{h:"면접", align:"center"},{h:"출석률", align:"center"},{h:"", align:"center"}].map(({h,align})=>(
                    <th key={h} style={{ padding:"10px 12px", textAlign:align, fontSize:11, color:T.mu, fontWeight:700, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(s=>{
                  const c = courses.find(x=>x.id===s.cid);
                  const col = rateColor(s.rate);
                  const age = (() => {
                    if(!s.birth) return "-";
                    const b = new Date(s.birth), t = new Date();
                    let a = t.getFullYear()-b.getFullYear();
                    if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate())) a--;
                    return `${a}세`;
                  })();
                  const badges = [
                    s.unemployment && {l:"실업급여",bg:"#EFF6FF",c:"#2563EB"},
                    s.disabled     && {l:"장애",    bg:"#F5F3FF",c:"#7C3AED"},
                    s.veteran      && {l:"보훈",    bg:"#ECFDF5",c:"#059669"},
                  ].filter(Boolean);
                  const gradeColor = g => g?.startsWith("A")?T.ok:g?.startsWith("B")?T.warn:T.danger;
                  return (
                    <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                      <td style={{ padding:"11px 12px" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <div style={{ width:32, height:32, borderRadius:9, flexShrink:0, background: s.gender==="여" ? "#FDF2F8" : "#EFF6FF", color: s.gender==="여" ? "#BE185D" : "#1D4ED8", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:900 }}>{s.name?.[0]}</div>
                          <div>
                            <div style={{ fontSize:13, fontWeight:700, color:T.tx, whiteSpace:"nowrap" }}>{s.name}<span style={{ marginLeft:5, fontSize:10, fontWeight:600, color: s.gender==="여"?"#BE185D":"#1D4ED8" }}>{s.gender||""}</span></div>
                            <div style={{ fontSize:10, color:T.mu }}>{age} · {s.birth||"-"}</div>
                          </div>
                        </div>
                      </td>
                      <td style={{ padding:"11px 12px", maxWidth:150 }}>
                        <div style={{ fontSize:11, fontWeight:600, color:T.tx, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c?.name}</div>
                        <div style={{ fontSize:10, marginTop:1 }}><span style={{ color:c?.cc, fontWeight:700 }}>{c?.code}</span></div>
                      </td>
                      <td style={{ padding:"11px 12px", textAlign:"center" }}><div style={{ fontSize:12, fontWeight:600, color:T.tx, whiteSpace:"nowrap" }}>{s.addrCity||s.addr?.split(" ")[0]||"-"}</div></td>
                      <td style={{ padding:"11px 12px", textAlign:"center" }}><div style={{ fontSize:11, color:T.tx, whiteSpace:"nowrap" }}>{s.phone||"-"}</div></td>
                      <td style={{ padding:"11px 12px" }}>
                        <div style={{ fontSize:11, fontWeight:600, color:T.tx }}>{s.edu||"-"}</div>
                        {s.major && s.major!=="-" && <div style={{ fontSize:10, color:T.mu }}>{s.major}</div>}
                        {s.career && s.career!=="없음" && <div style={{ fontSize:10, color:T.p, marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:120 }}>{s.career}</div>}
                      </td>
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        <div style={{ display:"flex", gap:3, justifyContent:"center", flexWrap:"wrap" }}>
                          {badges.length > 0 ? badges.map(b=>(<Chip key={b.l} label={b.l} bg={b.bg} color={b.c} size={10}/>)) : <span style={{ fontSize:10, color:T.bd }}>—</span>}
                        </div>
                      </td>
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        {s.itvScore ? (
                          <><div style={{ display:"inline-flex", alignItems:"center", gap:5 }}><span style={{ fontSize:13, fontWeight:800, color: gradeColor(s.itvGrade) }}>{s.itvGrade}</span><span style={{ fontSize:11, color:T.mu }}>{s.itvScore}점</span></div><div style={{ marginTop:2 }}><Chip label={s.itvPass?"합격":"불합격"} bg={s.itvPass?T.pbg:"#FEF2F2"} color={s.itvPass?T.p:T.danger} size={10} /></div></>
                        ) : <span style={{ fontSize:10, color:T.bd }}>미입력</span>}
                      </td>
                      <td style={{ padding:"11px 12px", textAlign:"center", minWidth:80 }}>
                        <div style={{ fontSize:14, fontWeight:800, color:col }}>{s.rate}%</div>
                        <RBar r={s.rate} h={4}/>
                        <div style={{ fontSize:9, color:col, marginTop:2 }}>{s.rate>=80?"정상":s.rate>=70?"주의":"위험"}</div>
                      </td>
                      <td style={{ padding:"11px 12px", textAlign:"center" }}>
                        <div style={{ display:"flex", gap:4, justifyContent:"center" }}>
                          <button onClick={()=>onEdit(s)} title="수정" style={{ width:28, height:28, borderRadius:6, border:"none", background:T.pbg, color:T.p, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon n="edit" s={13}/></button>
                          <button onClick={()=>onDelete(s.id)} title="삭제" style={{ width:28, height:28, borderRadius:6, border:"none", background:"#FEF2F2", color:T.danger, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon n="x" s={13}/></button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            </div>
            {filtered.length===0 && <div style={{ padding:40, textAlign:"center", color:T.mu, fontSize:13 }}>검색 결과가 없습니다</div>}
          </Card>
        </>
      )}
    </div>
  );
};
/* ═══════════════════════════════════════════════════════════
   EDIT MODAL  ★ 훈련생 면접 및 정보 수정 모달
═══════════════════════════════════════════════════════════ */
const FLD = ({ label, required, children }) => (
  <div>
    <label style={{ fontSize:11, fontWeight:600, color:T.mu, display:"block", marginBottom:5 }}>
      {label}{required && <span style={{ color:T.danger, marginLeft:2 }}>*</span>}
    </label>
    {children}
  </div>
);

const EditModal = ({ student, onSave, onClose, isNew=false, courses }) => {
  const empty = {
    cid: courses[0]?.id || 1, name: "", gender: "남", birth: "", idBack: "",
    addrCity: "의정부시", phone: "", itvDate: new Date().toISOString().slice(0,10),
    itvScore: "", itvGrade: "B", itvPass: true, memo: "", rate: 0,
  };
  const [form, setForm] = useState(student ? { ...student } : empty);
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const age = (() => {
    if (!form.birth) return "";
    const b = new Date(form.birth), t = new Date();
    let a = t.getFullYear() - b.getFullYear();
    if (t.getMonth() < b.getMonth() || (t.getMonth()===b.getMonth() && t.getDate()<b.getDate())) a--;
    return isNaN(a) ? "" : `만 ${a}세`;
  })();

  const gradeColor = g => g?.startsWith("A") ? T.ok : g?.startsWith("B") ? T.warn : T.danger;
  const selStyle = { width:"100%", padding:"8px 10px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", background:T.s2, color:T.tx, cursor:"pointer" };
  const inpStyle = { width:"100%", padding:"8px 10px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", color:T.tx, background:T.s2 };
  const divider = (label) => (
    <div style={{ display:"flex", alignItems:"center", gap:10, margin:"4px 0 0" }}>
      <div style={{ fontSize:11, fontWeight:700, color:T.p }}>{label}</div>
      <div style={{ flex:1, height:1, background:T.bd }}/>
    </div>
  );

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center" }} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:T.s, borderRadius:16, width:500, maxWidth:"96vw", maxHeight:"92vh", display:"flex", flexDirection:"column", boxShadow:"0 24px 64px rgba(0,0,0,.28)", overflow:"hidden", animation:"fadeUp .2s ease" }}>
        
        {/* 헤더 */}
        <div style={{ background:`linear-gradient(135deg,${T.sb},${T.p})`, padding:"16px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
          <div>
            <div style={{ fontSize:15, fontWeight:800, color:"#fff" }}>{isNew ? "신규 훈련생 면접 등록" : `정보 수정 — ${student.name}`}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,.55)", marginTop:2 }}>{isNew ? "면접 시 확인 항목을 입력하세요" : age}</div>
          </div>
          <button onClick={onClose} style={{ width:28, height:28, borderRadius:6, border:"none", background:"rgba(255,255,255,.15)", color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon n="x" s={14}/></button>
        </div>

        {/* 바디 */}
        <div style={{ flex:1, overflowY:"auto", padding:"20px 22px", display:"flex", flexDirection:"column", gap:12 }}>
          {divider("기본 신원")}
          <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr", gap:10 }}>
            <FLD label="이름" required><input value={form.name||""} onChange={e=>set("name",e.target.value)} placeholder="홍길동" style={inpStyle}/></FLD>
            <FLD label="성별">
              <div style={{ display:"flex", gap:5, height:36 }}>
                {["남","여"].map(g=>(
                  <button key={g} type="button" onClick={()=>set("gender",g)} style={{ flex:1, border:"none", borderRadius:7, cursor:"pointer", fontWeight:700, fontSize:12, background: form.gender===g ? (g==="남"?"#EFF6FF":"#FDF2F8") : T.s3, color: form.gender===g ? (g==="남"?"#1D4ED8":"#BE185D") : T.mu }}>{g}</button>
                ))}
              </div>
            </FLD>
            <FLD label="과정">
              <select value={form.cid} onChange={e=>set("cid",+e.target.value)} style={selStyle}>
                {courses.map(c=><option key={c.id} value={c.id}>{c.code}</option>)}
              </select>
            </FLD>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>

/* ═══════════════════════════════════════════════════════════
   QR ATTENDANCE  ★ 관리자용 대형 QR 모달
═══════════════════════════════════════════════════════════ */
const BigQrModal = ({ course, onClose }) => {
  const qrRef = useRef();
  const checkInUrl = `${window.location.origin}${window.location.pathname}?mode=checkin&cid=${course.id}`;

  useEffect(() => {
    if (qrRef.current) {
      qrRef.current.innerHTML = "";
      new QRCode(qrRef.current, { text: checkInUrl, width: 320, height: 320, colorDark: "#7C2D12", colorLight: "#ffffff" });
    }
  }, [course, checkInUrl]);

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000 }}>
      <div style={{ background: "#fff", padding: "40px", borderRadius: "24px", textAlign: "center", position: "relative", animation: "fadeUp 0.3s ease" }}>
        <button onClick={onClose} style={{ position: "absolute", top: 20, right: 20, background: "none", border: "none", cursor: "pointer", color:T.mu }}><Icon n="x" s={24}/></button>
        <h2 style={{ fontSize: "24px", fontWeight: 800, color: T.sb, marginBottom: "8px" }}>{course.name}</h2>
        <p style={{ color: T.mu, marginBottom: "30px", fontSize: 14 }}>학생들은 스마트폰으로 아래 QR을 찍어주세요</p>
        <div style={{ display: "inline-block", padding: "15px", background: "#fff", borderRadius: "12px", boxShadow: "0 0 20px rgba(0,0,0,0.1)" }}>
          <div ref={qrRef}></div>
        </div>
        <div style={{ marginTop: "24px", fontSize: "12px", color: T.mu }}>{checkInUrl}</div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   ATTENDANCE MANAGEMENT (관리자 출결 관리 탭)
═══════════════════════════════════════════════════════════ */
const AttendanceMgmt = ({ students, courses, attendance, onManual }) => {
  const [selCid, setSelCid] = useState(courses[0]?.id);
  const [showQrModal, setShowQrModal] = useState(false);
  const today = new Date().toISOString().slice(0, 10);

  const courseStudents = students.filter(s => s.cid === selCid);
  const course = courses.find(c => c.id === selCid);
  const todayAttendance = attendance.filter(a => a.courseId === selCid && a.attendDate === today);

  const handleManualClick = (studentId, type, val) => {
    onManual({ studentId, courseId: selCid, type, val, attendDate: today });
  };

  return (
    <div className="page">
      <SectionHead
        title="실시간 출결 현황"
        sub={`${today} 기준 (학생들이 QR을 찍으면 자동으로 새로고침 됩니다)`}
        right={<Btn onClick={() => setShowQrModal(true)} style={{ boxShadow: "0 4px 12px rgba(234,88,12,0.3)" }}>📱 강단용 QR코드 띄우기</Btn>}
      />

      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {courses.map(c => <button key={c.id} onClick={() => setSelCid(c.id)} style={{ padding: "6px 14px", borderRadius: 20, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, background: selCid === c.id ? T.p : T.s3, color: selCid === c.id ? "#fff" : T.mu }}>{c.code}</button>)}
      </div>

      <Card style={{ overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: T.s2, borderBottom: `1px solid ${T.bd}` }}>
              {["성명", "입실", "퇴실", "방식", "상태", "수동 처리"].map(h => <th key={h} style={{ padding: "12px", textAlign: "center", fontSize: 11, color: T.mu, fontWeight: 700 }}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {courseStudents.length === 0 && <tr><td colSpan={6} style={{padding:30, textAlign:'center', color:T.mu, fontSize:13}}>이 과정에 등록된 훈련생이 없습니다.</td></tr>}
            {courseStudents.map(s => {
              const att = todayAttendance.find(a => a.studentId === s.id);
              return (
                <tr key={s.id} className="row-hover" style={{ borderBottom: `1px solid ${T.bd}` }}>
                  <td style={{ padding: 12, textAlign: "center", fontSize: 13, fontWeight: 700 }}>{s.name}</td>
                  <td style={{ padding: 12, textAlign: "center", fontSize: 12, fontWeight:600, color:T.tx }}>{att?.inTime || "-"}</td>
                  <td style={{ padding: 12, textAlign: "center", fontSize: 12, fontWeight:600, color:T.tx }}>{att?.outTime || "-"}</td>
                  <td style={{ padding: 12, textAlign: "center" }}>
                    {att ? <Chip label={att.viaQr ? 'QR 스캔' : '수동'} bg={T.s3} color={T.mu} /> : "-"}
                  </td>
                  <td style={{ padding: 12, textAlign: "center" }}>
                    {att ? <Chip label={att.status} bg={att.status === '출석' ? "#ECFDF5" : "#FEF2F2"} color={att.status === '출석' ? T.ok : T.danger} /> : <span style={{ color: "#ccc", fontSize:11 }}>대기중</span>}
                  </td>
                  <td style={{ padding: 12, textAlign: "center" }}>
                    <Btn size="sm" variant="ghost" onClick={() => handleManualClick(s.id, 'in', '09:00')} style={{ marginRight: 4 }}>수동 입실</Btn>
                    <Btn size="sm" variant="ghost" onClick={() => handleManualClick(s.id, 'out', '13:00')} style={{ marginRight: 4 }}>수동 퇴실</Btn>
                    <Btn size="sm" variant="danger" onClick={() => handleManualClick(s.id, 'status', '결석')}>결석</Btn>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
      {showQrModal && course && <BigQrModal course={course} onClose={() => setShowQrModal(false)} />}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   COMPLETION (수료 관리)
═══════════════════════════════════════════════════════════ */
const CompletionMgmt = ({ students, courses }) => {
  const [course, setCourse] = useState(courses[3] || courses[0]);
  const [threshold, setThr] = useState(80);
  const [overrides, setOvr] = useState({});
  const list = students.filter(s=>s.cid===course.id);
  const get  = s => overrides[s.id] ?? (s.rate>=threshold?"수료":"미수료");
  const completed = list.filter(s=>get(s)==="수료").length;
  const rate = list.length ? Math.round(completed/list.length*100) : 0;

  return (
    <div className="page">
      <SectionHead title="수료 관리" sub="출석률 기준 자동 판정 · 담당자 수동 조정 가능"/>
      <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap" }}>
        {courses.map(c=>(
          <button key={c.id} onClick={()=>setCourse(c)} style={{ padding:"6px 13px", borderRadius:20, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, whiteSpace:"nowrap", background: course.id===c.id ? c.cc : T.s3, color: course.id===c.id ? "#fff" : T.mu }}>
            {c.name.length>14?c.name.slice(0,14)+"…":c.name}
          </button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:12, marginBottom:18 }}>
        <Card style={{ padding:"16px 20px", display:"flex", gap:20, alignItems:"center" }}>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:11, color:T.mu, marginBottom:6, fontWeight:600 }}>수료 기준 출석률</div>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <input type="range" min={60} max={95} step={5} value={threshold} onChange={e=>setThr(+e.target.value)} style={{ flex:1, accentColor:T.p }}/>
              <span style={{ fontSize:26, fontWeight:900, color:T.p, minWidth:52 }}>{threshold}%</span>
            </div>
            <div style={{ fontSize:10, color:T.mu }}>※ 매뉴얼 기준: 총 교육시간의 80% 이상</div>
          </div>
          <Btn onClick={()=>{ const j={}; list.forEach(s=>{ j[s.id]=s.rate>=threshold?"수료":"미수료"; }); setOvr(j); }}>자동 판정</Btn>
        </Card>
        <Card style={{ padding:"16px 22px", textAlign:"center" }}>
          <div style={{ fontSize:11, color:T.mu }}>수료율</div>
          <div style={{ fontSize:32, fontWeight:900, color:rate>=90?T.p:T.danger, lineHeight:1.1 }}>{rate}%</div>
          <div style={{ fontSize:11, color:T.mu }}>{completed}/{list.length}명</div>
          <Chip label={rate>=90?"목표달성":"목표미달"} bg={rate>=90?T.pbg:"#FEF2F2"} color={rate>=90?T.p:T.danger} size={10}/>
        </Card>
        <Card style={{ padding:"16px 22px" }}>
          <div style={{ fontSize:11, color:T.mu }}>과정 목표</div>
          <div style={{ fontSize:16, fontWeight:800, color:T.tx, marginTop:4 }}>{course.cGoal}명 수료</div>
          <div style={{ fontSize:11, color:T.mu, marginTop:2 }}>{course.eGoal}명 취업 목표</div>
        </Card>
      </div>

      <Card style={{ overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.s2 }}>
              {["이름","출석률","자동판정","최종결과","비고"].map(h=>(<th key={h} style={{ padding:"10px 16px", textAlign:h==="이름"?"left":"center", fontSize:11, color:T.mu, fontWeight:700, borderBottom:`1px solid ${T.bd}` }}>{h}</th>))}
            </tr>
          </thead>
          <tbody>
            {list.map(s=>{
              const auto = s.rate>=threshold?"수료":"미수료";
              const final = get(s);
              const changed = overrides[s.id]!==undefined && overrides[s.id]!==auto;
              return (
                <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                  <td style={{ padding:"12px 16px", fontSize:13, fontWeight:700, color:T.tx }}>{s.name}</td>
                  <td style={{ padding:"12px 16px", textAlign:"center" }}>
                    <span style={{ fontSize:15, fontWeight:800, color:rateColor(s.rate) }}>{s.rate}%</span>
                    <RBar r={s.rate} h={3}/>
                  </td>
                  <td style={{ padding:"12px 16px", textAlign:"center" }}><Chip label={auto} bg={auto==="수료"?T.pbg:"#FEF2F2"} color={auto==="수료"?T.p:T.danger}/></td>
                  <td style={{ padding:"12px 16px" }}>
                    <div style={{ display:"flex", gap:6, justifyContent:"center" }}>
                      {["수료","미수료"].map(v=>(
                        <button key={v} onClick={()=>setOvr(p=>({...p,[s.id]:v}))} style={{ padding:"5px 14px", border:"none", borderRadius:6, cursor:"pointer", fontWeight:700, fontSize:12, transition:"all .15s", background: final===v?(v==="수료"?T.p:T.danger):"#F1F5F9", color: final===v?"#fff":T.mu }}>{v}</button>
                      ))}
                    </div>
                  </td>
                  <td style={{ padding:"12px 16px", textAlign:"center", fontSize:11 }}>
                    {changed && <Chip label="수동조정" bg="#FFFBEB" color={T.warn}/>}
                    {s.rate<60 && <Chip label="1년 제한 검토" bg="#FEF2F2" color={T.danger} size={10}/>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

const CertMgmt = ({ students, courses }) => {
  const [course, setCourse]       = useState(courses[3] || courses[0]);
  const [docType, setDocType]     = useState("cert");   // "cert" | "attend"
  const [issued, setIssued]       = useState({});
  const [issueDate, setIssueDate] = useState("2026년　　월　　일");
  const [customDate, setCustomDate] = useState("");

  const certEligible   = students.filter(s => s.cid===course.id && s.rate>=80);
  const attendEligible = students.filter(s => s.cid===course.id && s.rate>0);
  const eligible = docType==="cert" ? certEligible : attendEligible;

  const getCertNo = (s, idx) => issued[s.id+docType]?.no ?? `${course.code}-${String(idx+1).padStart(3,"0")}`;

  const handleIssue = (s, idx) => {
    const no = getCertNo(s, idx);
    setIssued(p => ({ ...p, [s.id+docType]: { no, date: issueDate } }));
    if(docType==="cert") printCertificate(s, course, no, issueDate);
    else                  printAttendCert(s, course, no, issueDate);
  };

  const fmtDate = raw => { if (!raw) return ""; const [y,m,d] = raw.split("-"); return `${y}년 ${m}월 ${d}일`; };

  return (
    <div className="page">
      <SectionHead title="증명서 발급" sub="수료증 · 수강증명서 공식 양식 출력 · 브라우저 인쇄 → PDF 저장" />

      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        {[{id:"cert", label:"📋 수 료 증", sub:"출석률 80% 이상"}, {id:"attend", label:"📄 수강증명서", sub:"수강자 전체"}].map(({id,label,sub})=>(
          <button key={id} onClick={()=>setDocType(id)} style={{ padding:"10px 20px", borderRadius:10, border:"none", cursor:"pointer", background: docType===id ? T.p : T.s2, color: docType===id ? "#fff" : T.mu, fontWeight:700, fontSize:13, transition:"all .15s", borderWidth:2, borderStyle:"solid", borderColor: docType===id ? T.p : T.bd }}>
            {label}<div style={{ fontSize:10, fontWeight:400, marginTop:2, color: docType===id ? "rgba(255,255,255,.7)" : T.mu }}>{sub}</div>
          </button>
        ))}
      </div>

      <div style={{ display:"flex", gap:7, marginBottom:16, flexWrap:"wrap" }}>
        {courses.map(c => (
          <button key={c.id} onClick={()=>setCourse(c)} style={{ padding:"6px 12px", borderRadius:20, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, whiteSpace:"nowrap", background: course.id===c.id ? c.cc : T.s3, color: course.id===c.id ? "#fff" : T.mu }}>
            {c.name.length>14 ? c.name.slice(0,14)+"…" : c.name}
          </button>
        ))}
      </div>

      <Card style={{ padding:"14px 18px", marginBottom:16, display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ fontSize:12, fontWeight:700, color:T.tx }}>📅 발급일자</div>
        <input type="date" value={customDate} onChange={e => { setCustomDate(e.target.value); setIssueDate(fmtDate(e.target.value)); }} style={{ padding:"6px 10px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", background:T.s2, cursor:"pointer" }}/>
        <div style={{ fontSize:12, color:T.mu }}>→ <b style={{color:T.p}}>{issueDate}</b></div>
        <div style={{ marginLeft:"auto" }}>
          <Btn size="sm" onClick={() => eligible.forEach((s, idx) => handleIssue(s, idx))}>
            <Icon n="dl" s={13}/> 전체 {eligible.length}명 출력
          </Btn>
        </div>
      </Card>

      <Card style={{ overflow:"hidden" }}>
        <div style={{ padding:"12px 18px", borderBottom:`1px solid ${T.bd}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div><span style={{ fontSize:13, fontWeight:700, color:T.tx }}>{docType==="cert" ? "수료 대상자" : "수강 대상자"}</span><span style={{ fontSize:12, color:T.mu, marginLeft:8 }}>{eligible.length}명</span></div>
        </div>
        <div style={{ padding:"10px 18px", background:"#FFFBEB", borderBottom:`1px solid #FDE68A`, fontSize:11, color:"#92400E", display:"flex", gap:8, alignItems:"center" }}>
          <Icon n="info" s={13}/><span><b>PDF 저장:</b> 발급 버튼 → 새 창 → 🖨️ 클릭 → 프린터를 <b>「PDF로 저장」</b> 선택 · 서명란: <b>경기도일자리재단 대표이사 (인)</b></span>
        </div>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.s2 }}>
              {[{h:"번호",w:50},{h:"이름",w:"auto"},{h:"생년월일",w:100},{h:"출석률",w:80},{h:"문서번호",w:150},{h:"발급여부",w:90},{h:"",w:130}].map(({h,w})=>(
                <th key={h} style={{ padding:"10px 14px", textAlign:h==="이름"?"left":"center", fontSize:11, color:T.mu, fontWeight:700, borderBottom:`1px solid ${T.bd}`, width:w }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {eligible.map((s, idx) => {
              const cert = issued[s.id+docType];
              const no = getCertNo(s, idx);
              return (
                <tr key={s.id} className="row-hover" style={{ borderBottom:`1px solid ${T.bd}` }}>
                  <td style={{ padding:"12px 14px", textAlign:"center", fontSize:12, color:T.mu }}>{idx+1}</td>
                  <td style={{ padding:"12px 14px" }}><div style={{ display:"flex", alignItems:"center", gap:8 }}><div style={{ width:28, height:28, borderRadius:8, background:`${T.p}15`, color:T.p, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, flexShrink:0 }}>{s.name[0]}</div><span style={{ fontSize:13, fontWeight:700, color:T.tx }}>{s.name}</span></div></td>
                  <td style={{ padding:"12px 14px", textAlign:"center", fontSize:12, color:T.mu }}>{s.birth||"—"}</td>
                  <td style={{ padding:"12px 14px", textAlign:"center" }}><span style={{ fontSize:14, fontWeight:800, color: s.rate>=80?T.ok:s.rate>=60?T.warn:T.danger }}>{s.rate}%</span></td>
                  <td style={{ padding:"12px 14px", textAlign:"center", fontSize:11, color:T.mu, fontFamily:"monospace" }}>{cert ? `2026-북부-${docType==="cert"?"수료":"수강"}-${no}호` : <span style={{color:T.bd}}>미발급</span>}</td>
                  <td style={{ padding:"12px 14px", textAlign:"center" }}><Chip label={cert?"발급완료":"미발급"} bg={cert?T.pbg:T.s3} color={cert?T.p:T.mu}/></td>
                  <td style={{ padding:"12px 14px", textAlign:"center" }}><Btn size="sm" variant={cert?"ghost":"primary"} onClick={()=>handleIssue(s,idx)}><Icon n="dl" s={12}/>{cert?"재출력":"PDF 발급"}</Btn></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
};

const InstructorMgmt = ({ courses, instructors, setInstructors }) => {
  const [editTarget, setEdit]  = useState(null);
  const [isNew, setIsNew]      = useState(false);
  const [search, setSearch]    = useState("");
  const [typeFilter, setTF]    = useState("전체");

  const filtered = instructors.filter(i => {
    if(typeFilter!=="전체" && i.type!==typeFilter) return false;
    if(search && !i.name.includes(search) && !i.subject.includes(search)) return false;
    return true;
  });

  const handleSave = inst => { if(isNew) setInstructors(p=>[...p, inst]); else setInstructors(p=>p.map(x=>x.id===inst.id?inst:x)); };
  const handleDel = id => { if(window.confirm("강사를 삭제하시겠습니까?")) setInstructors(p=>p.filter(x=>x.id!==id)); };
  const typeColors = {"주강사":T.p,"보조강사":T.ok,"외래강사":"#7C3AED","운영요원":T.warn};

  return (
    <div className="page">
      {editTarget!==null && <InstructorModal inst={isNew?null:editTarget} isNew={isNew} courses={courses} onSave={handleSave} onClose={()=>setEdit(null)}/>}
      <SectionHead title="강사 관리" sub={`등록 강사 ${instructors.length}명`} right={<Btn size="sm" onClick={()=>{setIsNew(true);setEdit({});}}><Icon n="plus" s={13}/> 강사 추가</Btn>} />

      <Card style={{ padding:"12px 16px", marginBottom:14, display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름 / 과목 검색…" style={{ padding:"7px 11px", border:`1px solid ${T.bd}`, borderRadius:8, fontSize:12, outline:"none", background:T.s2, width:180 }}/>
        <div style={{ display:"flex", gap:5 }}>
          {["전체","주강사","보조강사","외래강사","운영요원"].map(t=>(<button key={t} onClick={()=>setTF(t)} style={{ padding:"5px 12px", borderRadius:16, border:"none", cursor:"pointer", fontSize:11, fontWeight:600, background: typeFilter===t ? T.p : T.s3, color: typeFilter===t ? "#fff" : T.mu }}>{t}</button>))}
        </div>
      </Card>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:12 }}>
        {filtered.map(inst=>(
          <Card key={inst.id} style={{ padding:18, position:"relative" }}>
            <div style={{ position:"absolute", top:12, right:12, display:"flex", gap:5 }}>
              <button onClick={()=>{setIsNew(false);setEdit(inst);}} style={{ width:26,height:26,borderRadius:6,border:"none",background:T.pbg,color:T.p,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="edit" s={12}/></button>
              <button onClick={()=>handleDel(inst.id)} style={{ width:26,height:26,borderRadius:6,border:"none",background:"#FEF2F2",color:T.danger,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="x" s={12}/></button>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12, paddingRight:60 }}>
              <div style={{ width:44, height:44, borderRadius:12, flexShrink:0, background:`${typeColors[inst.type]||T.p}18`, color:typeColors[inst.type]||T.p, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, fontWeight:900 }}>{inst.name[0]}</div>
              <div>
                <div style={{ fontSize:14, fontWeight:800, color:T.tx }}>{inst.name}</div>
                <div style={{ display:"flex", gap:5, marginTop:3 }}><Chip label={inst.type} bg={`${typeColors[inst.type]||T.p}15`} color={typeColors[inst.type]||T.p}/>{inst.subject && <Chip label={inst.subject} bg={T.s3} color={T.mu}/>}</div>
              </div>
            </div>
            {(inst.cids||[]).length > 0 && (
              <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                {inst.cids.map(cid=>{ const c = courses.find(x=>x.id===cid); return c ? <Chip key={cid} label={c.code} bg={`${c.cc}15`} color={c.cc}/> : null; })}
              </div>
            )}
          </Card>
        ))}
      </div>
    </div>
  );
};

        </div>
        <div style={{ padding: "30px 20px", textAlign: "center" }}>
          <div style={{ fontSize: 13, color: T.mu, marginBottom: 20 }}>전체 데이터를 엑셀로 백업하거나 훈련생 데이터를 초기화할 수 있습니다.</div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
            <Btn variant="ghost" onClick={() => alert('백업 기능 준비중')}><Icon n="dl" s={14} /> 데이터 백업</Btn>
            <Btn variant="danger" onClick={() => { if(confirm("모든 훈련생 정보가 삭제됩니다. 계속하시겠습니까?")) { onResetAll(); onClose(); } }}><Icon n="alert" s={14} /> 전체 초기화</Btn>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   ACCOUNT & LOGIN (계정 관리 및 로그인)
═══════════════════════════════════════════════════════════ */
const INIT_ACCOUNTS = [
  { id:1, name:"관리자", role:"admin", pw:"admin1234" },
  { id:2, name:"김담당", role:"staff", pw:"gjf2026"   },
];

const LoginScreen = ({ onLogin, accounts }) => {
  const [u, setU] = useState(accounts[0]?.id || 1);
  const [p, setP] = useState("");
  const [err, setErr] = useState("");
  const [agree, setAgree] = useState(false);

  const handle = () => {
    if(!agree) return setErr("개인정보 처리방침에 동의해주세요.");
    const acc = accounts.find(a => a.id === u);
    if(acc && acc.pw === p) onLogin(acc); else setErr("비밀번호가 올바르지 않습니다.");
  };

  return (
    <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: `linear-gradient(135deg, ${T.sb}, ${T.p})`, fontFamily: "'Pretendard', sans-serif" }}>
      <div style={{ background: "#fff", padding: 40, borderRadius: 24, width: 400, boxShadow: "0 20px 40px rgba(0,0,0,0.3)", animation: "fadeUp 0.5s ease" }}>
        <div style={{ textAlign: "center", marginBottom: 30 }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>🎓</div>
          <h1 style={{ fontSize: 20, fontWeight: 900, color: T.tx }}>경기북부 학사관리시스템</h1>
        </div>
        <select value={u} onChange={e => {setU(parseInt(e.target.value)); setErr("");}} style={{ width: "100%", padding: 12, marginBottom: 10, borderRadius: 8, border: `1px solid ${T.bd}`, fontSize: 14 }}>
          {accounts.map(a => <option key={a.id} value={a.id}>{a.name} ({a.role==='admin'?'관리자':'담당자'})</option>)}
        </select>
        <input placeholder="비밀번호 입력 (gjf2026)" type="password" value={p} onChange={e => {setP(e.target.value); setErr("");}} onKeyDown={e => e.key==='Enter' && handle()} style={{ width: "100%", padding: 12, marginBottom: 10, borderRadius: 8, border: `1px solid ${T.bd}`, fontSize: 14 }} />
        <div style={{ display:"flex", gap:8, fontSize:12, color:T.mu, marginBottom:20, alignItems:"start" }}>
          <input type="checkbox" checked={agree} onChange={e=>setAgree(e.target.checked)} style={{ marginTop:2, cursor:"pointer" }} />
          <label style={{ cursor:"pointer", lineHeight:1.4 }} onClick={()=>setAgree(!agree)}>개인정보 취급 및 업무 목적 외 사용 금지에 동의합니다. 무단 반출 시 법적 책임을 질 수 있습니다.</label>
        </div>
        {err && <div style={{ color: T.danger, fontSize: 12, marginBottom: 15, textAlign: "center", fontWeight: 700 }}>⚠️ {err}</div>}
        <Btn onClick={handle} style={{ width: "100%", padding: 15, fontSize: 16 }}>로그인</Btn>
      </div>
    </div>
  );
};

const AccountMgmt = ({ accounts, onSave, onClose }) => {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:1100, display:"flex", alignItems:"center", justifyContent:"center" }} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:T.s, borderRadius:18, width:400, padding: 20 }}>
        <h3>계정 관리 (준비중)</h3>
        <Btn onClick={onClose} style={{ marginTop: 20 }}>닫기</Btn>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════
   APP ROOT (라우팅 & 상태 관리)
═══════════════════════════════════════════════════════════ */
const NAV_ITEMS = [
  { id:"dash",        label:"대시보드",    icon:"dash"   },
  { id:"courses",     label:"과정 현황",   icon:"book"   },
  { id:"students",    label:"훈련생 관리", icon:"people" },
  { id:"instructors", label:"강사 관리",   icon:"award"  },
  { id:"rooms",       label:"강의실 관리", icon:"cal"    },
  { id:"attendance",  label:"출결 관리",   icon:"check"  },
  { id:"completion",  label:"수료 관리",   icon:"check"  },
  { id:"cert",        label:"증명서 발급", icon:"dl"     },
];

function App() {
  // 1. URL 파라미터 파싱 (모바일 출석 모드 판별)
  const params = new URLSearchParams(window.location.search);
  const mode = params.get("mode");
  const cid = params.get("cid");

  const [accounts, setAccounts] = useState(INIT_ACCOUNTS);
  const [currentUser, setCurrentUser] = useState(() => {
    try { const u = sessionStorage.getItem("gjf_user"); return u ? JSON.parse(u) : null; } catch { return null; }
  });
  
  const [students, setStudents] = useState([]);
  const [courses, setCourses] = useState([]);
  const [attendance, setAttendance] = useState([]); // 출석 데이터
  
  const [instructors, setInstructors] = useState(SEED_INSTRUCTORS);
  const [rooms, setRooms] = useState(SEED_ROOMS);
  const [bookings, setBookings] = useState(SEED_BOOKINGS);

  const [page, setPage] = useState("dash");
  const [collapsed, setCollapsed] = useState(false);
  const [dbReady, setDbReady] = useState(false);
  const [showDataMgr, setShowDataMgr] = useState(false);
  const [showAccMgr, setShowAccMgr] = useState(false);
  const [showNew, setShowNew] = useState(false);
  const [editTarget, setEditTarget] = useState(null);

  // 2. 초기 데이터 로드
  useEffect(() => {
    if (!currentUser && mode !== 'checkin') return; // 모바일 모드면 로딩 허용
    const initLoad = async () => {
      const [cRes, sRes, aRes] = await Promise.all([
        sbGet("courses", "select=*&order=id"),
        sbGet("students", "select=*&order=id"),
        sbGet("attendance", `attend_date=eq.${new Date().toISOString().slice(0, 10)}`)
      ]);
      if (cRes.data) setCourses(cRes.data.map(toCourse)); else setCourses(COURSES);
      if (sRes.data) setStudents(sRes.data.map(toStudent)); else setStudents(SEED_STUDENTS);
      if (aRes.data) setAttendance(aRes.data.map(toAttendance));
      setDbReady(true);
      
      const l = document.getElementById('loading');
      if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 400); }
    };
    initLoad();
  }, [currentUser, mode]);

  // 3. ★ Supabase Realtime (진짜 실시간 연동) ★
  useEffect(() => {
    if (!currentUser || !dbReady || mode === 'checkin') return;

    // 학생 테이블 실시간 구독
    const studentChannel = supabase.channel('public:students')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'students' }, payload => {
        if (payload.eventType === 'INSERT') setStudents(prev => [...prev, toStudent(payload.new)]);
        else if (payload.eventType === 'UPDATE') setStudents(prev => prev.map(s => s.id === payload.new.id ? toStudent(payload.new) : s));
        else if (payload.eventType === 'DELETE') setStudents(prev => prev.filter(s => s.id !== payload.old.id));
      }).subscribe();

    // 출석 테이블 실시간 구독
    const attendChannel = supabase.channel('public:attendance')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance' }, payload => {
        if (payload.eventType === 'INSERT') setAttendance(prev => [...prev, toAttendance(payload.new)]);
        else if (payload.eventType === 'UPDATE') setAttendance(prev => prev.map(a => a.id === payload.new.id ? toAttendance(payload.new) : a));
      }).subscribe();

    return () => {
      supabase.removeChannel(studentChannel);
      supabase.removeChannel(attendChannel);
    };
  }, [currentUser, dbReady, mode]);

  // 4. 모바일 화면 분기
  if (mode === 'checkin' && cid) {
    return <StudentMobileView cid={cid} />;
  }

  // 5. 로그인 화면 분기
  if (!currentUser) {
    return (
      <>
        <GStyle/>
        <LoginScreen accounts={accounts} onLogin={u => { sessionStorage.setItem("gjf_user", JSON.stringify(u)); setCurrentUser(u); }} />
      </>
    );
  }

  const addStudents = async (newOnes) => {
    const temps = newOnes.map((s, i) => ({ ...s, id: -(Date.now() + i) }));
    setStudents(prev => [...prev, ...temps]);
    const { data, error } = await sbInsert("students", newOnes.map(fromStudent));
    if (error) {
      alert("❌ 저장 실패: " + JSON.stringify(error));
      setStudents(prev => prev.filter(s => !temps.find(t => t.id === s.id)));
    } else {
      const realData = (Array.isArray(data) ? data : [data]).map(toStudent);
      setStudents(prev => [...prev.filter(s => !temps.find(t => t.id === s.id)), ...realData]);
    }
  };

  const updateStudent = async (updated) => {
    setStudents(prev => prev.map(s => s.id === updated.id ? updated : s));
    await sbUpdate("students", `id=eq.${updated.id}`, fromStudent(updated));
  };

  const deleteStudent = async (id) => {
    if (!window.confirm("정말 삭제하시겠습니까?")) return;
    setStudents(prev => prev.filter(s => s.id !== id));
    await sbDelete("students", `id=eq.${id}`);
  };

  const renderPage = () => {
    switch(page) {
      case "dash": return <Dashboard students={students} courses={courses}/>;
      case "courses": return <CourseList courses={courses} onAdd={async(c)=>{ const {data} = await sbInsert("courses", fromCourse(c)); if(data) setCourses(p=>[...p, toCourse(data)]); }} onUpdate={async(c)=>{ setCourses(p=>p.map(x=>x.id===c.id?c:x)); await sbUpdate("courses", `id=eq.${c.id}`, fromCourse(c)); }} onDelete={async(id)=>{ setCourses(p=>p.filter(x=>x.id!==id)); await sbDelete("courses", `id=eq.${id}`); }}/>;
      case "students": return <StudentMgmt students={students} courses={courses} onAdd={addStudents} onEdit={setEditTarget} onDelete={deleteStudent} onNew={()=>setShowNew(true)}/>;
      case "instructors": return <InstructorMgmt courses={courses} instructors={instructors} setInstructors={setInstructors}/>;
      case "rooms": return <RoomMgmt courses={courses} rooms={rooms} setRooms={setRooms} bookings={bookings} setBookings={setBookings}/>;
      case "attendance": return <AttendanceMgmt students={students} courses={courses} attendance={attendance} onManual={async (req) => {
        const { data: ex } = await sbGet("attendance", `student_id=eq.${req.studentId}&attend_date=eq.${req.attendDate}`);
        const body = req.type === 'in' ? { in_time: req.val, status: '출석' } : req.type === 'out' ? { out_time: req.val } : { status: req.val };
        if (ex && ex.length > 0) await sbUpdate("attendance", `id=eq.${ex[0].id}`, body);
        else await sbInsert("attendance", { student_id: req.studentId, course_id: req.courseId, attend_date: req.attendDate, ...body, via_qr: false });
      }}/>;
      case "completion": return <CompletionMgmt students={students} courses={courses}/>;
      case "cert": return <CertMgmt students={students} courses={courses}/>;
      default: return null;
    }
  };

  return (
    <div style={{ display:"flex", height:"100vh", flexDirection:"column", fontFamily:"'Pretendard', sans-serif" }}>
      <GStyle/>
      <div style={{ background:"#7C2D12", padding:"7px 22px", color:"#fff", fontSize:"11px", display:"flex", justifyContent:"space-between", zIndex:10 }}>
        <span>🔒 개인정보 주의: 이 시스템은 훈련생 개인정보를 포함합니다. 업무 목적 외 유출을 엄금합니다.</span>
      </div>

      <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
        {/* Sidebar */}
        <div style={{ width: collapsed?64:240, background:T.sb, color:"#fff", transition:"width 0.2s ease", display:"flex", flexDirection:"column", flexShrink:0, boxShadow:"4px 0 20px rgba(0,0,0,0.1)", zIndex:5 }}>
          <div style={{ padding:"16px 18px", fontWeight:900, borderBottom:"1px solid rgba(255,255,255,0.1)", display:"flex", alignItems:"center", justifyContent:collapsed?"center":"space-between" }}>
            {!collapsed && <span style={{ fontSize:14, letterSpacing:"-0.5px" }}>경기북부 학사관리</span>}
            <button onClick={()=>setCollapsed(!collapsed)} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.6)", cursor:"pointer" }}><Icon n="bars" s={16}/></button>
          </div>
          <nav style={{ flex:1, padding:"10px 0", overflowY:"auto" }}>
            {NAV_ITEMS.map(item => (
              <button key={item.id} className="btn-nav" onClick={()=>setPage(item.id)} style={{ width:"100%", padding:collapsed?"14px 0":"12px 20px", display:"flex", alignItems:"center", justifyContent:collapsed?"center":"flex-start", gap:12, background:page===item.id?"rgba(255,255,255,0.12)":"transparent", border:"none", borderLeft:page===item.id?`3px solid #FED7AA`:`3px solid transparent`, color:page===item.id?"#fff":"rgba(255,255,255,0.6)", cursor:"pointer", fontSize:13, fontWeight:page===item.id?700:400 }}>
                <Icon n={item.icon} s={16}/> {!collapsed && <span style={{ whiteSpace:"nowrap" }}>{item.label}</span>}
              </button>
            ))}
          </nav>
          {!collapsed && (
            <div style={{ padding:"20px", borderTop:"1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ fontSize:12, fontWeight:700, marginBottom:8 }}>{currentUser.name} 님</div>
              {currentUser.role==="admin" && <button onClick={()=>setShowAccMgr(true)} style={{ width:"100%", padding:"8px", background:"rgba(255,255,255,0.1)", border:"none", borderRadius:6, color:"#fff", fontSize:11, marginBottom:8, cursor:"pointer" }}>👤 계정 관리</button>}
              <button onClick={()=>{sessionStorage.clear(); window.location.reload();}} style={{ width:"100%", padding:"8px", background:"transparent", border:"1px solid rgba(255,255,255,0.3)", borderRadius:6, color:"#fff", fontSize:11, cursor:"pointer" }}>🚪 로그아웃</button>
            </div>
          )}
        </div>

        {/* Main Content */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", background:"#F8FAFC" }}>
          <header style={{ height:56, background:"#fff", borderBottom:`1px solid ${T.bd}`, display:"flex", alignItems:"center", padding:"0 24px", justifyContent:"space-between", flexShrink:0 }}>
            <div style={{ fontSize:13, fontWeight:700, color:T.tx }}>
              경기도일자리재단 북부교육팀 
              <span style={{ marginLeft:10, fontSize:10, padding:"3px 8px", borderRadius:4, background:dbReady?"#ECFDF5":"#FEF3C7", color:dbReady?T.ok:T.warn }}>{dbReady?"🟢 DB 연결됨":"🟡 확인중"}</span>
            </div>
            <Btn variant="ghost" size="sm" onClick={()=>setShowDataMgr(true)}><Icon n="dl" s={13}/> 데이터 백업/초기화</Btn>
          </header>
          <main style={{ flex:1, overflowY:"auto", padding:"24px 32px" }}>
            {renderPage()}
          </main>
        </div>
      </div>

      {/* Modals */}
      {showNew && <EditModal student={null} isNew={true} courses={courses} onSave={s=>addStudents([s])} onClose={()=>setShowNew(false)}/>}
      {editTarget && <EditModal student={editTarget} courses={courses} onSave={updateStudent} onClose={()=>setEditTarget(null)}/>}
      {showDataMgr && <DataManager students={students} courses={courses} onResetAll={()=>{setStudents([]); sbDelete("students", "id=gte.0");}} onClose={()=>setShowDataMgr(false)}/>}
      {showAccMgr && currentUser.role==="admin" && <AccountMgmt accounts={accounts} onClose={()=>setShowAccMgr(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
  
  <script>
    // 로딩 화면 제거 스크립트
    (function hideSplash() {
      var attempts = 0;
      var timer = setInterval(function() {
        attempts++;
        var root = document.getElementById('root');
        if ((root && root.children.length > 0) || attempts > 60) {
          clearInterval(timer);
          var l = document.getElementById('loading');
          if (l) { l.style.opacity = '0'; setTimeout(function(){ if(l.parentNode) l.parentNode.removeChild(l); }, 400); }
        }
      }, 200);
    })();
  </script>
</body>
