      return (
        <div style={{ animation: "fadeUp 0.4s ease" }}>
          <h1 style={{ fontSize: 28, fontWeight: 950, color: T.text, marginBottom: 20 }}>수료 관리</h1>

          <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
            {courses.map(c => (
              <Btn key={c.id} onClick={() => setCourse(c)} variant={course?.id === c.id ? "primary" : "ghost"} style={{ padding: "6px 12px", fontSize: 11 }}>
                {c.code}
              </Btn>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 14, marginBottom: 20 }}>
            {[
              { label: "총 인원", val: course_students.length },
              { label: "수료 예정", val: completed, color: T.ok },
              { label: "수료율", val: `${completion_rate}%`, color: completion_rate >= 90 ? T.ok : T.warn },
            ].map((k, i) => (
              <Card key={i} style={{ padding: 18, textAlign: "center", background: T.bg }}>
                <div style={{ fontSize: 24, fontWeight: 900, color: k.color || T.p }}>{k.val}</div>
                <div style={{ fontSize: 12, color: T.muted, marginTop: 6 }}>{k.label}</div>
              </Card>
            ))}
          </div>

          <Card style={{ padding: 20 }}>
            <table style={{ width: "100%", borderCollapse: "collapse" }}>
              <thead>
                <tr style={{ background: T.bg, borderBottom: `1px solid ${T.border}` }}>
                  {["이름", "출석률", "수료 판정"].map(h => (
                    <th key={h} style={{ padding: "12px", textAlign: "center", fontSize: 12, fontWeight: 700, color: T.muted }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {course_students.map(s => (
                  <tr key={s.id} style={{ borderBottom: `1px solid ${T.border_light}` }}>
                    <td style={{ padding: "12px", textAlign: "center", fontWeight: 700 }}>{s.name}</td>
                    <td style={{ padding: "12px", textAlign: "center", fontSize: 13, fontWeight: 800, color: s.rate >= 80 ? T.ok : T.warn }}>{s.rate}%</td>
                    <td style={{ padding: "12px", textAlign: "center" }}>
                      <Chip label={s.rate >= 80 ? "✓ 수료" : "✗ 미수료"} bg={s.rate >= 80 ? `${T.ok}20` : `${T.danger}20`} color={s.rate >= 80 ? T.ok : T.danger} />
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       🔐 로그인 화면
    ═══════════════════════════════════════════════════════════ */
    const LoginScreen = ({ accounts, onLogin }) => {
      const [sel_id, setSelId] = useState(accounts[0]?.id);
      const [pw, setPw] = useState("");
      const [error, setError] = useState("");

      const handle_login = () => {
        const acc = accounts.find(a => a.id === sel_id);
        if (!acc || acc.pw !== pw) {
          setError("❌ 비밀번호가 올바르지 않습니다");
          return;
        }
        onLogin(acc);
      };

      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: `linear-gradient(135deg, ${T.sb} 0%, ${T.p} 50%, ${T.p_light} 100%)`, padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 400, background: T.white, borderRadius: 20, padding: 40, boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
            <div style={{ textAlign: "center", marginBottom: 30 }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>🎓</div>
              <h1 style={{ fontSize: 20, fontWeight: 950, color: T.text }}>경기북부 학사관리</h1>
              <p style={{ fontSize: 12, color: T.muted, marginTop: 6 }}>v2026 직업교육 시스템</p>
            </div>

            <div style={{ marginBottom: 18 }}>
              <label style={{ fontSize: 12, fontWeight: 700, color: T.muted, display: "block", marginBottom: 8 }}>담당자 선택</label>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {accounts.map(a => (
                  <Btn key={a.id} onClick={() => setSelId(a.id)} variant={sel_id === a.id ? "primary" : "ghost"} style={{ flex: 1, padding: "8px 12px", fontSize: 12 }}>
                    {a.name}
                  </Btn>
                ))}
              </div>
            </div>

            <div style={{ marginBottom: 18 }}>
              <label style={{ fontSize: 12, fontWeight: 700, color: T.muted, display: "block", marginBottom: 8 }}>비밀번호</label>
              <input type="password" value={pw} onChange={e => { setPw(e.target.value); setError(""); }} onKeyDown={e => e.key === "Enter" && handle_login()} placeholder="비밀번호 입력" style={{ width: "100%", padding: "11px 14px", border: `1px solid ${T.border}`, borderRadius: 10, fontSize: 13, outline: "none", background: T.white, color: T.text }} />
            </div>

            {error && <div style={{ fontSize: 12, color: T.danger, marginBottom: 16, padding: "8px 12px", background: "#FEF2F2", borderRadius: 8 }}>{error}</div>}

            <Btn onClick={handle_login} style={{ width: "100%", justifyContent: "center", padding: "12px" }}>로그인</Btn>

            <div style={{ fontSize: 11, color: T.muted, textAlign: "center", marginTop: 14 }}>
              초기 비밀번호: <span style={{ fontFamily: "monospace", background: T.bg, padding: "2px 6px", borderRadius: 4 }}>gjf2026</span>
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════════
       🎪 메인 APP
    ═══════════════════════════════════════════════════════════ */
    function App() {
      const [current_user, setCurrentUser] = useState(() => {
        const u = sessionStorage.getItem("gjf_user");
        return u ? JSON.parse(u) : null;
      });
      
      const [page, setPage] = useState("dash");
      const [courses, setCourses] = useState(SEED_COURSES);
      const [students, setStudents] = useState(SEED_STUDENTS);

      if (!current_user) {
        return <LoginScreen accounts={INIT_ACCOUNTS} onLogin={user => { sessionStorage.setItem("gjf_user", JSON.stringify(user)); setCurrentUser(user); }} />;
      }

      const NAV_ITEMS = [
        { id: "dash", label: "대시보드", icon: "dash" },
        { id: "students", label: "훈련생 관리", icon: "user" },
        { id: "attendance", label: "출결 관리", icon: "check" },
        { id: "completion", label: "수료 관리", icon: "check" },
      ];

      const renderPage = () => {
        switch (page) {
          case "dash": return <Dashboard courses={courses} students={students} />;
          case "students": return <StudentMgmt students={students} courses={courses} />;
          case "attendance": return <AttendanceMgmt students={students} courses={courses} />;
          case "completion": return <CompletionMgmt students={students} courses={courses} />;
          default: return <Dashboard courses={courses} students={students} />;
        }
      };

      return (
        <div style={{ display: "flex", height: "100vh", overflow: "hidden" }}>
          {/* SIDEBAR */}
          <aside style={{ width: 240, background: `linear-gradient(180deg, ${T.sb} 0%, ${T.p} 100%)`, color: "white", display: "flex", flexDirection: "column", boxShadow: "4px 0 12px rgba(0,0,0,0.15)" }}>
            <div style={{ padding: "24px 18px", borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ fontSize: 13, fontWeight: 950, letterSpacing: "-0.5px" }}>경기북부 직업교육</div>
              <div style={{ fontSize: 11, opacity: 0.6, marginTop: 4 }}>v2026 시스템</div>
            </div>
            <nav style={{ flex: 1, padding: "16px 8px", overflowY: "auto" }}>
              {NAV_ITEMS.map(item => (
                <button key={item.id} onClick={() => setPage(item.id)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", borderRadius: 12, border: "none", cursor: "pointer", background: page === item.id ? "rgba(255,255,255,0.15)" : "transparent", color: page === item.id ? "white" : "rgba(255,255,255,0.65)", fontWeight: page === item.id ? 700 : 500, fontSize: 13, transition: "0.2s", marginBottom: 4 }}>
                  <Icon n={item.icon} s={18} c="currentColor" /> {item.label}
                </button>
              ))}
            </nav>
            <div style={{ padding: "16px 14px", borderTop: "1px solid rgba(255,255,255,0.1)", display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Icon n="user" s={18} c="white" />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 700, whiteSpace: "nowrap" }}>{current_user.name}</div>
                <div style={{ fontSize: 10, opacity: 0.6 }}>{current_user.role === "admin" ? "관리자" : "담당자"}</div>
              </div>
              <button onClick={() => { sessionStorage.removeItem("gjf_user"); setCurrentUser(null); }} style={{ width: 28, height: 28, borderRadius: 8, border: "none", background: "rgba(255,255,255,0.15)", color: "white", cursor: "pointer", fontSize: 14 }}>🚪</button>
            </div>
          </aside>

          {/* MAIN CONTENT */}
          <main style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", background: T.bg }}>
            <header style={{ height: 60, background: T.white, borderBottom: `1px solid ${T.border}`, padding: "0 28px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: T.muted }}>경기도일자리재단 북부사업본부</div>
              <div style={{ fontSize: 11, fontWeight: 700, background: T.p_bg, color: T.p, padding: "5px 12px", borderRadius: 20 }}>🟢 운영중</div>
            </header>
            <div style={{ flex: 1, overflowY: "auto", padding: "28px" }}>
              {renderPage()}
            </div>
          </main>
        </div>
      );
    }

    // ✨ 마운트
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
